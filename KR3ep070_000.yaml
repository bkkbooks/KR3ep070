body:
  text: 跋我國古代醫術至後漢長沙而極非以其理論之能動視聽蓋由其用方之有實效也奈自金元以來諸家別樹異幟沽名釣譽舍治績而重玄説引五運而申六氣時人不察其非竟群起而附會之近年科學之説自西歐來學者又以國醫不合科學欲以毀運氣者並古聖實學而棄之寧非過乎拙巢大師宗法南陽誠當代醫界之泰斗而及門之士大抵慕其文章詩句書法丹青反鮮注意於醫此何故歟蓋時俗用藥每喜輕淡而師則不欲隨俗同流獨標其學曰南陽學派焉薑先生佐景於醫學先有深造求益於拙師之門窺其論治與師若合符節先生常心傷中醫學之衰微急欲奮起挽救乃集師歷驗之醫案整理而編輯之附以心得發為按語瀝心血絞腦汁數易寒暑方告厥成不以培生為淺陋囑肩繕抄之任故培生先得而捧讀焉書中經緯花紋條舉不紊敘述有抑揚之妙釋理無矛盾之弊其倡言葛根湯為太陽溫病主方羅列三化熱方於三太陽方之後足使氣化醫奪魄其指舉盲腸炎肋膜炎肺炎心臟病之主方足使科學醫震撼更揭示脈證治法應用之廣泛外感疾病傳變之原則太陽陽明兩經之骨幹傷寒溫病二説之歸納又出之以沉著之筆伸之以透快之辭無一非吾醫界之創舉洵可稱破天荒之盛業逆知讀者快誦之際恍似置身雲夢之中秉燭以遊驟見山高水長月皎風清又喜峰回路轉柳暗花明其間宇宙之大品類之盛有難以形容者在焉然則斯書也表彰師道發揚聖學導學者於康莊之路脫斯民於疾苦之鄉厥功偉矣用塗數語於簡末以志欽佩云丁丑元宵節拙師門下晚學生唐培生謹跋
