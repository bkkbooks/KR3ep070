body:
  text: 第一集卷首序予自髫年即喜讀張隱菴傷寒論注先君子見而慰之以為讀書之暇倘得略通醫理是以濟世之一術也年十六會先君子病洞泄寒中醫者用芩連十餘劑病益不支汗凝若膏膚冷若石魂恍恍而欲飛體搖搖而若墜一夕數驚去死者蓋無幾矣最後趙雲泉先生來投以大劑附子理中加吳萸丁香之屬甫進一劑汗斂體溫泄止神定累進之病乃告全云泉之言曰今年太歲在辰為濕土司天又當長夏之令累日陰雨天人交困證多寒濕時醫不讀傷寒太陰篇何足與論活人方治哉予自聞此語然後知仲景方治果足脫人於險也厥後予治舉子業輟而弗理光緒中赴試金陵途中臥病偕行者略知醫方日以藿香佩蘭進之汗出而熱不除抵金陵病益殆適先表伯陳葆厚先生來同寓診予脈曰病當速愈但累經發汗津液已耗因向藥肆中購荷葉露三大瓶及哀家梨十餘枚曰渴即飲之飢即啖之予從其言半日而盡抵暮攜藥及煎粥之器及米炭來予睡方醒聞藥香葆伯令侍者進一甌自覺滿身沾漬中夜衣被俱濕葆伯為予易衣被問其方則曰桂枝白虎湯也予至是全體舒暢呼粥盡二碗安眠達旦非復病夫之故態矣予至是益信經方然以家君子期望予掇取科名未暇盡瘁研究自甲辰禮闈後詔罷科舉家君子亦於是年棄養然後瀏覽傷寒金匱全文予年已三十有八矣嗣是以來慨然興救世之志然其端實起於家庭用大劑附子理中則自先母邢太安人病洞泄始用皂莢丸則自母氏病但坐不眠時吐濁痰始用十棗湯則自母氏病痰飲始用甘草粉蜜湯則自家婢病蛔厥始用大黃牡丹湯則自若華母潘氏病腸癰始莫不隨時取效其應如響然則仲景之書豈金元四家所能窺見萬一哉所謂仁人之言其利溥也予年過五十始來上海其間用經方取效者十常八九顧性疏懶耽吟詠於活人方治境過情遷略不措意故存稿絕少即偶面錄存復為從遊者攜去甲戌年姜生佐景來掇拾方案佐以解說名之曰經方實驗錄數載之中裒然成集行將刊布問世丐序於予予笑謂姜生曰此書一出其於予傷寒金匱發微有光矣爰本平素趨重經方顛末拉雜書之丙子立秋後二日江陰曹家達序於上海寓齋章序成之從曹師遊也於今十七年矣師以經方治病幾於數見不鮮成之心好之故每遇重證往往以師為法即當時有曹派醫生之目予亦弗之辯也蓋觀師方治往往如己所欲出故於師之驗案亦若不甚珍惜竊謂取法其意足矣安用此瑣瑣者為若必匯而錄之仲景原書固自在也姜君佐景自近三年中始遊師門下乃輯師驗案及己所效用之經方解說而詳述之名曰經方實驗錄其意適與成之相反此何說歟成之所以不錄驗案而但師其意者為一身之學術計也今姜君廣搜驗案使天下人知經方之有實用者為全國之學術計也然則獨善其身何如兼善天下之為廣博哉然後嘆予向日之所見為拘墟不免對姜君而益滋慚恧也丙子重九日同學章成之序邵序復古不已終必達於本凡事盡然今夫長沙之術體實而用玄事有徵驗乃時師倒植轉尊葉吳新學無識猥邵歐美盜憎主人雜然同辭夏璜楚玉視同糞土此所謂以二缶鐘惑也可不大哀乎予自辛未先人患痰飲輾轉誤治以至不起恨市醫害道始閉戶殫精鑽究傷寒大論發憤寢饋蒐購註疏殆遍旁及諸家醫案密慄比勘稍稍出所學為人診病時獲奇效嘗治壯夫痰厥半夏重用至二兩治小兒吐蛔赭石重用至二兩四錢又治小兒頭面如焚而下利不止用金匱麥門冬湯治婦人血瘀脈伏如狂用傷寒論桃核承氣湯治婦人崩漏師內經藘茹烏鰂丸意用張氏固沖湯出入損益陽明燥結兼結胸則任大承氣合大陷胸湯痰飲則用苓桂朮甘湯苓甘五味姜辛半夏湯小青龍加石膏湯瘧則用白虎湯加半夏婦人病後脈弱則用真武湯加薯蕷其茯苓半夏皆重至二兩石膏薯蕷皆重至四兩附子重至五錢服後瞑眩者達半日許每任重劑見者咋舌然皆覆杯取效余乃亟嘆經方功用之神奇豈金元諸家與夫吳下派所能夢見萬一者今年春以文字因緣得交姜子佐景而經方大家曹公穎甫者姜子問業師也二人者曾為拙著傷寒論新詮捐序茲經方實驗錄將行世則師案而弟子編者載之空言固不如見諸行事之為深切著明矣間如神志恍惚以闕上蒸熱用大承氣小兒脈微細但欲寐舍四逆而取麻附甘草幾於入虢望色神妙欲到秋毫之顛矣又如腸癰病數千年所不經見西方醫所無奈何大陷胸證惲鐵樵疑莫能明葶藶瀉肺湯張錫純希見著錄此書皆歷歷詳之非夫黃中通理獨造幽奧者能乎斟其淑靜味其奇侅可以遣東西下士之鄙執而尋仲師墜緒於微茫雖達於本不難矣其視東洞丹波湯本何如哉彼徒掇拾歐美皮毛與夫冀得為葉吳之後世者將皆奪魄焉所愧者郢人能堊漫其鼻端若蠅翼吾斫之未能運斤成風佛頭著糞餘數有譏矣柔兆困敦辜月浙婺邵餐芝序葉序中醫存廢問題在目下確尚未能解決中醫改進方針現在可謂主張紛歧主廢棄者謂中醫說理太荒謬不合真際此言確屬實情主保存者謂中醫治療有不可思議之實效能補科學方法之不及此亦不可磨滅之事實前者謂中醫治療的功效在藥而不在醫故中醫當廢而中藥不可廢後者謂中醫之學理是哲學無在不合於科學中西學說只須加以匯通即是中醫科學化於是編刊物印專著紛紛出版幾如雨後春筍然而一檢其內容非摭拾陳言即妄呈臆說或獵取一二科學名辭硬湊五行氣化經絡運氣等腐說如中學為體西學為用以及中西溝通等連篇累牘汗牛充棟之作殊少見能差強人意者鄙人以為中醫之治療功效雖在於藥物然絕不是各個藥物單獨所發揮之效力而方劑之配合大有研究之價值以臨床之經驗言知整個之經方每能起沉疴大疾若雜湊藥物以成方劑則治效即大減後人妄謂古方不宜於今病而臆造時方此中國醫學所以至無明而退化也蓋古人由體驗得來之整個經方其組織自成為一種混合的藥效故某方有某方的主治證候如麻黃湯主治太陽病脈浮頭項強痛而惡寒之無汗脈浮緊桂枝湯主治同類證候之有汗脈浮緩等是也治中醫者除深究藥物之外尤須注意經方方劑及主治證候之研究證候者人體因病理的變化而所顯的徵象也古醫之無病理學固不可諱而證候之認識為方藥治療之相對的憑藉若廢棄中醫而專研藥物則試問拋棄數千年經驗之憑藉根據證候而投方藥經方而另起爐灶迂迂遠遠的化驗藥物那不但舍近就遠而且不易得到效果此所以主廢棄者未免流於偏激也至於主保存者於中西絕不可通之中硬求匯通牽強附會以圖整理改進竊以為亦徒勞而少功此所以主保存改進者之方針亟宜瞄準也醫學重實驗欲求治驗之效速而確舍經方莫屬方劑治療之對象是證候欲究證候之所由來則細胞病理之機變不可不知推而至於生理組織解剖病理藥理均為必修之科鄙人承海內同志不棄僉以識途老馬相視紛紛來函詢以中醫改進之方針及所應讀之醫藥書籍或以新出醫書之良劣為詢或要求介紹最精良之近代作品書函疊積苦不勝答因藉報端刊啟事介紹同志所應讀者以科學的生理解剖病理藥理等外中醫書籍惟藥物方劑傷寒金匱千金外臺等經驗的古方證候治療的學術而已神交姜君佐景所編之經方實驗錄適已殺青馳書索序喜其以忠實之筆述經方大家曹穎甫先生之治驗周密翔實得未曾有姜君更闡發其病理藥理治案有姓名與住址復影印曹先生之原方以真確之事實報告最有實用之經方治驗於醫界使人對於經方減去畏葸惠過慮之觀念其功實不在仲景下也此書出而果子藥敷衍塞責之時風或可稍殺其對於改進中醫前途寧不大哉爰書所感以應之時民國二十五年葉橘泉書於蘇州存濟醫廬熊序近世俗醫於仲景之學入之不深對經方輒多畏避創為辛涼輕劑以欺世盜名乃使仲景之道鬱而不彰今佐景先生以其縱橫矯健之筆將其師曹穎甫先生平日曆奏奇效諸經方為之闡幽抉奧疏通證明裒成一帙顏曰經方實驗錄以大聲疾呼於醫界吾知是書一出不惟可以醫病亦且可以醫醫誠足以振聾發聵羽翼仲景矣凡治醫者倘能將是書精究而熟玩之更進而與曹氏傷寒發微及金匱發微二書相互印證則於治病立方必有左右逢源之樂其津逮後學沾溉醫林夫豈淺鮮哉予受讀既竟特勉綴數語弁諸簡端非敢云序亦聊以讚揚於萬一云爾歲在丙子仲夏南昌熊世琳繹言拜撰於種杏醫廬殷序昔人有言曰良醫之功等於良相此褒醫之語也而又有言曰學書費紙學醫費人此貶醫之詞也褒之貶之孰言足信余今敢立於現代醫界之基石而宣告於眾曰褒之殊未必當而貶之則近乎是也世之人有疑吾言傾於偏激者乎然余固濫竽醫界中之一人也且請一罄余言何如余自肄習醫學以至開業問世迄今凡十數寒暑醫風腐化習俗卑趨瓦釜雷鳴黃鐘塵覆不學無術者固無足論矣即有一二高明之士亦常為環境所囿未敢輕用大方啟人疑畏而社會間好事者復多一知半解之流甚至醫界中人亦復助長其風遂致一方既出眾議紛紜不曰若者寒若者熱即曰斯者輕斯者重而對於方之意義藥之組合既無整個之認識復乏深層之研究而輒狺狺狂吠沾沾驕喜以致形成社會間一種避重就輕習非成是之風氣醫道遂於以大難學術乃不復可問明末大賢顧亭林氏所著之日知錄中曾有論醫一則曰古之時庸醫殺人今之時庸醫不殺人亦不活人使其人在不死不活之間其病日深而卒至於死今之用藥者大抵泛雜而均停既見之不明而又治之不勇病所以不能愈也而世但以不殺人為賢易曰裕父之蠱往見吝奈何獨取夫裕蠱者以為其人雖死而不出於我之為嗚呼此張禹之所以亡漢李林甫之所以亡唐也於此足徵醫多庸材或意存躲避責任者固自古已然第於今益烈耳所謂學醫費人之語寧不可信而其欺世之深為禍之久可勝慨哉可勝慨哉余既不幸置身斯境臨證疏方輕則恨無以驅病毒重則惜無以祛人疑其精神之痛苦幾欲棄醫而更他業嘗聞余師有一詩句曰深悔當年誤學醫余初過耳若忘何期今日身歷其境始知此語固大堪玩味者乎吾兄舊曾告餘一聯云兒女性情英雄肝膽神仙手眼菩薩心腸餘一聞而善之且甚覺若用此語以繩醫為最切醫界先哲孫思邈先生亦有言以勖醫者曰膽欲大而心欲小智欲圓而行欲方余何人斯詎敢妄以道義自詡惟念醫家動作輒與病家之幸福在在攸關稍一不慎非徒個人之精神物質生命均將感受犧牲甚至大家庭全民族亦或蒙受相當之損害吾人倘稍具良知又安敢輕忽余自秉茲旨趣獻身社會以來雖日處惡劣環境之中固未敢一日忘其責任以自欺欺人也對於臨床施治輒不禁戰戰兢兢時以小心辨證大膽處方八字懸為座右銘蓋以小心辨證庶可期其毋失大膽處方始可責其必效耳以歷年之經驗言之殊覺經方之效能常具神妙之功績方既精純藥亦銳利倘果投之得宜無不有絕大之收穫以個人之方案言之例如前五年間曾以大青龍湯一藥而愈病經兩旬醫更三四之所謂冬溫症前年秋又以桂枝加大黃湯治愈病八九月日二三行之腸澼症去夏間又曾以附子湯合桂枝人參湯桂用桂心治愈時逾一載日輒兩次之滑泄症又以桃核承氣湯合排膿散治愈當臍劇痛每便下血之腸風症其餘如疊以大柴胡合調胃承氣湯治愈身熱脘痞脅滿腹痛之胃實症小建中湯合四逆散治愈中焦嘈雜四末清冷之脾虛症其類甚多不遑縷舉凡此所述僅就一時記憶所及而語非敢妄以治績自炫蓋難在用方中肯尤難在投藥負責姑略舉數例如是耳友好中常有以勿用重藥以致驚世駭俗而或影響業務相勸者余曰盛意良感惟君非醫者似不知箇中真理之所在蓋疾病之發生乃生理之反常藥物之矯治系利用其偏性質言之則病與藥之關聯正相反相成者耳以故方藥之運用無所謂輕重醫者之膽量亦無所謂大小用之當則附桂正所以生人用之非則參苓適用以禍世藥之功罪固用者之功罪何預於輕重大小之本身哉倘明致謹慎之名陰成委責之實則恐惡斯甚矣過莫大焉君果知其中之因素乎余今之所為亦但行其心之所安而已非然者縱可徇俗求榮盜名欺世君又奚取諸友聞言輒憬然若悟無以難而退惟自顧學識淺薄技術平庸縱稍具襪線之長詎敢效器小之量既懍於醫司人命之責復昧於學無止境之艱爰自忘其愚陋對於醫學之進修時未敢忽最近疊於各醫刊中獲見穎甫大師所歷試佐景先生所編述之經方實驗錄多則雖僅一鱗半爪已徵良將宏韜拜讀之餘不禁作曠世一有人間那得幾回聞之想而自慚所學有若小巫也余景仰穎甫大師之德望固非自今日始而於讀此書後則尤甚蓋所記述之方案無一非卓識負責精詣獨到之結晶品以此而知大師拯救疾苦造福病黎之靈且確偉且著也昔賢有言曰獨善何如兼善今大師不私平日寶貴之心得而慨然由佐景先生蒐集編按著之簡素貢之社會是則願移獨善其身之行而擴為兼善天下之舉也大師之德固足麟炳千秋昭垂萬世而佐景先生贊襄發皇之力更安得以常功衡計耶余至願此書一出寰宇風行一藥正虛邪實之醫林與夫輿論殺人之社會也敢秉心香一瓣昕夕禱之今全書出版有期矣輒不避辭費之嫌而攄其所懷抒其所感如是其亦能免夫著糞佛頭之譏乎民國二十六年元旦殷子正序於安慶楊序自輕可去實之說興經方遂不為人所重視醫者但求無過避重就輕即偶有用之者病家亦顧而卻步競相效尤風靡一時而仲景之方几成寡和之曲矣噫時方流行去實驗益遠欲求中醫之振興進而與西醫抗衡安可得乎民國十一年志一負笈上海中醫專校時曹師穎甫講授醫經興味盎然次年秋志一以飲食不慎身染霍亂吐瀉肢冷勢瀕於危同學章君次公邀師來診投以大劑四逆湯二劑而安經方之神效固早已嘗試之矣問世以來服膺師訓悉心體驗深知功效宏而應用廣者固舍經方莫屬除四逆湯之於霍亂虎列拉外如麻杏石甘湯之治喉痧猩紅熱小青龍湯之治肺風急性肺炎梔子厚朴湯之治濕溫腸窒扶斯大黃牡丹湯之治腸癰盲腸炎十棗湯之治懸飲肋膜炎等苟對證施用靡不立竿見影化險為夷此其彰明較著者也師著行傷寒發微金匱發微二書後同學姜君佐景編師醫案成經方實驗錄一書復加按以伸其義痛砭時弊獨標真諦俾世之以玄學相視者亦知吾國醫學確有實驗可據絕非空言所能左右挽醫林頹風新世人耳目然則本書之作其價值寧可以道里計哉丙子十二月一日拙師門下同門吉安楊志一謹序尹序曩者肄業醫校與秦子伯未張子雄飛許子半龍以詩請業於穎師門下師邃於醫而嫺於詩詩源漢魏而醫宗長沙無如當時諸子皆舍醫論詩故得力於詩者多而致力於醫者少也蓋學者有大患二急於行道者棄經方而不敢用好臆斷者非不知經方可貴輒隨繙數章若有所悟尋以卷目浩繁難撮綱要輟而弗讀此醫道之所以常不明也醫籍最古者莫如傷寒金匱而諸家箋註者又不能澈其底蘊而改其訛誤令讀者多明昧參半之處吾師乃不畏艱深獨殫思竭慮潛志闡揚治跡多以經方奏功蓋仲聖有嗣音矣跡其心力所萃已梓行者有傷寒發微金匱發微其餘師說驗案二十年來頗多散失逸夫衣食奔走久違師訓輒用愧恧乃姜君佐景受師親炙不過在三數年間慨然以蒐集散佚諸什為責積案若干都為一集附以按語成經方實驗錄壽之梨棗聞者壯之語云學於古訓乃有獲發仲聖之秘者吾師也公吾師不傳之秘者姜君也問世有期用綴小言而予年未四十頹狀都陳倘吾師仍以不屑教誨也而教誨之乎二十五年雲南起義紀念日上虞尹逸夫識於題鳳廬張序姜君佐景余千里外志同道合之文字交也上年初翻閱各刊拜讀其經方實驗錄三複之下覺有羽翼傷寒金匱之價值因欲窺其全豹俾開茅塞故不揣冒昧上書姜君旋蒙惠賜醫案多篇徵余評語余感姜君垂青之盛意故亦不辭譾陋貢獻芻言復蒙錄登各刊由此益加接近遂成契友最近姜君應各地學者之請將成書付梓向余索序余思姜君此舉不獨加惠於醫林抑可發揚國粹推行國藥誠有益於民生之事也現在吾國醫藥日見衰頹西洋醫藥大有取而代之之勢外溢之金錢不計其數考吾國醫藥非不良也其發明之早成績之優藥物出產之豐富方劑組織之精密允稱世界之冠軍特因漢唐以降五行之玄說盛行學者競尚空談憑幻想而用藥謂之時方古人確具科學性質之經驗良方反棄而不用造成近代中衰之現象良可慨也此時若不急起復古提倡經方使收偉大之治績以挽回民眾之信仰則中醫必陷滅亡民生更不堪設想當知中醫所以得長存至今者不賴虛玄之學理而在靈異之藥效為其能起沉疴比比也試問起沉疴者果系桑菊平肝銀翹清肺木蝴蝶路路通絲瓜絡荷葉筋等輕描淡寫之果子藥耶抑系麻桂硝黃等之仲景方耶將不辨而自明矣今姜君抱濟世之宏旨述實驗之經方余知長沙絕學自此復興民生受益將永永無窮匱矣爰不揣固陋而為之序民國二十五年十二月益林張治河序吳序拙巢夫子少事舉業精詩古文辭中年治仲景書批郤導窾精審絕倫所處醫案泰半直錄經方絕鮮損益以其見之真辨之審故方無不用投無不中視危難險證蔑如也居嘗喟然嘆曰予之治醫豈故好古而遠俗哉徒以江南無正傷寒之謬說行仲景活人之大道湮而生民之厄運至勉挽狂瀾不得已也顧老夫耄矣不能復有進益爾曹英年尚其勉旃凝軒聞命之下竊凜然有所懼焉退思我國醫學以漢代為鼎盛唐孫思邈有千金方傳世猶為近古自宋以迄明清諸家挾其偏見各樹一幟竟以虛無渺茫之論測臟腑實質之病馴至說理以玄妙為尚用藥主輕靈為巧以是求愈人疾豈不難哉間有一二傑出之士能秉筆注傷寒金匱觀其文標新立異非不動人也無如臨診處方又悉平淡下品意若著書為一事臨診又一事不啻陽尊仲景若天人陰畏經方若蛇蠍自為矛盾曷勝浩嘆降至近年西學東漸又有人焉不自量力謬以陳腐不經之說與西醫相搏其被摧枯拉朽固在意中猶曰我能斬將搴旗是亦靦顏而已曷足貴乎蓋中醫之長不在乎理論而重在辨證果能憑證用方已可生死人而肉白骨夫醫以愈病為職者也得此尚何他求哉獨怪仲聖以後之人捨本逐末渾渾噩噩以迄今日舉目中流求一砥柱而不易覯有之其惟拙巢夫子乎夫子臨診四十年著有傷寒發微金匱發微二書至所處方案率多散佚其中大案險證不可勝數學者惜之學長姜君佐景乃奮起以表揚師道為己任窮數載之心力蒐集編纂卓然成經方實驗錄凡二集集中逐案附以按語如抽絲如剝蕉大能啟發閱者之巧思間亦附以己之治驗其精湛幾與夫子相埒蓋君之治醫一以夫子為法同以實驗為依歸者也夫子嘗稱之曰能得我真傳者丹徒章次公之後佐景一人而已其能得師心有如此者是書在各醫藥雜誌中發表未久而讀者讚許之函已紛至沓來君乃徇眾請先刊首集行見問世之後不脛而走於是乎經方之價值彰而醫界之頹風掃蘇子不云乎言有大而非誇者達者信之眾人疑焉世有能讀此編者當不以斯言為阿好也民國二十五年冬月拙師門下學弟吳凝軒拜序張仲景事狀考林億傷寒論序引甘伯宗名醫錄張仲景名機南陽人舉孝廉官至長沙太守始受術於同郡張伯祖時人言識用精微過其師太平御覽七百二十二引何顒別傳同郡張仲景總角造顒顒謂曰君用思精而韻不高後將為良醫卒如其言顒先識獨覺言無虛發王仲宣年十七嘗遇仲景仲景曰君有病宜服五石湯不治且成後年三十當眉落仲宣以其貰長也遠不治也後至三十病果成竟眉落其精如此仲景之方術今傳於世皇甫謐甲乙經序仲景見侍中王仲宣時年二十餘謂曰君有病四十當眉落眉落半年而死令服五石湯可免仲宣嫌其言忤受湯勿服居三日見仲宣謂曰服湯否仲宣曰已服仲景曰色候固非服湯之診君何輕命也仲宣猶不言後二十年果眉落後一百八十七日而死終如其言此事雖扁鵲倉公無以加也仲景論廣伊尹湯液為數十卷用之多驗抱朴子至理篇仲景穿胸以納赤餅案何顒在後漢書黨錮傳南陽襄鄉人別傳言同郡張仲景則名醫錄稱仲景南陽人信矣顒於郭泰賈彪為後進而能先識曹操荀彧仲景與操彧殆行輩相若者也顒別傳載王仲宣年與甲乙經序不同尋魏志王粲傳建安二十一年從徵吳二十二年道病卒時年四十一然則甲乙經序稱年四十眉落後一百八十七日而死視何顒別傳為得實仲宣終於建安二十二年前二十年遇仲景時建安二年也魏志粲年十七以西京擾亂乃之荊州依劉表仲景生南陽仕為長沙太守南陽長沙皆荊州部故得與仲宣相遇然據劉表傳及英雄記長沙太守南陽張羨叛表表圍之連年不下羨病死長沙復立其子懌表遂攻並懌桓階傳太祖與袁紹相拒於官渡表舉州以應紹長沙太守張羨舉長沙及旁三郡拒表則建安四五年間事也羨父子相繼據長沙仲景不得為其太守意者先在荊州與仲宣遇表既並懌仲景始以表命官其地則宜在建安七年後矣南陽張氏自廷尉釋之以來世為甲族故廣韻列張氏十四望南陽次於清河仲景自序亦稱宗族素多其與羨懌或為一宗表亦無所忌觀桓階說羨拒表城陷自匿表尚闢為從事祭酒則於張氏同族愈無嫌恨可知也何顒嘗與王允謀誅董卓未遂而卒計卒時未篤老仲景則為其所獎進者自序稱建安紀年以來猶未十稔是在建安七八年中傷寒論於是始作上與何顒相校其時不過中身也抱朴稱仲景穿胸以納赤餅其絕技乃與元化相類而法不傳魏晉間人多以元化仲景並稱其術之工相似也計元化長於仲景蓋數十歲何以明之魏志華佗傳時人以為年且百歲而貌有壯容為太祖所收荀彧請舍宥之太祖曰不憂天下當無此鼠輩邪遂考竟佗彧以建安十七年死元化死覆在其前而年且近百歲其視仲景蓋三四十年以長然兩人始終無會聚事穿胸之術亦不自元化得之抱朴至理篇淳于能解顱以理腦元化能刳腹以浣胃此則倉公已有刳治之術仲景元化蓋並得其傳者也元化臨死出一卷書與獄吏曰此可以活人孫奇以為即金匱要略亦無據尋抱朴雜應篇余見戴霸華佗所集金匱綠囊崔中書黃素方及百家雜方五百許卷明元化書亦稱金匱奇乃誤以仲景相傳耳仲景處荊州元化譙人蹤跡多在彭城廣陵間故兩人終身不相遇且甲乙經序稱華佗性惡矜技焉肯謂他人書能活人也仲景在後漢書三國志皆無傳史通人物篇曰當三國異朝兩晉殊宅若元化仲景時才重於許洛何楨許詢文雅高於揚豫而陳壽三國志王隱晉書廣列諸傳遺此不編今謂仲景事何顒依劉表交王粲所與遊皆名士疑其言行可稱者眾不徒以醫術著也佐景按今日我國有醫學足言者以存傷寒論及金匱要略故也二書元或合為一編名曰傷寒雜病論合十六卷為東漢長沙太守張氏仲景撰述經晉太醫令王叔和編次自晉下迄隋唐或顯或晦其傳不一又有合二書改稱金匱玉函經者其中條目較今世所傳二書為多其為後人增益或傳寫遺脫皆不可知唐真人孫思邈謂江南諸師秘仲景傷寒方法不傳及其晚年著千金翼方時始獲見傷寒論至金匱要略傳為宋翰林學士王洙從館閣蠹簡中錄出二書先後獲顯醫道賴以不墜蓋張氏工於治療尤精經方所著論若干篇其文辭簡古奧雅古今治醫者未有能出其右者也宋臣林億等本晉皇甫謐序甲乙針經之旨稱仲景本伊尹之法伊尹本神農之經得不謂祖述大聖人之意乎故歷代尊張氏為醫中之聖惜後漢書無張氏傳清元和陸氏九芝博採群籍為之補作近賢黃氏竹齋又撰醫聖張仲景傳悉當參讀而章氏所撰本篇尤精故特錄於此以樹楷模而資景仰云編按者自序佐景既稍稍知醫目睹世人疾苦輾轉床蓆世之醫者曾莫能識有大醫焉隱於市能愈廢疾起沉疴而人反莫之知又因中西醫論戰之亟而中醫學之真髓竟莫能道之不禁心懷悲憤作經方實驗錄以告當代之治醫者並以告當代之延醫者丁丑孟春瑞安姜佐景志第一集上卷第一案桂枝湯證其一穎師醫案湯左二月十八日太陽中風發熱有汗惡風頭痛鼻塞脈浮而緩桂枝湯主之川桂枝三錢生白芍三錢生甘草錢半生薑三片紅棗六枚佐景按明窗淨几焚香盥手恭展傷寒論凝神細讀恍然見標題曰辨太陽病脈證並治上數大字竊謂在此寥寥數字中仲聖垂教之精義彷彿盡之矣何謂脈人誰而知之何謂證人誰而勿知之何者證其所謂證非仲聖之所謂證也人以發熱為一證有汗為一證惡風為一證頭痛為一證等而推之仲聖則統發熱有汗惡風頭痛等等合稱曰證是猶合桂芍薑甘棗五味為一方而不可稱獨桂也獨芍也皆方也是為證之真義何謂治與病人以方去其邪助其正一劑知二劑已不待其傳必免其危之謂也故仲聖之學可以簡稱曰脈證治法仲聖在千百年前之昔日以此法治病既至京師為名醫於當時稱上手吾人在千百年後之今日以此法治病亦用之多驗與昔幾無以異推而廣之後人在千百年後之他日以此法治病亦必效如桴鼓與今日無殊夫醫求其效而已矣孰能效者是即為新故竊謂仲聖之書歷萬古而常新者義在此也若眩於機械之新奇繁縟震於解剖之精微細緻惑於提煉之纖巧玲瓏而治效卻渺如者猶曰此新醫藥也竊有疑焉大論曰太陽病發熱汗出惡風脈緩者名曰中風又曰太陽病頭痛發熱汗出惡風桂枝湯主之觀此二條知桂枝湯證又名曰中風所謂名曰者知前人本有此名仲聖不過沿而用之惟嚴格言之桂枝湯證四字其義較廣中風二字其義較狹易言之中風特桂枝湯證之一耳又此中風非雜病中之中風即非西醫所謂腦溢血腦充血之中風中醫病證名稱每多重複有待整理此其一斑耳至考此所以異證同名之理蓋為其均屬風也中之者淺則僅在肌肉此為傷寒論之中風中之者深則內及經絡甚至內及五臟此為雜病之中風所謂風為百病之長也仲聖方之藥量以斤兩計驟觀之似甚重實則古今權衡不同未許齊觀歷來學者考證達數十家比例各異莫知適從且古今煎法服法懸殊古者若桂枝湯但取初煎之汁分之為三日一服二服三服今則取初煎為一服次煎為二服是其間不無徑庭姑摒此種種勿論簡言之吾師之用量大抵為原方之什一例如桂枝芍藥原作三兩者師常用三錢是也佐景視證之較輕者病之可疑者更減半用之例如桂芍各用錢半是也以此為準利多弊少曹穎甫曰桂枝湯一方予用之而取效者屢矣嘗於高長順先生家治其子女一方治三人皆愈大約夏令汗液大泄毛孔大開開窗而臥外風中其毛孔即病中風於是有發熱自汗之證故近日桂枝湯方獨於夏令為宜也又按近世章太炎以漢五銖錢考證每兩約當今三錢則原方三兩一劑當得九錢再以分溫三服折之每服亦僅得三錢耳由是觀之原方三兩今用三錢於古法正無不合也第二案桂枝湯證其二穎師講授佐景筆記師曰余嘗於某年夏治一同鄉楊兆彭病先其人畏熱啟窗而臥周身熱汗淋漓風來適體乃即睡去夜半覺冷覆被再睡其冷不減反加甚次日診之病者頭有汗手足心有汗背汗不多周身汗亦不多當予桂枝湯原方桂枝三錢白芍三錢甘草一錢生薑三片大棗三枚又次日未請復診後以他病來乞治曰前次服藥後汗出不少病遂告瘥藥力何其峻也然安知此方乃吾之輕劑乎佐景按仲聖之脈證治法似置病因病原病理等於不問非不問也第不詳言耳惟以其脈證治法之完備吾人但循其道以治病即已綽有餘裕故常有病已愈而吾人尚莫明其所以愈者或竟有尚不知其病之何名者此非荒唐欺人之語凡屬仲聖信徒皆當默許也然則仲聖何以不詳言病因病原病理乎曰殆仲聖以為果言之將不饜後人之望反令傷寒論不能成萬世之新書乎然乎否乎我不敢必惟竊以今日之中醫亦當就病因病原病理種種方面略事研究以補不足則中醫藥之進步方無艾乎病有病原西醫所謂細菌原蟲是也一旦蟲菌侵犯人體則病此通例也顧歷觀下級社會之土人蓬頭垢首赤體跣足居常伍犬豕食不避蚊蠅此其受蟲菌侵襲之機緣為如何乃彼輩壯碩長壽不減都會人士然則病原尚非疾病之惟一主因彰彰明甚故中醫不重病原但重病因西醫所謂誘因是也本案示桂枝湯證病因之一所謂風是也方人醒時風來適體不致為病及其入睡體溫降低防禦驟弛而清風之徐來也依舊於是病原得隨以長驅直入比醒病矣曹穎甫曰仲景非不言病因病理也夫邪風外乘乃病中風欲救邪風者宜桂枝湯此非病因乎衛不與營和乃自汗出風中肌肉著於營分而衛氣不傷故衛強而營弱行水之衛氣不傷故毛孔自能出汗行血之營氣受困故肌腠不能作汗致皮毛與腠理顯分兩橛而不能相合故曰不和不和者不合也用桂枝湯以發肌理之汗而營衛自和矣此非病理乎讀書能觀其通則思過半矣第三案桂枝湯證其三穎師講授佐景筆記師曰我治一湖北人葉君住霞飛路霞飛坊大暑之夜遊大世界屋頂花園披襟當風兼進冷飲當時甚為愉快覺南面王不易也頃之覺惡寒頭痛急急回家伏枕而睡適有友人來訪乃強起坐中庭相與周旋夜闌客去背益寒頭痛更甚自作紫蘇生薑服之得微汗但不解次早乞診病者被扶至樓下即急呼閉戶且吐綠色痰濁甚多蓋系冰飲釀成也兩手臂出汗撫之潮隨疏方用桂枝四錢白芍三錢甘草錢半生薑五片大棗七枚浮萍三錢加浮萍者因其身無汗頭汗不多故也次日未請復診某夕值於途葉君拱手謝曰前病承一診而愈先生之術可謂神矣佐景按一病一證之成其病因每不一而足本案示風之外更有冷飲是也外為風襲內為飲遏所謂表裡兩病是猶國家不幸外有強鄰之侵內有異黨之擾兩相牽制證情雜矣本案見證較前多一吐字可見病人之證隨時變化決不就吾醫書之軌範而用藥可加減又豈非吾醫者之權衡觀本方用生薑五片可知矣曹穎甫曰此公系同鄉高長佑先生之友予因治其妻神經病始識之蓋其妻飲食如故但終日歌唱或達旦不寐診其脈滑疾因用丁甘仁先生法用豬心一枚剖開內藏辰砂二錢甘遂二錢扎住向炭爐煨枯將甘遂硃砂研成細末一服而大下下後安眠不復歌唱矣後以十全大補湯收膏調之精神勝於未病時附錄之以資談助後遷古拔路今則四五年不見矣第四案桂枝湯證其四佐景醫案謝先生三伏之天盛暑迫人平人汗流浹背頻頻呼熱今先生重棉疊衾尚覺凜然形寒不吐而下利日十數度行腹痛而後重小便短赤獨其脈不沉而浮大論曰太陰病脈浮者可發汗宜桂枝湯本證似之川桂枝錢半大白芍錢半炙甘草錢豐生薑二片紅棗四枚六神麯三錢穀麥芽炒各三錢赤茯苓三錢佐景按本案乃余所親歷附麗於此者也謝君先是應友人宴享西餐冰淋汽水暢飲鼓腹及歸夜即病下利三日不解反增劇曾投輕劑乏效愚則依證治之雖三伏之天不避桂枝服後果表解利稀調理而瘥本案不吐而下利又異於前案所謂證有變化是也吐者為胃不和利者為腸不和然而能吐能利胃腸尚有抗毒逐邪之機能病未得為進也大論太陰篇云太陰病脈浮者可發汗宜桂枝湯舒氏疑本條有誤當以理中為主內加桂枝云云說似有見然而理中加桂枝為偏里桂枝湯為偏表今脈浮表證重故宜桂枝湯況曰宜而不曰主之其賓主層次之分了然矣曹穎甫曰本案桂枝湯證其四實為太陰病蓋桂枝湯為證見脈浮之本方雖重棉疊衾尚覺惡寒有似麻黃湯證不知桂枝湯證原自有嗇嗇惡寒者況脈浮而不緊其不為麻黃湯證明矣因下利之為食滯也加六神麯炒穀麥芽因小便短赤也加赤茯苓可以悟隨證加減之法矣佐景又按本年二十五年六月二十四日起天時突轉炎熱友人沈君瘦鶴於其夜進冰淇淋一客兼受微風次日即病頭脹惡風汗出撫其額微冷大便溏泄復發心悸宿恙脈遂有結代意與桂枝白芍炙草各錢半生薑一片紅棗六枚切夜服此又次早醒來諸恙悉平惟心悸未愈乃以炙甘草湯四劑全差諸方均不離桂枝又越日孫椒君以進梅漿病下利惡風冷汗出頭脹胸悶骨酸腿軟不欲食而嘔一如沈君給方與沈同惟孫君以午夜市藥藥肆不備紅棗任缺之服後一時許熱汗漐漐遍體舒然睡去翌早醒來不知病於何時去然則桂枝湯實為夏日好冷飲而得表證者之第一效方又豈惟治冬日北地之傷寒而已哉夫傷寒而必限於北地北地而必限於冬日抑何固執之甚邪俗醫無識以耳為目使其見我治沈孫之方必曰桂枝生薑皆辛熱之品值此炎令何堪抱薪救火甘草大棗又悉甘膩之物甘增中滿膩能戀邪若芍藥之酸收更屬不合綜藥五味乃無一可用者向使病者無堅決之信仰聆此評語得毋擊節歎賞而撕吾方紙乎嗚呼魚目混珠燕石亂玉亦安知不合理之論按之事實不幾相去萬里乎設有醫者焉遇上述之證信吾此說願用此方但恐藥味太少藥值太廉原方價僅一角許不足以壯觀瞻而堅信仰則薄荷藿香佩蘭苡仁穀芽麥芽燈心茯苓豆卷扁豆之屬不妨邀作陪客聊湊熱鬧但切勿用桂枝二分還須泡湯代水免致無效反損吾經方聲價不特此也倘有識者見此抑慮其笑壞齒牙乎呵呵然則桂枝湯證之病理果如何桂枝湯之藥理又如何至此不能不有所解說在余未陳已意之前姑略引諸家之說以資參考醫宗金鑑略云桂枝辛溫辛能散邪溫從陽而扶衛芍藥酸寒酸能斂汗寒走陰而益營桂枝君芍藥是於發汗中寓斂汗之意芍藥從桂枝是於固表中有微汗之道陸氏九芝曰桂枝者能入營而出衛者也太陽主開今風乘之而過於開則必祛風外出而太陽之氣始復其常但中風為虛邪營氣已弱是宜慢泄又風邪已近肌肉即為肝氣乘脾故君以桂枝而必以養血和中者為臣風能化熱以芍藥之涼者監之柯氏韻伯曰此為仲景群方之魁乃滋陰和陽調和營衛解肌發汗之總方也此皆不離營衛以為說然而營衛茫茫試問讀仲聖書者有幾人能真個瞭解乎先賢有謂桂枝湯中不應有酸寒之芍藥而時賢祝味菊先生則曰本湯之組合應以芍藥為主藥桂枝為重要副藥蓋適用本方之標準在皮膚蒸發機能亢進而自汗出者故用芍藥以調節其亢進之機能桂枝則不過補助心臟之作用而已故麻黃湯中亦用之其非主藥可知也此二說也相左特甚湯本右衛門皇漢醫學云余之經驗凡用芍藥大棗甘草之證必診得筋肉攣急而於直腹筋最為明確可為三藥之腹證亦可為本方之腹證以上純屬理論實際上當隨師論準據脈證外證可以不問腹證也此說前後參差亦堪商矣眾說紛紜吾將安從雖然本書以實驗為名自當從實驗中求解決安可囿於前賢近哲之說以自錮也哉今有桂枝湯中風證患者於此惡風頭痛發熱汗出諸狀次第呈現顧汗出不暢撫之常帶涼意是可謂之曰病汗設其人正氣旺即自療機能強者其發熱瞬必加甚隨得暢汗撫之有熱意於是諸狀盡失可知一切毒素包括外來之病原物及內壅之排泄物已隨此暢汗以俱去此所謂法當汗解是也設其人正氣不足以辦此則必須假外物或動作以為助例如啜滾熱之茶湯可以助汗作劇烈之運動就溫水之沐浴亦皆可以助汗方法不一致汗則同當炎暑之日吾人周身舒適無汗之時偶作此三事則致汗甚易可為明證及此汗出病亦尋差然而中風證之重者又非此簡易療法所可得而幾何況啜水太多胃不能容運動就浴又易傷風於是乎桂枝湯尚矣及服桂枝湯已須臾當歠熱稀粥一小碗以助藥力且臥床溫覆一二時許將遍身漐漐微似汗出似者續也非似乎也病乃悉去此汗也當名曰藥汗而別於前之病汗也病汗常帶涼意藥汗則帶熱意病汗雖久不足以去病藥汗瞬時而功乃大著此其分也有桂枝證者來求診與桂枝湯告之曰服此汗出病可愈矣彼必曰先生我本有汗也夫常人不知病汗藥汗之分不足為責獨怪一般醫家尚有桂枝湯能發汗能止汗之辯呶呶相爭無有已時不知以中風證而服桂枝湯先得藥汗是發汗也病汗遂除亦止汗也是故發汗止汗二說若以為非則均非若以為是則均是惜乎未觀其通尚差一籌耳試陳桂枝湯之真際藥理曰桂枝能活動脈之血者也芍藥能活靜脈之血者也動脈為陽故曰桂枝為陽藥靜脈為陰故曰芍藥為陰藥動脈之血由心臟放射以外達於微絲血管其地位由小而大桂枝助之故曰桂枝發散為陽靜脈之血由微絲血管收回以內歸於心臟其範圍由大而小芍藥輔之故曰芍藥收斂為陰桂枝內含揮發油故能發散芍藥內含安息酸故能收斂收斂之後繼以發散發散之極轉又收斂二者互為起訖如環無端依道運行周而復始是故收斂並無停滯之意發散更非不復之謂所以分名之者蓋但示其運行之方向不同已耳由是可知桂芍之分工實乃合作況微絲血管之周布於身無遠勿屆與肌肉神經汗腺等雜沓而居故動靜脈血運加速之後勢必生熱較前此之發熱尤甚熱蒸汗腺勢必汗出與吾人劇烈運動之後心臟鼓動加速脈搏加速血運加速全身發熱因而汗出理正相同惟此運動而生之汗不必有若何毒素於其間若夫先病後藥因而得汗其汗必含毒素無疑吾人雖未經顯微鏡之檢察事實固如此也本湯煎服法中曰遍身漐漐微似有汗者益佳若不汗更服又不汗後服小促其間若汗不出乃服至二三劑仲聖諄諄垂教娓娓叮嚀以求一汗而後已者抑亦何哉曰蓋惟藉此藥汗方能排除一切毒素故耳毒素既去是即西醫所謂根本療法顧排毒素於體之外而不殺毒菌於身之內其間又有上下床之別矣炎暑之日汗流浹背誠能暢進冰制飲料汗乃遂止所以然者冰能涼胃故也然則涼胃既可以止汗今欲出汗又何可不溫胃於是溫胃之良藥兼可以止嘔之生薑為必需之品矣又恐汗出過多將傷胃液於是用大棗以攝持之說詳吳著大棗之主治又慮腸居胃下胃失和則腸有受傳之虞於是預用甘草以安之說詳吳著甘草之主治要之姜也棗也草也同為溫和胃腸之聖藥胃腸性喜微溫溫則能和故云胃腸既受三藥之扶護而和血液循環又被桂芍之激勵而急表裡兩合於是遍身漐漐汗出若其人為本湯證其一其二之表證者隨愈即有本湯證其三之吐者亦愈或有本湯證其四之利者亦無不愈使更能明其孰輕孰重加以權衡則仲聖復生亦猶是乎試更由此返溯桂枝湯證之真際病理曰一言以蔽之胃腸虛寒血運不暢而已身熱者血運自起救濟以蒸肌肉包括神經汗腺惜乎救濟之力不足終不能解除困苦故大論曰桂枝本為解肌汗出惡風者毒素阻於汗腺排之不能盡涼風襲於身旁抗之無餘力故耳頭痛者殆頭部神經不堪充血之壓迫因而不舒以上所言殊嫌抽象簡略深自愧赧然而大致不錯卻可引以自慰者執此以論然後知營衛之說本屬渺茫談者娓娓聽者未必津津其定義既無一定更不得一般學者之公認故余以為營衛之說雖古暫殊不必借重轉滋糾紛獨柯氏隨證用藥不拘六經中傷之說卓爾不群不愧仲聖功臣若言桂枝湯不用芍藥豈非獨活動脈之血難竟促進血運之全功反之以芍藥為主藥又豈非矯枉過正余如三藥治攣急之腹證既自破其說將何以令人信服夫遠哲近賢著書立說留為吾讀是皆吾師我敬之愛之然而我愛吾師我尤愛真理苟真理之所在我不能違之以受師說孟子曰予豈好辯哉予不得已也竊有同慨余與吳君凝軒先後並肩事拙巢夫子每遇一醫學難題必相互爭辯務求得到真理而後快於桂枝湯證何莫不然故余於本湯之一知半解初非一人之獨得也然而截至最近吾二人對於本湯意見尚有分歧之處並未趨於完全一致之途可見學術問題之爭執雖同窗密友有不可以假借阿好若此者吳君嘗作間話桂枝一文述其對於本湯之意見甚詳此文並前述吳著各篇均收入本書附錄中以資參證曹穎甫曰以上所陳說甚有意味惟破除營衛之說則殊有未安仲師於桂枝湯條問不曰衛不與營和乎蓋中風一證皮毛本開衛氣之行於皮毛中者自能挾太陽寒水作汗外泄故病常自汗出風邪在肌肉腠理衛閉不開營氣之行於肌腠中者乃不能自發其汗皮毛中自汗故曰衛強肌腠凝閉不能作汗故曰營弱脾主肌肉故曰系在太陰而太陰篇中桂枝湯條問與太陽篇更無差別吾嘗謂桂枝湯為扶助脾陽之劑豈不然乎第五案桂枝湯證其五佐景筆記佐景曰虞師舜臣嘗曰一二八之前閘北有一老婦其子服務於郵局婦患腦疽病周圍蔓延其徑近尺許啟其所蓋膏藥則熱氣蒸蒸上冒頭項不能轉側余與余鴻孫先生會診之三日不見大效四日診時天色已晚見病者伏被中不肯出詢其故侍者曰每日此時惡寒發熱汗出余乃悟此為嗇嗇惡寒翕翕發熱之桂枝湯證即用桂枝五分芍藥一錢加薑草棗輕劑投之次日病大減遂逐日增加藥量至桂枝三錢芍藥五錢餘三味亦如之不曾加他藥數日後竟告全愈云佐景按腦疽病也虞餘二先生先用治腦疽法治之三日不見大效及察知患者有桂枝湯證試投桂枝湯用桂枝不過五分芍藥不過一錢薑草棗又皆和平之品諒其為效也當僅矣然而功出望外毋怪虞師之驚奇且用獨方而竟全功更可見惟能識證者方能治病何況仲聖方之活用初非限於桂枝一湯仲聖所以於桂枝湯加減法獨詳者示後人以楷模耳果能將諸湯活而用之天下尚何不治之病哉由是細研方知吾仲聖脈證治法之真價值以視彼西醫之斤斤於病而不知證者其間實不可以道里計矣人曰西醫長外科中醫長內科或曰西醫長急救中醫長調理我則曰皆非也當曰西醫長在病中醫長在證彼身為中醫不知從證字發揮而以病與西醫爭短長者是未知中醫學之真諦故也我惜之曹穎甫曰丁甘仁先生有言腦疽屬太陽發背屬太陽合少陰二證妄投涼藥必死旨哉言乎嘗記予少時居江陰東鄉之後塍有蔣崐田者中醫也嘗患腦疽家居不出三日先考遇之於市上問所患曰愈矣問何法治之曰桂枝湯耳問用桂枝幾何曰四分耳以四分之桂枝能愈腦疽宜虞生舜臣用五分之有特效也惟蔣之證情輕故四分已足老婦之證重故加至三錢若狃於蔣之四分而援以為例設遇重證當用三四錢者則殆矣第六案桂枝湯證其六佐景醫案王右無表證脈緩月事後期而少時時微惡寒背部為甚納穀減此為血運遲滯胃腸虛弱故也宜桂枝湯以和之川桂枝三錢大白芍三錢酒炒炙甘草三錢生薑三片大棗十二枚佐景按吾國舊式婦女平日缺少運動每致食而難化冬日限於設備又未能勤行沐浴而家庭組織龐雜妯娌姑嫂每難和睦因而私衷抑鬱影響氣血始則氣逆脘痛納穀不暢自稱曰肝胃氣書則謂木侮土名雖有雅俚顯晦之分實則無二致也馴至頭暈心悸經事不調成西醫所謂貧血症按其脈常緩而無力若貧血甚者反成細小而數不待風寒之侵襲而常蕭瑟惡寒尤其在冬日為甚余逢此等證狀常投桂枝湯原方病者服後陡覺周身溫暖經脈舒暢如曝冬日之下如就沐浴之後此無他桂芍活血之功也而向之大便難者今乃得潤滑而下因甘草安腸本有緩下之力若大便仍堅踞不動不妨加大黃每劑一錢以微利之生者固佳制者亦可二三劑後便乃暢行且胃開矣其用甚妙親歷者方能言之若嫌大黃近於霸道則不妨改用研麻仁每劑四五錢亦可緩緩奏功況又有薑棗以刺激其胃機能令化穀食為精微淵源既開血乃漸滋吾師常以簡括之句表本湯之功曰桂枝湯功能疏肝補脾者也蓋肝主藏血血行既暢神經胥得涵養可杜煩躁之漸故曰疏肝亦曰平肝脾本概括消化系統而言今腸胃既健故曰補脾善哉言乎於此有一要點須注意及者即本案王右服桂枝湯後是否汗出是也曰不汗出但覺周身溫暖而已然則桂枝湯果不能發汗乎曰發汗與否乃服後之現象服後之現象等於方藥加病證之和非方藥可得而獨專也詳言之桂枝湯必加中風證乃得藥汗出若所加者非中風證而為如本案之裡證姑名此以別於太陽中風之表證必不得汗出或縱出而其量必甚微甚至不覺也吾人既知此義可以泛應諸湯例如服麻黃湯而大汗出者必其人本有麻黃湯證服承氣湯而大下者必其人本有承氣湯證反之加麻黃湯於承氣證加承氣湯於麻黃證則欲下者未必劇汗欲汗者未必劇下有可斷言者然而病之形能既亂於是壞病成矣或問曰桂枝湯既能治表證又能治里證表裡不一方藥卻同亦有仲聖之言可資證明乎曰師曰婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠桂枝湯主之夫曰無寒熱非即無表證之互辭乎曰不能食而渴非即胃腸虛寒不能化穀食為精微乎曰名妊娠非即謂無病而更無表證乎問者又曰請更作一譬喻以開茅塞曰可我前不云乎桂枝湯者功能促進血運溫和腸胃者也此二事也適猶國家之整飭軍旅依西說白血球能撲滅病菌籌備錢糧依內經脾胃為倉廩之宮然夫軍旅張錢糧足可以御外侮然而欲消內患亦莫不賴此是故胃腸溫和血運暢行者既可以消內病更可以卻外邪所謂進可以攻退可以守者是也或又曰若是論之桂枝湯直是一首補方縱令完全無病之人亦可服此矣曰何莫不然平人服此亦猶稍稍運動略啜咖啡而已陸自量先生曰余亦曾以桂枝湯桂枝白芍各四錢於無病時試服十數劑服後絕無其他細微影響此係以身作則非子虛之談也文見蘇州國醫雜誌第六期可為明證實則並非無細微影響也蓋亦猶入芝蘭之室久而不聞其香耳惟嚴格言之平素腸胃實熱血壓亢進之人究不甚宜毋須一試但亦決無桂枝下咽陽盛則斃之事余亦屬實熱之體平時不耐辛辣煎炒之品偶因受寒泄瀉必進桂枝湯一二劑良佳若夫素體虛寒之老人及婦女服此誠有意想不到之效力勝世之成藥徒持廣告為號召者多多故仲聖以本湯為溫補主方加桂即治逆氣衝心加附子即治遂漏不止加龍骨牡蠣即治盜汗失精加白芍飴糖即治腹中痛加人參生薑芍藥即治發汗後身疼痛更加黃耆當歸即泛治虛勞去白芍加生地麥冬阿膠人參麻仁即治脈結代心動悸無一非大補之方綜計傷寒論中共一百一十三方由桂枝湯加減者乃佔二十餘方然則仲聖固好用補者也誰謂傷寒方徒以攻劫為能事乎上述各節聊表桂枝湯之妙用然而桂枝湯之妙用卻決不盡於此一言以譽之有病治病無病養身其桂枝湯之謂乎奈何仲聖以後之人每陽譽其功曰是能調和營衛卻陰畏其峻曰我慮下咽則斃許叔微曰仲景一百一十三方桂枝獨冠其首今人全不用何也然則當日之醫士其伎倆原若是而已而桂枝湯抑何蹇運其甚耶汪訒庵曰仲景治傷寒用麻黃桂枝而全不用羌活防風是古人亦有所未備也嘻不明其功而責其缺抑何陋耶吳鞠通著溫病條辨假三焦抗六經又不肯舍桂枝湯之效故強列為第一首要方乃受時醫之譏諷信矣章次公先生曰自有清中葉蘇派學說盛行以後桂枝之價值遂無人能解病屬外感既不敢用之解肌病屬內傷更不敢用之補中不免有棄材之嘆蘇派醫生所以不敢用桂枝其理由之可得而言者不外南方無真傷寒仲景之麻桂僅可施於北方人非江南體質柔弱者所能勝故若輩一遇熱病無論傷寒溫病一律以大豆卷連翹桑菊應付之於此而欲中醫之不式微難言之矣嗚呼起式微而中興伊誰之責耶我輩學者盍共奮起曹穎甫曰本案桂枝湯證其六亦當屬諸太陰蓋桂枝湯一方外證治太陽內證治太陰仲師於兩篇中既列有專條矣此又何煩贅說惟以此治太陽證人所易知以之治太陽病之系在太陰者為人所不信自有此驗案益可見仲師之言初無虛設矣夫仲師不云太陰病腹滿而吐食不下自利腹痛乎設太陰病遇浮緩之太陽脈即桂枝湯證矣第七案麻黃湯證其一穎師醫案範左傷寒六七日形寒發熱無汗而喘頭項腰脊強痛兩脈浮緊為不傳也麻黃湯主之麻黃一錢桂枝一錢炙草八分杏仁三錢佐景按此吾師早年之方也觀其藥量之輕可以證矣師近日所疏麻桂之量常在三五錢之間因是一劑即可愈疾師常詔余儕曰予之用大量實由漸逐加而來非敢以人命為兒戲也夫輕劑愈疾也緩重量愈病也迅醫者以愈病為職者也然則予之用重量又豈得已也哉何公度先生作悼惲鐵樵先生文中之一節云越年二公子三公子相繼病傷寒殤先生痛定思痛乃苦攻傷寒論如是者有年而四公子又病傷寒發熱無汗而喘遍請諸醫家其所疏方仍不外乎歷次所用之豆豉山梔豆卷桑葉菊花薄荷連翹杏仁象貝等味服藥後熱勢依然喘益加劇先生乃終夜不寢繞室躊躇迨天微明乃毅然曰此非傷寒論太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之之病而何乃援筆書麻黃七分桂枝七分杏仁三錢炙草五分持方與夫人曰吾三兒皆死於是今四兒病醫家又謝不敏與其坐而待斃曷若含藥而亡夫人默然嗣以計無他出乃即配藥煎服先生則仍至商務印書館服務及歸見病兒喘較平肌膚有潤意乃更續予藥竟得汗出喘平而愈四公子既慶更生先生乃益信傷寒方錄現代中醫月刊第二卷第九期以上所引文字不過寥寥數行然而以吾觀之其中含蓄之精義實多時醫遇風熱輕證能以桑菊梔翹愈之一遇傷寒重恙遂不能用麻黃主方罹其殃者夫豈惟惲氏三兒而已哉此其一義也惲先生苦攻傷寒論有年及用輕劑麻黃湯尚且繞室躊躇足見醫學之難此其二義也然此諸義非吾所欲討究吾之所求者藉以表白麻黃湯全證耳麻黃湯之全部脈證厥為喘其甚者鼻扇兩脈浮緊按之鼓指頭痛惡寒無汗或已發熱或未發熱嘔逆身疼腰痛骨節痠疼等等考其簡要病理厥為寒氣外犯皮毛內侵肺臟肺臟因寒而閉呼吸不利故上逆而作喘肺臟既失職鼻管起代償動作故鼻扇皮毛因寒而收排泄失司故凜冽而惡寒血液循環起救濟故發熱血運呈緊張故脈緊胃受影響故嘔神經不舒故痛若欲求其詳雖長篇累牘難以盡之但憑脈證以施治已足以效如桴鼓此仲聖之教所以為萬世法也第八案麻黃湯證其二穎師醫案黃漢棟夜行風雪中冒寒因而惡寒時欲嘔脈浮緊宜麻黃湯生麻黃三錢川桂枝三錢光杏仁三錢生甘草錢半拙巢注漢棟服後汗出繼以桔梗五錢生草三錢泡湯飲之愈佐景按麻黃湯全部脈證固如前案拙按所云但並不謂必如此諸狀悉具乃可用本湯若缺其一即不可施也反之若病者體內之變化確屬麻黃湯證之病理則雖見證稍異亦可以用之而效緣病者體氣不同各如其面加以受邪有輕重之別時令有寒熱之殊故雖同一湯證彼此亦有差池若前按所引有喘而無嘔本案所載則有嘔而無喘是也大論曰太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名為傷寒竊謂此必字猶言多也並非一定之謂蓋其人胃氣本弱或有濕痰故牽引而作嘔若夫喘則實為麻黃湯之主證較嘔著要多多此吾人所當了然於胸中者也舍親童君公邃供職江都營業稅徵收局客冬來函告云弟日前亦患傷寒初起頭痛發熱胸悶咳多而喘脈浮而緊微風著身即毛骨悚然服豆豉蔥白杏仁桑枝等二劑汗仍不出反惡寒加甚疊被三床亦不覺其暖於是乃疏麻黃湯方三分之二量佐景注此所謂量諒係指本書樣本中本湯之藥量半服而汗出愈矣當其未服之先同事無不阻之而閱歷深富之邗上名醫亦言不可服弟以各證既具長沙必不我欺毅然決然而行之不及二小時之久而疾頓瘳可見時醫不讀書往往如此可嘆也如皋姚世琛先生亦惠書相告曰客冬余與內人彤影同患傷寒發熱無汗體痛嘔逆呼吸窒促乃共以麻黃治之一劑既已因篤信仲聖之學云云足見有此證用此方得此方消此證時不分古今地不分中外曾無二致也第九案麻黃湯證其三穎師講授佐景筆記師曰予憶得丁甘仁先生逝世之一年若華之母於六月二十三日親至小西門外觀看房屋迨回家已入暮曰今夜我不能親視舉炊急欲睡矣遂蓋被臥惡寒甚覆以重衾亦不溫口角生瘡而目紅又似熱證腹中和脈息浮緊有力溫覆已久汗仍不出身仍無熱當以天時炎暑但予麻黃二錢桂枝二錢杏仁三錢甘草一錢服後溫覆一時不動聲色再作一劑麻桂均改為三錢仍不效更予一劑如是續作續投計天明至中午連進四劑了無影響計無所出乃請章生次公來商次公按脈察證曰先生膽量何其小也曰如之何曰當予麻桂各五錢甘杏如前服後果不滿半小時熱作汗大出臭氣及於房外二房東來視掩鼻而立人立房外內望見病者被上騰出熱氣於是太陽病罷隨轉屬陽明口乾渴脈洪大而煩躁乃以調胃承氣下之嗣後病證反復調理月餘方愈周身皮肉多作紫黑色歷久乃退佐景按本案示證重藥輕難能去病之例醫者所當深曉惟竊意藥之能起瞑眩亦當待相當時間麻黃湯雖號峻方其服後之致汗當亦須三五小時若分量過峻求功過急則出汗固得而汗後之過分化燥亦當並顧及之故醫者宜權衡輕重不當有偏執之見也若夫世之一般時醫視麻黃若蛇蠍終身不以入藥籠者有之或謂麻不過三分桂不過五分者有之是所謂畏首畏尾身其餘幾余恐一家之言猶不足以信服讀者爰再引選論一則以為佐證埜燁先生作麻黃用量實驗記曰麻黃為利尿發汗藥表劑之猛將然其用量尚未有確切之考定也仲景大青龍湯麻黃之藥用量多至六兩近世醫家之用麻黃其量自三分至錢半而止未聞有至三四錢者然以余近日所身受之經驗考之則麻黃之藥用量固不止錢半已也今歲季夏六月壯暑酷熱揮扇成風汗下如雨余性好游泳體格壯實腠理堅強苦熱尤甚每日必泳水三四小時始能適意否則鬱郁終日神氣不舒也某日假期往浴入水凡七小時泳時赤日懸空赤帝施威歸途忽密雲作態沛然下雨地上起白氣一陣余大意吸之歸而遂病脈浮而緊一息六至頭疼惡寒發大熱全體如焚神思憒憒昏不知人但全身乾燥無汗口亦不渴耳請甲醫診之投以桑菊飲加梔子五錢二劑熱退而他證如故乙醫以杏蘇飲新加香薷飲投之亦如故後續投以清絡飲倍其分量二劑弗效遷延二來復熱雖退而胸滿氣喘兼有咳聲無痰至三星期後乃就診於本地頗負時譽之劉醫斷為傷暑伏熱脈沉緊而微法仍當主表投以滑石羌活等清暑利濕之藥用麻黃三錢半余初意頗畏之後以古人用之有至六兩之先例且現今醫界正以其用量未得解決亦何妨親身一行實驗也遂如量煎服之服後三十分鐘覺脈搏增加血行旺盛體溫略覺增高出汗三次量不甚多微透衣襟而已五小時內小便者三次量較未服藥前約增二分之一此外並未感覺其他不良副作用之發生翌日復診脈之緊張者已去其泰半後進以他劑二服而安今已還我康健矣以余之實驗推之則麻黃之藥用量可至四錢也海內賢彥其有所研究討論而昭示焉斯不獨餘個人之幸亦醫林之幸也錄醫界春秋第六十四期經驗之言彌足珍貴所謂出汗三次量不甚多堪作微似汗或微續汗三字之無上妙注然則大論麻黃湯方後云覆取微似汗又豈非至真之言我願天下醫士遇麻黃湯重證能大膽用麻黃湯第一案麻黃湯證其四穎師講授佐景筆記師曰予友沈鏡芙先生之房客某君十二月起即患傷寒因貧無力延醫延至一月之久沈先生傷其遇乃代延予義務診治察其脈浮緊頭痛惡寒發熱不甚據云初得病時即如是因予麻黃二錢桂枝二錢杏仁三錢甘草一錢又因其病久胃氣弱也囑自加生薑三片紅棗兩枚急煎熱服蓋被而臥果一刻後其疾若失按每年冬季氣候嚴寒之日患傷寒者特多我率以麻黃湯一劑愈之誰說江南無正傷寒哉佐景按內經一日太陽二日陽明三日少陽之說殊不足以為訓若本案所示其人作麻黃湯證不服藥者一月之久而麻黃湯證依然存在及投以麻黃湯一劑而愈其效又依然如響是蓋其人正氣本旺故能與邪久持也余在廣益醫院施診曾遇一小兒驚厥之恙目瞠神呆大便不行危在旦夕迭用承氣下之白虎清之數日方定旋竟轉為少陽寒熱往來之證予以小柴胡湯加味如是數日又略安意其愈矣某日偶巡視鄰近某善堂驚見此兒又在其母曰多謝先生再造之恩活此小犬昨日作卦占兆謂有方向吉利故改就此處調理為吉云云予更細察其病情則寒熱日數度發又是麻桂各半湯之證矣屈指計之距其起病之日已近一月觀其病變曲折彷彿離經叛道是又豈一日二日之說所得而限之哉第一一案麻黃湯證其五穎師醫案俞右住高昌廟維德里一號傷寒頭項強痛惡寒時欲嘔脈緊宜麻黃湯麻黃五錢桂枝五錢杏仁三錢生草三錢佐景按病者服此方後絕不汗出閱者或疑余作誑言安有服麻桂各五錢而無反響者乎非也有其故在緣病者未進藥之先自以為大便不通誤用瀉鹽下之及其中氣內陷其脈即由浮緊轉為微細故雖服麻黃湯而汗勿出二診師加附子以振心陽救逆而差此不汗出之因於誤治者也余更目睹師治吏惠甫君之弟發熱惡寒無汗用麻桂各三錢一劑亦絕不汗出二劑加量方得微似汗解其故安在蓋史君弟執業於鴻昌造船廠廠址臨江江風颯颯史弟平日督理工場之間固曾飽嘗風露者此不汗出之因於地土者也又余在廣益醫院治一人衣冠楚楚發熱惡寒無汗頭痛與麻桂各三錢余藥稱是次日二診謂服藥後了無變化囑再服原方三診又然予疑院中藥量不足囑改從藥鋪購服四診依然未汗出予百思不得其故及細詢其業曰吾包車伕也至是予方恍然蓋若是之人平日慣伍風寒本不易受風寒之侵襲若果受其侵襲則其邪必較常人為重此不汗出之因於職業者也然凡此諸例其不汗出猶可理解余又曾治一妊婦腫病面目手足悉腫一時意想所至徑予麻黃湯加味次日復診腫退其半問曾汗出否曰否問小便較多否又曰否然余未之信也予原方加減三日腫將退淨仍問其汗與小便各如何則又絕口否認倘其言果屬真切則若不曰水化為氣無形外泄而承認生理學上之所謂潛汗直無理足以釋之嘻病情萬變固有不可以常理格之者惟親歷者能信是言曹穎甫曰發熱惡寒無汗而兩脈浮緊者投以麻黃湯無不應手奏效辛未六月有鄉人子因事居舍弟裔伯家卒然覯病發熱惡寒擁被而臥寒戰不已長女昭華為疏麻黃湯服後汗出神昏裔伯大恐不逾時沉沉睡去日暮始醒病若失大約天時炎熱藥劑太重以致神昏非有他也今年陰曆十一月初一日予在陝西渭南縣交通銀行行長曹欣莊之弟志松病發熱無汗脈浮緊予用麻黃三錢桂枝四錢生草三錢杏仁五錢服後微汗出脈微嗜臥熱退身涼不待再診病已愈矣又記昔在丁甘仁先生家課其孫濟華昆季門人裴德炎因病求診於濟萬方治為荊防等味四日病無增減亦不出汗乃招予往診予僅用麻黃二錢桂枝一錢半杏仁三錢生草一錢明日德炎不至亦不求再診予甚疑之越日德炎欣然而來曰愈矣予按傷寒始病脈之所以浮緊者以邪正交爭於皮毛肌腠間相持而不下也一汗之後則皮毛肌腠已開而邪正之交爭者解矣世人相傳麻黃多用亡陽而懸為厲禁然則病太陽傷寒者將何自而愈乎佐景又按以上錄桂枝麻黃二湯證既竟請再略伸數語以明二湯之異趣前人恆謂桂枝湯治風傷衛麻黃湯治寒傷營即今日之學子亦有篤奉此說者竊意此說大非當闢之余曰桂枝湯為治太陽病之屬於腸胃虛寒者麻黃湯為治太陽病之屬於肺臟寒實者故余伸述桂枝湯之義凡六則計八千餘言獨不一及肺字及述麻黃湯證即著重肺字此其彰明較著者也為桂枝湯為治虛故余曰桂枝湯為補方麻黃湯為治實故余曰麻黃湯為攻方為其為補方故桂枝湯可以常服為其為攻方故麻黃湯未可妄試攻補互異此二湯之所攸分惟其對象同是寒故曰二湯為傷寒廣義的之主方為此二證常見於傷寒廣義的之初起故曰二湯為太陽之主方試更以西醫之名詞為說則可曰桂枝湯為消化器系之感冒方麻黃湯為呼吸器系之感冒方學者能知乎此方明二湯之真趣更當審風寒營衛之舊說將不堪一擊矣夫曰風以喻邪之輕曰寒以喻邪之重猶可說也獨不聞衛氣為肺所主既知麻黃湯為治肺之良方當曰麻黃湯主治寒傷衛乎獨不聞營氣為血之精既知桂枝湯有活血之桂芍當曰桂枝湯主治風傷營乎明明顛倒是非人乃熟視無睹抑亦何哉豈其見大論辨脈法篇有風則傷衛寒則傷營之文遂致賢賢相傳造成此失耶然而辨脈法篇非仲聖原文又固盡人所知也即太陽篇中言營衛處每亦自相矛盾例如原文曰病常自汗出者此為營氣和營氣和者外不諧以衛氣不共營氣和諧故爾以營行脈中衛行脈外復發其汗營衛和則愈宜桂枝湯又曰太陽病發熱汗出者此為營弱衛強故使汗出欲救邪風者宜桂枝湯夫首條言桂枝湯治營和衛不諧次條又言本湯治營弱衛強強固不諧之謂若夫弱又安得謂之曰和仲聖之言豈竟若是紛亂耶又太陽篇原文營衛必相提且必與桂枝湯並論若言麻黃湯既不及衛更不及營豈後人嫌麻黃湯之寂寞寡伴乃強分桂枝湯之營以歸之耶故精鑿言之傷寒論中言營衛處既不多且決不似仲聖口吻然則營衛云何哉我寧暫舍之或曰子以為營衛不足恃拜聞命矣然則太陽經病府病之說如何謹答曰是說之謬較營衛尤甚其入人之深賢者不免余每篤信章氏太炎之醫論然而章氏曰傷寒論之太陽病應分別論之初起時之麻黃湯證桂枝湯證僅為太陽之前驅證猶非太陽正病也惟水蓄膀胱之五苓散證及熱結膀胱之桃核承氣湯證斯為太陽正病竊意未敢贊從考此所謂經病府病蓄水蓄血說之失其因有三一為本內經經絡之舊說二為五苓散及桃核承氣湯悉列太陽篇中而條文復冠以太陽病三字三為五苓散及桃核承氣湯中悉有桂枝夫處處本內經之說以釋傷寒論無異御錦繡之衣行荊棘之途將無往而不掣肘此其失一也小柴胡湯人皆知為少陽病之主方四逆湯人皆知為少陰病之主方而悉列在太陽篇中與五苓桃核並肩故以所列篇章而論方此其失二也烏梅丸中有桂枝將以為太陽方乎半夏散中有桂枝將亦為太陽方乎此其失三也欲免諸失當曰桃核承氣湯為陽明方五苓散為少陽方夫桃核承氣湯中有硝黃與大承氣湯同例謂為陽明方似猶近是人或信之獨謂五苓散為少陽方得毋離經叛道故作驚人之論乎曰非也余作此言有實驗以為徵有病理以為說悉詳本錄第二集中茲不先贅或曰依君之論太陽將僅餘麻桂二方矣曰容或近之故若謂麻桂二湯證為太陽正病為六經病之前驅也可謂麻桂二湯證僅為太陽病之前驅猶非太陽正病實不可也敘述至此不能不連及太陽病三綱鼎立之說孫思邈千金翼方首謂傷寒全論不過三方桂枝麻黃大青龍湯是也其餘均為救逆之方云云夫桂枝湯為風傷衛麻黃湯為寒傷營大青龍湯為風寒兩傷營衛成氏許氏方氏諸賢或述於先或繼於後千百年來播為醫林美談幸生韻翁快人發為快語曰既云麻黃湯治寒桂枝湯治風而中風見寒傷寒見風者曷不用桂枝麻黃各半湯而更用大青龍湯主治耶吾知主三綱鼎立說之古人一聞此語得毋俯首耶韻翁謂大青龍湯為麻黃湯加味不愧名言其不能與麻桂二湯相鼎足者彰彰明甚若夫麻桂各半湯之所治雖與麻黃湯及桂枝湯悉異然以其證情之重要言以其病例之多寡言更不能與二湯並駕齊驅然則太陽病之主方似僅餘麻桂二湯矣雖然尚有第三方在但今者吾舉其名以告又恐滋君之疑無從解君之惑好在吾經方實驗錄一書以經方為經以實驗為緯以理論為花紋敢請諸公先察經緯慢賞花紋而容吾述葛根湯證治如下第一二案葛根湯證其一穎師講授佐景筆記師曰封姓縫匠病惡寒遍身無汗循背脊之筋骨疼痛不能轉側脈浮緊余診之曰此外邪襲於皮毛故惡寒無汗況脈浮緊證屬麻黃而項背強痛因邪氣已侵及背輸經絡比之麻黃證更進一層宜治以葛根湯葛根五錢麻黃三錢桂枝二錢白芍三錢甘草二錢生薑四片紅棗四枚方意系借葛根之升提達水液至皮膚更佐麻黃之力推運至毛孔之外兩解肌表雖與桂枝二麻黃一湯同意而用卻不同服後頃刻覺背內微熱再服背汗遂出次及周身安睡一宵病遂告差佐景按余讀傷寒論至太陽病項背強𠘧𠘧無汗惡風葛根湯主之條未嘗不廢書長嘆曰何葛根湯之不幸竟沉埋千古無一人知其為仲聖治太陽溫病之主方也夫仲聖未嘗曰太陽病中風桂枝湯主之太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之一條顯非仲聖原文不論更未嘗曰太陽病傷寒麻黃湯主之然而後人聰敏能合太陽病發熱汗出惡風脈緩者名為中風太陽病頭痛發熱汗出惡風桂枝湯主之二條為一曰桂枝湯主治中風者也又能合太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名為傷寒太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之二條為一曰麻黃湯主治傷寒者也我今仿其例合太陽病發熱而渴不惡寒者為溫病太陽病項背強𠘧𠘧無汗惡風葛根湯主之二條為一曰葛根湯主治溫病者也我知此說一出一般讀傷寒論者必將驚駭詫愕急欲問吾說之何由矣曰容陳其義學者當知今人所謂溫病非仲聖所謂溫病仲聖所謂溫病非今人所謂溫病吾人先具今人溫病之概觀乃讀傷寒論溫病之條文無怪格不相入我姑仿狹義傷寒廣義傷寒之例當曰仲聖所謂溫病乃狹義溫病今人所謂溫病乃廣義溫病雖然我但願學者心知此意我卻不願杜撰名辭轉滋糾紛今為求名正言順計不妨稱仲聖之所謂溫病為太陽溫病如是即可別於今人之所謂溫病稱仲聖之所謂傷寒與溫病對稱者為太陽傷寒如是即可別於傷寒論廣義之傷寒稱仲聖之所謂中風與傷寒對稱者為太陽中風如是即可別於雜病中之中風命名既定乃論大旨然則太陽溫病之異於太陽中風太陽傷寒者何在乎佐景斗膽敢揭一旨曰太陽中風太陽傷寒是皆太陽病之津液未傷者也若其人先日傷津續得太陽病是即太陽溫病是故傷津二字實為太陽溫病之內蘊此乃絕無可疑者惟其內津已傷不能上承口舌故作渴故仲聖曰太陽病發熱而渴者為溫病且將渴字特置於而字之下以彰其首要惟其內津已傷不能注輸背脊故非但頭痛項強且進而為背部亦強𠘧𠘧矣故仲聖曰太陽病項背強𠘧𠘧葛根湯主之是故渴與項背強𠘧𠘧同是傷津之外證實一而二二而一奈何仲聖稍稍出之以隱筆襯之以遙筆千古讀者遂永永蒙於鼓裡耶學者既已知渴與項背強𠘧𠘧同為太陽溫病葛根湯證之主症更可由此左右推求自得逢源之樂例如由太陽溫病之渴可以推知太陽中風太陽傷寒之不渴故惲鐵樵先生教學子謂桂枝湯麻黃湯當同以口中和為主症云云學子遵此施治不啻指南良針實則口中和即不渴之易辭不渴即由太陽溫病之渴字悟來仲聖待人以智故遂不自覺其言之約耳更例如由太陽溫病之項背強𠘧𠘧可以推知太陽痙病之背反張身體強𠘧𠘧然者乃疾病之傳變也誠以項背強𠘧𠘧尚為津傷邪襲之輕者若治不如法更汗下以傷其津勢必背反張身體強𠘧𠘧然而為進一層之痙病矣此傷寒金匱之可以通釋者也閱者必將發問曰然則傷寒論溫病條下之若發汗已身灼熱者名曰風溫又作如何解說答曰此乃仲聖後人之注語非仲聖原文也雖然彼為仲聖之後人猶為吾儕之前賢故其言非無理致彼之意若曰假使逢太陽溫病之葛根湯證醫者誤認為太陽傷寒之麻黃湯證徑予麻黃湯以發其汗則汗雖出表雖解必將引起全身之灼熱必不克一劑而竟全功若是者其初病非為傷寒實為溫病但嫌溫病之病字與太陽病之病字重故不若改稱風溫因葛根湯原有麻桂以治風葛根以治溫也由是觀之風溫即是溫病之別名初不必另眼視之又此風溫與近日溫熱家所說之風溫亦異為免除混淆計寧削而不論抑尤有進者學者當知發汗已身灼熱並非絕對壞病之謂不過由太陽轉入陽明此時但隨其證或用白虎以清之或用麻杏甘石以開之或用葛根芩連以折之其病即得全差初不必過事張皇惟經方家之治病其可以一劑愈者不當用二劑即其可以用葛根湯一劑全愈者不當用麻黃湯使入陽明以致二劑愈嗚呼歷來注傷寒者多矣其有能一道及此者乎閱者又將問曰然則傷寒論原文風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘈瘲若火熏之一逆尚引日再逆促命期又作如何解說答曰此亦仲聖後人之言也注家有視此為錯誤任意顛倒改易以求曲符已意者矣是乃竊所不取細按此條大意重在申明二禁一禁被下二禁被火何以禁下蓋下為陽明正治今溫病病在太陽未到陽明故不可下下之將更傷其津何以禁火蓋溫病津液既已內傷安堪更以火灼爍之如此治之是為一逆再逆逆之重者促命期逆之輕者或語言難出或直視或驚癇或瘈瘲合考種種症狀無一不由津液內竭神經失其濡養所致或小便不利則傷津之重者幾無餘液足以外泄或微發黃色則津竭血溶血液變色尤為顯明之病理夫下與被火未始合於太陽中風太陽傷寒之治今獨在溫病條下剴切告誡者抑亦何哉無非中風傷寒者津液未傷雖誤下誤火逆猶不甚今溫病者津液已傷實未許毫釐誤治故也嗚呼前賢之旨微矣第一三案葛根湯證其二穎師親撰師曰葛根湯方治取效之速與麻黃湯略同且此證兼有渴飲者予近日在陝州治夏姓一婦見之其證太陽穴劇痛微惡寒脈浮緊口燥予用葛根六錢麻黃二錢桂枝三錢白芍三錢生草一錢天花粉四錢棗七枚按診病時已在南歸之前晚亦未暇問其效否及明日其夫送至車站謂夜得微汗證已全愈矣予蓋因其燥渴參用栝蔞桂枝湯意吾願讀經方者皆當臨證化裁也佐景按本案為吾師所親撰者竊謹敬照錄未敢損益毫釐拜讀再四乃恍然悟曰夏姓婦所病者即太陽溫病也向使吾師用葛根湯原方未始不可優治之今更以花粉易生薑則所謂欲窮千里目更上一層樓其技之神嘆觀止矣雖然讀者於此有不能釋疑者在焉曰溫病條言不惡寒葛根湯條言惡風風寒本屬互稱如是得毋自相矛盾乎答曰此正仲聖之互文見意處可以深長思者也夫曰風寒為互稱此言不謬但當知寒為重風為輕惡寒為重惡風為輕故溫病及葛根湯二條合一之後即成惡風不惡寒其意猶曰微惡風寒節言之即本案吾師所謂微惡寒是也為其尚不能盡脫惡寒本色而合於太陽首條提綱之旨故仲聖稱此為太陽病又為其兼口渴津傷易於化熱故仲聖稱此為太陽溫病歷來傷寒注家有一絕大錯誤賢賢相承莫能自覺者即以溫病為陽明病是也佐景覺之不容緘默夫依吾說溫病為太陽病之一綱判然異於陽明病固矣然竊以為尚有辨證之法在大論曰問曰陽明病外證云何答曰反惡熱也然則惡熱者方為陽明病其但渴而不惡熱之溫病得稱陽明病乎然則惡熱者當用膏知硝黃其但渴而不惡熱者得用辛溫發散之麻桂仲聖於此又豈非暗暗點明乎佐景之旨蓋在於此今試排列太陽陽明之主證如下太陽傷寒或已發熱或未發熱惡風惡寒太陽中風發熱惡風太陽溫病發熱而渴惡風不惡寒陽明發熱譫語不惡寒反惡熱閱者試察上表其中層次何等分明太陽傷寒當或未發熱惡寒之時完全為寒象且不但曰惡風兼曰惡寒顯見其惡風寒之重至太陽中風即但曰發熱顯無或未發熱之時且但曰惡風不兼曰惡寒顯見其惡風寒之輕至太陽溫病不但曰發熱且加渴以示其津液之傷曰惡風又曰不惡寒顯見其惡風寒之微至陽明其甚者曰譫語以示其津竭之後神經且受熱灼矣又曰反惡熱至此完全為熱象與太陽傷寒之完全為寒象者適相反由是吾人可得外感疾病傳變之第一原則曰由寒化熱是也此原則實為吾人依經探討之收穫而溫病之不得稱為陽明病又其餘事也矣第一四案葛根湯證其三穎師講授佐景筆記師曰予昔在西門內中醫專校授課無暇為人治病故出診之日常少光華眼鏡公司有袁姓少年其歲八月臥病四五日昏不知人其兄欲送之歸延予診視以決之余往診日將暮病者臥榻在樓上悄無聲息余就病榻詢之形無寒熱項背痛不能自轉側診其脈右三部弦緊而浮左三部不見浮象按之則緊心雖知為太陽傷寒而左脈不類時其兄赴樓下取火少頃至予曰乃弟沉溺於酒色者乎其兄曰否惟春間在汕頭一月聞頗荒唐宿某妓家揮金且甚巨予曰此其是矣今按其左脈不浮是陰分不足不能外應太陽也然其舌苔必抽心視之果然予用葛根二錢桂枝一錢麻黃八分白芍二錢炙草一錢紅棗五枚生薑三片予微語其兄曰服後微汗出則愈若不汗則非予所敢知也臨行予又恐其陰液不足不能達汗於表令其藥中加粳米一酒杯遂返寓明早其兄來求復診予往應之六脈俱和詢之病者曰五日不曾熟睡昨服藥得微汗不覺睡去比醒時體甚舒展亦不知病於何時去也隨請開調理方予曰不須也靜養二三日足矣聞其人七日後即往漢口經商云佐景按前案葛根湯證其二乃吾師晚年醫案故其一種斲輪老手大刀闊斧之風度躍然筆下紙上若本案葛根湯證其三則為吾師之中年醫案故其一種戰戰兢兢如履薄冰之神情亦顯乎字裡行間行年之於學力學力之於魄力有如是者亦可見吾經方實驗錄所言者乃無一語虛訛雖然余錄本案之義卻不在此素問金匱真言論曰夫精者身之本也故藏於精者春不病溫生氣通天論曰冬傷於寒春必病溫此數語也凡習中醫者類能道之然而議論紛紛每悖經旨佐景不敏請以本案袁姓少年病為內經之註釋可也簡言之袁姓少年宿妓荒唐不藏於精故生溫病治之以葛根湯應手而起者以葛根湯為溫病之主方故也夫精者津之聚於一處者也津者精之散於周身者也故精與津原屬一而二二而一之物其人平日既不藏精即是津液先傷及其外受邪風之侵乃不為太陽中風亦不為太陽傷寒而獨為太陽溫病乃不宜乎桂枝湯亦不宜乎麻黃湯而獨宜乎葛根湯此內經傷寒之可以通釋者也抑尤有當知者藏精之要初不必限於冬時然尤以冬時為甚故傷寒例曰冬時嚴寒萬類深藏君子固密則不傷於寒觸冒之者乃名傷寒耳溫病之成初不必限於春日觀袁姓少年之呻吟於仲秋可知然尤以春日為甚蓋春繼冬來於時為邇冬不閉藏使擾乎陽則春不發陳無能隨天地萬物以俱生榮也精之泄初不必限於男女之間凡志勤而多欲心怵而常懼形勞而致倦高下必相慕嗜欲傷目淫邪惑心者是皆不藏於精之類也然尤以直耗腎精為甚故吾人可作結論曰冬不藏精春必病溫必猶言多也此經旨之所當達觀者也雖然余走筆至此竊不禁凜然有所懼焉所懼者何曰人將以本案為根據而伸其溫病伏少陰之說蓋所謂少陰雲者指足少陰經腎言也余曰腎精虧耗者全身津液不足一旦外受邪風之侵無能祛邪反易化熱此猶為抽象之言差近於是猶曰平素腸胃虛寒者易患桂枝湯證同不失為平正之論若必欲一口咬定溫病之邪氣久伏於腎則猶曰中風證之邪氣必久伏於腸胃其可通乎不特此也小兒天真爛漫腎精不耗為何患麻疹等一類溫病特多蓋為其純陽之體長育之日需津既亟化熱自易初不關腎家事也奈何溫病伏於少陰發於他經之說竟亦風行醫林斯乃不可解者茲姑引選論一則藉作本說之當頭棒喝張公山雷平議張石頑溫熱一案曰謂此證石頑原案云徽商黃以寬風溫十餘日壯熱神昏語言難出自利溏黑舌苔黑燥唇焦鼻煤先前誤用發散消導藥數劑煩渴彌甚石頑曰此本伏氣鬱發更遇於風遂成風溫風溫脈氣本浮以熱邪久伏少陰從火化發出太陽即是兩感變患最速今幸年壯質強已逾三日六日之期證雖危殆良由風藥性升鼓激周身元氣皆化為火傷耗真陰少陰之脈不能內藏所以反浮考諸南陽先師原無治法而少陰例中則有救熱存陰承氣下之一證可藉此以迅掃久伏之邪審其鼻息不鼾知腎水之上源未絕無慮其直視失溲也時歙醫胡晨敷在坐同議涼膈散加人中黃生地黃服後下溏糞三次舌苔未潤煩渴不減此杯水不能救車薪之火也更與大劑涼膈大黃加至二兩兼黃連犀角三下方能熱除於是專用生津止渴多服而愈即是仲師之所謂風溫誠為確論然仲景原文明謂太陽病發熱而渴不惡寒者為溫病只以外感言之其見證同為太陽病但傷寒與溫病之所以異者一則發熱惡寒而不渴一則發熱不惡寒而渴何嘗有外感伏氣之別亦何嘗有久伏少陰發出太陽之說其下文風溫一節以若發汗三字為提綱則又明言傷寒以惡寒不渴故當發汗溫病既不惡寒且又加渴則已是溫熱之邪即無發汗之例若俗子不知誤與傷寒發汗之法則擾動陽邪為火益烈而身之灼熱更甚是為風溫即是誤汗之變證所以脈則陰陽俱浮證則自汗身重嗜臥鼻鼾語言難出皆汗多傷液陽明灼熱見證成聊攝謂發熱而渴不惡寒者陽明也言仲景雖冠以太陽病三字其實無寒且渴即是陽明熱證一語破的可知宋金時人尚無不知是外感之溫熱即至誤汗灼熱已為風溫亦無不知是熱在陽明聊攝於風溫為病全節註文又何嘗說到少陰上去所以近賢亦有謂是節病證皆在陽明仲景雖未有方然治此風溫變證宜用仲景陽明之例以白虎為主方言簡而賅淺顯曉暢是謂正直蕩平之坦道所最可怪者喻嘉言自詡絕世聰明舍正路而不由故意索隱行怪以仲師風溫諸證一一附會少陰自謂能讀素問冬不藏精一語尚論後篇幾無一句不是牛鬼蛇神奇形怪狀遂開後人專言伏氣之謬一似溫熱為病無一不從少陰來者直不許世間有外感之溫熱蓋著書者以為但講外感為病盡人能知似不足顯出作者識見之玄奧必扭之捏之說得伏氣若天花亂墜方見得入木三分造詣獨到總是好名太過務求其深而不自知其走入魔道以王孟英之臨證輕奇處方熨帖亙古幾無敵手而經緯一編尚沿襲嘉言之謬完全比附於伏氣二字令人不能索解更何論乎餘子碌碌然每見高談伏氣者試一察其臨證用藥何嘗有伏氣及外感之別則仍是見證治證了不異人斷不能劃分兩路無非故為高論自欺欺人即以仲景風溫為病諸證言之嘉言雖謂一一顯出少陰經證而陸九芝辯之謂是一一皆陽明經證且謂嘉言所言少陰則處處聱牙余所言之陽明則句句吻合至精且確始於黑暗獄中大放光明功德及人頤以為不下於孟子拒楊墨放淫辭最是吾道之絕大幹城世補齋文第九卷中論喻嘉言者三篇誠不愧字字珠璣言言金玉石頑此案妄稱伏氣亦中嘉言之毒究竟壯熱神昏語言難出自利溏黑舌苔黑燥唇焦鼻煤無一非陽明熱證而乃誤於發散即是仲師所謂發汗已之風溫所顯各證亦與仲師本條處處吻合藥用涼膈加味仍是陽明正治又何必妄引少陰急下之例捨近求遠治法是而持論實乖不過好奇之心勝而故以驚世駭俗為高明最是醫界之魔障須知此是切理饜心實用之學斷不可故求新穎徒托空談尚願好學之士弗再蹈此習氣庶乎易說易行可以與人共喻世苟有以頤為好辯者頤亦受之而不辭余讀此議不禁折節歎賞謂為擲地有金石聲又豈溢譽之辭張公以老成之年發少壯之論直可愧死今日一般青年之呆煞於舊經句下者使當張公在日余能早以仲聖所謂溫病為近陽明屬太陽一說進諒來不受呵斥然則今日之張公誰乎我當師事之第一五案葛根湯證其四穎師講授佐景筆記師曰南陽橋有屠宰公司夥友三人一日同病求余往診診視既畢心甚奇之蓋三人病均頭痛身惡寒項背強痛脈浮數二人無汗一人有汗余乃從其證情無汗者同與葛根湯有汗者去麻黃即桂枝湯加葛根服後皆愈後詢三人何以同病蓋三人於夜半同起宰豬深宵受寒之所致也佐景按高粱之人冬不藏精春多溫病前已言之若夫勞苦之人用力不節亦足耗精傷津而得溫病本案宰豬夥友即其例也何況宰豬者俯首從事項背緊張最甚更易受邪風之侵襲故發為項背強𠘧𠘧或有汗或無汗不過微有不同耳其無汗者即是剛痙之初步故仲聖曰太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙葛根湯主之其有汗者亦即柔痙之先聲故仲聖曰太陽病發熱汗出而不惡寒名曰柔痙又曰太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之吾師本此以為治效如桴鼓然則苟不熟玩傷寒金匱其能若是乎本經謂葛根主治消渴身大熱蓋病溫者津液素傷渴飲即消何況太陽病身大熱尤足灼津惟用生津之葛根既可以潤舌止渴更可以解肌退熱本經又謂葛根能起陰氣解諸毒此言若譯作西醫語當曰葛根能喚起白血球殺滅一切病菌以此釋葛根芩連湯證更覺吻合此本經傷寒之可以通釋者也綜上所述余謂葛根湯主治太陽溫病一說合於內經合於本經合於傷寒論合於金匱要略合於吾師治驗合於一切理論推而廣之將無有所不合然則吾此說幸告成立以後傷寒論一書將陡增萬丈光芒平添無限聲價何者前人皆以大論為缺方之殘書尤其缺溫病之方今則主治溫病之方赫然在目是大論不啻重為完璧之寶籍雖撰次容或有異無傷也已不特此也彼溫熱諸家藉口傷寒論中無溫病方明文指為散佚失傳故敢揭溫病旗幟求與傷寒抗衡今溫病之真方既顯彼溫熱陣之偽壁壘將不攻自破從此大家攜手同歸仲聖正道寧非中醫學之大幸也耶第一六案葛根湯證其五穎師親撰師曰鎮江趙錫庠章次公門人也診所在曹家渡嘗治康腦脫路忻康里四十八號蔡姓女孩約一周歲先病百日咳月餘未全忽股背間隱約有紅點咳甚劇目赤多淚惟身熱不揚手足逆冷常自汗出皮膚寬緩顏面淡白無出疹狀錫庠告其母曰瘄疹欲出表陽虛而不足以達之此即俗所稱白麵痧也方用葛根三錢桂枝一錢杭芍錢半生草一錢姜一片棗二枚因其咳也加前胡錢半射干錢半桔梗八分象貝三錢復加牛蒡子三錢以助其提達出表明日復診顏面紅疹漸顯神色雖佳而手足尚冷遂令再進一劑二日後手足溫和周身紅疹透達越二日而回一切平安躉咳亦愈佐景按學者既已知中風傷寒溫病各為太陽病之一綱矣然此猶為未足吾今當窮根究柢為學者作進一步言所請毋庸驚詫耳其言曰所謂中風所謂傷寒所謂溫病所謂太陽病推而至於六經病是皆非疾病之真名不過疾病之代名耳更細晰言之六經病方為疾病之代名所謂中風傷寒溫病尚為疾病中一證之代名耳病猶戲劇之全部證猶戲劇之一幕故病之範圍大而證之範圍小更詳盡言之謂中風傷寒溫病等為一證之代名猶不切毋寧謂之日一證之通名何者知此等通名病證之方治將可以泛應萬病故也例如吾人知太陽溫病之方治可以泛治痙病可以泛治麻疹可以泛治一切類似之病所謂痙病所謂麻疹方是疾病之真名仲景之所以為聖即在先教人以病證之通名通治指傷寒後教人以病證之專名專治指金匱後人之所以為愚即在不曉病證之通名通治獨齗齗於傷寒溫病等代名之爭西醫之所以不及中醫即在但講疾病之專名專治獨不知疾病之通名通治彼於無特效藥之病除委之於期待外恆束手無策更不曉何者為證彼所謂對症療法與吾所謂證大異其義另詳而佐景之所欲大聲疾呼者亦即在使學者知仲聖通名通治之大道柯氏曰因知仲景方可通治百病與後人分門證類使無下手處者可同年而語耶是柯氏寧非得道之深者余謂吾人既知太陽溫病之方治即可以泛治麻疹者猶曰用葛根湯方可以治麻疹之初起也麻疹之順者可勿服藥服藥而誤反易僨事閱者將疑麻桂之決不可治疹病者乎則吾師遇麻疹病之遏伏甚而不透發者且用麻黃湯服湯已疹乃暢發惟竊細心考察間有透發之後引起灼熱者是正所謂若發汗已身灼熱者名曰風溫但余早已言及此所謂灼熱並非不得了之謂其輕者將自已其重者亦可以補治惟竊意與其補治於後寧早用葛根預防於前故余之治小兒麻疹葛根乃為第一味要藥回觀本案趙先生方中既用前胡牛蒡桔梗等開發之品即可以代麻黃之司故謂本方為桂枝湯加葛根加味毋寧謂葛根湯加味與余之方治乃密合無間也海上諸醫視麻桂若蛇蠍何況疹病宜涼之說深入人心誰敢以之治麻疹者吾乃不得已變通其說曰葛根湯以葛根為君麻桂為臣君藥不可去臣藥可取而代也若薄荷桑葉若牛蒡桔梗若西河柳芫荽若櫻桃核蟬衣皆可以代麻桂獨葛根當勿易嘻高價不售降格以求其有能諒吾苦心者乎實告讀者余之治太陽病於麻黃桂枝葛根三藥誠有不可一日無此君之慨故凡余之所說悉屬言行合一而絕非著書治病分作兩事者余用麻黃常由八分至二錢用桂枝常由錢半至三錢用葛根常由二錢至四錢若吾師之用此三藥則更倍蓰於是故三藥之中以葛根最為和平奈何今之醫尚多不敢下筆徒知拾前人之唾餘曰葛根是陽明藥若邪未入陽明而早用之將引邪入內曰葛根竭胃汁嗚呼邪說重重豈惟不必贅引法當一焚而廓清之用是作葛根湯證按為葛根一藥呼冤為葛根一湯表彰欲勿廢書長嘆猶待舉世之覺悟也夫曹穎甫曰世之論者動稱溫病無主方而傷寒論一書幾疑為專治傷寒而設不知越人言傷寒有五溫病即在其中今姜生佐景能於大論中發明葛根湯為太陽溫病之主方真能發前人所未發蓋葛根湯證與傷寒不同者原以津液不足之故故於桂枝湯中加麻黃而君葛根中風證而津液不足者即用桂枝湯本方而加葛根太陽標熱內陷而下利者即用葛根芩連湯以清熱生津為主蓋人體中水分多於血分則易從寒化故藏於精者春不病溫血分多於水分則易從熱化故冬不藏精春必病溫從寒化者傷寒不愈浸成痰飲雖天時轉陽猶宜小青龍湯從熱化者中風誤治即成熱病為其津液少也即此意以求之則葛根為太陽溫病主藥葛根湯為太陽溫病主方不益可信乎佐景又按學者既已熟稔太陽病之三主方矣乃請進論陽明病而以白虎湯證始可也第一七案白虎湯證其一穎師講授佐景筆記師曰住三角街梅寄里屠人吳某之室病起四五日脈大身熱大汗不譫語不頭痛惟口中大渴時方初夏思食西瓜家人不敢以應乃延予診予曰此白虎湯證也隨書方如下生石膏一兩肥知母八錢生甘草三錢洋參一錢粳米一小杯服後渴稍解知藥不誤明日再服原方至第三日仍如是惟較初診時略安本擬用犀角地黃湯以其家寒仍以白虎原劑增石膏至二兩加赤芍一兩丹皮一兩生地一兩大小薊五錢並令買西瓜與食二劑略安五劑全愈曹穎甫曰此證二診時其夫名玉芳者固一黑籍冤魂也靳其資謂予曰此婦予甚不愛之如不愈先生不必再來予曰汝以錢為重我以人命為重以後我來與否汝可不必問也前後凡六診兩易方竟得全可為之快意者累日佐景按本案方原為白虎加人參湯卻標作白虎湯證者蓋為求說解便利示學者以大範故耳石膏所以清熱人參所以養陰養陰所以佐清熱之不逮同屬於裡非若白虎加桂枝湯桂枝加大黃湯之兼有表裡者故今姑一併及之後人於白虎湯中加元參生地麥冬之屬即是人參之變味不足異也陳惠民先生醫藥筆記抄曰浙鄞有徐姓者居鸚脰湖浜不農不儒始依父兄以閒遊繼有妻子而號苦思欲養家爰記醫方懸牌療疾冀得蠅頭之利人知底蘊誰肯寄之以命冬衣敝絮裹以棉袍夏衣草衫蔽以葛衫日逐遊獵尋病而醫人見其濯濯也以僕隸下人視之進而坐談踞身不起必俟一飯而後歸一日有隔里許之姓朱者偶觸傷寒八日而死徐聞之貿貿然來入其門其屍已移房出堂矣徐按其胸曰心口尚熱可醫也朱之家屬以天氣炎夏急治棺成衣立圖殯且知其不精於醫也無人聽之徐自取楮筆書白虎湯一方令其侄速檢藥石其弟侄曰子非華佗能挽人於危乎子非純陽能起死復生乎子餓難度不如與我幫忙同食三朝不必以拙技嘗試也徐曰氣雖絕胸尚熱死馬還須當活馬醫之子與我錢百枚我往市中沽藥能生乃汝家之福不能生算我借用此錢也其弟侄厭其纏繞與之徐自煎自熬以湯藥灌死者之口竟順受而下須臾死者手微動而口有氣徐曰生矣時滿堂哀哭之聲畢止於是復舁至房調理數日而愈咸以此為神醫也不可貌相謝銀十兩由是名聲大振延者有人徐欣欣得意云白虎一湯能起死回生況病而未死之人乎佐景注此言誤矣凡遇病者就之即開白虎湯與之不及兩月醫死者十餘人被人拷打數次醫道仍不行而朱復活二十餘年錄現代中醫按原案出於文人之手而非醫者之筆故所著要之脈證毫不知曉本無引證之價值姑引之者以見白虎之活用可以肉白骨誤用足以死病人亦聊作吾醫界之棒喝云曹穎甫曰病於寒者得火而喜以為天下莫火若也病於熱者得水而喜以為天下莫水若也蓋狃於一偏者必有一偏之蔽苟非精通醫理而隨證處方則以薑桂取效者或不敢用涼劑以芩連奏功者或不敢用溫藥甚有偏於瀉者以瀉藥而殺人偏於補者又以補藥而殺人自非辨證精審然後用藥無論古方時方何在非殺人之利刃哉莊生有言哀莫大於心死為其執而不化也是故病機出入既不能因之斡旋方治措施又不能決其功效則病者之死機未動醫者之生理先亡可不警歟第一八案白虎湯證其二穎師講授佐景筆記師曰江陰繆姓女予族侄子良婦也自江陰來上海居小西門寓所偶受風寒惡風自汗脈浮兩太陽穴痛投以輕劑桂枝湯計桂枝二錢芍藥三錢甘草一錢生薑二片大棗三枚汗出頭痛差寒熱亦止不料一日後忽又發熱脈轉大身煩亂因與白虎湯生石膏八錢知母五錢生草三錢粳米一撮服後病如故次日又服白虎湯孰知身熱更高煩躁更甚大渴引飲汗出如漿又增重藥量為石膏二兩知母一兩生草五錢粳米二杯並加鮮生地二兩天花粉一兩大小薊各五錢丹皮五錢令以大鍋煎汁口渴即飲共飲三大碗神志略清頭不痛壯熱退並能自起大小便盡劑後煩躁亦安口渴大減翌日停服至第三日熱又發且加劇周身骨節疼痛思飲冰涼之品夜中令其子取自來水飲之盡一桶因思此證乍發乍止發則加劇熱又不退證大可疑適餘子湘人在曰論證情確係白虎其勢盛則用藥亦宜加重第就白虎湯原方加石膏至八兩余仍其舊仍以大鍋煎汁冷飲服後大汗如注濕透衣襟諸恙悉除不復發惟大便不行用麻仁丸二錢芒硝湯送下一劑而瘥佐景按白虎湯證有由直中天時之熱而起者有由自身積熱而起者若前案所引是也有非直起於熱而由寒化熱者即由桂枝湯證轉為白虎湯證者若本案所言是也仲聖曰服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之是即由寒化熱之明證本條之意若曰有患桂枝湯證者於此醫者認證不誤予以桂枝湯服湯已應熱退病除但病者忽大汗出後反大煩渴不解脈且轉為洪大是蓋其人素有蘊熱因藥引起或藥量過劑所致但勿懼可以白虎加人參湯一劑愈之其屬有蘊熱者可以順便除之其屬藥量過劑者此即補救法也本條即示桂枝湯證化為白虎湯證之一例人多以桂枝麻黃二湯齊稱我今且撇開麻黃而以白虎合桂枝二湯並論之余曰桂枝湯為溫和腸胃若以其重要言當曰胃腸之方白虎湯則為涼和腸胃之方桂枝證之腸胃失之過寒故當溫之溫之則能和由虎證之腸胃失之過熱故當涼之涼之則亦能和和者平也猶今人所謂水平或標準也失此標準則病故曰太過等於不及猶言其病一也桂枝湯證腸胃之虛寒或由於病者素體積弱使然或由於偶受風寒使然或更合二因而兼有之白虎湯證腸胃之實熱容吾重複言之或由於病者素體積熱使然或由於由寒化熱即腸胃機能自起救濟一發而不能自已之謂使然或竟由直受熱邪使然或竟合諸因而兼有之來路不一證狀參差而醫者予以方求其和則同方藥不一而方意則同桂枝湯有桂芍以激血生薑以止嘔同是溫胃白虎湯之石膏知母同是涼胃大棗免胃液之傷粳米求胃津之凝餘下甘草一味同是和腸防其下傳兩相對勘一無遁形試更妙為之譬則患桂枝湯證者服桂枝湯無異冬日啜咖啡茶見自虎湯證者進白虎湯不啻夏月飲冰雪水溫涼既得舒適恰同此情至真此理至明雖三尺童子聞之首肯然則幻鏡拆穿令人失笑誰謂仲聖之道猶天高而地遠耶吾師治白虎湯證之直起於熱者用白虎湯治白虎湯證之由寒化熱者亦用白虎湯無所謂傷寒無所謂溫熱是乃仲聖之正傳乃溫熱家硬欲分傷寒溫熱為爾我彼此謂由寒化熱者是傷寒由熱直起者是溫熱然則治傷寒之白虎湯證用白虎湯治溫熱之白虎湯證曷不用其他神湯妙藥而終不脫石膏知母耶是故所謂溫熱傷寒之分廢話而已廢話而已第一九案白虎湯證其三佐景筆記佐景曰友人郁祖安君之女公子方三齡患消渴病每夜須大飲十餘次每飲且二大杯勿與之則吵鬧不休小便之多亦如之大便不行脈數別無所苦時方炎夏嘗受治於某保險公司之西醫蓋友人也逐日用灌腸法大便方下否則不下醫誡勿與多飲此乃事實上所絕不可能者累治多日迄無一效余診之曰是白虎湯證也方與生石膏四錢知母二錢生草錢半粳米一撮加其他生津止渴之品如洋參花粉茅根之屬五劑而病全顧餘熱未楚孩又不肯服藥遂止服越五日舊恙復發仍與原方加減連服十五日方告全愈口不渴而二便如常先後計服石膏達半斤之譜佐景按見其大便不通而用灌腸法是為西醫之對症療法辨其脈數口渴而用白虎湯是為中醫之脈證治法對症療法求療不療脈證治法不治自治此乃中西醫高下之分王儒大先生曰夫國醫道也形上者也西醫器也藝也形下者也人之成藝也則易刻鵠不成尚類鶩也而其成道也則難畫虎不成反類犬也故國醫之工者高出西醫之工者遠甚佐景續為之說曰國醫之道何在脈證治法是也第二案白虎湯證其四佐景筆記佐景曰據舍親童公邃君云民國六七年間於役吳門一山東人名楊宜德者為先兄衛兵患腹部膨脹不更衣者二月有餘而健飯特甚腹大幾如五石瓠甚至行坐不得營團各軍醫百治乏效複數更外醫亦然因就診於曹先生滄洲先生閔其情復憐其貧即令服生石膏半斤次日病依然於是由半斤加至一斤至第四日復加至二斤便乃大下悉屬黑糞其硬如石約二便桶許體腹頓時瘦削向之手臂如碗者至此僅有一握神志疲倦異常且須倩人扶掖而後能行於是先生令止服改給四君子等大劑凡調理三月始瘥佐景按此病為中消膽胃之火特重故能健飯膽汁不自下輸故大便不行重用石膏以清胃熱膽汁得下則大便通矣其用單味石膏者意猶白虎湯耳曹氏之膽識固如是其駭俗乎前案消渴是為上消本案消食是為中消上中不同一湯愈之所謂通仲聖方能治百病者此也曹穎甫曰予所遇白虎湯證未有若此之重者張錫純用石膏不過二三兩予嘗加至雙倍有奇豈料蘇州宗人滄洲先生更有用至二斤者然經方中正有用如雞子大二十四枚者是又不止二斤矣第二一案麻黃杏仁甘草石膏湯證其一穎師醫案鍾右住聖母院路大千世界隔壁福新電料行樓上初診十一月初三日傷寒七日發熱無汗微惡寒一身盡疼咯痰不暢肺氣閉塞使然也痰色黃中已化熱宜麻黃杏仁甘草石膏湯加浮萍淨麻黃三錢光杏仁五錢生石膏四錢青黛四分同打生草三錢浮萍三錢佐景按據史惠甫師兄言鍾姓少婦先因外出探望其父疾心滋憂戚歸途白雪紛飛到家即病曾經中西醫師雜治未全又因身懷六甲家人憂懼萬分耳師名叩請出診惠甫兄隨侍焉初診時病者面赤氣喘頻頻呼痛腹部尤甚按脈浮緊師謂此證易治不足憂徑疏本方二診十一月初四日昨進麻杏甘石湯加浮萍汗泄而熱稍除惟咳嗽咯痰不暢引胸腹而俱痛脈仍浮緊仍宜前法以泄之淨麻黃三錢五分生甘草二錢生石膏六錢薄荷末一錢同打光杏仁四錢苦桔梗五錢生薏仁一兩中川樸二錢蘇葉五錢佐景按據史惠甫兄言二診時病者已能與師對語神情爽適不若初診時之但呼痛矣稔知服藥後微汗出一身盡疼者悉除惟於咳嗽時胸腹部尚覺牽痛耳師謂本可一劑全愈適值天時陰雨故稍纏綿乃加苡仁厚朴蘇葉等與之自服第二方後又出微汗身熱全除但胸背腹部尚有微痛遊移不居又越一日病乃全瘥起床如常人第二二案麻黃杏仁甘草石膏湯證其二穎師醫案馮蘅蓀嵩山路萼廬賬房十月廿九日始而惡寒發熱無汗一身盡痛發熱必在暮夜其病屬營而惡寒發熱無汗則其病屬衛加以咳而咽痛當由肺熱為表寒所束正以開表為宜淨麻黃三錢光杏仁四錢生石膏五錢青黛四分同打生甘草三錢浮萍三錢佐景按本案脈案中所謂營衛蓋本內經營氣夜行於陽晝行於陰衛氣晝行於陽夜行於陰之說余則謂本案乃麻黃湯證化熱而為麻杏石甘湯證耳觀其惡寒發熱無汗身疼非麻黃湯證而何觀其咳而咽痛非由寒邪化熱熱邪灼津而何方依證轉病隨藥除桂枝湯證或以服藥故或以病能自然傳變故可一變而為白虎湯證同理麻黃湯證可一變而為麻杏石甘湯證此可證之以大論曰發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯此言本屬麻黃湯證予麻黃湯發汗孰知藥劑太重竟致肺部轉熱雖汗出而仍喘淺人無知見無汗變為有汗疑麻黃湯證轉為桂枝湯證初不知身無大熱熱反聚於肺臟而肺臟之邪並非傳於腸胃也經文俱在可以覆按余前謂白虎湯為桂枝湯之反面今當續曰麻杏甘石湯為麻黃湯之反面此說當更易明瞭何者二湯中三味相同所異者一為桂枝一為石膏而後知麻黃湯證為寒實麻杏甘石湯證為熱實攻實雖同寒熱不一麻黃湯證有喘麻杏甘石湯證亦有喘其喘雖同而其喘之因不一喘為肺閉而其所以閉之因不一人當健時肺部寒溫調勻啟闔合度無所謂閉及其受寒則閉受熱則亦閉閉者當開故均用麻杏以開之甘草以和之而以桂枝石膏治其原於是因寒而閉者開因熱而閉者亦開仲聖制方之旨於焉大明第二三案麻黃杏仁甘草石膏湯證其三佐景筆記佐景曰前年三月間朱錫基家一女婢病發熱請診治予輕劑透發次日熱更甚未見疹點續與透發三日病加劇群指謂猩紅熱當急送傳染病醫院受治錫基之房東尤恐懼慫恿最力錫基不能決請予毅然用方予允之細察病者痧已發而不暢咽喉腫痛有白腐意喘聲大作呼吸困難不堪咯痰不出身熱胸悶目不能張視煩躁不得眠此實爛喉痧之危候當與淨麻黃錢半生石膏五錢光杏仁四錢生草一錢略加蘆根竹茹蟬衣蚤休等透發清熱化痰之品服後即得安睡痧齊發而明喉痛漸除續與調理三日全愈事後婢女叩謝曰前我病劇之時服藥指本方之後涼爽萬分不知如何快適云意者醍醐灌頂可以彷彿形容之歟佐景按夫麻疹以透淨為吉內伏為凶盡人所知也而透之之法卻有辨別蓋痧毒內伏須隨汗液乃能外出而汗液寄汗腺之內須隨身熱乃能外泌故痧前之身熱乃應有之現象惟此種身熱亦有一定之標準過低固不可過高亦不佳事實上過高者少過低者多故用藥宜偏於溫萬不可濫用涼劑以遏之及痧毒正發之時小兒身熱往往過度與未發前成反比不知身熱過重又妨痧毒之外透此時熱迫肺部則喘急熱蒸汗腺則汗出熱灼心君則神昏熱熏痰濁則乾咳此為麻杏甘石之的證重劑投之百發百中又豈平淡之藥所能望其項背哉疹病之兼喉病者中醫謂之爛喉痧西醫稱之曰猩紅熱西醫治本病主先隔離視為第一等急性傳染病中醫治此似無若此慌張丁甘仁先生擅治此病其治法大意略曰喉痧當以痧為本以喉為標但求痧透則喉自愈可謂要言不煩而本湯之治喉痧所以得特效者即此故也痧毒攻喉則喉爛而為猩紅熱痧毒襲肺則呼吸急迫而為肺炎余嘗治稔友摯甫之大公子發麻疹用麻杏甘石湯加味而安其疹頗稠其證非輕余坦然愈之不以為意也越日二公子續發麻疹治以同法惟其性情較為強頑不肯聽母言安睡被中常自一床跳躍至他床疹發已逾四日滿面悉紅尚無回意忽加呼吸急迫鼻扇不已余曾見鼻扇之證甚多但從未有若是之劇者當其吸氣時鼻葉自動用力向里吸入兩葉幾合而為一又加肩動以助之呼氣之後又如是吸氣鼻葉直無寧時使依西醫法診斷此為麻疹併發急性肺炎無疑時摯甫遠客川中嫂夫人倉皇無主余乃延虞師舜臣主診先用開水送服琥珀抱龍丸一顆以折其熱邪續投湯藥仍師麻杏甘石法內用麻黃納入蘆根莖中兩頭紮好入煎並加桑白皮以透肺熱其夜撫孩四肢忽覺微微作冷鼻扇略緩面赤略淡屬吉屬凶孰能決之此嫂夫人次早所告余者幸自次早起四肢即轉溫顏面之疹倍稠於前色加紅鼻扇漸定至是方敢云出險此又中醫能治急性肺炎之一例至西醫謂肺炎乃麻疹之合併病就醫師立場之利害言我可從其說就醫學立場之真理言我不能無疑何者彼患麻疹者倘能服藥合度調護得法即不致續發肺炎抑亦何耶顧本湯之用卻又不限於喉痧及肺炎凡屬肺熱生痰因痰生喘者本湯皆能治之且已驗之屢矣然考之西醫說於肺病有急性慢性氣管支炎肺炎肺水腫種種名目究其理不外因細菌或塵埃之侵入而生炎灶以致氣管支等部分分泌黏液閉塞孔道轉致呼吸窒塞預後不良與吾中醫說謂肺津為熱熏灼變為痰涎因而痰聲如鋸者如出一轍使用麻黃杏仁以開其肺氣生石膏以清其熱甘草以和其中吾知其必可效也本湯條文曰發汗後又曰下後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯云云而惲鐵樵先生竟欲易之為無汗而喘大熱者不知麻黃湯證由或未發熱進為發熱其證勢為由鬱而發麻杏甘石湯證由身大熱轉為身無大熱其證勢為由表入里如邪由肺傳腦則身熱更微矣惟其逐漸由表入里由寒化熱故無汗漸轉為汗出獨其喘則必不除然後知熱喘二字實為本湯之主證得此一隅庶幾三反而經文煌煌乃可憑私意以塗改之耶惲先生又曰本湯可治白喉初起此言殊可商蓋真正之白喉忌表當以養陰解毒為主或者惲先生之所謂白喉實喉痧之誤王潤民先生曾暢發此義茲不贅第二四案麻黃杏仁甘草石膏湯證其四佐景醫案王左乳蛾雙發紅腫疼痛妨於咽飲身熱微微惡風二便尚自可脈微數舌微絳宜辛涼甘潤法薄荷一錢後下杏仁三錢連翹二錢象貝三錢桑葉二錢生草錢半赤芍二錢蟬衣一錢殭蠶三錢炙桔梗一錢馬勃八分牛蒡二錢活蘆根一尺去節另用玉鑰匙吹喉中佐景按當九十月燥氣當令之時喉病常多其輕者但覺喉中梗梗然妨於咽飲其略重者則咽喉兩關發為乳蛾紅腫如桃西醫稱此為扁桃腺腫治之每用刀割報載影后胡蝶嘗患此受治於西醫費千金而愈中醫治此似不須如此小題大做但須照上列方隨意加減可以一劑知二劑已計藥所費當不出一元之數與千金相較奚似蛾退之後悉如常態若夫言割法試問皮膚受蚊咬而發腫可以削之使平乎至若乳蛾漸由紅腫而化白腐或生白點可加玄參一味以治之其效如神若更由白腐而化膿乃可用刺法使膿出亦愈然使早用辛涼甘潤必不至如此地步此辛涼甘潤法之所以可貴也有一派喉科醫生治喉喜用苦寒之藥如板藍根川連地丁人中黃之屬服後雖可暫折邪氣每致鬱而不宣牽延時日甚或激成白喉之屬至堪危慮凡患乳蛾因服苦寒藥不解續進辛涼甘潤藥者則見效必較緩甚或初劑二劑竟毫不見效余試之屢矣又有一派醫生治喉喜用重膩育陰之藥如生地麥冬石斛沙參之屬竟重用至八錢一兩者以此治乳蛾亦不能速愈友人謝君維岐籍隸吳縣患喉痛小恙名醫與以育陰重劑多費而少效余卒用辛涼輕劑一服見功二服全愈此辛涼甘潤法之所以可貴也吾重言之不覺辭費至是讀者必將譁然曰辛涼甘潤是溫熱家法也今乃娓娓稱之姜佐景殆神昏譫語乎豈其舍經方實驗錄而改作時方實驗錄乎敬答曰非也辛涼甘潤乃仲聖大法溫熱家不過伸言之耳何以謂辛涼甘潤乃仲聖之法曰辛涼甘潤四字乃麻杏甘石湯之別稱也謂吾不信請察下表麻杏甘石湯麻黃辛石膏涼甘草甘杏仁潤辛涼甘潤法吾知讀者得此必將啞然失笑曰有是哉然此猶為未足我今更道其詳夫依鞠通言所謂辛涼輕劑者桑菊飲是也所謂辛涼平劑者銀翹散是也我今竭此二方之藥更益以近人所習用者分為四組列之如下第一組淡豆豉芥穗浮萍薄荷桑葉菊花連翹蟬衣佩蘭第二組貝母杏仁竹茹萊菔殭蠶牛蒡桔梗蔞皮枇杷葉第三組銀花赤芍滑石竹葉葦莖第四組人中黃甘草梨皮蔗漿地慄以上第一組藥九味功在解表試問能出麻黃之範圍否第二組藥九味功在化痰試問能出杏仁之範圍否第三組藥五味功在涼血試問能出石膏之範圍否第四組藥五味功在生津試問能出甘草之範圍否然則統辛涼甘潤法之妙藥總不出麻杏甘石湯之範圍一經指出彰彰明甚故謂辛涼甘潤藥系從麻杏石甘湯脫胎向平淡方向變化以治麻杏甘石湯之輕證也可若謂辛涼甘潤法為溫熱家創作能跳出傷寒圈子者曷其可哉葉氏幼科醫案曰春月暴暖忽冷先受溫邪繼為冷束咳嗽痰喘最多夫輕為咳重為喘喘急則鼻掀胸挺此實麻杏甘石湯之的證使及時投以麻杏甘石湯重劑則藥到病除何致有逆傳心包之危依佐景臨床所得本湯證以小兒患者居多且多發在冬春之間與夫白虎加桂枝湯證之多發於夏日及大人者悉相反與葉氏所言頗合是葉氏乃明知麻杏甘石湯者也吳氏鞠通亦知之故雖在條辨上焦中焦二篇隱而不言及在下焦篇第四十八條即不復藏匿曰喘咳息促吐稀涎脈洪數右大於左喉啞是為熱飲麻杏甘石湯主之然則溫熱諸家果能識麻杏甘石湯證並即以此為基礎更從而變化之擴充之欲自成為廣義之溫病學說實無疑義惜乎不肯道破根源反欲求分庭抗禮其學力獨到處可以令人佩仰其禮貌未修處殊不可效尤獨怪今之一般醫師讀溫熱書而忘傷寒論更不曉溫熱病在傷寒論中之出處欲求愈疾抑亦難矣故余敢作公平之論曰溫熱家之說並非全錯時方輕方並非全不可用但當明其與傷寒經方間之師承貫通處然後師經方之法不妨用時方之藥且用之必更神驗此為親歷之事實所可忠告於同仁者也余前謂白虎湯證有非由桂枝湯證傳變者同理麻杏甘石湯證有非由麻黃湯證傳變者使其一見而為麻杏甘石湯證醫必曰此溫病也葉香岩曰溫邪上受首先犯肺旨哉斯言於是桑菊銀翹滔滔而來病輕者幸愈病重者竟至逆傳心包嗚呼若而人者不學無術其安知麻杏甘石湯本可免逆傳心包乎安知首先犯肺者不但為溫邪且有時屬寒邪上受即是麻黃湯證乎安知麻黃湯證化熱之後即是麻杏甘石湯證乎又安知傷寒傳足溫病傳手悉是殺人之邪說乎我敢實告讀者我非神昏我不譫語今歲臘月一同鄉何姓小孩住菜市路一百號煤炭店樓上病鼻扇喘息不寧汗出微黏便溏帶臭身微熱先日曾經他醫投辛涼輕劑絕不見效余曰汗出而喘無大熱者麻杏甘石湯主之因即予本湯輕劑略加蟬衣桔梗蘆根以助透發次日據報病大減喜吮乳矣乃就原方去麻石加輕藥懸擬予之三日病又急不得已抽暇前往親診依然賴麻石而安嘻麻杏甘石之足以去病辛涼淡藥之莫能逐邪有如是者是故余謂辛涼甘潤是發源於麻杏甘石但治麻杏甘石之輕證一說乃從臨床實驗中細心體察而來絕非文字上之偶合使我但藉雕蟲之小技空添諸君酒後之資茶餘之助則經方實驗錄同是可焚之書安有價值足言使其不然諸君中有未曾用過麻杏甘石湯者他日遇此的證不解於他醫之辛涼輕劑乃用此湯而獲效者方是本錄發揚權威之時亦正仲聖絕學復興之日也曹穎甫曰治病用藥當觀其通苟得其空靈妙悟則牛溲馬勃敗鼓之皮何嘗非活人之聖藥予亡友丁甘仁先生云古人於重證始出方治今人用之於類似之證往往失效非古方之不可用也為其藥石之太過也藥力太過則當擇藥力稍輕者而代之無如近代醫生見避重就輕之有效竟廢古方而不用一人倡之百人和之遂成積重不反之勢醫道所以日趨於苟簡耳今姜生具此通識使甘仁先生可作吾知必許為通才謂不料有此再傳弟子也第二五案葛根黃連黃芩湯證其一佐景醫案李孩疹發未暢下利而臭日行二十餘次舌質絳而苔白腐唇乾目赤脈數寐不安宜葛根芩連湯加味粉葛根六錢細川連一錢淮山藥五錢生甘草三錢淡黃芩二錢天花粉六錢升麻錢半佐景按李孩服後其利漸稀痧透有增無減逐漸調理而安湘人師兄亦在紅十字會醫院屢遇小孩發麻疹時下利必治以本湯良佳又有溏泄發於疹後者亦可以推治麻疹之利屬於熱者常十居七八屬於寒者十不過二三故宜於葛根芩連湯者十常七八宜於理中湯或桂枝人參湯者十不過二三一或不慎誤投湯藥禍乃立至可不畏哉今人每以葛根芩連湯證之利為協熱利實則葛根芩連湯證之利雖屬熱性仲聖並未稱之為協熱利至桂枝人參湯證之寒性利反稱之為協熱而利蓋協熱者猶言挾表熱也此不可不知太陽病當解表若不予解表而用治陽明法以下之則變證但或從寒化或從熱化每無定局正氣盛者多從熱化正氣衰者則從寒化仲聖云太陽病外證未除而數下之遂協熱而利利下不止心下痞鞕表裡不解者桂枝人參湯主之此從寒化之例也又曰太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之此從熱化之例也本條有餘意有省文若欲知其詳而不嫌辭贅者可在也字下加宜葛根湯若利不止諸字樣則經旨明矣意謂桂枝湯證因下傷津利不止亦傷津而脈促近於浮為表未解故宜葛根湯以解其表而養其津若表解之後內熱甚熾肺受熱灼而喘汗受熱蒸而出者當用葛根芩連湯以直折之余前謂桂枝湯證化熱則為白虎湯證麻黃湯證化熱則為麻杏甘石湯證今當續為之說曰葛根湯證化熱則為葛根芩連湯證徵之於臨床考之於經文歷歷不爽我豈好為異說故作矜奇者哉曹穎甫曰表未解者必不汗出蓋利不止而脈促為表未解表未解者宜葛根湯利不止而喘汗為表病入里則宜葛根芩連湯脈促為脈緊變文前於傷寒發微中已略申其旨固知葛根芩連湯惟已經化熱者宜之耳惟其化熱者宜之而舌苔白腐唇乾目赤乃無乎不宜不惟熱利為然也第二六案葛根黃連黃芩湯證其二佐景醫案孫寶寶住廳西路初診滿舌生瘡環唇紋裂不能吮飲飲則痛哭身熱溲少脈洪而數常煩躁不安大便自可擬葛根芩連湯加味粉葛根四錢淡黃芩錢半小川連六分生甘草三錢燈心三紮活蘆根一尺佐景按孫君維翰友人也其小公子未二齡甚活潑可愛體肥碩肖其父每患微恙余必愈之顧以事繁常無暇面診有時僅憑孫君之陳述而疏方焉一日孫君又言其孩身熱咳嗽口渴不安云云當遙擬辛涼輕劑與之服之二日不差反劇謂口舌生瘡矣當請面診允之細察之下乃知本為葛根湯證今乃化熱進而為葛根芩連湯證矣葛根湯證何以化熱變劇蓋辛涼輕劑不勝重任故也孫孩服此之後將一劑而愈乎曰不然次日其病不增不減僅維原狀而已何以故蓋藥量不足故也尤以黃連之量殊輕隨俗浮沉我病不能自拔二診口瘡投葛根芩連湯不見大效宜進一步合承氣法粉葛根四錢細川連八分生川軍二錢生甘草三錢淡黃芩錢半枳實錢半玄明粉錢半分沖佐景按又次日孫君來告此方之效乃無出其右服後一小時許能飲水而不作痛狀夜寐甚安越宿醒來舌瘡大退肯吮乳囑減量再服遂愈乃知大黃內服卻勝冰硼外搽因此散我固曾用於二三日前也葛根湯證化熱為葛根芩連湯證葛根芩連湯證化熱則為承氣湯證我因失治緩治於先故補治急治於後不待其大便閉結而審其即將閉結預用硝黃以圖之此急治補治之說也然設使我能及時重用葛根芩連又何需乎硝黃我能及時重用葛根湯又何需乎芩連溯本窮源為醫者不當若是乎昔我治一婦人舌尖下發一白點漸內蝕飲食輒痛不能觸鹹味尤不可碰熱菜我曰此屬熱宜師白虎湯服石膏婦服之數日腐點不動而胃納反差聞人言服黃連可效竟一劑而愈我乃恍然若聞道知葛根芩連湯與白虎湯本屬並肩各有主治不容混淆設使互易為治必兩不奏功閱者倘猶以此為未足而欲詳二湯之異趣者請續察下案拙按曹穎甫曰葛根芩連湯既為化熱而設服之不效腸胃燥實即為熱病之結果故佐景謂合承氣法為進一步也第二七案葛根黃連黃芩湯證其三佐景醫案自服方案缺粉葛根四錢生甘草三錢淡黃芩二錢黃連一錢京赤芍三錢密蒙花錢半佐景按本方余備以自服者也然余不下利不生口瘡用比安為者曰用此以治目赤西醫所稱眼膜炎者是也余先微傷於風風去而目赤晨起多眵封目不易張張則梗梗然若有物觸犯之者隨服本方服藥之時適史惠甫唐崇景二兄來訪余告以病情並請試猜藥屬何方二兄莫能中也不須再劑不必忌口眼膜炎退惠甫默識吾葛根芩連湯可治目赤之言越日訪姨母適見表弟病目赤不能張身大熱神糊譫語不下利頭中劇痛其人服務於江南造船廠曾經醫治不愈反劇僉謂冬溫難治惠甫與葛根芩連輕劑不加他藥又次日往視神昏譫語頭痛目痛悉愈惟眼膜之炎未退囑服原方又越二日往視眼膜之炎退其半仍囑服原方其全愈可操左券者不待言矣適北平文醫半月刊遞至內載張玉珍先生作經方驗案一則頗足與本案互相發明敢摘錄如下以證吾言張先生曰本村有張志瑞者年六十業農七八年前偶得眼鼻劇痛之症醫治月餘乃愈二十三年秋復犯一次半月乃愈上月初間舊曆舊症復發眼睛鼻孔疼痛異常先延某西醫眼科專家施以止痛治療絲毫未效翌日其家人向余求治余與病者既為同鄉又為同姓立即馳往及至其家見其以頭觸地弓腰伏臥呻吟呼喊之聲達於戶外問之則曰眼睛鼻孔疼痛異常非如此呼喊呻吟以頭觸地不能減其疼也且每次都是這樣惟此次又加泄利身熱耳診之脈象洪數因思傷寒論中陽明經證有目痛鼻乾之文腑證有胃家燥熱之說今泄利雖非燥熱亦定為胃腸濕熱所致彼傷寒論中之葛根黃芩黃連湯恰與此證相合遂以此湯加桑葉菊花夏枯草滑石與之一劑而愈考吾國古聖之經方苟用之對症莫不效如桴鼓今西醫束手無策之症而我國古方竟能一藥而愈者非一證乎然則葛根芩連湯既可以治下利又可以治口瘡又可以治目赤更可以治鼻疼演而伸之還可以治他病一湯之用何其廣也曰欲答此題當明葛根芩連湯證之病所何在欲明葛根芩連湯證之病所何在當明葛根湯證之病所何在容順次述之我所謂病所云者有異於西醫之病灶也西醫所稱之病灶精而詳我所說之病所略而約夫約略者無如精詳者美此盡人所知也然而精詳者有時而窮約略者乃可泛應萬病故二者高下之分似尚未可以片言折之今姑置此而勿論桂枝湯證之病所言其里則偏於胃麻黃湯證之病所言其里則偏於肺葛根湯證之病所言其里則偏於血脈神經而項背為腦脊髓神經分布之地故患葛根湯證者其項背獨強𠘧𠘧白虎湯證之病所同桂枝湯偏於胃麻杏甘石湯證之病所同麻黃湯偏於肺葛根芩連湯證之病所同葛根湯偏於血脈神經故白虎湯證與麻杏甘石湯證之病所發有定處若葛根芩連湯證之病所則發無定處誠以血脈神經本周布於一身而一身之血脈神經未必盡病不過病其一部經云邪之所湊其氣必虛即血脈神經較為脆弱之部則受邪而病之謂發於腸部則為下利發於舌部則為口瘡發於眼部則為目赤發於腦部則為痙或腦膜炎之類觀此葛根芩連湯之所以得泛應諸病者實以本證之病所本無定處故也難經曰溫病之脈行在諸經不知何經之動也各隨其經所在而取之與所謂中風傷寒濕溫熱病之脈有定象者獨異而與我所謂葛根芩連湯證發無定處者隱約中若合符節我不敢據此以通釋難經傷寒然其義至足長思也難經中所謂五種傷寒依鄙見大論中皆有主方詳第二集鍾志和先生作吾人對於流行性感冒應有之認識略云吾人連日讀報章所載英國流行性感冒傳染極盛死亡頗多據調查所得前星期因患該證而死者為數達一千一百三十七人而本星期則已增至一千一百五十五人其傳布之迅速以及其死亡率之眾多已足驚人查此證系一大流行病屬急性傳染病之一種為地方性流行性或散發性在前世紀曾大流行四次至於一九一七至一九一八年則為近年來第三次大流行勢甚洶湧流行全球各國死亡極多一九二一年曾流行於遠東傳布達於全球但疫勢非劇按該病之流行每一地方大抵經六至八星期之久其疫潮所至難有幸免者如在大流行之時幾佔全人口百分之四十或較強則其傳染性之劇烈實有令人寒齒恐懼者也今英國既經流行一旦因交通之便而傳入我國雖云死亡率不甚高然一經傳染身體因而虛弱影響終身康健者為害非淺吾人豈可漠視不顧而不加緊預防更可對該症無深切之認識乎本證依其種類之不同分作呼吸系統類呼吸道自鼻部以達於肺各部均可受累病輕者現卡他耳症狀惟身體極感疲乏其危重者每現支氣管炎胸膜炎肺炎等狀胃腸即消化系統類現下痢噁心嘔吐口臭舌苔厭食頭痛吐酸腹痛甚或大瀉而呈腦力虛脫者孕婦易起流產神經系統類頭痛暈眩神經痛不眠精神亢奮或因之發神經炎腦炎腦膜炎癲癇精神病等錄二十六年二月十六日申報醫藥專刊然則西醫所謂流行性感冒之屬於呼吸系統類者即吾所謂麻黃湯麻杏甘石湯證是其屬於消化系統類者即吾所謂桂枝湯白虎湯證是其屬於神經系統類者即吾所謂葛根湯葛根芩連湯證是其曰大流行勢甚洶湧各國死亡極多者即仲聖所謂余宗族素多向餘二百建安紀年以來猶未十稔其死亡者三分之二傷寒十居其七是此西醫說傷寒論之可以通釋者也然彼重預防隔離滋養注射吾主望聞問切寒熱溫涼此治療法則之未許強同者也白虎湯證不過為熱象其勢較緩麻杏甘石湯證熱之中夾閉象其勢較急葛根芩連湯證熱之中夾毒象其勢較險惟其毒劇故生腐蝕毒者菌也黃連苦寒功能殺菌故仲聖用以為主藥白虎湯證麻杏甘石湯證傳自不傷津之中風傷寒葛根芩連湯證傳自傷津之溫病然則津傷者即貽毒菌之繁殖津不傷者反是此中寧無一貫之妙理讀者請自釋之曹穎甫曰凡病入於血分則易於化熱易於生毒若癰疽然為其血分受灼血鬱而毒生也故麻疹之從熱化者尤為重要推而言之葛根芩連一方可以治下利可以治目赤鼻疼去歲予長孫患疹目赤下利脈數予適患眩暈重證以此方語長子湘人湘人竟不敢用以致夭死至今猶為心痛附記於此以志吾過蓋當時予不能握管若使他人書方或當有救可惜也佐景又按語云旁觀者清當局者昧信然余能愈他人之腸癰而不克治家岳之肺癰即是一例蓋醫者之治家人或至戚每多情感作用於其間反為理智之蔽若治他人省卻顧慮反易奏功湘人師兄以一時姑息曲愛竟遭喪明之痛者恐亦坐此弊耳師兄自後在紅十字會醫院施診屢遇小兒麻疹下利之重證悉用葛根芩連愈之病家感戴之真誠有非言語可以形容者然則三折肱成良醫亦情勢之所必然也歟第二八案葛根黃連黃芩湯證其四穎師醫案徐左美亞十廠六月十二日小便已陰疼此本大腸燥氣熏灼膀胱傷寒論所謂宜大承氣湯之證也乃治之不當服某種丸藥以致大便日滯小便轉數陰疼如故足腿痠上及背脊俱酸而胃納不減者陽明燥氣用事也闕上略痛陽明餘熱為病也右脈滑大仍宜大承氣湯惟虛者不可重虛姑宜葛根芩連湯加綠豆以清下陷之熱而兼消丸藥之毒葛根一兩五錢淡芩三錢川連一錢綠豆一兩生草一錢佐景按吾師所謂小便已陰疼宜大承氣湯者義詳傷寒發微本湯之加綠豆與葛根湯之加粳米有異曲同工之妙本證當用大承氣湯以其虛故退一步用葛根芩連湯前案以其實故進一步合承氣法能進者病以速愈能退者疾乃無危夫進退之法兵家之事也今吾於醫術亦云且凡百證治皆然第於本案發之曹穎甫曰予用此方不過因熱利而設初未嘗有退一步想然亦何嘗非退一步想也小便已陰疼原屬當下之證設非經西醫妄下何至不用硝黃此與佐景加硝黃於本方中者適得其反固知治病用藥當觀其通墨守成方直土木偶人耳觀後文佐景所說病機之變化與用藥之同異可以恍然大白矣佐景又按今合以上自桂枝至葛根芩連共六湯列為一表如下麻黃湯證太陽傷寒一一麻杏甘石湯證病所偏於肺桂枝湯證太陽中風白虎湯證病所偏於胃葛根湯證太陽溫病葛根芩連湯證病所偏於血脈神經六湯中桂枝湯以桂枝為君藥麻黃湯以麻黃為君藥葛根湯以葛根為君藥葛根芩連湯以黃連為君藥白虎湯以石膏為君藥麻杏甘石湯似無君藥可言非無君也合他湯之君以為君也設有好事者欲為麻杏甘石湯立專君我當首推葦莖此君乃千金之子最堪為萬乘之君者也一笑於此有一剩義焉我將發之以為快曰桂枝湯證麻黃湯證葛根湯證皆帶有表證一經化熱之後則表證悉罷而為白虎湯證麻杏甘石湯證葛根芩連湯證之純里證於是知由表入里乃外感疾病傳變之第二原則第二九案大承氣湯證其一穎師醫案方左病延二候闕上痛渴飲大便八日不行脈實雖今見心痛徹背要以大承氣湯主治生川軍四錢後入小枳實四錢中川樸一錢芒硝二錢後入全瓜蔞五錢拙巢注下後胸膈頓寬惟餘邪未盡頭尚暈乃去硝黃再劑投之即愈佐景按大論曰問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也此概統白虎承氣而言之若求大承氣湯之全部症狀當為一大便不行腹痛拒按此以胃中有燥矢故也二闕上痛內經以闕上屬喉間病此概以氣色言之若陽明燥氣上衝及腦則闕上必痛其不甚者則但脹耳王慎軒先生首言之而吾師親驗之三右髀有筋牽掣右膝外旁痛此為吾師所獨驗而得之者四脈洪大而實然亦有遲者五日晡潮熱他若舌苔黃燥厚膩大渴引冷當在應有之例然此不過言其常耳若下列諸案所引則其變也知常知變乃可與言大道吾師善用諸承氣湯歷年治陽明實證十九全愈雖不能盡如陸九芝氏所云陽明無死證然似可告無罪於仲聖矣人見吾師用承氣之善乃有曹一帖之尊稱復有曹承氣之雅號不知若而人者皆非真能知吾師者也何以言之吾師之用藥也麻桂膏黃柴芩姜附悉隨其證而定之絕不似世之名家偏涼偏熱以執一為能事者嗟乎時至今日醫道陵替桑菊梔豉貝杏蔞杷凌亂雜湊不復成方治輕病以此治重證亦以此驟見一二名士能用桂附乃輒驚為天人甘拜下風適見其病之起則咋舌歎服以為盧扁復生而其故莫知也不起則搖首太息曰醫能醫人之病不能救人之命竟忘桂附而外猶有硝黃在也故當其險證臨前束手無策之時偶見一能用硝黃之醫一劑而愈之又不覺茅塞頓開矇瞶遽啟曰此某承氣也此某一帖也噫以管窺天以蠡測海何其陋也余敢宣告於眾曰凡仲聖所稱某某湯主之云者此皆一劑知二劑已之方也倘能藥量適合則一帖愈病原屬平淡無奇之事安足怪者而傷寒論中之陽明病佔全書篇幅四之一於承氣湯尤反復推論其詳備明確遠出三陰諸方之上然則硝黃之用復有何疑者閱者能明此旨是為知吾師者是為知仲聖者今日中醫之弊在不敢用下藥既如上述而西醫之拙卻在過用下藥凡外感病初起西醫大抵以清滌腸胃為先著不知表未解有內陷之虞彼不暇問也夫先解其表後攻其里是乃仲聖之大法順之者生違之者危中西醫各宜矯正也曹穎甫曰予遇貧病之家病太陽而大便累日不行者於方箋必書二方一為麻黃湯一為承氣湯令其先服前方有汗即用後方得下則表裡之病皆愈昔年治趙庭槐家用之治繆桂堂亦用之俱效余則不復記憶矣存此以為先解表後攻里之明證第三案大承氣湯證其二穎師醫案若華忽病頭痛乾嘔服吳茱萸湯痛益甚眠則稍輕坐則滿頭劇痛咳嗽引腹中痛按之則益不可忍身無熱脈微弱但惡見火光口中燥不類陽明腑實證狀蓋病不專系腸中而所重在腦此張隱菴所謂陽明悍熱之氣上循入腦之證也按即西醫所謂腦膜炎之類及其身無熱脈微弱之時而急下之所謂釜底抽薪也若身有大熱脈大而實然後論治晚矣生川軍三錢芒硝三錢枳實四錢厚朴一錢佐景按若華女士服本方後約三小時即下所下非燥矢蓋水濁也而恙乃悉除不須再診是時余按日從師受課故知之稔夫滿頭劇痛病所在腦也一下而愈病源在腸也合而言之所謂上病下取治求其本也蓋腸中既燥胃居其下聲氣互通乃亦化熱胃有神經上通於腦輾轉相傳腦神經受熱熏灼故發為滿頭劇痛抑又腸胃燥實者周身血液亦必隨之化熱其敷陳血管壁間之諸神經自受同一之影響而腦部為全身神經之總彙樞機重要所繫更鉅故非特滿頭劇痛甚且神昏譫語發狂喜妄考之抵當湯證有發狂之象桃核承氣湯證有如狂之狀此皆血熱影響於腦神經之明證故用藥總不離乎硝黃無非脫胎於承氣湯深足長思也然腸熱有易犯腦者有不易犯腦者則其人之神經脆弱與否殊為一大主因要以脆弱者易被犯如本案所載者是其理極顯又小兒神經脆弱故驚厥之病特多曹穎甫曰陽明證之頭痛其始則在闕上甚則滿頭皆痛不獨承氣湯證有之即白虎湯證亦有之且陽明府實證燥氣上衝多致腦中神經錯亂而見譫語頭痛或反在大便之後無根之熱毒上冒如大便已頭卓然而痛可證也惟腸中有濕熱蘊蒸其氣易於犯腦為水氣易於流動正如湯沸於下蒸氣已騰於上不似燥矢之凝結必待下後而氣乃上衝也此證但下濁水即可證明濕熱之蘊蒸陽明不然目中不了了無表裡證大便難身微熱者何以法當急下乎第三一案大承氣湯證其三穎師講授佐景筆記師曰予嘗診江陰街肉莊吳姓婦人病起已六七日壯熱頭汗出脈大便閉七日未行身不發黃胸不結腹不脹滿惟滿頭劇痛不言語眼張瞳神不能瞬人過其前亦不能辨證頗危重余曰目中不了了睛不和燥熱上衝此陽明篇三急下證之第一證也不速治行見其腦膜爆裂病不可為矣於是遂書大承氣湯方與之大黃四錢枳實三錢川樸一錢芒硝三錢並囑其家人速煎服之竟一劑而愈蓋陽明燥氣上衝顛頂故頭汗出滿頭劇痛神識不清目不辨人其勢危在頃刻今一劑而下亦如釜底抽薪泄去胃熱胃熱一平則上衝燥氣因下無所繼隨之俱下故頭目清明病遂霍然非若有宿食積滯腹脹而痛壯熱譫語必經數劑方能奏效此緩急之所由分是故無形之氣與有形之積宜加辨別方不至臨診茫然也佐景按余嘗見一男子病者神志恍惚四肢痙厥左手按額上右手按其陰器兩足相向彎曲而崛起旁人雖用大力不能使之直伸目張而赤近光則強閉脈凌亂隱約大便多日不行數日來頭痛病起僅七八日服藥五六日即至如此地步據謂前曾宿娼患瘡外治而愈余曰此大承氣證失治者也顧口噤藥不能下侍者用簡便法納甘油錠於其肛中凡三次毫無效驗惜無親人作主不能試膽導法次日汗出夜斃是可憫也又一男子病者感病數日腹中微痛醫以四逆散作湯與之痛略差而目中之不了了更顯與之言半是半非其夜即斃由上實驗證之目中不了了睛不和確為至危至急之候雖傷寒不過六七日無表裡證身但微熱大便但難而不結即為實當急下之宜大承氣湯仲聖筆之於論固甚明瞭也果能治之得法獲效亦捷如本案所示者是以今日之生理釋之目中不了了睛不和即為腦病之外徵緣腦神經纖維出於後腦之下部者十有二對其繫於目睛者四對焉曰視神經曰動眼神經曰滑車神經曰外展神經故外見目疾內實腦病較之上案所言僅滿頭劇痛者其病為更勝一籌其情為更急一等其方藥分量當更重若干而治無第二法門舍大承氣莫屬也雖然大論又曰傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦則生澀者死微者但發熱譫語者大承氣湯主之可見腦神經病至於不識人至於獨語如見鬼狀至於循衣摸床至於脈澀其微者大承氣湯尚可得而主之其劇者縱投本湯亦無效矣試推求其無效之故安在曰大承氣但能治腸熱之病源不能治神經之病所病源雖去而病所燎原之勢已成諸神經悉受燒灼故外見種種惡狀卒致不救也然則當此時也將何藥以救之乎曰有之其惟羚羊角乎本草綱目曰本品平肝舒筋定風安魂散血下風辟惡解毒治子癇痙疾云云所謂惡者毒者因熱而生也所謂肝者筋者即指神經也熱毒熏灼神經則見痙攣抽搐是即所謂肝風動陽羚羊角能涼和神經使之舒靜故用之得法合量可以治大承氣所不能治之證他藥如石決鉤鉤蠍尾蜈蚣皆可以為佐張氏錫純善用本藥余心折之曹穎甫曰惲鐵樵治王鹿萍子腦膜炎用羚羊角犀角奏效此王鹿萍子親為予言之證以佐景所言益復可信足見治危急之證原有經方所不備而藉力於後賢之發明者故治病貴具通識也第三二案大承氣湯證其四穎師講授佐景筆記師曰陳姓少年住無錫路矮屋年十六幼齡喪父惟母是依終歲勤勞尚難一飽適值新年販賣花爆冀博微利飲食失時飢餐冷飯更受風寒遂病腹痛拒按時時下利色純黑身不熱脈滑大而口渴家清寒無力延醫經十餘日始來求診察其證狀知為積滯下利遂疏大承氣湯方憐其貧也並去厚朴計大黃四錢枳實四錢芒硝三錢書竟謂其母曰倘服後暴下更甚於前厥疾可瘳其母異曰不止其利反速其利何也余曰服後自知果一劑後大下三次均黑糞乾溼相雜利止而愈此金匱所謂宿食下利當有所去下之乃愈宜大承氣湯之例也佐景按大論曰少陰病自利清水色純青心下必痛口乾咽燥者急下之宜大承氣湯可以互證溫疫論曰熱結旁流者以胃家實內熱壅閉先大便閉結續得下利純臭水全然無糞日三四度或十餘度宜大承氣湯得結糞而利止服湯不得結糞仍下利並臭水及所進湯藥因大腸邪勝失其傳送之職知邪猶在也病必不減宜更下之延陵吳又可先賢能言此誠不愧為仲聖之入室弟子矣客曰仲景論傷寒又可論溫疫子烏可混而一之曰籲是何言也仲聖曰觀其脈證知犯何逆隨證治之客知此大義乎吾中醫之長處即在能識此證字苟察病者所犯為大承氣湯證則投以大承氣湯所犯為四逆湯證則投以四逆湯服湯已其效若響斯應則其前病之何名初可勿拘拘也傷寒家曰此傷寒也此自利清水也此嘔吐而利是名霍亂也溫熱家溫疫家曰此溫病也此溫疫也此熱結旁流也此絞腸痧也推而至於西醫師曰此急性傳染病也此腸炎也此虎列拉也余曰凡此所稱皆是也然使醫者不識其證而誤投方治則其所稱之病名雖合皆非也由是論之有清二百餘年醫家輩出只知傷寒溫病之爭不研數百證方之辨此皆懵懂人也降至近年國醫館成立為中醫界闢一新紀元彌足慶賀然而袞袞諸公嘗惟病名之是論或主從中或主從西筆墨紛爭案牘載途反將中醫學最著重之證與方置而未問卒也築室道謀用不潰成冷眼靜觀得毋與清人之失同一覆轍而無以負舉國人士期望之殷殷乎余也無似於醫學並未深造初不敢妄有論列致犯當世大家然而骨鯁在喉稍吐亦快凡此所附論者尚不過為吾所見之一極小微點他日有暇當暢陳拙懷以就教也客唯唯而退曹穎甫曰治病必求其本故醫者務識其病根所在然後可以藥到而病除若泥於病名之殊異多有首尾兩端始終不敢用藥以致人於死者豈不惜哉佐景又按柳氏谷孫吾醫中之賢者也所著溫熱逢源一書膾炙醫林茲錄其治驗二則曰光緒初年冬仲徐君聲之因欲服補劑囑為定方予診其脈兩尺浮數絃動而不靜予謂據此脈證當發冬溫補劑且從緩進因疏方黃芩湯加生地囑其多服幾劑當其時飲啖如常並無疾苦勉服三兩劑即停不服迨十二月十七忽振寒發熱兩日後漸覺神情昏糊困倦熱勢蒸郁不達神呆耳聾面垢此少陰伏邪化熱外達其勢外已入胃而內發於陰者尚未離少陰之界而並有竄入厥陰之勢病情深重而急予以至戚誼無可諉不得不勉力圖之先與梔豉黃芩二劑繼進清心涼膈法兩劑均無大效而痙厥昏譫舌燥唇焦病勢愈急乃用調胃承氣加洋參生地犀角羚羊元參養陰清泄之品兩劑之後始得溏糞如黴醬者二遍間進犀羚地芍豆豉梔丹芩元參養陰熄熱清透少陰之劑而熱似不減乃再與調胃承氣合增液法又行垢糞一次此後即以此法與養陰清泄之法相間迭用自十二月二十三起至正月初十通共服承氣八劑行宿垢溏黑者十餘次裡熱始得漸鬆神情亦漸清朗用養陰之劑調理兩月而全按此證少陰伏邪本重其化熱而發也設熱邪全聚於胃即使熱壅極重猶可以下泄之藥背城借一以圖幸功乃中焦之熱勢已劇而伏熱之潰陰分者又內熾於少厥兩陰之界岌岌乎有蒙陷痙厥之險不得已用助陰托邪之法從陰分清化使其漸次外透其已達於胃者用緩下法使之隨時下泄戰守兼施隨機應變如是者將及兩旬邪熱始得退清假使攻下一兩次後即畏其虛而疑不能決則其險有不堪設想者然則焦頭爛額得為今日之上客者幸也又曰長媳徐氏戊戌七月患感冒挾肝氣發熱脘痛嘔惡不納者五六日八月朔得大解頗暢余謂大便一通病可松也不意至夜寒熱大作噁心乾嘔徹夜不止與左金平胃溫膽瀉心均無寸效至初五日煩躁口渴舌燥起刺予以其質弱陰虧慮其不耐壯熱急思乘早擊退冀免淹纏遂用涼膈合瀉心法佐以洋參石斛等連進兩劑得大解兩遍嘔惡即止而裡熱不減間服養陰泄熱藥一二劑大便仍不行而舌苔灰黑轉厚乃改用調胃承氣合增液法間日一進每進一劑即行一次糞色或黃或黑或溏或結又進三次至十五日方中大黃重至五錢乃腹中大痛宿糞暢行當時冷汗肢厥幾乎氣脫不回急進人參以扶正氣始能漸定自此次暢行後裡熱漸鬆用藥總以養陰扶胃為主每間三四日大解不行即用人參湯送大黃丸藥一服或瀉葉湯一盞大便始行而糞色仍黑紫如醬至九月初乃能漸進米湯稀粥然每至三五日大解不通即覺胃熱熏郁須與清泄得大解始平至九月十九日服瀉葉湯後忽然宿垢大行得黑垢半桶之多然後積熱濁熱始得一律肅清不再有餘熱熏蒸矣自初病至此共用大黃三兩零元明粉一兩零人參參鬚二三兩洋參麥冬各十餘兩鮮地石斛各一斤其犀羚珠粉等味用數少者不計焉此證因陰虛質弱之體患此大病米飲不沾唇者一月而得全性命者緣自病迄今始終以扶正養陰為主故雖屢瀕危殆而卒獲保全其積垢行至一月有餘而始淨則初念亦不及料也然從此可知時病之餘熱不解皆由積垢不清所致斷不可顧慮其虛轉致留邪生變也又此證最易惑者其脈始終細弱毫無實象惟將見證細意審察究屬體虛證實惟有用洋參鮮地石斛大黃以養陰泄熱為至當不易之治碻守不移始得回一生於九死也亦幸已哉足見柳氏治陽明實證用承氣湯法使邪從溏糞宿糞而解近師又可遠宗仲聖不失為治病能手乃氏始終念念於少陰不忘於伏氣得毋與張氏石頑同坐一失而難免張公山雷之議乎斯乃不能不為柳氏惜矣第三三案大承氣湯證其五穎師親撰師曰傷寒論曰厥應下之而反發汗者必口傷爛赤按寒鬱於外熱伏於裡則其證當俟陽熱漸回而下之俾熱邪從下部宣泄而病愈矣若發其汗則胃中液涸膽火生燥乃一轉為陽明熱證為口傷爛赤所由來此正與反汗出而咽痛喉痹者同例由其發之太過而陽氣上盛也此證余向在四明醫院親見之其始病余未之見及余往診已滿口爛赤檢其前方則為最輕分量之桂枝湯案中則言惡寒夫病在太陽而用桂枝雖不能定其確當與否然猶相去不遠既而病轉陽明連服白虎湯五劑前醫以為不治老友周肖彭囑余同診問其狀晝則明瞭暮則壯熱徹夜不得眠夫營氣夜行於陽日暮發熱屬血分晝明夜昏與婦人熱入血室同熱入血室用桃核承氣則此證實以厥陰而兼陽明燥化病者言經西醫用瀉鹽下大便一次則中夜略能安睡診其脈沉滑有力余因用大承氣湯日一劑五日而熱退肖彭以酸棗仁湯善其後七日而瘥佐景按大論曰厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤今已口傷爛赤考其原咎在發汗則更應下矣此經文之可據以用承氣者一也陽明病有日晡所發潮熱之證大論言之者屢今病人晝日明瞭暮則壯熱殊相合此經文之可據以用承氣者二也更診其脈沉滑而有力是為實此脈象之可據以用承氣者三也西醫曾以瀉鹽微下則中夜略得安睡此前治之可據以用承氣者四也有此四證已可謂細心若仍不能大膽用救命之方尚得稱為醫家乎曹穎甫曰口傷爛赤胃熱也大便燥結腸熱也手足陽明俱熱不急瀉之病何能去內經云陽氣當隔隔者當瀉不亟正治粗乃敗之此之謂也第三四案小承氣湯證穎師醫案史左闕上痛胃中氣機不順前醫投平胃散不應當必有停滯之宿食納穀日減殆以此也擬小承氣湯以和之生川軍三錢後入中川樸二錢枳實四錢拙巢注服此應手第三五案調胃承氣湯證穎師醫案沈寶寶上巳日病延四十餘日大便不通口燥渴此即陽明主中土無所復傳之明證前日經用瀉葉下後大便先硬後溏稍稍安睡此即病之轉機下後腹中尚痛余滯未清脈仍滑數宜調胃承氣湯小和之生川軍二錢後入生甘草三錢芒硝一錢沖佐景按調胃承氣湯小承氣湯並前大承氣湯為三承氣湯三者藥味各異分量不同煎法既殊服法亦差仲聖分之至詳用之至精歷來注家能辨之至稔言之至明者當推柯氏韻伯學者當細心參究惟竊有一二小議當略略補充如下仲聖常言胃中有燥矢此胃中二字當連讀成一名詞即腸字之別稱並非言胃之中故調胃承氣之胃微和胃氣之胃均可作胃中或徑作腸字解此其一柯氏謂調胃承氣湯為太陽陽明並病之和劑並謂此外之不解由於里之不通故太陽之頭項強痛雖未除而陽明之發熱不惡寒已外見不知陽明亦有頭痛惟痛在闕上而不在太陽穴陽明亦有發熱惟熱屬蒸蒸而不屬翕翕故大論曰太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之此不解二字並非表不解乃太陽熱去陽明熱繼亦不解之謂也柯氏硬加頭不痛句反逆此其二柯氏謂厚朴倍大黃是氣藥為君大黃倍厚朴是氣藥為臣謂之曰氣似尚見含糊蓋厚朴是腸藥能直達腸部寬放腸壁彼腸結甚者燥矢與腸壁幾密合無間硝黃雖下莫能施其技故必用厚朴以寬其腸壁而逐其矢氣如是燥矢方受攻而得去此其三雖然竊於大承氣一法猶有疑義焉仲聖於本方中用厚朴至半斤之多以吾師什一之法折之當得八錢但吾師用此似未有至八錢者吳氏又可為承氣專家而其大承氣湯用大黃達五錢至厚朴則一錢而已吳氏鞠通較為闊步本方用大黃六錢用厚朴亦僅及其半量至三錢而止吳氏辨謂治傷寒本證當重用厚朴治溫熱本證當減用之者此乃點綴之語非通人之論也由是觀之使用嚴酷之眼光細計藥量之比重世乃無有真大承氣湯閱者博雅曾有慣用真大承氣湯而能識其底蘊者乎辱承賜教下工之願也以上論自桂枝湯至調胃承氣湯九證既竟乃可合列一表如下麻黃湯證麻杏甘石湯證桂枝湯證白虎湯證葛根湯證葛根芩連湯證承氣湯證小承氣湯證大承氣湯證調胃承氣湯證此表之意猶曰麻黃湯證化熱入里為麻杏甘石湯證桂枝湯證化熱入里為白虎湯證葛根湯證化熱入里為葛根芩連湯證而葛根芩連湯證白虎湯證麻杏甘石湯證化熱之後則均為承氣湯證其腸結輕可攻補兼施所謂和之者是為調胃承氣湯證其腸結較重者亦用和法即為小承氣湯證其腸結最重者當用下法又曰急下法又曰攻法即為大承氣湯證實則三承氣湯方對於麻桂葛之汗法及白虎湯之清法言皆得曰下法也又吳凝軒師兄於三承氣之分辨另有高見詳本集附錄中可參閱麻杏甘石湯證之傳為承氣湯證在以上諸實驗醫案中似尚未有述及實則此種病例雖較白虎湯證傳為承氣湯證為少卻並不鮮見蓋經謂肺與大腸相表裡腸熱可以移肺肺熱亦可及腸所謂溫邪上受首先犯肺逆傳心包者即系麻杏甘石湯重證不能解於桑菊銀翹乃傳為腸熱腸熱不已灼及神經發作神昏譫語遂指為逆傳心包耳依余臨床所得肺熱傳為腸熱之後其肺熱每不因此而消此時若但治其肺熱縱用麻杏石甘湯極重之量必然無濟當急用承氣湯法去其腸熱如嫌承氣傷肺伐及無辜則導法甚佳法詳中卷余屢用之獲效腸熱既去續用麻杏甘石以治肺熱乃得有濟故大論曰下後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯本條條文極似重出當刪而事實上卻有此例奈何甚有既下之後而肺氣自開咳嗽自爽者余亦屢屢逢之有一俞姓小孩於某月初三日患咽痛紅腫兼見白點胸悶不舒初四日皮膚髮出細點如麻甲醫斷宜清血保咽用生地川連黑梔淡芩之屬夜間病孩喉腫譫語齗齒目赤初五日甲醫用玄參生地山梔左金丸之屬易乙醫改投解肌透痧之劑如豆豉薄荷葛根牛蒡之屬初六日乙醫主喉痧以透痧為要重予透發之藥初七日痧密布夾白㾦熱度更高入夜夢囈乙醫慮其傷津又與存陰清熱之法如連翹銀花竹葉黛蛤散等如是延至十一日晚痧雖回而熱不退咳嗽氣粗鼻扇口燥胸悶不舒神識不清加以腹痛拒按耳下漫腫丙醫有識曰宜通腑氣徑用生大黃三錢元明粉一錢併合透發之藥以達其餘邪其夜大便既行神煩即安鼻扇耳腫悉漸退復診依然用硝黃直至糞色轉黃方予調理而安由本案觀之凡肺熱之轉為腸熱者苟不設法去其腸中熱結但知透表生津豈有濟乎然則麻杏甘石白虎葛根芩連三湯證皆能化熱而為承氣湯證在病所方面言三湯證之病所為較上承氣湯證之病所偏於腸為較下由此吾人得外感疾病傳變之第三原則曰由上傳下是也大論曰陽明居中主土也萬物所歸無所復傳其斯之謂乎吾人研究上列九方有一事當注意及者即此九方中用甘草者竟達七方是也麻桂葛上列三湯既不離甘草中列三湯又不脫甘草下列調胃承氣湯亦用甘草因知甘草安腸一說不為無見蓋疾病由上傳下由表入里由寒化熱既為必然之趨勢今安和其腸即所以保其在裡在下之津者自為著要之法矣至於大小二承氣湯證因病已傳腸邪已內實故不必用甘草及其邪去腸虛又當重用甘草以益之不待再計者也余治小兒病喜用甘草自一錢至三錢既取其有和中之能更樂其有調味之功小兒服吾藥之後乃不喜他醫之劑寄語兒科郎中善用甘草可以使天下父母省強藥之煩也我今姑舍甘草一味之小者近者不論而論九首湯方之大者遠者學者當知此九方者處同等重要之地位各有專功不容漠視集此九方即成傷寒論中太陽陽明二經之骨幹識此九方即能治傷寒亦能治溫病學者將疑吾言之誇乎吾敢實陳讀者歷來大醫竟無有能盡識此九方者或但識其一而莫識其二或能識其二而莫識其三謂予不信請略論之尤氏在涇曰無汗必發其汗麻黃湯所以去表實而發邪氣有汗不可更發汗桂枝湯所以助表氣而逐邪氣學者但當分病證之有汗無汗以嚴麻黃桂枝之辨不必執營衛之孰虛孰實以證中風傷寒之殊是無汗為表實反云衛虛麻黃之去實寧獨遺衛能不膠於俗說者斯為豪傑之士柯氏韻伯曰桂枝湯證惟以脈弱自汗為主耳粗工妄謂桂枝湯專治中風印定後人耳目而所稱中風者又與此方不合故置之不用愚常以此湯治自汗盜汗虛瘧虛痢隨手而愈又曰予治冷風哮與風寒濕三氣合成痹等證用麻黃湯輒效非傷寒證可拘也其言何等精闢然則尤氏柯氏皆能識麻桂二湯者也陸氏九芝曰葛根芩連一方獨見遺於陽明者以人必見下利始用之不下利即不用而不以為是陽明主方也孰知此方之所用者宏而所包者廣也然則陸氏能識葛根芩連湯者也又曰無人知溫熱之病本隸於傷寒論中而溫熱之方並不在傷寒論外然則陸氏又能看破傷寒溫病之畫地為牢者也吳氏又可曰應下之證見下無結糞以為下之早或以為不應下之證誤投下藥殊不知承氣本為逐邪而設非專為結糞而設也必俟其糞結血液為熱所搏變證迭起是猶養虎遺患醫之咎也況多有溏糞失下但蒸作極臭如敗醬或如藕泥臨死不結者但得穢惡一去邪毒從此而消脈證從此而退豈徒孜孜糞結而後行哉此言超拔非凡然則吳氏能識諸承氣湯者也葉氏天士曰溫邪上受首先犯肺吳氏鞠通曰凡病溫者始於上焦在手太陰法曰辛涼輕平方號桑菊銀翹雖無麻杏甘石之名而有泛治肺熱之實苟吾人不求酷論謂葉氏吳氏能識麻杏甘石湯可也而吳氏之用白虎或以化斑或以解暑頗具變化之觀苟吾人不吝譽語可稱之曰微有仲聖用桂枝之風然則吳氏亦能識白虎湯者也由是言之諸氏皆仲聖之功臣也九方中惟葛根湯未得知己彼垂青於葛根芩連湯之陸公九芝且勿能道之陸公選溫病方二十有二首以葛根芩連為首選而獨遺葛根湯亦不及麻杏石甘湯本湯反附溫法麻黃湯下又曲解太陽病發熱而渴不惡寒者為溫病條為太陽陽明合句曰太陽病發熱五字為句是太陽而渴不惡寒者六字為句即陽明不免牽強附會於是知陸公誤矣尤公在涇以葛根湯主太陽陽明合病不知葛根芩連湯即大論小注所謂一云用後第四方方是合病之主方於是知尤公誤矣柯公韻伯釋太陽溫病條引麻杏甘石湯為主方不知太陽溫病非陽明病特近陽明故其所釋乃與陸公所引者相類總未免似是而實非於是知柯公誤矣然而以上所誤猶不甚獨鞠通曰按仲景傷寒論原文太陽病但惡熱不惡寒而渴者名曰溫病桂枝湯主之是乃驚人之語夫能發仲聖之秘即使易仲聖之辭容何傷今乃不然以吾觀之此中有太陽病原文有陽明病但惡熱不惡寒有太陽溫病不惡寒而渴者名曰溫病有太陽中風桂枝湯主之鞠通乃悉合之為一猶如並牛頭馬脯豬腿羊腳於一器得毋滑天下之大稽荒宇宙之大唐又既知麻杏甘石湯證為上焦當清之熱飲何以反列入下焦篇里寒濕門中鞠通善辯何以自解回視上焦篇第八條所謂太陰溫病脈浮大而芤汗大出微喘甚至鼻孔扇者顯是急當救肺宜麻杏甘石之候乃偏偏用白虎加人參湯代之當知脈芤汗出不至即死鼻扇肺閉命乃立傾故即使應用參米救逆亦當在喘平鼻定之後乃萬無可疑者鞠通當此日暮途窮竟欲倒行逆施以此教人貽害曷窮於是知鞠通誤矣至又可明明以傷寒表裡之法傷寒和下之方治溫治疫乃偏曰傷寒溫病自是兩途未有始傷寒而終變為溫病者若果溫病自內達外何有傳經若能傳經即是傷寒而非溫病明矣於是知又可誤矣至香岩指南捏造河間溫熱須究三焦藉抗傷寒之分六經陸公已揭其非又曰傷寒多有變證溫熱雖久在一經不移以此為辨又曰溫邪手經為病今世多以足六經主治故致此此言壞病也又曰初病手經不當用足經方賅其意蓋謂傷寒屬足經溫病屬手經傷寒之足經以太陽為首溫病之手經以太陰為首又曰再論三焦不得從外解必至成里結里結於何在陽明胃與腸也夫胃既為足陽明何得曰傳手不傳足三焦既能傳胃何得曰久在一經不移於是知香岩誤矣參考謝著溫病論衡由是觀之諸家所言皆未能盡合仲聖意也今更舍人而論方麻桂二湯擁龐大之美名人皆知其為傷寒中風之主人實則僅有少數傷寒家與之交納一般溫熱者流恆敬而遠之故其名彌彰而其實彌亡麻杏甘石湯因得葉吳等向平淡方面發揮故其名愈湮而其用反宏白虎承氣諸湯坐不改姓行不易名溫熱家莫奈之何雖或加養陰之品以資點綴徒見其掩盜而已葛根芩連湯得陸公為知已堪慰生平所嘆者葛根一湯在傷寒論中不埋於形而埋於神千古萬人讀傷寒論者不盲於睛而盲於心推原其故有可得而言者本湯證為期至暫因其化熱至速瞬入陽明病家延醫稍緩醫者即不及見非若麻黃湯證竟有延至一月之久者此其一仲聖述此出之以隱筆後人讀此依然用大意此其二成氏無己首注大論功次叔和其注太陽溫病條曰發熱而渴不惡寒者陽明也自此一也竟誤盡仲聖奧旨引起無底紛爭使當日成氏添用一字作近陽明也方毫釐不失千里無差乎此其三有此三因竟使葛根湯之治太陽溫病莫明於世噫上表九方範圍本小以六經言不過三之一以一百一十三方言不及十之一設以傷寒諸方為一大圈子則此九方者不過大圈子中之一小圈子耳不意在此小圈子中任爾傷寒鴻儒任爾溫熱大家孰為五十步孰為百步悉已如繪如畫莫能遁形異哉傷寒家尊其師承篤其禮貌我無間言獨彼溫熱家者每傲然自得曰我能跳出傷寒圈子嗚呼天下之人非盡盲者孰能信之邵子餐芝曰彼謂能跳出傷寒圈子者將折足傷脛也我則曰遑論不折足傷脛任伊添千翅百翼又安能越雷池一步哉陸士諤先生曰余方求跳入傷寒圈子而未得是又豈滑稽之言哉溫病別於傷寒之說不始於葉吳前乎葉吳者多家說解不一誠如陸公所謂如弈棋然直無一局之同者但以葉吳為甚今日一般市醫之佼佼者又每以葉吳為宗故我即以葉吳之說為討論之對象我今以細密之眼光分析葉吳之學說不外陽襲溫病之名陰統陽明之實杜撰濕溫之論彼輩所謂濕溫非古醫家所謂濕溫擷取少陽之華說詳本書第二集如是而已是故今日之醫遇白虎承氣證指是溫病無論矣遇麻杏甘石葛根芩連等肺熱血熱之證亦曰溫病遇葛根湯證雖不識同曰溫病遇桂枝湯證猶曰溫病見溫病條辨遇麻黃湯證心知其為傷寒無可說矣卻曰不久即成溫病果也病既不解於輕劑而已於太陽遂逐漸化熱轉入陽明而成彼之所謂溫病於是凡人之病皆是溫病不是傷寒庸工噩噩人云亦云不禁居常嘆曰當今之世何溫病之多而傷寒之鮮也不知彼之所謂溫病正仲聖所謂傷寒耳我今退一步言使彼能用驗方一一愈之即呼之為火病炎病容何傷奈何一律豆豉豆卷桑葉菊花但知計日用藥不審辨證疏方毋怪譫語神昏逆傳心包以至於死可哀也已夫病家之病一也溫熱派之醫至曰此溫病也傷寒家之醫至曰此傷寒也病家矇矇莫知適從不知傷寒為雅士之稱溫熱乃田舍之號傷寒為仲聖之大論溫熱乃後賢之附驥然則後者何如前者美舍溫熱而從傷寒可矣雖然傷寒論六經之說亦安得無小疵依傷寒論六經提綱太陽之為病脈浮頭項強痛而惡寒桂枝麻黃葛根三湯得分據之陽明之為病胃家實是也白虎承氣諸湯得分據之若夫葛根芩連遂無所依附不得已目之為太陽陽明合病至麻杏甘石湯所主既為肺家實不關胃家事不能附於陽明又以不頭項強痛甚不惡寒不能附於太陽其被擯於二經之外彰彰明甚更無論於少陽三陰矣況條文僅存其二若去其疑似將僅存其一毋怪後賢少有用意及之是誠一絕大罅漏之處彼葉氏天士聰明絕頂得此遺寶驚喜若狂乃曰溫邪上受首先犯肺即以此為新溫熱病之總綱然則與人以隙使人易乘者又寧非六經說之小疵也耶惟小疵含於大純小疵將絕不損於大純抑學者當知水至清則無魚人至明則無朋學至精則無書可讀理至澈則大智若愚格致不已則返為老子之無為心存無為則經方實驗錄將自毀自毀陋籍了不足惜惟念此又非愛吾勵吾者之所期無已姑止吾格醫之言而作本卷之結論曰傷寒溫熱之爭辨至有清一代為最烈傷寒家之斥溫熱猶嚴父之逐劣子認為不屑教誨溫熱家之排傷寒如蠻族之抗敵國指為不共戴天竊意則殊不爾夫傷寒溫熱同屬中醫一則陳義較高範圍較廣一則述理稍淺範圍稍小其淺者小者悉從高者廣者化出故我不惜筆墨悉指出其真憑實據使無遁辭又表彰其片長只善俾有足錄一言以蔽之我將融溫熱於傷寒之中而不拒溫熱於傷寒之外此乃餘數年來私人整理中醫學術之原則亦即吾一家學說之鮮明旗幟也夫中醫之在今日危岌極矣外有西醫之侵內有寒溫之爭中難得民眾之信賴上未獲政府之優視正似山雨欲來疾風將起憂時之士早效杞人然佐景不敏頗具自信之力信吾此旗幟一出定可息狂風止暴雨而永永飄揚於光天化日之下者也曹穎甫曰豐城之劍埋光氣於塵沙荊山之璞被猜嫌於燕石傷寒溫病之聚訟惟有歷年非經剖析分明貫通融會不惟仲師立方之功不能大白而又無以鉗溫熱家之口使不敢抗衡於先聖無怪近代庸工讀仲聖之書陽尊之而陰棄之也佐景此論實能發仲聖之藏使用古方者不迷於駢枝邪說夫而後可以治傷寒可以治溫病而泛應曲當可以免聚訟矣第一集中卷第三六案桂枝二麻黃一湯證其一穎師醫案王右六月二十二日寒熱往來一日兩度發仲景所謂宜桂枝二麻黃一湯之證也前醫用小柴胡原自不謬但差一間耳川桂枝五錢白芍四錢生草三錢生麻黃二錢光杏仁五錢生薑三片紅棗五枚佐景按病者服此蓋被自臥須臾發熱遍身漐漐汗出其病愈矣又服藥時最好在寒熱發作前約一二小時許其效為著依仲聖法凡發熱惡寒自一日再發指發熱二次非謂合發熱惡寒為二次以至十數度發皆為太陽病若一日一發以至三數日一發皆為少陽病少陽病多先寒而後熱太陽如瘧證卻有先熱而後寒者觀大論稱少陽曰寒熱往來稱太陽如瘧曰發熱惡寒熱多寒少不無微意於其間歟以言治法少陽病宜柴胡劑太陽病宜麻桂劑證之實驗歷歷不爽若反其道以行之以柴胡劑治寒熱日數度發之太陽如瘧每每不效以麻桂劑治寒熱一作之少陽病雖偶或得效究未能恰中規矩蓋少陽病之病所偏於淋巴太陽病之病所偏於汗腺表裡互異此方劑之所由分也方極云桂枝二麻黃一湯治桂枝湯證多麻黃湯證少桂枝麻黃各半湯治桂枝湯麻黃湯二方證相半者此言似是而非將令人有無從衡量之苦余則憑證用方凡發熱惡寒同時皆作有汗者用桂枝湯無汗者用麻黃湯發熱惡寒次第間作自再發以至十數度發者擇用桂二麻一等三方層次釐然絕無混淆苦欲求其詳細病理藥理且可言之有據不受科學醫之攻駁者恕我未暇抑未能也曹穎甫曰少陽病之所以異於太陽者以其有間也若日再發或二三度發則為無間矣太陽所以異於陽明者以其有寒也若但熱不寒直謂之陽明可矣惡得謂之太陽病乎固知有寒有熱一日之中循環不已者為太陽病寒熱日發有間隙如無病之人者為少陽病此麻桂二湯合用與柴胡湯獨用之別也病理既明隨證用藥可矣時醫妄言科學乃與五行八卦糾纏不清者同類而共笑之乎第三七案桂枝二麻黃一湯證其二佐景醫案施右住唐家灣肇周路仁德里二號佐景按本年七月十五日予施診於廣益中醫院有施姓婦者蹙頞告訴曰先生我昨服院外他醫之方病轉劇苦不堪言余為之愕然令陳其方照錄如下經事淋漓入夜寒熱胸悶泛惡苔灰膩治宜荊芩四物湯加味炒荊芥錢半炒條芩錢半全當歸二錢大川芎八分炒丹皮錢半赤白芍各錢半金鈴子二錢制香附錢半元胡索錢半貫仲炭三錢荷葉一角余曰方未誤安得轉劇婦曰否初我夜寐粗安大便如常自進昨藥夜中心痛甚劇輾轉不能成寐且大便轉為泄瀉乞先生一治之予按例首問其病歷婦曰半月矣次問其寒熱婦曰倏冷倏熱不計其次余聞其言若有所得焉婦自陳其異狀汗出自首至胸而止既不達於胸下亦不及於兩臂予思論有劑頸而還之語此殆劑胸而還乎察其舌黑近墨而不焦口奇干余疑其方進陳皮梅松花蛋之屬婦曰非是日來苔黑常作此狀按其脈幸尚不微細兩肩至臂頗麻木加以經事淋漓不止婦幾不能悉陳其狀予對此錯雜之證亦幾有無從下筆之苦使從西醫所謂對症治法瑣瑣而治之則用藥得毋近數十味然而此非我所能也因書方曰初診七月十五日寒熱往來每日七八度發已兩候矣汗出劑胸而還經事淋漓法當解表為先以其心痛加生地倍甘草淨麻黃一錢川桂枝二錢生甘草三錢生苡仁一兩杏仁三錢生白芍錢半生地五錢制川樸一錢生薑二片紅棗六枚二診七月十六日昨進藥後汗出遍身漐漐心痛止經事停大便溏薄瘥麻木減僅自臂及指矣黑苔漸退口乾漸和夜中咳嗽得痰並得矢氣是佳象前方有效不必更張淨麻黃一錢川桂枝錢半生甘草二錢生白芍錢半大生地五錢制小樸一錢杏仁三錢生薑二片紅棗六枚佐景按予遵仲聖脈證治法而疏昨方心未嘗不惴惴也以為次日復診能得寒熱略除即是大功乃喜出望外非但熱退神振抑且諸恙並差有如方案所云斯亦奇矣試求其所以能愈病之理以證狀學之立場言之必曰能治其主證斯一切客證或副證不治自愈也此言不誤然而無補於病理之瞭解幸有博雅君子閱吾此案踢予說明其中一切病理如苔黑口乾何以反宜麻桂發汗傷津何以反除心痛經水淋漓大便溏泄猶風馬牛之不相及何以戛然並止寄惠數行佐景之願也時施婦更示我以一方蓋即初得病時就診於海上傷寒名家所得之方箋也箋云右丙子五月廿四日溫邪身熱嘔吐口乾坐臥不安防其昏厥候高才正炒香豉三錢前胡二錢桑葉錢半藿香錢半砂仁五分打赤苓三錢蘇梗錢半朱茯神三錢姜山梔二錢姜竹茹錢半佛手錢半上方蓋即傷寒名家治傷寒之標準方或模範方也余獲見者屢故毫不以為奇試問本方竟可防昏厥乎大論之用梔子豉湯必曰發汗吐下後今人乃用之於發汗吐下前得毋大謬容在本書第二集中詳述其理曹穎甫曰太陽水氣留於心下則津不上承而渴此意丁甘仁先生常言之舌黑不焦大便又溏知非陽明熱證而黑色亦為水氣水氣凌心心陽不振故痛大便溏則為條芩之誤不用條芩溏薄自止非本方之功也水氣不能化汗外泄故脾陽不振而指臂麻經水淋漓亦水分多於血分為水氣所壓故也知病之所從來即知病之所由去不待煩言矣三診七月十七日寒熱如瘧漸除大便已行舌苔黑色亦淡麻木僅在手指間惟余咳嗽未楚胸脅牽痛有喘意參桂枝加厚朴杏子法杏仁四錢厚朴錢半川桂枝二錢生草三錢白芍二錢大生地六錢絲瓜絡四錢生薑一片紅棗六枚佐景按服此大佳輕劑調理而安第三八案桂枝麻黃各半湯證其一穎師醫案顧左住方斜路十月二十一日寒熱交作一日十數度發此非瘧疾乃太陽病宜桂枝麻黃各半湯桂枝三錢甘草錢半杏仁五錢麻黃錢半白芍錢半生薑二片大棗四枚佐景按桂枝麻黃各半湯方原法分為三服桂枝二麻黃一湯方原法分為再服取前方原量三之一後方原量二之一而較之得麻杏同量而後方之桂芍姜草棗悉比前方約多一倍故前方名各半而後方名桂二麻一也然而近代煎服法率分二次煎服與古者不同況其分量上下又甚微細故吾人但知此二方之應用足矣初不必過分斤斤於銖兩之間也曹穎甫曰此證甚輕故輕劑而病易愈不徒與銖兩不合已也第三九案桂枝麻黃各半湯證其二穎師醫案朱右住小北門福佑路十月九日自墜胎後即病寒熱往來日夜五度發此本麻桂各半湯證可以一汗而愈乃經西醫用止截瘧病之針寒熱之交作遂止變為但熱不寒西醫因驗其血謂無瘧蟲病本非瘧安得有瘧蟲乎自此以後一身盡痛經王仲奇先生用通絡疏風之劑身痛愈其大半而大便否塞不通今晨已發痙厥證甚危篤脈實大有力血分熱度甚高加以日夜渴飲陽明燥熱顯然治宜調胃承氣湯佐以涼血通絡或可僥倖於萬一生川軍三錢枳實三錢芒硝二錢生草二錢丹皮五錢大小薊各三錢絲瓜絡一條剪先煎去渣入前藥佐景按吾師一二診後即因故辭謝由他醫續治後聞卒下起惜哉然而卒不起者非後醫之過壞病之治實難也推本病之源殆因墜胎之後正氣虛弱因得太陽病凡太陽病當從汗解絕無止截之理竟止截之故遂變為深一層之壞病我更不知用以止截者為何藥使其為奎寧之屬則吾知有服金雞納霜數十粒因熱極而死者故截後之化燥奎寧不無嫌疑設此說非是化燥實本乎病者在裡之伏熱則吾以為初起病時桂枝二越婢一湯當較桂麻各半湯為勝一籌復次大論桂枝二越婢一湯條曰太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯諸家或以本條為有缺文或以為是倒筆余則謂但加一括弧如上式以示例外之意即得初不必議論紛紛也又括弧並可用於他條曹穎甫曰歷來病家最忌有錢有錢則藥石紛投予每見富家子弟婦為雜醫所誤甚有至死不悟者可悲也已第四案桂枝加大黃湯證穎師醫案慶孫七月二十七日起病由於暴感風寒大便不行頭頂痛此為太陽陽明同病自服救命丹大便行而頭痛稍愈今表證未盡里證亦未盡脈浮緩身常有汗宜桂枝加大黃湯川桂枝三錢生白芍三錢生草一錢生川軍三錢生薑三片紅棗三枚佐景按治病當先解其表後攻其里此常法也前固言之稔矣余依臨床所得常有表解之後其里自通初不須假藥力之助者緣先表束之時病者元氣只顧應付表證不暇及里及表解之後則元氣自能反旌對里夫元氣之進退往返誰能目之者然而事實如此勿可誣也故余逢表束里張之證若便閉未越三日者恆置通里於不問非不問也將待其自得耳若本湯之合解表通里藥為一方者又是一法然其間解表者佔七分通里者佔三分不無賓主之分以其已用里藥故通里為賓以其未用表藥故解表為主雙管齊下病魔遁烏有之鄉彼元氣主帥乃高枕而無憂由是觀之仲聖書中活法重重惟在人善自取之設更求法外之法請再研究厚朴七物湯第四一案白虎加桂枝湯證穎師講授佐景筆記師曰餘二十五歲時能讀醫書而尚不善於治病隨表兄陳尚白買舟赴南京應秋試陳夫婦同宿中艙余宿前艙天方溽暑驕陽如熾舟泊無錫陳夫婦相偕登陸赴浴惠泉囑余守艙中余汗出俠背又不便易衣令其自干飲食起居又不適因是心恆悒悒然舟泊五日方啟碇又五日乃抵鎮江下榻後部署初定即臥病矣延醫疏方不外鮮藿香鮮佩蘭之屬服之數日病反加劇汗出熱不清而惡寒無已當夜乘輪赴京時覺天昏地黑不知人事比抵石城諸友扶住堂子巷寓所每小便輒血出作殷紅色且覺頭痛時為八月初五日距進場之期僅三天矣是時姻丈陳葆厚先生己先余到南京丈精於醫診脈一過即親出市藥及荷葉露三大瓶生梨十餘枚以歸並囑先飲露飲已口即不幹頃之又渴復啖生梨梨皮不遑削僅棄其心頃刻盡十枚迨藥煎成即進一大碗心中頓覺清朗倦極而睡醒後頭己不痛惟汗未出更進二煎濃倍於前服後又睡醒時不覺周身汗出先小汗後大汗竟至內衣夾襖被褥上下皆濕急起更易反被以蓋於是方覺諸恙悉除腹中知飢索熱粥侍者曰粥己備蓋陳丈所預囑者也初啜一小碗覺香甜逾恆稍停又續進竟其夜竟盡二大碗初七日即能進場試期達九日夜毫無倦容余乃驚陳丈醫術之神叩其藥則桂枝石膏二味同搗也問其價曰適逢新開藥鋪共費錢六文而已遂相與大笑丈江陰人邑庠生精醫之外又能詩詞佐景按頭痛而惡寒此太陽病未罷也法當令其汗出而解然小便已見血出安復有餘液可以作汗故先飲荷葉露及生梨者增其液以為作汗之張本也於是與石膏以清其內蘊之熱與桂枝以祛其外束之寒寒因汗解熱因涼除醒來索粥是即白虎湯之粳米向之飲露亦猶加參湯之人參看其啖梨啜露之頃像煞兒戲孰知六文二味之中已含聖法嗚呼化仲聖方活而用之非陳老孰有此巧也曹穎甫曰救命之恩所不敢忘表伯葆厚先生已於八十四歲歸道山迄今又四五年矣清燈夜雨為之泫然佐景又按白虎加桂枝湯證多見於夏日誠以炎暑蒸人胃腸本已熱化入夜涼風習習未免貪享故致表裡交病表為寒束則熱無外泄之機勢必愈熾熱既內熾則更易傷津使無從作汗以解表惟有投白虎湯以治其本腸胃之熱同時加桂枝以治其標表證之寒標本並治方可熱除津復汗出表解依余經驗桂枝輕至一錢生石膏輕至三錢亦可有效設不爾者但用白虎以清熱則表證將愈甚但用桂枝以解表則內熱將愈熾終不免壞病之變此理較深請以弈棋為喻圍棋繁密請以象棋為喻夫棋法必也雙砲直列或也雙車並弛或也砲馬互峙或也雙馬連環方可制敵將之死命否則單槍匹騎孤掌難鳴敵方非但可從容他逸抑且易事反攻桂枝石膏二藥之合作而不可分離者理亦猶是或曰君前謂石膏涼胃桂枝溫胃何能溫涼並進反獲奇功耶曰仲聖方溫涼並用者諸瀉心湯即在其例若桂枝與石膏猶其始焉者爾蓋人體之機構複雜繁沓靈敏萬分及其病時作用尤顯各部機構每自能吸取其所需而放任其所不需者若論本湯證則胃取石膏之涼而消熱動脈取桂枝之散而致汗故二者非但不相左抑且相成吾人若驚仲聖之神何能到此造詣敢答曰此尚為仲聖大道之藩籬耳欲盡賞奇花異卉請細讀傷寒金匱前桂枝加大黃湯為七分太陽三分陽明今白虎加桂枝湯為七分陽明三分太陽二湯之對仗堪稱工整醫者能合用仲聖諸方即可曲應萬變之病茲二湯特發其凡耳第四二案麻黃附子甘草湯證佐景醫案佐景曰余嘗治上海電報局高魯瞻君之公子年五齡身無熱亦不惡寒二便如常但欲寐強呼之醒與之食食已又呼呼睡去按其脈微細無力余曰此仲景先聖所謂少陰之為病脈微細但欲寐也顧余知治之之方尚不敢必治之之驗請另乞診於高明高君自明西醫理能注射強心針顧又知強心針僅能取效於一時非根本之圖強請立方余不獲已書熟附片八分淨麻黃一錢炙甘草一錢與之又恐其食而不化略加六神麯炒麥芽等消食健脾之品次日復診脈略起睡時略減當與原方加減五日而痧疹出微汗與俱疹密布周身稠逾其他痧孩痧布達五日之久而胸悶不除大熱不減當與麻杏甘石重劑始獲全愈一月後高公子又以微感風寒復發嗜寐之恙脈轉微細與前度彷彿此時余已成竹在胸不虞其變依然以麻黃附子甘草湯輕劑與之四日而瘥佐景按麻黃能開肺氣附子能強心臟甘草能安腸胃三者合則為麻黃附子甘草湯能治虛人之受邪而力不足以達邪者若麻黃附子細辛湯則以細辛易甘草其力更偉蓋細辛芳香能蠲痰飲而闢穢濁故也夫脈微細但欲寐如本案所云固為少陰病若更進而兼身熱惡寒踡臥亦為少陰病不過有輕重緩急之分爾而東人山田氏必欲補惡寒二字使成少陰之為病脈微細但惡寒欲寐也一條其可以已乎曹穎甫曰予治脈微細但欲寐者往往以四逆湯取效然姜生所治高姓小兒實由太陽表證內伏少陰故非麻黃不能奏功斷非四逆湯所能治蓋四逆湯僅能由少陰外達肌腠以乾薑炙草能溫脾胃脾胃固主肌肉也若改乾薑為麻黃方能由少陰直達肺部而皮毛為之開泄以肺主皮毛故也觀其證治三變而始終不脫麻黃其用心之細密殆不可及況身熱而不惡寒似無用麻黃之必要此證竟毅然用之其識解尤不可及乎蓋呼之則醒聽其自然則寐有矇蔽之象故可決為非少陰本病而為太陽內陷之證且以小兒純陽之體不當有此少陰病故也以此意叩姜生定當相視而笑以為不意悶葫蘆竟被打破也佐景又按友人周巨中君之二女公子年三齡患恙沉迷不醒手足微厥余診之脈微細承告平日痰多常有厥意必劇吐而後快余曰諾疏麻黃附子細辛湯加半夏生薑與之囑服一劑再商及次日周君睹孩精神振作不復沉迷又值大雨滂沱遂勿復邀診仍與原方一劑三日往診手足悉溫唇口乾燥由陰證轉為陽證余曰無妨矣與葛根花粉桑葉菊花輕劑連服二日全愈以後余逢小兒患但欲寐者多人悉以本法加減與之無不速愈人見本方藥味之少竊竊以為怪是皆未讀經書未從名師之故也更有友人李君某日深夜值余曰吾之幼孩病可慮否詢其詳曰旬日以前吾房內四壁新漆未乾睡其中寒氣凜然吾孩亦宿於比未免受寒自後精神不振但欲睡呼之吮乳亦無喜樂之狀痰多身不發熱適值陰曆歲尾家事紛繁內人以其不煩躁無所苦不甚以為慮僅與生梨萊菔及生薑汁數次無效請同居之醫士某君診之醫亦謂無妨藥後殊不見進步睡時口中有痰湧出余曰中醫治病當辨寒熱得毋寒痰為祟乎當囑速就海上著名兒科徐先生診當尚有救徐先生善治此證眾所素知也聞次日以事阻勿果往第三日改延某年老之推拿女醫士診醫士診務慄六至病家已晚上九時用薑汁蔥白汁沾指推拿約十餘分鐘並與丸藥謂病不妨事勿必驚惶至夜十二時許喉中作痰阻狀者凡二次遂殤嗚呼惜哉杭州湯士彥先生作酣睡篇曰稔友林源卿少君年只四齡於黴後患症他無所苦惟昏迷沉睡永日不蘇呼之不應推之不醒醫者以積滯挾痰論治凡三劑渺效越日乃迓彥趨視曾反復診察了無異證指紋苔色一似常孩身既不熱便亦通鬯無痰而不咳口潤而不飲呼吸平均能食知飢驟視之蓋與正式之睡眠無以異也每日惟在侵晨略有一句鍾短時之清醒在清醒時固一毫無疾病之小兒也呼父呼母一如平常遇此則熟睡如泥雖簸顛震撼多方逗引終無法使之清醒而不睡焉證象如是治之奈何予意此必濕濁為祟阻礙機竅所致蓋濕本陰晦之邪得穢濁則迷漫散布矇蔽神明既失清晨於初起更無形質之可攻淹綿不去至為糾纏法當開上郁佐中運投藿香木香蘇葉薄荷省頭草全青蒿石菖蒲鬱金川樸廣皮苓塊送服神香蘇合丸半粒外更以桂心附子淡萸均薑白芷陳艾為末炒熱交換以布包熨其腹際上下取其溫香通調以助藥勢果不須臾微聞腹中漉漉作鳴移時竟漸漸蘇來家人睹狀竟欣然色喜該兒亦咿唔笑語頓復常態時方下午坐伴天明亦不欲睡聞街有販賣食物者且欲購食因進焦飯煮化之稀粥與之交午猶張眸無倦意詎下午二時後又頹然入睡鄉去矣因再施前法效稍減翌日施之亦然彼家親友俱竊竊相告眾口嘵嘵僉曰魅祟因就卜焉聆術者言鬼凡三二大一小小者弱叱之可去惟大者悍耳且皆新市場之梟首鬼也婦嫗聞之毛骨悚然亟焚帛致祭夜相送不獲也乃倩變相羽士數輩陰陽生作保福俗稱拜斗而解禳之鑼鼓喧天膏粱潑地斗室中居然給主事之法師請得杭城所有之土地尊神而來法師跪念遍城之土地及神名循序朗誦鐃鈸相聞音調別具亦頗悅耳最後並以八仙桌高掀架於二桌之上作橋形上更置有預製之紙門一是為關法師前導家人抱病兒隨之俯首繞桌下凡三匝卒破其紙門大呼一切災難盡消滅而去是役也所費為十餘袁老歷時可三數小時而病者矍然起能言矣群方詫為神奇詎不旋踵復如故蓋小兒亦因方才之驚擾使然也豈真驗乎時予固在旁方默籌愈之之道對於此等胡鬧只一笑置之蓋勢然也習然也亦無可如何也翌日病猶是復懇設法乃重聚其家人更商治策予曰迷信種種殆試遍矣今請為約嗣而後惟藥餌為是在證象測之實無大害當可挽救且郁久蒸發漸見佳象有由募原中道瀰漫及至中下之勢濕甚生熱氣窒不宣脈滯苔黃更衣不行煙霧繚繞可望展舒無形變為有形因輕宣以開鬱芳香而通神溫運中樞滲導穢濁用蘇葉薄荷佩蘭連翹心石菖蒲鬱金木香枳殼炒黃川貝元明粉栝蔞子六一散一劑而大小解瀉如醬色狀再劑而睡兼旬之證豁然矣後以六君加減調治半月康復綜計孩病凡二旬自六月三十日起迄七月二十日止計清醒時平均每日一時半合計約三十小時以小兒睡眠十時為衡每日越睡時凡十二時半二十日共計越睡時凡二百五十小時誠一有趣之睡眠病也錄醫界春秋五十九期讀有趣之醫案每令人樂而忘倦余讀本案至而病者矍然起能言矣群方詫為神奇詎不旋踵復如故蓋小兒因方才之驚擾使然也句不禁為之捧腹者竟日按本案初起確屬麻黃附子細辛湯證故湯熨交施漸得甦醒惜其藥力嫌薄故醒而又睡最後苔黃便閉寒證漸轉熱證佳象也湯先生主輕宣以開鬱是麻黃之任也主芳香而通神是細辛之職也主溫運中樞是附子之能也更主滲導穢濁是臨證所宜加減也故雖不用經方之藥卻盡合大論之法退病魔勝術士湯先生可謂匠心獨運者矣曹穎甫曰手足厥但欲寐全是少陰寒證以太陽寒水陷入少陰故宜麻黃附子細辛湯而於水腫一證尤宜第四三案小青龍湯證其一佐景醫案張志明先生住五洲大藥房初診十月十八日暑天多水浴因而致咳諸藥乏效遇寒則增劇此為心下有水氣小青龍湯主之淨麻黃錢半川桂枝錢半大白芍二錢生甘草一錢北細辛錢半五味子錢半乾薑錢半姜半夏三錢佐景按張君志明為余之好友嘗患疔毒自以西藥治之增劇因就余以中藥治愈乃嘆中藥之神自後恙無大小每必垂詢顧余以事冗居恆外出致常相左某晨君又賁臨曰咳嗽小恙耳何中醫久治不差並出方相示則清水豆卷冬桑葉前胡杏仁赤苓枳殼桔梗竹茹牛蒡貝母瓜蔞皮冬瓜子枇杷葉之屬因詢之曰君於夏月嘗習游泳乎曰然君之咳遇寒則增劇乎曰然余乃慰之曰此證甚易一劑可愈幸毋為慮因書上方與之越二日來告曰咳瘥矣何中醫亦有上下床之別也余笑而頷之並徇其請書下方調理焉二診十月二十日咳已全愈但覺微喘耳此為餘邪宜三拗湯輕劑夫藥味以稀為貴淨麻黃六分光杏仁三錢甘草八分佐景按張君之尊甫頗精醫理頤居四明聞君久咳未愈懼其傷肺乃買舟來視及至則恙已瘳矣欣喜之餘極贊經方之妙余屢用本方治咳皆有奇效顧必審其咳而屬於水氣者然後用之非以之盡治諸咳也水氣者何言邪氣之屬於水者也如本案張君因習游泳而得水氣其一例也又如多進果品冷飲而得水氣其二例也又如遠行冒雨露因得水氣其三例也更如夙患痰飲為風寒所激其四例也凡此種水氣之咳本湯皆能優治之顧藥量又有輕重之分其身熱重頭痛惡寒甚者當重用麻桂其身微熱微惡寒者當減輕麻桂甚可以豆豉代麻黃蘇葉代桂枝其痰飲水氣甚者當重用姜辛半味因此四者協力合作猶一藥然吾師用五味嘗多至三錢切勿畏其酸收其咳久致腹皮攣急而痛者當重用芍草以安之否則輕用或省除之奏效如一要之小青龍證在裡為水氣在表為咳咳之前喉間常作癢其表證之重輕初可勿拘其舌苔亦不必限於白膩遑論其他或喘或渴或利或噎哉此皆經驗之談不必泥於書本者也本年夏友好多人皆習游泳耽之不倦雖雨天不已一月前後十九患咳余悉以本湯加減愈之人每譽我為治咳聖手孰知我之妙藥不過仲聖之一輕方而已哉朱阜山先生醫案云劉聘賢孫六歲住劉行鄉南潘涇宅十一月下旬夜間隨祖父戽水捕魚感冒風寒咳嗽痰黏前醫投旋覆代赭湯咳嗽陡止聲音嘶嘎涎壅痰鳴氣急鼻煽肩息胸高煩躁不安大小便不利脈右伏左弦細乃予仲聖小青龍湯原方桂枝六分杭白芍五錢仙半夏五錢北細辛五分炙麻黃四分炙甘草七分乾薑五分五味子五分一劑而喘平再劑咳爽而咯痰便利矣錄國醫雜誌然則本湯證之誤治轉劇者本湯亦能救其逆曹穎甫曰予近日治丁姓婦十年痰飲遇寒即劇日晡所惡寒而喘亦用此方方用麻黃三錢細辛二錢乾薑三錢白朮三錢半夏三錢桂枝四錢服經二劑咳喘略減而無汗惡寒如故再加麻黃二錢合五錢細辛加一錢合三錢外加杏仁四錢炮附子四錢效否待明日方知然則姜生治張君兩用輕劑而即效者實由本年新病不同宿疾之未易奏功也若國醫雜誌所載治劉孫案尤不足道矣第四四案小青龍湯證其二佐景醫案張摯甫先生據函述懸擬方無脈案淨麻黃一錢川桂枝錢半細辛一錢乾薑一錢大白芍錢半五味一錢半夏三錢生草一錢穀麥芽炒各四錢佐景按前案張君志明之兄摯甫向居海上於今歲三月間奉命調任重慶某局要職一日飛函來陳謂患咳嗽甚劇懼成肺病已請當地名醫趙君診治斷為肺寒藥為金沸草菊花杏仁蟬衣枇杷葉川貝陳皮桔梗知母等味未知合否請擬方備用云云余以重慶多雨難見天日況摯甫病前又曾就浴溫泉冒雨遊山此水氣為病乃絕無可疑者更據述咳聲如甕中出此非水濕而何當不假思索徑擬小青龍湯加味飛函報之孰知方到後張君不敢服仍請趙醫調治先後諸方略略加減匝月將屆竟未得愈久之方獲張君續訊曰弟之咳疾服趙方終不斷根不得已於五月十四日改服兄方竟一帖見效十五日續服一帖即見斷根兄治弟病於數千里之外效如桴鼓亦太神奇矣苟不服兄方目下恐真要變成肺病則弟之感恩固非筆墨所能道其萬一交友如兄誠弟終身之幸也云云按此乃鐵一般之事實勝於雄辯余非好炫己能不過欲表聖方之功已耳摯甫感醫藥之保身濟世年來勤讀醫書且能作醫論矣其認識之精確有非吾儕可及者士別三日刮目相待信然雖然余能治小青龍湯證於千里之外獨不能釋小青龍湯證之病理於寸紙之上使有讀者不諒必欲以此責難則惟有鞠躬赧顏而已姑取顢頇之語以塞責曰小青龍湯證之病所雖似在肺而其病源實屬於胃大論中所謂心下即是指胃心下二字當連讀成一名詞不必謂心之下猶胃中二字每連用代一腸字並非謂胃之中否則胃之中安得有燥矢故云心下有水氣猶言胃有水氣余以自身實地經驗言嘗因多進果品茶湯致咳必設法探吐盡出白色痰涎咳方隨止此事實之可以證明經文者也更考本方所用之藥屬胃者多屬肺者少故本證病理實屬胃邪犯肺加表寒以激之若是而已若推問胃邪取何道以犯肺頗難解答吳兄凝軒謂胃欲逐邪上出不時掀動因而擾肺生咳此殆近物理作用云云頗具巧思余意肺因生理互助作用故意作咳以輔胃之排邪亦未可知究屬若何姑留待識者考證要之我不願以個人顢頇之臆語阻學者靈活之巧思但我願以忠誠之疑問啟學者切實之發明惲氏鐵樵當醫學晦盲之日揭傷寒之大纛發世人之矇瞶著書授徒厥功甚偉及今拜讀遺文雖與本錄所言每多出入是猶見仁見智無關大體也已姑以本湯言惲氏謂條文必有訛字余則謂當無訛字惲氏謂傷寒表不解而咳殆無有不喘者喘字上之或字必系衍文以喘乃必見證非或然證也余則謂傷寒表不解而咳正多不喘者故咳字居而字之下為主證而喘字居或字之下為或然證即使有或然之喘推其量不過微喘而已惲氏謂本湯證即肺傷寒余則謂所謂肺傷寒者究移之於麻黃湯證為切惲氏謂凡人之呼吸停勻者因肺氣能降腎氣能升肺腎失職則喘余則謂本湯證與腎毫不相干肺之外當責之胃惲氏謂本湯為傷寒論中第一等大方與十棗大建中相伯仲些微誤用可以立刻致命余則謂本湯為傷寒論中第一類和平方詳後大陷胸湯證按內與小柴胡小建中相頡頏稍稍辨證即不致誤用更決不至於死余用本方不啻家常便飯甚有但咳毫無他病者余苟稔其屬於水氣無不以本湯愈之與惲氏之如臨大敵者迥異然而余有治驗惲氏亦多治驗此又異途而同歸者學者於此等異同之處如依舊不肯輕易放過當從臨床實驗中求解答所謂以人體為標本萬無一誤據體工之變化可以改正經文之訛誤可以分曉諸家之得失有不容以口舌筆墨爭者是正遵惲氏之遺教也以上自上卷桂枝湯至本卷小青龍湯凡十五證皆有發熱之狀此十五種發熱各自不同使醫者不能辨別得主方以治之其熱皆不退必須能一一細辨病方就範即能辨其發熱之屬於中風用桂枝湯屬於傷寒用麻黃湯屬於溫病用葛根湯屬於肺熱用麻杏甘石湯屬於胃熱用白虎湯屬於神經熱用葛根芩連湯屬於腸熱用諸承氣湯屬於太陽一日數度發用桂枝二麻黃一湯或桂枝麻黃各半湯屬於表裡不解用桂枝加大黃湯或白虎加桂枝湯屬於心陽衰弱用麻黃附子甘草湯屬於心下有水氣用小青龍湯方奏膚功而此十五種熱不過熱之至常者本集以下所述諸證諸病亦每兼有發熱下集所述諸證諸病亦皆不脫髮熱之範圍惟其熱將悉異於是未許等視醫者又當辨其病證覓其主方絕不許固執一方以治諸熱是故經方家退熱之效綦捷退熱之方綦多而其辨熱用方之技則殊非朝夕所可得而幾也今有醫者於此曰我能以一針退熱病形萬變吾針不改不拘此為中醫冷熱之針抑屬西醫注射之管使其屬事實勝雄辯我甘拜下風使其為欺世之大言我不暇責焉人每以病之能傳染者為傷寒或以傳染為傷寒之主要條件實則傷寒論廣義之傷寒決不如是狹仄今求通俗說法可曰凡病之發熱者皆傷寒也謂予不信任君所發何熱論中皆有主方以治此熱所慮者驗方重重還待明眼之選取耳經曰今夫熱病者皆傷寒之類也然則通俗云乎哉直古聖人之遺意矣第四五案射干麻黃湯證其一穎師醫案馮仕覺七月廿一日自去年初冬始病咳逆倚息吐涎沫自以為痰飲今診得兩脈浮弦而大舌苔膩喘息時胸部間作水鳴之聲肺氣不得疏暢當無可疑昔人以麻黃為定喘要藥今擬用射干麻黃湯射干四錢淨麻黃三錢款冬錢三花紫菀三錢北細辛二錢製半夏三錢五味子二錢生薑三片紅棗七枚生遠志四錢桔梗五錢拙巢注愈曹穎甫曰有張大元者向患痰飲初每日夜咯痰達數升後咯痰較少而胸中常覺出氣短促夜臥則喉中如水雞聲徹夜不息當從金匱例投射干麻黃湯尋愈又有楊姓婦素患痰喘之證以涼水浣衣即發發時咽中常如水雞聲亦用金匱射干麻黃湯應手輒效又當其劇時痰涎上壅氣機有升無降則當先服控涎丹數分以破痰濁續投射干麻黃湯此又變通之法也第四六案射干麻黃湯證其二佐景醫案沈賢襄先生住辣斐德路玉振里三十五號案缺射干錢半麻黃二錢細辛錢半紫菀錢半款冬錢半姜半夏二錢五味子一錢生薑二錢大棗四枚佐景按有友人莊君國坤者病呃逆患之三日勉飲滾熱之開水則可止呃一分鐘許既治之不差就診於余細察之計每分鐘作呃一十三次甚均停夜間亦然稍入睡輒因呃而醒如是合計其三日夜之呃竟已達五萬六千餘次之多此寧非驚人之數余略按其脈視其舌撫其額即疏一方以與之合計診察及疏方時間前後不出五分鐘莊君即電告藥鋪囑遣人來迎方送藥半小時後藥已煎就送到立飲之杯未復而宿呃頓止莊君初疑此為熱飲之功非藥力之效勿信焉既而一分鐘後二分鐘後十分鐘後一點鐘後呃永不發莊君乃驚為神奇余曰何神奇之有哉此乃古聖人之遺澤余不過竊其一二耳余因檢金匱橘皮湯方後文示之曰上二味以水七升煮取三升溫服一升下咽即愈並告之曰古聖人用藥二味已能下咽即愈況余今所用者不止此二味哉時有友人沈君賢襄亦在側睹此變戲法式之治病術不禁竊怪曰我有十餘年之宿恙君亦能愈之若是其速乎曰何病曰老咳嗽也曰是亦不難因按脈察苔撫額依舊至迅而上方隨成蓋即射干麻黃湯原方是也次日沈君服此恙減其半續進二劑咳永除又豈非下咽即愈之謂乎我知閱者必將願聞沈君宿恙之經過及服藥後之反應則與其由余陳述跡近於誇曷若由沈君自言事屬乎真故沈君徑自筆述如下以告世之同病者鄙人體素健但自幼即有咳嗽之疾每屆初秋天氣驟涼必按時舉發初則換衣之時稍受風寒即噴嚏不止繼則喉中生痰呼吸不暢疾劇時夜間難以成寐時需坐起氣方稍蘇而氣管因痰阻礙一呼一吸聲如鋸木往往頭暈目眩坐臥不安痛苦殊甚飲食方面如肉類等固不敢染指並菸酒等刺激物品亦在屏絕之例十數年來雖經診治間或購服西藥終鮮效果因是每年例須受苦二月許今秋又漸後發幸經服姜君方數劑立即遏止現已隆冬仍康好健啖如恆惟偶聞濃厚之煤氣或略感寒涼喉中亦立即呼吸有聲但片刻即愈不須藥治且今晨間起身時必有濃痰一口自能吐出甚稱快適前在病時此痰阻塞喉間不復能出其苦不堪言狀回憶纏綿宿疾恍然若失多年沉疴一旦根除誠令人感佩不止也沈賢襄謹志二十六年一月十五日射干麻黃湯有其藥理在射干麻黃湯證有其病理在使吾一一暢發之諸君安坐而得之將覺淡然無味不值一嚼君若不惜清神而自求之則興之所至可以忘君餐可以廢君寢此中之樂樂無窮有不足為外人道者第四七案苓甘五味加姜辛半夏杏仁湯證穎師醫案葉瑞初君麗華公司化妝部初診二月十七日咳延四月時吐涎沫脈右三部弦當降其沖氣茯苓三錢生甘草一錢五味子一錢乾薑錢半細辛一錢製半夏四錢光杏仁四錢二診二月十九日兩進苓甘五味姜辛半夏杏仁湯咳已略平惟涎沫尚多咳時痰不易出宜與原方加桔梗茯苓三錢生草一錢五味子五分乾薑一錢細辛六分製半夏三錢光杏仁四錢桔梗四錢佐景按葉君現服務麗華公司化妝部昔與史惠甫君為同事患咳凡四閱月問治於史史固辭之以習醫未久也旋葉君咳見痰中帶血乃懼而就師診服初診方凡二劑病即減輕服次診方後竟告霍然第四八案皂莢丸證其一穎師親撰師曰要略曰咳逆上氣時時吐濁但坐不得眠皂莢丸主之按射干麻黃湯證但云咳而上氣是不咳之時其氣未必上衝也若夫本證之咳逆上氣則喘息而不可止矣病者必背擁疊被六七層始能垂頭稍稍得睡倘疊被較少則終夜嗆咳所吐之痰黃濁膠黏此證予於宣統二年侍先妣邢太安人病親見之先妣平時喜進厚味又有煙癖厚味被火氣薰灼因變濁痰氣吸於上大小便不通予不得已自制皂莢丸進之長女昭華煎棗膏湯如法晝夜四服以其不易下咽也改丸如綠豆大每服九丸凡四服浹晨而大小便通可以去被安睡矣後一年聞吾鄉城北朱姓老婦以此證坐一月而死可惜也曹穎甫曰有黃松濤者住城內廣福寺左近開設玉器店其母年七旬許素有痰飲宿疾數年未發體甚健某秋忽咳嗽大作濁痰稠黏痛牽胸脅夜不能臥臥則咳吐脹痛更甚前所未見病發三日乃延余診其脈弦數氣急促大便三日未行力憊聲嘶喘不能續證已危險余乃告其家人曰此屬痰飲重證勢將脫若不急救再延片刻無能為矣於是急取控涎丹一錢五分以開水沖元明粉三錢吞送不久咳減氣急稍定至晚大便下作黑色能安眠達旦諸恙盡失於是始知控涎丹系十棗湯變其體制用以備急者也然考此病本皂莢丸證金匱所謂咳逆上氣時時吐濁但坐不得眠皂莢丸主之是也但此證來勢暴厲病體已不支恐皂莢丸性緩尚不足以濟急耳第四九案皂莢丸證其二穎師講授佐景筆記師曰門人盧扶搖之師曹殿光蕪湖人年五十所患痰飲宿疾病逾十載扶搖不能治使來求診其證心下堅滿痛引胸脅時復喘促咳則連聲不已時時吐濁痰稠凝非常劇則不得臥余謂其喘咳屬支飲與傷寒論之心下有水氣痰飲篇之咳逆不得臥證情相類因投以小青龍湯不效更投以射干麻黃湯合小半夏湯又不效而咳逆反甚心殊焦急更思以十棗湯攻之而十棗又為胸脅懸飲之方思以葶藶大棗降之而瀉肺係為肺脹肺癰而設皆非的對之劑縱投之徒傷元氣於病何補因念其時吐痰濁劇則不得臥與金匱所載皂莢丸證大旨相同遂以皂莢炙末四兩以赤砂糖代棗和湯與射干麻黃湯間服之共八劑痰除喘平諸恙盡退第五案皂莢丸證其三穎師講授佐景筆記師曰余嘗自病痰飲喘咳吐濁痛連胸脅以皂莢大者四枚炙末盛碗中調赤砂糖間日一服連服四次下利日二三度痰涎與糞俱下有時竟全是痰液病愈後體亦大虧於是知皂莢之攻消甚猛全賴棗膏調劑也夫甘遂之破水飲葶藶之瀉癰脹與皂莢之消膠痰可稱鼎足而三惟近人不察恆視若鴆毒棄良藥而不用伊誰之過歟曹穎甫曰余治張大元喘咳不得臥亦用控涎丹法一下而愈近數年來大元染有煙癖濃痰和水而出一夜得一大玻璃杯諸痰飲方絕無功用皂莢灰亦無濟大約水氣太甚者既不當用滌除油垢之法而中有濃痰者又非溫藥所能治乎佐景按鴉片本為大藥彼以大藥為家常便飯宜乎他藥之不能奏功故任何病證發於嗜煙之體較常人為難治不啻倍蓰者常歷試不爽也第五一案皂莢丸證其四穎師醫案鄭左住方浜路口年八十二歲濕痰之體咳嗽四肢浮腫病情屬溢飲原當發汗利小便但以濁痰阻於胸膈咳而上氣但坐不眠痰甚濃厚病急則治其標法當先用皂莢丸以下胸膈之痰俾大小便暢行得以安睡方是轉機今按兩脈結代結代之脈仲景原以為難治藥有小效方議正治土皂莢去黑皮去子去弦酥炙研細蜜丸如桐子大每服三丸日三服以黑棗二十枚濃煎去渣送丸拙巢注病家將此方詢諸他醫醫以劑峻勸勿服其後究竟如何不可得而知矣曹穎甫曰皂莢丸之功用能治膠痰而不能去濕痰良由皂莢能去積年之油垢而不能除水氣也然痰飲至於嗽喘不已中脘必有凝固之痰故有時亦得取效惟皂莢灰之作用乃由長女昭華髮明彼自病痰飲常嘔濃厚之痰因自制而服之二十年痰飲竟得劖除病根予服之而效曹殿光適自蕪湖來診病情略同故亦用之而效也佐景按金匱本方云皂莢八兩刮去皮用酥炙右一味末之蜜丸桐子大以棗膏和湯服三丸日三夜一服刮去皮用者刮去其外皮之黑衣也酥炙者用微火炙之使略呈焦黃即得勿成黑炭也服三丸者每服三丸也日三夜一服者日中三服夜間一服竟日共四服計十二丸也故或云本藥盪滌刺激之力甚大一日用量不得過梧子大三丸者非也棗膏和湯者言預用棗肉煎熬成膏及應用時取膏加熱水使混和成湯送本丸也尤氏云飲以棗膏安其本也此說甚是伸言之即恐皂莢入胃非但去濁痰並將殃及胃中寶貴之津液故必用棗膏以固護之此吾友吳凝軒之說也吾師代棗膏以砂糖無非取其便捷然其保津之功恐不及棗膏遠甚顧二者皆屬甘味與甘草之安腸生津飴糖之建中定痛有異曲同工之妙綜計以上本湯四案第一案邢太安人先一日四服共進如梧子大者十二丸次一日共進如綠豆大者三十六丸今案凡蜜丸如梧子大之丸藥每錢約得十餘丸則如梧子大十二丸者量僅錢許耳第二案曹殿光用皂莢末四兩者乃其八日間之總量也即先一日服皂莢末一兩次日改服射干麻黃湯一劑以後第三第五第七日同第一日第四第六第八日同第二日按每日服末一兩較第一案之錢許量已大增但此為皂莢焦黑之灰彼為同品炙黃之質黑者力微黃者力巨故其量為反比而二者病情又有重輕之分故量雖迥異並非矛盾第三案吾師自以皂莢大者四枚炙末盛之得一小半碗余嘗試擇大皂莢一枚不去皮弦與子衡之得新秤一兩許又取大者二枚炙之使焦研之為末衡之得六錢許是四枚末約為一兩二錢許與第二案所稱之兩許亦尚相合第四案如古法與第一案同按本藥究屬峻品無經驗之醫生初次試用寧自每服五分遞加較為妥當又按用皂莢無非取其盪滌膠痰而其能盪滌膠痰者蓋即賴其中含有石鹼素余云岫先生曰吾輩所用之驅痰劑西藥如西尼加根中藥如遠志桔梗皂莢中皆含有石鹼素所謂刺激性驅痰劑是也故用牙皂之莢可以代西尼加根云云中西學說相通信哉曹穎甫曰除痰之藥以有鹼性者為長故咯痰不出者用桔梗甘草湯無不克日取效以桔梗含有鹼性故也痰黏胸膈而不出則用有鹼性之桔梗以出之所謂在高者引而越之也膠痰在中脘則用有鹼性之皂莢以下之所謂在下者引而竭之也凡用藥有徹上徹下之異可因此而觀其通矣第五二案澤瀉湯證穎師醫案管右住南陽橋花場九月一日咳吐沫業經多年時眩冒冒則嘔吐大便燥小溲少咳則胸滿此為支飲宜澤瀉湯澤瀉一兩三錢生白朮六錢佐景按本案病者管婦年三十餘其夫在上海大場蒔花為業婦素有痰飲病自少已然每屆冬令必發劇時頭眩不能平臥師與本湯婦服之一劑既覺小溲暢行而咳嗽大平續服五劑其冬竟得安度明年春天轉寒病又發師仍與本方澤瀉加至二兩白朮加至一兩又加蒼朮以助之病愈至其年冬又發宿疾之難除根有如是者傷寒金匱中小方甚多吾師亦常用之佐景因筆墨不閒未暇一一詳舉神而明之存乎其人以上自小青龍湯至澤瀉湯凡五證皆治痰飲小青龍湯以心下有水氣為主射干麻黃湯以喉中水雞聲為主苓桂五味加姜辛半夏杏仁湯以吐涎沫為主皂莢丸以膠痰為主澤瀉湯以眩冒為主此其大較也第五三案桂枝加龍骨牡蠣湯證其一穎師醫案周左早年精氣不固兩足乏力頭暈目花證屬虛勞宜桂枝加龍骨牡蠣湯川桂枝三錢生白芍三錢生甘草二錢龍骨一兩先煎左牡蠣三兩先煎大黑棗十二枚生薑八片佐景按要略云男子失精女子夢交桂枝加龍骨牡蠣湯主之故本湯之治遺精醫者所盡知也顧知之而不能用之其所用者每偏於腎氣丸一方加補益之品如續斷杜仲女貞子菟絲子核桃肉之屬吾師治此種病一二劑即已余依師法而行之其效亦然時事新報館黃君舜君患遺精已久多勞則劇不喜服重劑藥為疏桂枝白芍各錢半炙草一錢生薑一片大棗四枚龍骨牡蠣各三錢三服而瘥另有鄒萍君年少時染有青年惡習久養而愈本冬遺精又作服西藥先二星期甚適後一星期無效更一星期服之反劇精出甚濃早起脊痛頭眩不勝痛苦自以為中西之藥乏效愁眉不展余慰之曰何懼為予有丹方在可療之以其人大膽服藥予桂枝白芍各三錢炙草二錢生薑三大片加花龍骨六錢左牡蠣八錢以上二味打碎先煎二小時一劑後當夜即止遺雖鄒君自懼萬分無損焉第三日睡前忘排尿致又見一次以後即不復發原方加減連進十劑恙除精神大振計服桂枝芍藥各三兩龍骨六兩牡蠣八兩矣其他驗案甚多不遑枚舉曹穎甫曰此方不惟治遺精並能治盜汗十餘年中治愈甚眾但以數見不鮮未錄方案並姓名居址而忘之矣按桂枝湯本方原為營弱衛強脾陽不振不能令汗出肌腠而設故辛甘發散以助脾陽令肌腠中發出之汗液與皮毛中原有之汗液混合而出然後營氣和而自汗可止盜汗常在夜分營氣夜行於陽則其病當屬肌腠不密汗隨營氣而外泄營病而衛不病亦為衛不與營和故用桂枝湯本方以和營衛二氣加龍骨牡蠣以收外浮之陽故盜汗可止若營衛未和而漫事收斂吾知其必無濟也吳生凝軒蓋親驗之第五四案桂枝加龍骨牡蠣湯證其二穎師醫案季左十月十二日夜寐喜盜汗脈陽浮陰弱宜桂枝加龍骨牡蠣湯川桂枝四錢生白芍三錢生草一錢龍骨四錢左牡蠣一兩生薑八片紅棗十二枚佐景按要略云男子平人脈虛弱細微者喜盜汗也巢源虛勞盜汗候云盜汗者因眠睡而身體流汗也此由陽虛所致久不已令人羸瘠枯瘦心氣不足亡津液故也診其脈男子平人脈虛弱微細皆為盜汗脈也丹波氏云金鑑云此節脈證不合必有脫簡未知其意如何蓋虛勞盜汗脈多虛數故有此說乎吾師則曰此證桂枝加龍骨牡蠣湯所得而主之也如本案所示即其一例服藥後每每周身得微微熱汗出以後即不盜汗矣余用本方者屢得效與治失精同吳兄凝軒昔嘗患盜汗之恙醫用浮小麥麻黃根糯稻根以止其汗顧汗之止僅止於皮毛之裡而不止於肌肉之間因是皮膚作癢異常頗覺不舒後自檢方書得本湯服之汗止於不知不覺之間云本湯既可治盜汗又可治遺精更可治盜汗之兼遺精者所謂虛勞人是也以中醫之舊理釋之必曰汗者津液之散於表者也精者津液之注於下者也雖有表下之不同而本湯能保津液則一此種抽象之說理原屬不錯但實在之病理變化決不如此簡單余更見一病者先患盜汗醫以糯稻根浮小麥等品以止之於是遺精作醫又以熟地五味朮杞以補之於是盜汗又起二者更替為病諸名醫竟無術以療之纏綿數月病者發狂自樓上向街躍下醫院懼其生事婉勸出院後不知究竟尚憶其人以服藥日久多看載藥用說明之包藥紙亦能稍明藥性因是醫下一藥彼必曰此藥太熱或曰此藥過涼余按其人之病不足慮而其評藥之習卻可畏卒不得良醫以起之者非無因也曹穎甫曰一知半解為近世病家通病而時醫又從而恐嚇之謂某藥不可輕試故遇方治稍重者往往棄而弗服一遇重證多至不救傖楚之生命固不足惜其如醫學之晦盲何哉佐景又按陸自量先生作桂枝龍骨牡蠣湯之治驗篇云中表某君有四歲女患小便頻數日夜無度然無其他症狀夜必遺尿數次彼母深惡之遂求治於余以療此惡疾余沉思之竊念遺尿之病世多此疾而無此方在小兒則為司空見慣在大人亦為秘密暗疾故世少特效方此亦破題兒之治證也俄頃悟得金匱桂枝加龍骨牡蠣湯為治男女失精夢交之良方曾有人施治於膀胱咳證且日人以此湯療久年遺尿每得特效雖未親歷實驗所載諒不我欺乃處以整個的桂枝加龍骨牡蠣湯桂枝芍藥各二錢生薑二片紅棗四枚龍牡各五錢令試服之竟二劑遺尿已愈溲數亦調於服藥時彼母佯為棗子湯與之故該孩頗為歡迎益系純屬甘味絕無苦口之藥雖有生薑之辛盡為甘味所掩服後亦無反射影響故該孩屢索棗子湯不已也考遺尿證系腎臟泌尿作用興奮膀胱尿道括約肌麻痹而弛緩致患尿意頻數投此湯大棗甘草正能緩和腎臟泌尿之興奮桂枝生薑含有揮發油能直達生理變常之所在地病處刺激括約肌之麻痹使之興奮同時以龍骨牡蠣含有石灰質芍藥含有單寧酸能為之收斂遺尿病遂由是而愈也此湯之能愈失精者亦從而知之矣錄蘇州國醫雜誌余亦曾仿此用本湯治高年婦人遺尿其結果大致甚佳惜其報告系由人輾轉傳來故不甚詳明耳讀者如遇此證大可一用此湯蓋以補治虛以澀治遺乃吾中醫之大法復何疑為第五五案炙甘草湯證其一穎師講授佐景筆記師曰律師姚建現住小西門外大興街嘗來請診眠食無恙按其脈結代約十餘至一停或二三十至一停不等又以事繁心常跳躍不寧此仲師所謂心動悸脈結代炙甘草湯主之之證是也因書經方與之服十餘劑而瘥炙甘草四錢生薑三錢桂枝三錢潞黨參二錢生地一兩真阿膠二錢烊沖麥冬四錢麻仁四錢大棗四枚佐景按大論原文煎法用清酒七升水八升合煎吾師生之用本湯每不用酒亦效惟阿膠當另烊衝入或後納烊消盡以免膠質為他藥黏去余用阿膠至少六錢分二次沖因其質重故也曹穎甫曰陽氣結澀不舒故謂之結陰氣缺乏不續故謂之代代之為言貸也恆產告罄而稱貸以為生其能久乎固知傷寒太陽篇所謂難治者乃專指代脈言非並指結脈言也第五六案炙甘草湯證其二穎師醫案唐左史惠甫介紹初診十月二十日脈結代心動悸炙甘草湯主之此仲景先師之法不可更變者也炙甘草四錢川桂枝三錢潞黨參三錢阿膠珠二錢大麻仁一兩大麥冬八錢大生地一兩生薑五片紅棗十枚佐景按唐君居春申素有心臟病每年買舟到香港就診於名醫陳伯壇先生先生用經方藥量特重如桂枝生薑之屬動以兩計大鍋煎熬藥味奇辣而唐君服之疾輒良已今冬心悸脈結代又發師與炙甘草湯服至三五劑心悸愈而脈結代漸稀尚未能悉如健體蓋宿疾尚賴久劑也君又素便秘服藥則易行停藥則難行甚須半小時之久故師方用麻仁一兩之外更加大黃三錢二診十月二十三日二進炙甘草湯胃納較增惟口中燥而氣短左脈結代漸減右脈尚未盡和仍宜前法加減加制軍者因大便少也炙甘草五錢川桂枝四錢潞黨參五錢阿膠珠二錢大熟地一兩大麻仁一兩麥冬四錢紫蘇葉五錢天花粉一兩生薑三片紅棗七枚制軍三錢第五七案炙甘草湯證其三穎師講授佐景筆記師曰昔與章次公診廣益醫院庖丁某病下利脈結代次公疏炙甘草湯去麻仁方與之當時鄭璞容會計之戚陳某適在旁見曰此古方也安能療今病次公忿與之爭僅服一劑即利止脈和蓋病起已四十餘日庸工延誤遂至於此此次設無次公之明眼則病者所受苦痛不知伊于胡底也佐景按本案與前案同例惟一加麻仁一去麻仁均具深意豈流俗庸工之所知哉古方不能療今病逼肖時醫口吻第不知何所據而云然何怪江南無正傷寒之論調猶盛於今日也黃鐘譭棄瓦釜雷鳴付之一嘆曹穎甫曰玉器公司陸勳伯寓城隍廟引線弄年逾六秩患下利不止日二三十行脈來至止無定數玉器店王友竹介余往診余曰高年結脈病已殆矣因參仲聖之意用附子理中合炙甘草湯去麻仁書方與之凡五劑脈和利止行動如常按古方之治病在傷寒金匱中仲師原示人加減之法而加減之藥味要不必出經方之外如陰虧加人參而去芍藥腹痛加芍藥而去黃芩成例具在不可誣也如予用此方於本證相符者則用本方因次公於下利者去麻仁遂於大便不暢者重用麻仁或竟加大黃遇寒濕利則合附子理中於臥寐不安者加棗仁硃砂要不過隨證用藥絕無異人之處仲景之法固當如此也佐景又按余用本方無慮百數十次未有不效者其證以心動悸為主若見脈結代則其證為重宜加重藥量否則但覺頭眩者為輕投之更效推其所以心動悸之理血液不足故也故其脈必細小異常婦女患此證之甚者且常影響及於經事動悸劇時左心房處怦怦自躍不能自已膽氣必較平時為虛不勝意外之驚恐亦不堪受重厲之叫呼夜中或不能成寐於是虛汗以出此所謂陰虛不能斂陽是也及服本湯則心血漸足動悸亦安頭眩除經事調虛汗止脈象復其功無窮蓋本方有七分陰藥三分陽藥陰藥為體陽藥為用生地至少當用六錢桂枝至少亦須錢半方有效力若疑生地為厚膩桂枝為大熱因而不敢重用斯不足與談經方矣余治驗過多不暇盡數證引姑簡述一二如下有盧氏婦經事淋漓不清其夫憂之慮成漏證與本湯一劑經即止神即安有王氏婦足腫不良於行每日下午三四時許背脊痠痛不可名狀服本湯三劑腫者退而痛者除有馬姓女郎患失眠又易怒服此湯後日間亦欲眠不與人忤矣病家無識以為服藥之後何反神憊也不知今日之多眠即所以代償前此之失眠與病愈後之多食同例迨償負既足有償至旬日之久者安用晝寢為有沈姓教師經西醫診斷患心臟病而治心臟病之特效藥尚未發明戚然來問計余曰君所需之特效藥早已發明其發明之日至少在距今一千七百年以前君特不自知耳教師愕然服本湯而心臟病除有吳姓老婦兩手臂筋攣服本湯得屈伸自如夫經漏足腫脊楚失眠易怒心病筋攣病象萬千余何能一方而愈之實告讀者辯證之功也本湯證在男子多發於病後在女子每見於平日但吾國婦女最喜諱疾忌醫君如告之曰病彼不信也試服湯而精神煥發興趣倍增者彼曰我前此體虛也果依此說炙甘草湯能補虛然則傷寒方又豈惟專治傷寒而已哉柯氏謂傷寒論中多雜病方信然神交邵子餐芝貽書教曰本錄脈診一項似欠詳明余拜聆之下無任感銘爰特添述本證脈象一二如下以補前愆按本湯證脈象數者居多甚在百至以上遲者較少甚在六十至以下服本湯之後其數者將減緩其緩者將增速悉漸近於標準之數蓋過猶不及本湯能削其過而益其不及藥力偉矣又血虧甚者其脈極不任按即初按之下覺其脈尚明朗可辨約一分鐘後其脈竟遁去不見重按以覓之依然無有至此淺識之醫未有不疑慮叢生者但當釋其脈稍待再切於是其脈又至試問脈何以不任按曰血少故也迨服本湯三五劑後脈乃不遁可以受按此皆親歷之事絕非欺人之語依理一人二手其脈當同然而事實上不爾左右二脈每見參商脈理之難信有如是者抑吾國同胞不甚講究健康尤以婦女為甚試執一無病之人而切其脈輒多病象或至數不合或洪細無度以醫學之目光衡之悉是病體而同胞不自以為病一旦發熱臥床病上加病其病脈又加異象幾至不可究詰直有難以言語形容之者即使勉事形容而人亦難能瞭解者脈象之難言又有如是者故拙按中言脈象略簡者未嘗無苦衷於其間也第五八案小建中湯證其一穎師醫案王右腹痛喜按痛時自覺有寒氣自上下迫脈虛弦微惡寒此為肝乘脾小建中湯主之川桂枝三錢大白芍六錢生草二錢生薑五片大棗十二枚飴糖一兩佐景按大論曰傷寒二三日心中悸而煩者小建中湯主之又曰傷寒陽脈澀陰脈弦法當腹中急痛先與小建中湯要略曰虛勞裡急悸衄腹中痛夢失精四肢痠疼手足煩熱咽乾口燥小建中湯主之似未言有寒氣上自胸中下迫腹中之證惟吾師以本湯治此寒氣下迫之證而兼腹痛者其效如神推原藥理有可得而言者蓋芍藥能活靜脈之血故也詳言之人體下身靜脈之血自下上行以匯於大靜脈管而返注於心臟意者本證靜脈管中必發生病變有氣逆流下行故痛須重用芍藥以增靜脈迴流之力而消其病變故病可愈昔吳兄凝軒患腹中痛就醫久治不愈自檢方書得小建中湯樂其能治腹痛即照錄原方用白芍至六錢桂枝至三錢自以為藥量僅及古人什之一輕甚且未用飴糖服後腹中痛隨除惟反覺其處若空洞無物重按更適蓋其時腹中靜脈血向上迴流過盛動脈血不及調劑又無飴糖以資補充故也凝軒曾歷歷為吾言可為明證學者可暫識此理更與下卷奔豚各案合考之自得貫通之樂今之醫者每不用飴糖閒嘗與一藥鋪中之老夥友攀談問其歷來所見方中有用飴糖者乎笑曰未也可見一斑先賢汪訒庵曰今人用小建中者絕不用飴糖失仲景遺意矣然則近古已然曷勝嘆息夫小建中湯之不用飴糖猶桂枝湯之不用桂枝有是理乎第五九案小建中湯證其二穎師醫案顧右十月二十六日產後月事每四十日一行飯後則心下脹痛日來行經腹及少腹俱痛痛必大下下後忽然中止或至明日午後再痛痛則經水又來又中止至明日卻又來又去兩脈俱弦此為肝膽乘脾臟之虛宜小建中加柴芩桂枝三錢生白芍五錢炙草二錢軟柴胡三錢酒芩一錢臺烏藥錢半生薑五片紅棗十二枚飴糖三兩拙巢注一劑痛止經停病家因連服二劑全愈佐景按余初疑本證當用溫經湯加楂曲之屬而吳兄凝軒則力贊本方之得師曰大論云傷寒陽脈澀陰脈弦法當腹中急痛先與小建中湯若不差者小柴胡湯主之我今不待其不差先其時加柴芩以治之不亦可乎況婦人經水之病多屬柴胡主治爾儕察諸云云翌日據報病向愈矣第六案當歸建中湯證穎師醫案宗嫂十一月十七日月事將行必先腹痛脈左三部虛此血虧也宜當歸建中湯全當歸四錢川桂枝三錢赤白芍各三錢生甘草錢半生薑三片紅棗七枚飴糖二兩沖服佐景按當歸建中湯即桂枝湯加味也姑以本方為例甘草之不足故加飴糖白芍之不足故加赤芍桂枝之不足故加當歸本經表桂枝治上氣咳逆表當歸治咳逆上氣然則其差也僅矣我今用簡筆法略發其義於此而貽其詳畀讀者第六一案黃耆建中湯證佐景醫案王女士初診經停九月咳嗆四月屢醫未效刻診脈象虛數舌苔薄膩每日上午盜汗淋漓頭暈心悸胸悶脅痛腹痛喜按食少喜嘔夜寐不安咳則並多涎沫證延已久自屬纏綿擬先治其盜汗得效再議川桂枝一錢大白芍二錢生甘草八分生薑一片紅棗四枚粽子糖四枚全當歸二錢花龍骨四錢先煎煅牡蠣四錢先煎佐景按觀本案所疏藥量之輕案文之俗一望而知非吾師之方矣病者王女士為友人介紹來診者芳齡二八待嫁閨中經停始於今春迄今約九月矣詰其所以答謂多進果品所致察其皮色無華咳嗆不已緩步上梯竟亦喘息不止他狀悉如脈案所列蓋流俗所謂乾血癆也曾歷訪中西名醫遍求村野丹方顧病勢與日俱增末如之何焉余初按其脈即覺細數特甚按表計之每分鐘得一百四十餘至合常人之脈搏恰強二倍依舊說此為木火刑金凶象也依新說肺病貧血甚者脈管縮小故也其預後多不良云云據述在家終日踡臥被中如是則惡寒稍瘥余何人斯乃敢當此重證相對之頃實難下藥乃默思本證之癥結有三經停不行其一也肺病而咳其二也腹痛惡寒而盜汗其三也將用攻劑以通其經乎則腹無癥瘕如虛不受劫何將用肺藥以止其咳乎則癆菌方滋如頑下易摧何無已姑治其腹痛惡寒而盜汗用當歸建中湯合桂枝龍骨牡蠣法疏極輕之量以與之粽子糖者即飴糖所制糖果店所售較用飴糖為便捷此吾師法也病家持此方箋以購藥藥鋪中人又笑曰糖可以為藥此醫可謂幽默矣越三日病者來復診喜出望外欣然告謝其詳請閱二診案二診三進輕劑當歸建中湯加龍骨牡蠣盜汗已除十之三四腹痛大減惡風已罷胸中舒適脈數由百四十次減為百二十次由起伏不定轉為調勻有序大便較暢咳嗽亦較稀頭暈心悸略瘥前方尚合惟量究嫌輕今加重與之俟盜汗悉除續謀通經炙黃耆三錢川桂枝錢半肉桂心二分炙甘草錢半大白芍三錢全當歸四錢生薑二片紅棗八枚粽子糖六枚龍骨六錢先煎牡蠣八錢先煎佐景按病者曰吾初每夜稍稍動作即覺喘息不勝自服前方三小時後喘息即定雖略略行動無損矣三服之後恙乃大減向吾進飯半盅今已加至一全盅矣余初以為腹痛稍定即為有功不意咳嗽亦差脈搏反減而調嗚呼聖方之功偉矣又越三日病者來三診神色更爽於前扶梯而上已無甚喘急之狀詢之答謂盜汗悉除惡風已罷日間喜起坐不嗜臥矣飯量由一盅加至一盅有半而其最佳之象則尤為脈數由百二十至減為百十有四至咳嗽亦大稀舌苔漸如常人余乃改用潤肺養陰寧咳化痰之劑如象貝杏仁款冬紫菀麥冬沙參之屬五劑竟無進退後有老醫詔余曰子之棄建中而用貝杏者誤也若是之證當換箋不換方雖服之百日不厭其久也余謹志而謝之後此證變化如何自在閱者諸君雅注之中第以不在本證範圍姑詳他案後於此有一重要問題之發生不容擱置而勿論焉問題維何即所謂陽虛虛勞陰虛虛勞之辨是也後賢多謂古者民風樸素惟勤勞是務故其所患虛勞多屬陽虛虛勞宜建中劑今者世風卑下男女授受相親故其所患虛勞多屬陰虛虛勞宜養陰劑二者誤用禍如反掌云云而蘭臺軌範之說則較為近理軌範曰古人所云虛勞皆是純虛無陽之證與近日之陰虛火旺吐血咳嗽者正相反誤治必斃今日吐血咳嗽之病乃血證雖有似虛勞其實非虛勞也又曰小建中湯治陰寒陽衰之虛勞正與陰虛火旺之病相反庸醫誤用害人甚多此咽乾口燥乃津液少非有火也又湯本氏云余往年誤認師論及諸家學說用黃耆建中劑於肺結核常招失敗當時學識尚淺不知其故及讀蘭臺軌範諸書乃始曉然懼後之人蹈余覆轍故表而出之蓋膠飴性大溫有助長炎症之弊芍藥之收斂又有抑遏皮膚肺腸腎臟排泄機能之作用故誤用本方於肺結核時一方面助長炎症他方面阻止結核菌毒素之排泄故令病勢增惡耳按以上諸家之說誠足為吾人參考之資請重以余淺薄之經驗衡之本案王女士所患之病確為肺結核使湯本氏之說而信又安能六服輕劑建中湯而得大效耶推求其得效之故何在亦無非此肺結核者適有建中湯之證耳使其無建中湯證則其不效當如湯本氏所期矣誠以結核之範圍至廣結核之病期至久其間變化萬端豈某一方所能主治又豈必無某一方所適治之證故曰建中湯不得治肺結核猶曰桂枝湯不能治太陽病適為脈緊無汗之麻黃證其失惟一至軌範所云陰虛火旺吐血咳嗽確為肺痿為肺癰為血證要略自有正治請檢本書肺癰案所載即可得其一隅其案內附記之曹夫人惡寒盜汗與陽虛虛勞幾無以異然卒能以甘寒之藥愈之其不混淆為一者辨證之功也後人誤稱此等證亦曰虛勞於是有陽虛虛勞陰虛虛勞之辨實則古今人同有此所謂二種虛勞之證後人既誤其名稱復化其藥味馴至古今判然學者大惑負整理中醫之責者又安可不揭其秘也哉曹穎甫曰通俗醫界莫不知培土生金之說然往往不能用之適當者不通仲師之醫理故也夫陽浮陰弱則汗自出汗常出則脾病而肺亦病肺病則氣短矣汗常出則惡風矣故桂枝湯本方原為扶脾陽作用仲師不曰系在太陰乎病積既久脾陽益虛肝膽之氣乘之乃至胸脅腹中俱病故加飴糖以補脾飴糖者麥精所煎也但使脾陽既動飲食入胃自能暢適當歸黃耆亦補脾之藥也加龍骨牡蠣則金匱虛勞盜汗之方治也要而言之不過是培土生金之用苟得其精理所在幸無為群言所亂也佐景又按本案拙見意謂肺癆病者確有時屬建中湯證而譚次仲先生之卓識則更進一步確定建中湯為治虛癆之主方且闡述其義無不與西醫學相吻合其言曰蓋治肺癆近世尚未有特效藥最重要的對症療法為健胃與營養以使體重增加肺之局部症狀因而輕快之一法考金匱虛勞篇首立小建中湯本湯以桂枝生薑為君此即西藥中所謂芳香辛辣之健胃劑也方中配以飴糖即西藥中之滋養品也三味均西醫所同備者而證以中醫之解釋亦無絲毫違異焉陳修園云建中者建立其中氣也尤在涇云治虛勞而必以建中者何也蓋中者脾胃也脾乃消化機關之胰而非造血臟器之脾詳證拙著中醫與科學一書書本此字俱誤蓋虛勞不足納穀者昌故必立其中氣中氣之立必以建中也余謂古人以建中湯謂健胃劑此非其明證歟且桂枝之芳香能緩解氣管支神經之痙攣有排痰鎮咳之效已於痰飲篇之苓桂朮甘湯開其端所以仲景立小建中湯為治虛勞之主方也但痰多者嫌其太甜燥多者嫌其太熱可用他藥代之而師其健胃營養之法可也其餘若發熱盜汗失精夢交則有二加龍牡湯及桂枝加龍牡湯失眠則有酸棗仁湯腰痛有腎氣丸補虛有黃耆建中湯此皆仲聖治虛勞之正法俱載金匱虛勞篇中考科學醫對肺結核之藥物療法皆完全若合符節者焉錄中西醫藥二卷二期譚著論國醫非科學化則必亡及略舉科學整理之方法高瞻遠矚彌足欽也第六二案芍藥甘草湯證其一穎師醫案四嫂十一月十三日足遇多行走時則腫痛而色紫始則右足繼乃痛及左足天寒不可向火見火則痛劇故雖甚惡寒必得耐冷然天氣過冷則又痛眠睡至浹晨而腫痛止至夜則痛如故按歷節病足亦腫但腫常不退今有時退者非歷節也惟痛甚時筋攣先用芍藥甘草湯以舒筋赤白芍各一兩生甘草八錢拙巢注二劑愈第六三案芍藥甘草湯證其二佐景醫案老媽二月七日右足行步不良此有瘀滯也宜芍藥甘草湯以疏之京赤芍八錢生甘草四錢佐景按摯友張君摯甫客居海上雇有年老女傭一人方來自原籍浙江黃岩未越半月而病已七日矣其病右足拘急不能行行則勉強以跟著地足尖上向如躄者然夜則呼痛達旦闔家為之勿寐右足踝骨處又因乘輪擦傷潰爛不能收口老媼早年嘗有所謂瘋氣之疾纏綿三年方愈自懼此番復發後顧堪虞嗒然若喪哭求歸里摯甫憐之亟來請診余細察之右脛之皮色較左脛略青乃疏上方方成摯甫以為異親為煎煮湯成老媼不肯服曰服之無濟也吾年前之恙略同於此三年而後已今安有一藥而瘥者強而後進翌日復診媼右足已能全部著地惟潰爛處反覺疼痛余即就原方加生甘草二錢使成六錢炙乳沒各八分外用陽和膏及海浮散貼之又翌日訪之老媼料理雜務行走如健時及見余歡顏可掬察之右脛青色略減潰處亦不痛矣摯甫率之長揖共謝曰君之方誠神方也值廉而功捷余遜辭曰我不能受君謝君當致謝於吾師吾師嘗用此而得效也然吾師將亦曰我不能受君謝君當致謝於仲師仲師曰作芍藥甘草湯與之其腳即伸也摯甫略知醫曰有是哉執此觀之今人以本湯為小方不屑一用之者非也或姑信而用之而藥量欠重不效如故致用而失望者亦未達一間也然則究竟芍藥之功用為如何吾友吳君凝軒曰芍藥能活靜脈之血故凡青筋暴露皮肉攣急者用之無不效善哉一語破千古之奧謎酸收云乎哉若言酸收余另有新說已詳桂枝湯按中雖未得為定論要勝於俗說多多焉芍藥能令足部之靜脈血上行使青筋隱退步履如舊者此芍藥甘草湯中芍藥之功也患桂枝湯證者服桂枝湯後其動脈血既暢流於外使無芍藥助之內返豈非成表實裡虛之局此桂枝湯中芍藥之功也雖有自下達上自表返里之異其屬於靜脈一也抑芍藥甘草湯不僅能治腳攣急凡因跌打損傷或睡眠姿勢不正因而腰背有筋牽強者本湯治之同效余親驗者屢蓋其屬於靜脈瘀滯一也緣動脈之血由心臟放射干外其力屬原動而強故少阻塞靜脈之血由外內歸於心臟其力近反動而較弱故多遲滯遲滯甚者名曰血痹亦曰惡血故本經謂芍藥治血痹別錄謂芍藥散惡血可知千百年前之古語悉合千百年後之新說誰謂古人之言陳腐乎曹穎甫曰辛未之秋予家筱云四弟婦來診無他病惟兩足痠疼拘急三年矣其子蔭衢問可治與否予告以效否不可必藥甚平穩不妨姑試之乃為用赤白芍各一兩生草八錢至第三日蔭衢來告曰服經兩劑今已行步如常矣而佐景所用效如桴鼓者乃又如此此可為用經方者勸矣芍藥一味李時珍本草所引諸家之說率以為酸寒歷來醫家以訛傳訛甚有疑桂枝湯方中不應用芍藥予昔教授於石皮弄中醫專校與馬嘉生等向藥房取赤白芍親嘗之白芍味甘微苦赤芍則甚苦可見本經苦平之解甚為的當予謂苦者善泄能通血絡之瘀桂枝湯為解肌藥肌腠為孫絡所聚風襲肌理則血液凝閉而不宣故必用芍藥以通之然予說但憑理想今吳生凝軒乃有芍藥活靜脈之血一解足證予言之不謬讀傷寒淪者可以釋然無疑矣佐景又按以上自桂枝加龍骨牡蠣湯至當歸建中湯凡四證皆從桂枝湯加減桂枝加龍骨牡蠣湯以盜汗失精為主炙甘草湯以心動悸為主小建中湯以腹中痛為主當歸建中湯以婦人經產為主黃耆建中湯以虛勞諸不足為主皆大補之方余曾揭桂枝湯為補方之義於上卷彼時讀者或不置信今也能毋釋然仲聖於桂枝湯之加減示範獨詳者留他湯為後人作隅反不徒省筆墨已也至芍藥甘草湯與桂枝甘草湯同為組成桂枝湯之母方並表之以彰其功第六四案大陷胸湯證其一穎師講授佐景筆記師曰沈家灣陳姓孩年十四獨生子也其母愛逾掌珠一日忽得病邀余出診脈洪大大熱口乾自汗右足不得伸屈病屬陽明然口雖渴終日不欲飲水胸部如塞按之似痛不脹不硬又類懸飲內痛大便五日未通上濕下燥於此可見且太陽之濕內入胸膈與陽明內熱同病不攻其濕痰燥熱焉除於是遂書大陷胸湯與之制甘遂一錢五分大黃三錢芒硝二錢返寓後心殊不安蓋以孩提嬌嫩之軀而予猛烈銳利之劑倘體不勝任則咎將誰歸且傷寒論中之大陷胸湯證必心下痞鞕而自痛其甚者或有從心下至少腹鞕滿而痛不可近為定例今此證並未見痞鞕不過悶極而塞況又似小兒積滯之證並非太陽早下失治所致事後追思深悔孟浪至翌日黎明即親往詢問據其母曰服後大便暢通燥屎與痰涎先後俱下今已安適矣其餘諸恙均各霍然乃復書一清熱之方以肅餘邪嗣後余屢用此方治愈胸膈有濕痰腸胃有熱結之證上下雙解輒收奇效語云膽欲大而心欲小於是益信古人之不予欺也佐景按讀者諸君閱此驚心駭目之醫案至深悔孟浪一語得毋提心吊膽懼孩之殤乎迨見乃母笑顏呈現眼前又得毋轉憂為喜樂人之樂乎佐景以曲折文字迷惑諸君心目罪過罪過爰述本案之趣語一則以為諸君解頤緣本案病者之父為一沙發洋椅店之主人初孩病方劇主人驚惶莫措慌恐萬狀逆其意若曰誰能愈孩之病者雖重酬不吝也故當吾師按脈之時即自陳病愈之日願獻精美之沙發一座以為壽次日疾瘳而沙發杳然近世人情大抵如此亦何怪乎此小小主人也一笑佐景未從師前曾遇一證病者為一肥婦自謂不病則已病則恆劇時當炎暑初起微惡風寒胸悶醫者予以解表祛暑之方二劑而病增改就傷寒專家診治予淡豆豉黑山梔等藥三日病更劇專家拒而勿治病家計無所出乃問道於余細審病狀胸中悶熱特甚以西藥消炎膏塗其胸部則熱氣騰騰上冒如蒸籠然且苦咯痰不出得少許皆黏膩不堪以二指引之不斷如線大便不行全身壯熱口渴引飲病殊棘手因思前醫既汗之不解乃予大劑白虎以清之服後成效渺然胸中悶熱如故遂亟請更醫投以化痰之劑若枳實竹茹象貝杏仁之屬都為一方服竟得寐片刻醒則依然病家迫不得已乃賚重金敦延負時譽之名醫某醫至持脈不二分鐘輒詳言病狀歷歷如繪旁聽者咸驚為神於是展紙書案洋洋大篇積滿二箋得數百言其大意曰濕溫為病汗之不解清之不愈僅可用辛平一法以宣泄之倘發白㾦則吉否則危其方藥第一味為枇杷葉三錢去毛包煎余如象貝杏仁蟬衣絲瓜絡等悉屬王道和平之品量亦絕輕方成其家人持以請教最初之醫醫曰診金幾何曰以稔友介紹故減收十元零八角醫愕然持方者睹狀驚問曰藥不可服乎醫曰否此方和平任何人任何時服均無損於是病家遂與服服後效否自在閱者明鑑之中無庸贅陳然病家篤信名醫名醫自為悉心調治果出白㾦悉如預言先後四十餘日病乃漸瘥余深慚從前學植疏淺及今追憶此婦之疾實大陷胸湯證也觀其胸中苦悶之狀如頑敵負固而守恰無二致不有勁旅如甘遂硝黃等將軍者安能披堅陷陣而底於平哉然則陷胸二字其義亦深長矣王孟英醫案云陳赤堂令正患感面赤不眠煩躁譫語口甘渴膩溲澀而疼顧聽泉多劑清解未應孟英切其脈左弦洪而數右滑而溢胸次痞結大解未行肝陽上浮肺氣不降痰熱阻痹邪乃逗留與小陷胸湯合溫膽雪羹加旋薤投之胸結漸開乃去半薤而送當歸龍薈丸譫語止且能眠參以通幽湯下其黑矢三次後始進養陰和胃而全陸士諤先生按云面赤不眠煩躁譫語口甘渴膩溲澀而疼脈左弦洪而數右滑而溢胸次痞結大解未行顯然邪熱熏灼頑痰阻滯與小陷胸合溫膽雪羹加旋薤破結舒氣化痰實為吃緊之治當歸龍薈丸乃是錢氏方當歸龍膽草山梔川連川柏黃芩大黃蘆薈青黛木香麝香專治肝輕實火者通幽湯則東垣方也當歸身升麻梢桃仁甘草紅花生熟地參其法者吾意升麻熟地當必去也以上名案名按相得益彰與上述肥婦案之名醫用枇杷葉蟬衣者實有霄壤之別然此案設逢吾師診治其必用大陷胸湯無疑其奏效之捷吾知必較小陷胸湯加味更勝一籌也嗚呼當病勢險急之候以一劑克奏膚功此其所以為疾醫也細考本湯證顯屬陽明其由太陽傳來者居多不必定由誤下所致蓋太陽發汗不暢表證雖罷而宿水積濁留戀膈上又加陽明之燥熱閉結於下炎炎上熏致濕濁凝為痰涎欲吐不能故胸悶特甚細考其完全見證厥為發熱不惡寒但惡熱面目赤喉中有痰聲痰黏而稠苦咯之不出胸悶之外甚者微痛不欲飲即飲而不多脈大而實大便三日以上未行苔黃膩不咳者多其脅或痛或不痛故必用甘遂方能祛膈間之濁痰必用硝黃方能除上炎之陽熱若但用硝黃不用甘遂則濕濁上據下熱得其掩護將不肯去否則徒以白虎清之則釜底之薪火未除熱無由減徒以溫膽化之則平淡之藥力嫌輕痰無由化若汗之則更不合所謂清之下愈汗之不解於是轉為白㾦之變而所謂濕溫之病成矣以上所論結胸之證似猶為結胸之一式若傷寒論所言結胸其義更廣大論曰傷寒六七日結胸熱實脈沉而緊心下痛按之石鞕者大陷胸湯主之此結胸之以心下石鞕為主證者也又曰傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之此結胸之以胸脅水結為主證者也又曰太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹鞕滿而痛不可近者大陷胸湯主之此以少腹痛為主證者也若是諸式結胸吾信本湯皆能療之與五苓散之治水能治水之壅在下焦者亦能治水之壅及中焦者更能治水之壅及上焦者實有異曲同工之妙大論本湯方下云右三味以水六升先煮大黃取二升去滓內芒硝煮一二沸內甘遂未溫服一升得快利止後服至吾師之用本方病者常將三藥同煎不分先後亦不用末服後每致嘔吐痰誕繼而腹中作痛痛甚乃大便下於是上下之邪交去而病可愈竊按甘遂用末和服其力十倍於同量煎服吾師常用制甘遂錢半同煎以治本證若改為末量當大減切要切要甘遂月良後之反應互詳下卷懸飲案陸淵雷先生按云結胸既由誤下而得復以大陷胸湯峻下舒弛遠既疑之鐵樵先生亦謂大陷胸不可用太炎先生云結胸有惡涎此有形之物非徒無形之熱也非更以下救下將何術哉然江南浙西妄下者少故結胸證不多見而大陷胸湯之當否亦無由目驗也吾昔在浙中見某署攜有更夫其人河北人也偶患中風遽飲皮硝半碗即大下成結胸有揚州醫以大陷胸下之病即良已此絕無可疑者按以下救誤下是猶將計就計良工之謀奚用疑為故每讀醫書輒佩太炎先生之偉論非無因也先賢余聽鴻云泰興太平洲王姓婦始而發熱不甚脈來浮數舌苔薄白因其發熱投以二陳蘇葉等其舌即紅而燥改投川貝桑葉等其舌又白吾師蘭泉見其舌質易變曰此證大有變端使其另請高朗王姓以為病無所苦起居如常諒無大患後延一屠姓醫診之以為氣血兩虛即服補中益氣兩三劑愈服愈危至六七劑即奄奄一息脈伏氣絕時正酷暑已備入木吾師曰王氏與吾世交何忍袖手即往視之見病人仰臥正寢梳頭換衣備入木矣吾師偕余細視面不變色目睛上反唇色尚紅其形似未至死後將薄紙一張蓋其口鼻又不見鼓動氣息已絕按脈亦絕吾師左右躊躇曰未有面色不變手足尚溫而死者後再按其足上太衝太谿其脈尚存曰未有見足脈尚存而手脈已絕者必另有別情即將其衣解開按其脘中石硬而板重力按之見病人眉間皮肉微動似有痛苦之狀吾師曰得矣此乃大結胸之證也非水非痰是補藥與熱邪摶結而成醫書所未載也即書大黃一兩芒硝三錢厚朴三錢枳實三錢萊菔子一兩瓜蔞皮一兩先煎枳樸萊蔞後納大黃濾汁再納芒硝濾清將病人牙關挖開用竹箸兩隻插入齒中將藥汁漸漸灌入自午至戌方盡一劑至四更時病人已有氣息至天明稍能言語忽覺腹中大痛吾師曰病至少腹矣當再服原方半劑腹大痛不堪下燥矢三十餘枚而痛即止後調以甘涼養胃錄診餘集按此乃大陷胸證之變局大陷胸湯之活用神而明之竟能起九死於一生為醫者不當若是乎吾師自治本案用大陷胸湯得效其後屢屢用之率奏奇功余嘗親見師家一房客母女三人患病相似師疏大陷胸湯與之令三人合飲次日均瘳夫以此告人人能信之乎信筆漫書費紙已多誠以本湯乃仲聖救世之方亦吾師獨得之秘是猶項籍劉邦鴻門之會著要萬分太史公雖欲簡筆記之不可得也曹穎甫曰太陽之傳陽明也上濕而下燥燥熱上熏上膈津液悉化黏痰承氣湯能除下燥不能去上膈之痰故有按之不硬之結胸惟大陷胸湯為能徹上下而除之原不定為誤下後救逆之方治也治病者亦觀其通焉可耳佐景又按王季寅先生作同是瀉藥篇曰民十八四月某日狂風大作余因事外出當時冒風腹中暴疼余夙有腹疼病每遇發作一吸阿芙蓉其疼立止不料竟不見效服當歸芍藥湯加生軍一劑亦不應時已初更疼忽加劇家人勸延針醫余素拒針未允所請至午夜疼如刀絞轉側床頭號痛欲絕無何乃飲自己小便一盅始稍安已而復作狀乃如前黎明家人已延醫至矣遂針中脘以及各穴凡七針行針歷五小時痛始止據該醫云腹部堅硬如石針雖止疼一時而破堅開結非藥不克奏功因擬順氣消導之方余不欲服家人再三慫恿勉進一劑病不稍減翌日家人仍欲延前醫余堅辭曰余腹堅硬如石決非順氣化痰所能奏效惟大承氣或可見功因自擬生軍三錢枳實二錢厚朴三錢芒硝五分服後時許下積物甚多胸腹稍暢次日胸腹仍覺滿悶硬疼又進二劑復下陳積數次元氣頓形不支因改服六君子湯三劑後元氣稍復而胸腹滿疼仍自若也更服大承氣二劑不惟疼痛絲毫未減腹中滿硬如故而精神衰憊大有奄奄欲斃之勢因念攻既不任補又不可先攻後補攻補兼施其效猶復如此生命至是蓋已絕望矣談次忽憶傷寒小結胸病正在心下按之始痛大結胸則從心下至少腹硬滿不待按即痛不可近余之初病即胸腹堅硬如石號痛欲絕者得毋類是惟大結胸以大陷胸湯為主治此湯之藥僅大黃芒硝甘遂三味硝黃余已頻服之矣其結果既如上述加少許甘遂即能卻病回生耶興念及此益旁皇無以自主既思病勢至此不服藥即死服之或可倖免遂決計一試方用生軍二錢芒硝五分甘遂末一分藥既煎成親友群相勸阻餘力排眾議一飲而盡服後頗覺此藥與前大不相同蓋前所服硝黃各劑下咽即覺藥力直達少腹以硝黃之性下行最速故也今服此藥硝黃之力竟不下行盤旋胸腹之間一若尋病者然逾時忽下黑色如棉油者碗許頓覺胸中豁明痛苦大減四五劑後飲食倍進精神煥發古人所謂用之得當雖硝黃亦稱補劑者於斯益信惟此湯與大承氣湯只一二味出入其主治與效力有天淵之別經方神妙竟有令人不可思議者矣嗣又守服十餘劑病已去十分之九本可不藥而愈余狃於前服此湯有利無弊更服一劑以竟全功詎藥甫下咽頓覺心如掀肺如搗五臟鼎沸痛苦不可名狀亟以潞參一兩黃耆五錢飴糖半茶杯連服二劑始安余深奇同是瀉藥初服硝黃則元氣徒傷繼加甘遂則精神反形壯旺故詳述顛末而為之記錄醫界春秋細按本篇實有無上之價值何者病人服醫者之藥每不能詳言服後之變化惟有醫者服自疏之藥乃能體察周詳言之有物觀王先生之言今服大陷胸後硝黃之力竟不下行盤旋胸腹之際一若尋病者然可謂一言發千古之秘勝於後世注家之書徒以空談為依歸者萬卷此實驗之所以尚而本錄之所由作也曹穎甫曰藥不由於親試縱憑思索理解必有一間未達之處予昔服生附子一身麻痹至於洞泄穢濁之水不能自禁久乃沉沉睡去比覺而二十餘日之泄瀉竟爾霍然若夫大陷胸湯予但知令上膈濕痰並中下燥矢俱去耳且甚不解下後之更用硝黃今觀王君自記始知硝黃與甘遂同煎硝黃之性即與甘遂化合而為攻治上膈濕痰之用固不當失之毫釐也第六五案大陷胸湯證其二穎師醫案袁茂榮六月十九日病延一月不飢不食小便多而黃大便闕但轉矢氣脈形似和臟無他病下之當愈上膈有濕痰宜大陷胸湯生川軍五錢後入制甘遂二錢先煎元明粉三錢沖佐景按有名袁茂榮者南京人年四十四以賣面為業其麵攤即設上海民國路方浜橋順泰當鋪前人行道旁體素健今年六月間忽病纏綿床第者達一月之久更醫已屢迄未得效胸悶異常不能食兩旬不得大便一身肌肉盡削神疲不能起床半月前胯間又起跨馬疽紅腫疼痛不能轉側至是有如千斤重量負系其間自問病篤無可為已曰有能與我峻劑劇藥者雖死無怨也史君惠甫與茂榮居相近憐其遇慨然邀師診師至按脈察證曰此易耳不能食者濕痰阻於上膈也不大便者燥矢結於大腸也濕痰阻於上者我有甘遂以逐之燥矢結於下者我有硝黃以掃之一劑之後大功可期勿慮也故師徑用大陷胸湯如上載但囑服初煎一次已足茂榮以經營為生性甚敏悟雖不明醫理顧知此為劇藥必難下咽因俟藥汁稍涼閉目凝睫滿欲一口而盡飲之但藥汁氣味過烈勉啜二口輒不能續進余其小半而罷服後嘔出濃痰且覺藥力直趨腹部振盪有聲腹痛隨作欲大便者三四次卒無所下至夜三鼓腹痛更劇乃下燥矢五六枚隨以溏糞據云矢糞積於紙製香菸匣中滿二匣予嘗詰之曰何不用便桶耶曰際此衰疲之時尚有何能力起床耶況家無長物故權假煙匣作便桶耳予為之筦爾翌早茂榮一覺醒來方入妙境向之胸悶如窒者今則漸趨清明昨之腹痛如絞者今則忽轉敉平而胯間之疽亦崩潰而膿出重痛大除蓋內證愈而外疽無所附麗也於是思食能進粥一碗喜悅之情無以復加蓋其與粥飯絕緣者已一月有餘不意得重逢時也後潰疽由西醫調治十日即告收功不勞吾師之再診矣茂榮性情誠懇而言語滑稽予與惠甫崇景曾共訪之故知其病情稔讀者有暇亦大可一往晤之彼必供君以研究之資料而解君之疑團且彼所售炒麵香脆可口亦大堪一嚼云夫大陷胸湯號稱峻劑世人罕用之抑亦罕聞之而吾師則能運之若反掌抑亦何哉曰此乃四十年臨診之功非初學者所可得而幾也苟強求之非惟畫虎不成類犬貽譏而人命之責實重也予嘗謂仲聖方之分類若以其峻否別之當作為三大類第一類為和平方補正而可去邪者也姑舉十方以為例則桂枝湯白虎湯小柴胡湯理中湯小建中湯炙甘草湯吳茱萸湯小青龍湯五苓散當歸芍藥散等是若是諸湯證遇之屢而辨之易故易中而無傷第二類為次峻方去邪而不傷正者也並舉十方以為例則麻黃湯大承氣湯大柴胡湯四逆湯麻黃附子細辛湯大建中湯大黃牡丹皮湯桃核承氣湯葛根芩連湯麻杏甘石湯等是若是諸湯證亦遇屢而辨易但當審慎以出之為其不中則傷正也第三類乃為峻方是以救逆為急未免傷正者也舉例以明之則大陷胸湯十棗湯三物白散瓜蒂散烏頭湯皂莢丸葶藶大棗瀉肺湯甘草半夏湯甘草粉蜜湯抵當湯等是若是諸湯證遇之較鮮而辨之難確用之而中已有傷正之虞不中即有壞病之變可不畏哉佐景侍師數載苦心鑽研於第一類和平方幸能施用自如綽有餘裕於第二類次峻方則必出之以審慎亦每能如響斯應獨於第三類峻方猶不敢曰能用即遇的證亦必請吾師重診方敢下藥此乃治醫者必經之途徑不必諱飾是故醫士有能用第一類方而不能用第二類第三類方者有能用第一類第二類方而不能用第三類方者未聞有能用第三類方而不能用第一類第二類方者也然則今有初學醫者焉毫無用方經驗見本案大陷胸湯證驚其神而識其效越日偶遇一證與本證相似乃遽投以重劑大陷胸湯可乎頃之病者變證矣或號痛而呼天或大吐而劇下觀其神形去死非遠爾時醫者在側既已目眩心驚未免手忙腳亂將佯作鎮定空言以慰藉乎將臨渴掘井翻書以覓方乎抑將額汗涔涔抱頭而鼠竄乎吾知其均未可也嘻是故治醫之道法當循序而漸進切勿躐等以求功多下一分苦工夫方增一分真本事閱者能體斯旨方為善讀吾書若有人焉平素過習平淡輕劑視余所謂第一類和平方即以為天下第一流峻藥畏而卻走者則非我之徒不足與言大道也曹穎甫曰世人讀仲景書但知太陽誤下成結胸乃有大陷胸湯證而不知未經誤下實亦有結胸一證而宜大陷胸湯者夫傷寒六七日熱實脈沉緊心下痛按之石鞕及傷寒十餘日熱結在裡無大熱此為水結在胸脅二條皆示人以未經誤下之結胸讀者自不察耳予謂太陽傳陽明之候上濕而下燥苟腸中燥火太重上膈津液化為黏痰結胸之病根已具原不待按之石鞕然後定為結胸證即水結在胸脅胸中但見痞悶而不覺痛者何嘗非結胸證也此方予十年來驗案甚多一時不能追憶暇時當檢出之以供快覽第六六案桃核承氣湯證其一穎師醫案羅夫人七月二十三日腹滿脹轉矢氣則稍平夜不安寐大便行則血隨之而下以證狀論有似脾虛不能統血然大便鞕則決非脾臟之虛以脾虛者便必溏也脈弦宜桃仁承氣湯桃仁泥三錢生川軍二錢後下川桂枝三錢生草一錢芒硝錢半沖佐景按病者服二劑後大便暢而血止矣大論曰太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解其外外解已但少腹急結者乃可攻之宜桃核承氣湯本條即後人所據指本湯為太陽府病蓄血之方治也蓋膀胱為太陽之府本條之首見太陽病三字條文又在太陽篇中有此三證得毋可信佐景下愚願闢其非本條條文諸本稍有出入原注曰後云解外宜桂枝湯玉函自上有必字愈上有即字成氏本解下無其字脈經其外下有屬桂枝湯證五字千金翼同竊意凡此種種出入皆無關大要惟條中膀胱二字諸本無異竊引為大疑今試先問蓄血證之小便如何按桃核承氣湯條未言但抵當湯丸三條則已三複言之曰以熱在下焦少腹當鞕滿小便自利者下血乃愈又曰少腹鞕小便不利者為無血也小便自利其人如狂者血證諦也又曰少腹滿應小便不利今反利者為有血也然則蓄血證之小便利也夫小便從膀胱出今小便既利彼膀胱何病之有反是凡膀胱熱者其小便必不利甚或刺痛宜豬苓五苓之屬此為任人所知然則以蓄血證言膀胱實無熱結而膀胱二字之誤人每熟視不覺者蓋習非成是故耳膀胱二字既誤反不若下焦二字為妥下焦猶言少腹之裡也其義雖太渾涵假之為代名可也學者欲知其真切病所余今尚無辭以答惟與其謂病所屬膀胱無寧謂屬大腸與子宮蓋考諸實例女子之瘀血有從前陰下者有從大便下者男子則悉從大便下桃核承氣湯煎服法中又曰當微利亦可以為證抑謂病所在大腸與子宮猶未盡妥未竟之義姑留待高明發之而熱結不在膀胱要可斷言後人乃欲依此膀胱二字附會內經經絡以立說是猶建塔於沙其可穩乎又大論厥陰篇曰病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也知膀胱二字原用以代小腹之裡不可過於拘呆否則膀胱既屬太陽又何能再屬厥陰乎余今解釋桃核承氣湯條文可見文冠以太陽病三字者湯不必限於太陽方也本條之意若曰有人患太陽病或延不醫治或醫不如法以致太陽病不解同時其人又作他病即熱結於下焦少腹之裡發為動作如狂設其人正氣旺盛自能逐下瘀血如是血自下者其病得愈設其人正氣不旺無力逐邪者當用藥以攻之但此時如其外太陽病依然未解尚未可攻當先解外外解已但少腹急結者乃可用桃核承氣湯攻之蓋外不解尚未可攻云者謂太陽未罷尚未可用陽明攻法也外解已但少腹急結者乃可攻之云者謂太陽已罷但存陽明急結乃可用硝黃攻下也夫解外宜桂枝湯人知桂枝湯為太陽方攻之宜桃核承氣湯人何不知桃核承氣湯為陽明方故本條全文可謂是從太陽說到陽明奈何前人但見太陽病之冠辭遂不見陽明病之方治耶至於本條列在太陽篇中不妨指本湯為太陽方又何值一駁緣仲聖之走筆若游龍又豈淺學者所可想像而及之哉本湯中有桂枝一味又是前人誤解之源曰桂枝所以解太陽之表者也不知桂枝湯中之桂枝功在解表桃核承氣湯中之桂枝功在助下一藥二用有說在乎曰我前不云乎桂枝能活動脈之血者也動脈之血自里達表桂枝助之可以作汗解表此桂枝湯中桂枝之功也動脈之血自心臟出分作上行下行然上行者少下行者多少腹之熱結血瘀又遠居心臟之下使不有桂枝以助動脈之血下行瘀何由去此桃核承氣湯中桂枝之功也夫桂枝為血分藥桃核承氣湯證為血分病以血分藥治血分病何疑之有其不關太陽事也明矣曹穎甫曰胞中蓄血部位即在膀胱兩角昔年在紅十字會有男子少腹脹痛用桃核承氣下後雖未徹底而少腹漸軟然瘀血則由大便出將毋服此湯後胞中瘀血亦能被吸上行使從大便出耶太陽病三字原不可泥在太陽篇中要不過辨其為蓄水否耳此其所以當從小便有無為辨也第六七案桃核承氣湯證其二穎師講授佐景筆記師曰住毛家衖鴻興里門人沈石頑之妹年未二十體頗羸弱一日出外市物驟受驚嚇歸即發狂逢人亂毆力大無窮石頑亦被擊傷腰部因不能起數日後乃邀余診病已七八日矣狂仍如故石頑扶傷出見問之方知病者經事二月未行遂乘睡入室診察脈沉緊少腹似脹因出謂石頑曰此蓄血證也下之可愈遂疏桃核承氣湯與之桃仁一兩生軍五錢芒硝二錢炙甘草二錢桂枝二錢枳實三錢翌日問之知服後下黑血甚多狂止體亦不疲且能啜粥見人羞避不出乃書一善後之方與之不復再診佐景按狂止體不疲者以病者體弱不甚而藥復適中病也即使病者體氣過虛或藥量過劑致下後疲憊者不妨用補劑以調之病家至此慎勿驚惶反令醫者不克竟其技也第六八案桃核承氣湯證其三佐景醫案曹右住林蔭路初診十月二十二日經事六七月不來鼻衄時作腹中有塊卻不拒按所以然者鼻衄宣泄於上故也闕上痛周身骨節烘熱而咳此病欲作乾血以其體實宜桃核承氣湯加味上者下之也川桂枝二錢制川軍三錢枳實二錢桃仁泥四錢生甘草錢半牛膝二錢全當歸二錢大白芍二錢佐景按桃核承氣湯亦余所慣用而得效之方也廣益中醫院中每多藜藿之婦女經停腹痛而乞診其甚者更見鼻衄或吐血所謂倒經是也余苟察其非孕悉以本方加減投之必下黑汙之物而愈本案特其一例耳曹右約三十餘歲面目黧黑一望而知為勞苦之婦人也婦訴其苦備如案述乾咳不得痰其塊在少腹之左久據不移腹中痛卻喜按假令腹中有塊而拒按此為本湯的證絕無可疑者今卻喜按則本湯之中否實須細考余以其鼻衄之宣泄為亡血家法當導之使下乃徑與本方蓋處方之前未嘗不躊躇審顧也二診十月二十三日骨節烘熱已減咳嗽亦除癥塊已能移動不如向之佔據一方矣服藥半日見效如此非經方孰能致之川桂枝三錢枳實三錢當歸三錢制川軍四錢牛膝三錢白芍三錢桃仁四錢甘草三錢佐景按服藥半日云者蓋婦於昨日下午五時服藥迄今日下午五時方為一日而今日上午九時婦即來二診故也婦謂其塊自原處略向上中方向移動大便暢而未察其色咳與烘熱均減而夜寐以安夫不治其咳而咳差不治其骨蒸而骨蒸減者何也所謂治病必求其本今主病去而客病隨除也三日婦未來四日續來曰服二診方後飯量增體隨舒快其塊更向上中方向移動漸在腹之中道矣余曰若是甚佳中道猶通衢其塊易下矣曰昨以便故丐他醫施診顧服藥後今日反覺不舒塊亦不動閱其案曰經閉腹中痞塊日晡潮熱宿瘀內阻胞脈不利宜祛瘀為治藥為桃仁泥六錢花檳榔三錢兩頭尖二錢大白芍三錢青陳皮各錢半川桂枝一錢醋炒三稜莪朮各三錢紫丹參二錢澤蘭葉三錢余曰案甚佳方亦合量又不輕安得無效婦堅請疏方余曰服二診之方可矣安用多事為五日婦竟不復來閱者將虞其殆乎余則敢必其向愈或者塊下之後稍稍倦憊休養一二日轉輒健步如飛勞人草草不遑謝先生矣閱者博雅能信吾言乎顧本湯之用必以病者之體實為前提假令其人體虛粗率投之將得不償失而貽後悔閱者請檢本卷第六一案黃耆建中湯一案容續陳其經過其案病者王女士自服治肺之藥乏效堅請設法根治余曰根在乾血當下之姑試以最輕之量計桃仁泥二錢制川軍一錢半元明粉錢半分二次沖加其他和平扶正之品二劑後果下黑如河泥之物依理此為病根之拔正為佳兆然而病者因是不能起床胃納轉呆精神又頹雖云可用補益之藥以善其後然而病家恐懼醫更難於措手所謂得不償失者是也閱者鑑之曹穎甫曰桃核承氣作用正在能攻下耳二診後他醫所立方治攻而不下安能奏效時醫畏大黃若蛇蠍真是不治之痼疾若王女士既下如汙泥之惡物病根已拔雖胃呆神倦不妨再用小建中以調之即不服藥亦斷不至死可以片言決也佐景又按陸自量先生作桃核承氣湯之治驗篇云張姓之女年方二九患病匝月仍未少差延余診治證得形瘦色白神識雖清兩耳失聰入夜則神昏譫語日間則其狀若失如此見象蓋已旬日盜汗自汗日夜無間舌無苔余以陽虛證治處以附子桂枝龍骨牡蠣芍藥等明日復診病無進退惟自汗較少病家反加責難蓋欲病迅愈人同此心思至此不禁嘆為醫之難矣是時實無詞應付惟有敷衍主義聊以為慰繼而轉輾思維難得病之真諦籌思再三乃悟得熱結膀胱始有此種見證因此目的吃緊於腹診且念醫生以愈病為天職設存瓜李之嫌實有阻我學術之進步結果診得腹腔軟癟在少腹部分得有堅硬之物質隆然若塊石同時病者亦訴痛乃認定為熱結膀胱少腹急結之腹證並詢得旬日前病盛之際曾患便血為某名醫所治愈其蓄血之證益形露骨乃毅然處以桃核承氣湯加龍骨牡蠣白芍茯苓令服二劑此後遂未往診久久沉音心自惴測幾疑此人已不食人間煙人矣後得鄰人謂現已起床照鏡開窗看菊此昔年九秋事也後又邀余謂新患咯吐紫血精神尚未恢復想系蓄血未淨反動上衝使然也再與前方去芒硝入泡薑三七漸次向愈余以為該病之便血時正是熱結膀胱血自下下者愈之良好機會無奈某醫不察反加堵塞而反多此一番手續然則病家亦未嘗不歡迎也病人苦極已一嘆錄蘇州國醫雜誌陸先生見理透徹立言平正堪作病家之明鏡第六九案抵當湯證其一穎師講授佐景筆記師曰余嘗診一周姓少女住小南門年約十八九經事三月未行面色萎黃少腹微脹證似乾血勞初起因囑其吞服大黃䗪蟲丸每服三錢日三次盡月可愈自是之後遂不復來意其差矣越三月忽一中年婦人扶一女子來請醫顧視此女面頰以下幾瘦不成人背駝腹脹兩手自按呻吟不絕余怪而問之病已至此何不早治婦泣而告曰此吾女也三月之前曾就診於先生先生令服丸藥今腹脹加四肢日削背骨突出經仍不行故再求診余聞而駭然深悔前藥之誤然病已奄奄尤不能不一盡心力第察其情狀皮骨僅存少腹脹硬重按痛益甚此瘀積內結不攻其瘀病焉能除又慮其元氣已傷恐不勝攻思先補之然補能戀邪尤為不可於是決以抵當湯予之虻蟲一錢水蛭一錢大黃五錢桃仁五十粒明日母女復偕來知女下黑瘀甚多脹減痛平惟脈虛甚不宜再下乃以生地黃耆當歸潞黨川芎白芍陳皮茺蔚子活血行氣導其瘀積一劑之後遂不復來後六年值於途已生子年四五歲矣佐景按丸藥之效否與其原料之是否道地修合之是否如法儲藏之是否妥善在在有關故服大黃䗪蟲丸而未效者不能即謂此丸竟無用也蜀渝鄒趾痕老醫士曰虻蟲水蛭二物為仲聖書中起沉疴愈大病最有大力之神藥然而自仲景迄今一千七百餘年歷年久聖道失傳而今竟無人能用此藥遂使一切瘀血入於血室之發狂腹硬證及瘀血入於血室結成堅硬大塊之乾血癆病可生而不得生者不知凡幾曷勝浩嘆何以知無人能用此藥趾痕在四川重慶多年目睹重慶藥鋪不辦虻蛭愚遇須用此二物之病必特派人到四鄉農村尋求之民國十七年為三小兒再舉在北平臥病於德國醫院因自四川來平見北平藥鋪皆有二物知北平之醫能用二物誠堪佩也及愚用二物時往往無效愚乃注意考察乃知藥鋪所售之虻蟲非牛虻乃屎虻尿虻耳所用之水蛭非鑽腳蛭乃不吮血之長蛭大蛭耳推原其故皆由採辦二物之人未聞醫生說明二物分別之法以為無須分別只要是蛭蟲水蛭便可充數不知虻蟲必用牛虻屎虻尿虻無用水蛭必用鑽腳蛭不鑽腳之長蛭大蛭無用此二物生於夏秋暑熱強烈之時採二物者當在炎暑肆威時專人到四鄉採之採牛虻於畜牛家之牛房中此中吮血之虻飛翔成群虻聲聒耳虻嘴有吸血之針專噆牛膚之血其針刺入牛膚能令牛不勝痛跳躍鳴嚎者良去其翅足微火烤乾藏於高燥之處可以久藏不壞採鑽腳蛭於有蛭之水田或水池中其中水蛭千百成群蠕動蜎蠉浮沉跳躍於水中採蛭之人以腳入水中則未滿一寸長之水蛭爬滿於腳脛之上皆鑽腳蛭也從腳脛上抹下微火烤乾藏於高燥之處可免腐壞凡水蛭能爬腳者皆能吮血若長二三寸之水蛭皆不爬腳不吮血故不得為鑽腳蛭也此物在四川俗名螞蟥因此物兩頭有嘴其爬上腳脛時兩頭鑽入肉中有似兩頭有鋒之鐵釘故稱此釘為螞蟥絆在北平俗名水鱉在山海關俗名肉鑽子愚以其名多易淆故以鑽腳蛭一其名以免與不鑽腳之水蛭混淆乃可見諸實功俗醫不知虻蛭之善惡竟敢糊塗輕用見有診治單上用虻蟲二分水蛭一分者謬之甚矣不知此二物不用則已用則只計個數不以兩錢分釐計也愚每用牛虻二十個用鑽腳蛭亦必二十個用牛虻三十個用鑽腳蛭亦必三十個其個數必相等不得參差也所以必用相等之個數者因要用此二物合力以攻一個堅硬之瘀塊使破為細碎砂粒若夫用二十個或用三十個者則視其瘀塊之大小堅柔而決定也若夫用其大毒以成功而又能避其猛峻而無害者則在乎良醫辨證精明臨險不惑見可而進知難而退進退適宜之運籌也良醫善用故能起沉疴愈大病粗工無學無識冒昧從事不惟無益而反害之於是相戒以不可用久而不用用法失傳辨別採藥之法亦失傳遂使起死回生有大力之神藥擱於無用之地詎非大可惜哉今余作聖方治驗錄二卷將脫稿第一卷追錄愚在重慶治愈之病載有用虻蛭治愈劉玉成婦乾血癆瘵之奇驗第二卷紀錄愚在北平用虻蛭治愈岳項氏腹癥腿寒二十年不受孕今忽受孕之奇驗錄聖方治驗錄經驗之言至足欽仰今海上藥鋪間有備虻蟲者辨之確係牛虻非屎虻尿虻但水蛭一味則鮮有備之者蓋醫家藥商同視此為禁品不敢以之列方不敢以之售人積習不返良藥坐湮為可惜也第七案抵當湯證其二穎師講授佐景筆記師曰蓄血一證見於女子者夥矣男子患者甚鮮某年余診一紅十會某姓男子少腹脹痛小便清長且目不識物論證確為蓄血而心竊疑之乃姑投以桃核承氣湯服後片時即下黑糞而病證如故再投二劑加重其量病又依然心更驚奇因思此證若非蓄血服下藥三劑亦宜變成壞病若果屬是證何以不見少差此必藥輕病重之故也時門人章次公在側曰與抵當丸何如余曰考其證非輕劑可瘳乃決以抵當湯下之服後黑糞挾宿血齊下更進一劑病者即能伏榻靜臥腹脹平痛亦安知藥已中病仍以前方減輕其量計虻蟲二錢水蛭錢半桃仁五錢川軍五錢後復減至虻蟲水蛭各四分桃仁川軍各錢半由章次公調理而愈後更詢諸病者蓋嘗因勞力負重致血凝而結成蓄血證也第七一案抵當湯證其三穎師親撰師曰丁卯新秋無錫華宗海之母經停十月腹不甚大而脹始由丁醫用疏氣行血藥即不覺脹滿飲食如常人經西醫考驗則謂腹中有胎為腐敗之物壓住不得長大欲攻而去之勢必傷胎宗海邀余赴錫診之脈澀不滑不類妊娠當晚與丁醫商進桃核承氣湯晨起下白物如膠痰更進抵當湯下白物更多脹滿悉除而腹忽大月餘生一女母子俱安孫子云置之死地而後生亶其然乎曹穎甫曰金匱妊娠篇宿有癥病當下其癥桂枝茯苓丸主之方中丹皮桃仁芍藥極破血攻瘀之能事丹皮桃仁為大黃牡丹湯治腸癰之峻藥芍藥為癰毒通絡之必要今人之治外證用京赤芍其明驗也桂枝合芍藥能扶統血之脾陽而疏其瘀結觀太陽病用桂芍解肌非以脾主肌肉乎用茯苓者要不過去濕和脾耳然方治平近遠不如桃核承氣抵當丸之有力然當時非經西醫之考驗及丁醫用破血藥之有效亦斷然不敢用此而竟以此奏效其亦有故無殞亦無殞也之義乎佐景按余前表桃核承氣湯為陽明攻下之方矣若抵當湯比前湯更進一步自亦為陽明之方蓋前湯治血之新瘀者本湯治血之久瘀者故二者見證顯分輕重彼曰小腹急結此曰少腹鞕滿鞕滿原較急結為重彼曰如狂此曰發狂發狂原較如狂為重彼有血自下者此則須下其血乃愈較血能自下者為重彼不曰脈當在浮而數之例此曰脈微而沉原較前為重彼用植物性藥此用動物性藥動物性藥之功原較植物性藥為烈此皆其彰明較著者也本湯條文曰太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當鞕滿小便自利下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之試以此與桃核承氣湯條文同讀當得一新義有為前人所未及者蓋二條均屬太陽陽明同病惟前條先治太陽後治陽明為經本條先治陽明後治太陽為權所以有經權之分者以血證有緩急之異也前條血證不過急結如狂而已故雖屬陽明病猶當先治太陽本條血證已至鞕滿發狂甚或擊人上屋其候已急故暫舍太陽先治陽明正符急當救里之例大論曰本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之為逆若先下之治不為逆此即桃核承氣湯及抵當湯二條之提綱也汪琥注曰大約治傷寒之法表證急者即宜汗里證急者即宜下不可拘拘於先汗而後下也汗下得宜治不為逆何其明澈允當也由是觀之仲聖假桃核承氣湯及抵當湯二條示人以太陽陽明經權之治同時引出陽明之方實無疑義在仲聖當日臨床原有此種實例但吾人居今日而讀大論卻不可固執此例以為用二方之法門使其過於膠執恐二方將永無可用之時而患二方證者反永不得主治之方寧不可哀乎讀者試察本卷二方各案其有太陽病者乎無有也斯可知二方實專屬陽明無疑矣竊以太陽經府之說盛行賢者不發其非而反惑焉用是不殫辭費而辨之第七二案抵當丸證穎師講授佐景筆記師曰常熟鹿苑錢欽伯之妻經停九月腹中有塊攻痛自知非孕醫予三稜莪朮多劑未應當延陳葆厚先生診先生曰三稜莪朮僅能治血結之初起者及其己結則力不勝矣吾有藥能治之顧藥有反響受者幸勿罵我也主人諾當予抵當丸三錢開水送下入夜病者在床上反復爬行腹痛不堪果大罵醫者不已天將旦隨大便下汙物甚多其色黃白紅夾雜不一痛乃大除次日復診陳先生詰曰昨夜罵我否主人不能隱具以情告乃予加味四物湯調理而瘥曹穎甫曰痰飲證之有十棗湯蓄血證之有抵當湯丸皆能斬關奪隘起死回生近時岐黃家往往畏其猛峻而不敢用即偶有用之者亦必力為阻止不知其是何居心也第七三案白頭翁湯證穎師醫案米右住方浜路肇方弄十四號高年七十有八而體氣壯實熱利下重兩脈大苔黃夜不安寐宜白頭翁湯為主方白頭翁三錢秦皮三錢川連五分黃蘗三錢生川軍三錢後下枳實一錢桃仁泥三錢芒硝二錢另沖佐景按米姓婦家貧有一子現年三十餘齡賣舊貨為業不娶妻事母至孝鄰里咸呼之曰孝子阿三母病臥床匝月無力延醫安奉湯藥便器穢物悉孝子親潔之史君惠甫有姑母居相近聞婦苦病慨代延師出診本案方系初診方即系末診方何者老婦服此之後得快利得安寐復何求者依法病後當事調理但婦以勞師遠駕心實不安即任之竟復健康如中年人崇保氏序世補齋醫書曰今年春保病溫群醫束手先生指陸九芝先生以大承氣湯下之一藥霍然保年七十矣梔芩苦寒也朴硝峻下也乃力排眾議毅然行之非有真知灼見不惑於補陰補陽之說者曷能若此故保曰仲景醫中之聖先生醫中之賢以佐聖者也竊於吾師亦云余尚憶曾治一楊左白頭翁湯證其脈案曰利下色鮮紅日二十行無表證渴欲飲水脈洪大論曰熱利下重者又曰下利慾飲水者以有熱故也白頭翁湯主之其藥味為白頭翁三錢秦皮三錢枳實二錢黃連五分生甘草錢半黃芩錢半黃蘗三錢復診大效夫腸中熱而有燥矢者此為實熱宜承氣湯腸中熱而無燥矢者此為虛熱在比較上言猶言空虛之意宜白頭翁湯胃裡有實邪者宜吐法用瓜蒂散胃裡有虛熱亦在比較上言者宜清法用白虎湯故胃之有白虎無異腸之有白頭翁腸之有承氣無異胃之有瓜蒂然而胃患虛熱時多患實邪時少腸患實熱時多患虛熱時少仲聖取其多者常者為法故立白虎承氣為陽明正治而以瓜蒂白頭翁為陽明輔治若問腸何以患實時多胃何以患虛時多曰胃居腸上腸生胃下上者可以傳之下下者莫能還之上也經旨點穿令人微笑第七四案豬膽汁導證穎師親撰師曰門人張永年述其戚陳姓一證四明醫家周某用豬膽汁導法奏效可備參究其言曰陳姓始病咯血其色紫黑經西醫用止血針血遂中止翌日病者腹滿困頓日甚延至半月大便不行始用蜜導不行用灌腸法又不行復用一切通大便之西藥終不行或告陳曰同鄉周某良醫也陳喜使人延周時不大便已一月矣周至察其脈無病病獨在腸乃令病家覓得豬膽傾於盂調以醋借西醫灌腸器以灌之甫灌入轉矢氣不絕不逾時而大便出凡三寸許擲於地有聲擊以石不稍損乃浸以清水半日許盂水盡赤乃知向日所吐之血本為瘀血因西醫用針止住反下結大腸而為病也越七日又不大便復用前法下燥矢數枚皆三寸許病乃告全予於此悟蜜煎導法惟證情較輕者宜之土瓜根又不易得惟豬膽汁隨時隨地皆有近世醫家棄良方而不用為可惜也佐景按本案見傷寒發微以其可備一格故特轉錄於此凡大便多日未行甚且在十日以上又不下利清水者是蓋燥矢結於直腸部分矢與腸壁黏合甚切故愈結愈不能下此時倘用硝黃以治之不惟鞭長莫及抑將徒損胃氣伐其無辜此導法之所由作也蜜煎導法為輕但能用之合度亦每克奏膚功友人黃君有祖母年已九十餘齡矣遘病旬日不大便不欲食神疲不支群醫束手不敢立方卒用灌腸器灌入蜜汁糞穢既下諸恙竟退獲享天年此其例也近者藥房制有甘油錠施用較便可以為代倘用二三錠後依然無效者不妨續施因腸壁熱甚者二三錠尚不敷濡潤用也若蜜汁或錠皆不勝任則須用豬膽汁蓋人之膽汁本有潤腸之功今以豬膽為代亦所謂藏器療法之變局也月前範石生先生治黃氏肝癌案亦用膽汁導法惜乎一般中醫恆喜以清淨為高不肯親犯糞矢坐視良法湮滅能不浩嘆豬膽汁須和醋少許者似欲藉醋以刺激其腸壁而促進其蠕動故蜜錠之制有時亦加以少許皂角末實同此意皂角粉少許吹入鼻孔中即作噴嚏其刺激之功為何如至於行導法用之器具以西醫所備者為簡潔適用價不昂中醫應同樣採用奈聞有法令焉中醫不許採用西醫器具是何意旨令人莫測高深而寶貴之中藥若大黃也當歸也麻黃也桔梗也彼洋醫洋商反可以恣意採取製為所謂西藥以反售國人嗟乎天下事之不平寧有甚於此者第七五案麻子仁丸證穎師醫案徐左能食夜臥則汗出不寐脈大大便難此為脾約脾約麻仁丸一兩作三服開水送下佐景按麻子仁丸原方為麻子仁二升芍藥半斤枳實半斤炙大黃一斤去皮厚朴一尺炙去皮杏仁一升去皮尖熬別作脂等六味蜜和丸如梧桐子大今藥鋪中通稱曰脾約麻仁丸者即是也本方以麻子仁為君凡仁中皆有油質功能潤下故借之以通便施於虛弱體質之不勝攻伐者允宜以上自大陷胸湯至麻子仁丸凡七證雖有緩急之分皆不離下法或以結胸為主或以瘀血為主或以蓄血為主或以熱利為主或以腸燥為主其病所或偏於上或偏於中或偏於下夫下則通通則不痛此治陽明熱結之總訣也第一集下卷第七六案神志恍惚佐景筆記佐景曰友人施君朝貴崇明人也服務上海電報局甲戌孟秋某晚匆匆邀診乃弟病入其室見病者仰臥榻上叩其所苦絕不應余心異之私謂施君曰乃弟病久耳聾無所聞乎抑舌蹇不能言乎則皆曰否余益驚異按其脈一手洪大一手沉細孰左孰右今已莫能記憶因詢家人以致病之由曰渠前任某軍電職因事受驚遂覺神志恍惚每客來恆默然相對客去則歌唱無序飲食二便悉如常人惟食時闕上時有熱氣蒸騰輕則如出岫朝雲甚則如窯中煙狀頗怪特前曾將渠送往本市某著名醫院診治經二十餘日醫者終不識其為何病既無術以療翻稱其無病以塞責故於昨日遷出請先生一斷余細按其腹絕不脹滿更不拒按沉思良久竟莫洞其癥結於是遂謝不敏赧然告辭越日施君告余曰舍弟之病昨已延曹穎甫先生診治服藥後大泄闕上熱氣減余聞而愕然遂急訪之並視所服方憶其案尾略曰此張仲景所謂陽明病也宜下之主以大承氣湯方為生大黃三錢枳實二錢芒硝三錢沖厚朴一錢又越數日余再晤施君諗其弟服藥後已能起床且不歌唱惟兩脅脹痛經曹師診治頃又愈矣審其方乃小柴胡湯也柴胡三錢黃芩三錢黨參三錢半夏三錢生薑三片大棗十二枚甘草二錢嗣是施君之弟似可告無恙矣顧尚苦自汗精神不振又經曹師投以桂枝加龍牡湯一劑而愈川桂枝三錢大白芍三錢生草二錢生薑三片大棗十二枚花龍骨五錢煅牡蠣五錢以上二味先煎自此以後健康逾常人一日與兄俱出值余於途各微笑頷首以過翌日遇施君問其弟昨日途間作何語施曰無他固詰之乃笑曰彼說吾兄脈理欠精耳余不禁重為赧然於是深服吾師醫術之神遂執贄而列門牆焉佐景按本案病者所患似系所謂精神病或神經病顧西醫用神經藥治之絕不見效中醫用經方治之反奏膚功其理深奧莫可究詰殆所謂治病必求其本歟按初方系陽明方次方系少陽方末方系太陽方以三方疏其三經之阻滯諸恙乃全殆當日受驚之時周身筋絡器官即因驚而有所滯乎顧飲食二便如常腹不痛又不拒按誰復有膽敢用承氣乃吾師獨以闕上熱氣之故遂爾放膽用之殆所謂但見一證便是不必悉具之意乎噫天下怪病滔滔微吾師其誰與歸曹穎甫曰此證予亦不能識惟診其脈則右極洪大左極微細陰不足而陽有餘意其為少陰負趺陽之脈而初非逆證加以熱氣出於闕上病情正屬陽明與右脈之洪大正合故決為大承氣湯的證而不料其應乃如響也佐景又按本案屬三陽同病本編入本書第二集中因邵餐芝先生大序中道及且本案又為余從師之因故特提前列此以作紀念第七七案腸癰其一穎師醫案史惠甫先生住上海城內方浜路七七五號三樓佐景按史惠甫君前以病來診曰我時患腹痛藥則少瘥隔日輒發醫者以為疝氣常用理氣之劑云云余細診之乃腸癰也即西醫所稱盲腸炎腹膜炎之類是當用藥攻之稍瘥數日又發案及處方如下腹痛偏右瘥而復發便燥結擬大黃牡丹湯生川軍錢半元明粉三錢沖桃仁二錢丹皮二錢敗醬草三錢生苡仁四錢熟附塊一錢枳實炭二錢大白芍二錢佛手錢半此四月十八日方也服三劑所下甚多腹痛大減至二十五日僅覺患處隱隱作痛矣易醫治之與以疏泄厥氣之劑方為軟柴胡錢半枳實炭二錢大白芍二錢青陳皮各錢半雲苓三錢香附二錢金鈴子三錢炙乳沒各八分小茴香八分炙枸桔三錢青桔葉錢半路路通三錢服後一日病無進退二日腹脹轉劇又來請診察之向之腹偏右脹痛者今則滿腹左右皆脹矣按之不甚有反抗力經文中腹皮急按之濡六字確是形容盡致不能更易病者蹙頞相告曰將如之何余曰無慮前方尚可用乃書曰腸癰旋瘥旋發刻診小腹四圍作脹按之濡隱隱痛大便不爽再擬原法生川軍三錢粉丹皮三錢冬瓜子四錢芒硝三錢沖桃仁三錢敗醬草三錢熟附塊錢半大白芍四錢焦楂炭三錢細青皮錢半此方午刻服下下午無動靜至夜半方欲便下穢物甚多次日又來診曰下後腹中略舒矣余視之病雖減其一二殊不了了曰昨方雖合尚嫌輕也史君曰然則如之何曰當請吾師用重方君有膽量服之否曰願聽命乃謁師作初診初診腸癰屢經攻下病根未拔昨由姜君用大黃牡丹湯腹脹略減以證情論仍宜攻下仍用原法加減生川軍五錢後入冬瓜仁一兩桃仁八十粒粉丹皮一兩當歸五錢芒硝三錢沖杜赤豆四兩煎湯濃後入前藥佐景按史君持本方至藥鋪配藥鋪中人有難色曰安用若許劇藥耶史君曰毋慮此種藥予已屢服之矣鋪中人曰然則此郎中年幾何矣曰七十餘齡矣曰然是誠有經驗學問之醫也乃慨予藥據史君言服後四小時即得便下較向之服予方用大黃三錢須逾十小時方得下者爽快多矣其夜所下最多皆黑色臭穢之物更衣頻數至不可數而快下之後腹痛大減腫脹亦消次日乃來二診二診昨用大黃牡丹湯加當歸赤豆所下黏膩赤色之物非膿非血此種惡濁久留腸中必化為黑色之河泥狀服湯後腸中有水下行作漉漉聲蓋此證腸中必有阻塞不通之處故謂之癰癰者壅也然則不開其壅寧有濟乎病根未拔仍宜前法減輕生川軍三錢丹皮五錢桃仁五十粒當歸五錢冬瓜仁一兩赤芍五錢芒硝二錢沖敗醬草五錢杜赤豆四兩煎湯後入前藥佐景按史君服此方凡二日計二劑夜間皆大下甚至疲於奔波床第與便具之間所下除河泥狀汙物外更有白色之膿水下此水時每作劇痛史君自曰計吾三日夜所下之物當已滿一器有半吾腹雖大乃何來若許汙物斯亦奇矣第三日史君服此原方余親訪之於其私宅史君曰我昨未告老師以所下之物如河泥狀而老師立案乃徑曰必化為黑色之河泥噫何其神也余笑頷之因憶某日有徐先生先生亦嘗從師遊者嘗來謁師曰家慈以腸病棄養矣時余以事遠羈他方未克侍側中醫以藥攻之不下西醫剖開腸之一角見腸中所蓄非為燥矢乃盡屬如河泥狀之物於是施術取去汙物病暫愈乃不幸又二月餘而棄養於此可見西醫之治療腸癰雖見效於一時而終不足恃忽其本而務其末倘死者有知能不飲恨九泉乎坐談有頃因詢史君以得病之由曰昔年患病常不服藥家嚴篤信仙佛每以香灰令服病因其在此乎但斯時史君所下者已由黑色漸變為紫紅之咖啡色矣三診兩進加味大黃牡丹湯腸中宿垢漸稀惟臍右斜下近少腹處按之尚痛則病根尚未盡去也仍用前法減硝黃以和之粉丹皮一兩冬瓜子一兩生苡仁一兩桃仁泥五錢敗醬草五錢京赤芍六錢生甘草二錢當歸五錢桔梗三錢杜赤豆四兩煎湯代水佐景按史君服此凡六劑所下之物漸由咖啡色轉為綠色而綠色之中更雜有如蠶砂之黑粒少腹痛處較瘥惟上行之筋反覺微微牽引不舒六劑之後停藥二大乃行四診四診腸癰近已就全惟每日晨起大便患處尚覺脹滿恐系夙根未除然下經多次血分大虧時時頭暈脈大虛象也當以補正主治佐以利下焦水道大川芎一兩全當歸五錢大熟地四錢春砂仁一錢赤白芍各三錢豬苓三錢明天麻四錢陳皮三錢澤瀉二錢生白朮五錢冬葵子五錢佐景按史君服此補正分利之劑後前之大便時痛者今已不痛矣且其前色綠者今亦轉黃矣惟七分黃之中仍有三分綠耳史君前有遺精宿恙此時又發或系本方分利藥太重之故歟惟遺後絕不疲勞則亦無妨焉瘥後史君踵予道謝曰承先生等診視吾之惡疾已全愈矣溯我未遇先生之前歷訪中外名醫祈禱遠邇神祇二年於茲所費時間金錢不可數計顧又以此辭業未獲小效苟早知先生則二年之劫運豈非可免乎雖然今日若是亦不幸中之大幸矣史君又曰我以老師之方示我親友親友無不咋舌以劇藥而用劇量彼輩未之前睹也余曰劇藥所以治劇病方今舉世滔滔病家之訟醫家者日有所聞故時流習為輕劑馴至劇藥無敢嘗試劇病無由以起悲夫佐景又按惠甫曾大病三次皆屬於腸本案所載乃第一次也其後二次亦由吾師生共愈之悉詳第二集中嗣是惠甫識醫藥之保身乃毅然棄業從師習醫寒暑尚未三易而惠甫已成醫界通人矣故我稱惠甫或曰先生或曰君或曰師兄者先後關係不同故也茲姑悉仍其舊第七八案腸癰其二穎師醫案陸左初診痛在臍右斜下一寸西醫所謂盲腸炎也脈大而實當下之用仲景法生軍五錢芒硝三錢桃仁五錢冬瓜仁一兩丹皮一兩二診痛已略緩右足拘急不得屈伸伸則牽腹中痛宜芍藥甘草湯赤白芍各五錢生甘草三錢炙乳沒各三錢佐景按俗所謂縮腳腸癰者此也吾師移傷寒之方治要略之病神乎技矣三診右足已伸腹中劇痛如故仍宜大黃牡丹湯以下之生川軍一兩芒硝七錢沖桃仁五錢冬瓜仁一兩丹皮一兩拙巢注愈佐景按本案陸左患足拘急因獲治而伸有一杇者足本得伸因誤治而致拘急兩者相映成趣令人捧腹杇者鄒姓性情滑稽常喜據丹方小冊以自治己病一日發熱體痛無汗意求汗出聞友人言糯稻根癟桃干可以治汗出不止竟誤會其意取而服之於是右足遂攣其妻扶之叩師門請診師睹其突梯之神情不禁大笑腸癰病證變化多端上述各案尚不足以盡其情吾友蔣冠周君偶抱孩上下階沿不慎稍一驚跌頃之心中劇痛不可耐次日痛處移於少腹右旁盲腸處醫以定痛丸止之而不能治其病其令正來囑余診余適以感暑臥床薦就吾師治吾師予以大黃牡丹湯加減二劑將愈不知何故忽又發劇痛如前改就西醫診用藥外敷約十餘日徐徐向愈自後盲腸部分有一硬塊如銀元大隱隱作痛按之更顯蔣君以為病根猶在慮其再發意欲開刀作一勞永逸之計餘力止之用陽和膏硇砂膏加桂麝散等香竄之品交換貼之一月而消此一例也盛熙君嘗患腹中隱痛時差時劇者三年余以四逆散愈之竟不復發一年後某夕賁臨坦然曰吾腹中不舒請疏方持脈未畢腹痛大增甚至呼號傴僂列方未畢痛竟不能耐急呼汽車由他友伴送之歸藥為理中加味疑其中寒也藥後即大嘔吐繼之以血終夜反復不獲一寐次日往診自謂腹中痛差盲腸處轉痛余知其病情與上案蔣君彷彿乃以輕劑大黃牡丹湯微下之三日踵余道謝能久坐戲劇院觀賞電影矣此又一例也曹穎甫曰腸癰一證舍大黃牡丹湯以外別無良法千金腸癰湯雖與此方大略相似而配合猶未盡善但有時藥雖對病而治愈正未可必嘗治莊翔生次妻張氏屢用本湯攻下而腰間忽起流火以至於死考其原因實由平日有鴉片癮戒菸後不復吸菸常用燒酒浸鴉片灰吞之以至腸燥成癰下後鴉片灰毒內發遂發流火以至由腫而爛終於不救要不得歸咎於方治之猛峻也歐陽文忠述其先德曰求其生而不得則死者與我皆無憾也吾願同學諸君奉此言為圭臬第七九案腸癰其三穎師醫案周小姐住小西門復發初診大便不甚暢行自以他藥下之痛而不行仲師所謂非其治也今擬用承氣湯加桃仁主之生川軍三錢後入枳實四錢川樸二錢桃仁四錢芒硝二錢沖佐景按周小姐先於本年五月間病腸癰經吾師暨俞哲生師兄後先治愈體健回校肄業至十二月間因運動過度飲食不節前之盲腸患處又見隱痛大便不行乃市某西藥房所制之丸藥服之冀其緩下孰知僅服二丸便不得下痛反增劇不能耐自悔孟浪無已仍請吾師賜方即本案復發初診方也服後便暢下痛大除惟有時按之還作小痛耳越日乃來二診二診昨經下後舊時患處按之尚痛脈弦而數用千金腸癰湯以和之粉丹皮三錢丹參三錢白芍三錢生地黃五錢生甘草一錢敗醬草三錢茯苓三錢生苡仁八錢大麥冬五錢桔梗一錢柏子仁一兩佛手二錢生薑三片佐景按周女士來二診時余方恭侍師側師令余按脈得弦細而數察其面色似未甚榮潤惟據述痛已大減無任私慰師令余擬方余曰千金腸癰湯差足以和之承賜諾即用焉以其下經多次故不加大黃以其夜寐不安而性易躁怒故加柏子仁以其偶或氣鬱不舒故加佛手以其經欠調故仍用丹參藥味既多竟不似吾師之方矣相與一笑周女士服此二劑大覺舒適夜寐竟安聞師將返江陰度歲重來乞調理長方余乃知之稔本案似無多大特色不足錄惟以其可以示覆發及調理之一格故附焉雖然周女士初病之經過極曲折僥倖之奇觀容續述之以博一粲先是五月間周女士病腹痛偏右就診於中醫孫先生孫先生與以理氣定痛之劑續治二月有餘不見效改請西醫王先生診察究系何病斷謂盲腸炎欲求根治當用手術病家不敢從命乞施別法西醫乃用冰罩其患處痛止周女士得仍回校中攻讀未逾十日病又作倍劇於前至是西醫堅決主張用手術且謂時不可失後將無及相與議定手術費銀若干兩但須家長簽字即可實行此時也適周女士之父因事在杭接家報如此云云急覆電謂待我返再議而女士之痛已不可忍且拒按右足不能伸證情岌岌不可終日周母無主惶急異常會有戚祝先生至曰何不請中醫治周母曰中醫之方積疊成簿惟其不能治乃請教西醫耳曰我有友人或能治此曷請一試於是俞哲生師兄應運而出晚七時許診之灑淅惡寒口渴脈弦滑而數苔抽心而絳邊反白膩急疏大黃牡丹湯加味內用生大黃三錢周母急令購藥煎服待其服已俞師兄乃返寓夜十一時周先生忽作不速客訪俞兄驚問曰生大黃竟可服至三錢耶我昔延請之孫先生用藥數十劑僅末劑有蜜炙大黃五分俞兄問服後病情曰腹加痛矣將奈何俞兄慰之周先生曰姑待我返舍看變化如何倘不幸轉劇我必以電話相告未越一小時俞家之電話鈴聲果響諸君試思之俞君為一執業未久之醫士當時聞此丁丁之鈴聲將生若何之心理然而事出望外但聞周父曰病者得下而足已伸矣續診三次頗告順手並知服第一劑後下如血筋等汙物服第二劑後下瘀血服第三劑後下血水服第四劑後竟得黃色糞其日適值病者經來病情未免夾雜當延老師診治視已師曰病根未除也依然用下劑晚六時服藥其夜病者竟作瞑眩四肢厥逆冷汗出下經六七次至天亮痛休自是方真入坦途了卻無限風波至於瞑眩之夜周父額汗奔波叩師門以問計者又當在智者意料之中也本集編按既竟余又診得一盲腸炎病即腸癰也病者為友人陳君子良弟名國楨年十五肄業城內一粟街尚文小學六年級住大南門電話局後寶隆里六號國楨攻讀至勤因家離校稍遠每飯已輒匆匆赴校日以為常二月一日子良邀余診視據述已經西醫陳天樞先生詳細診察指為盲腸炎並曾注射退熱劑之藥及用安福消腫膏因病勢急似尚未見速效大便四日未行小便短赤絕不欲食常屈足而臥每痛作輒不耐云云余以手按其患處適在所謂馬克孛內氏之壓痛點即自臍至右腹角高骨引一直線此線與右直腹肌邊線相交之點是亦即近前線之中點自起病至今已四日矣家人見病不退且知按諸西醫法當用手術方得根治但恐發生危險故未敢冒昧嘗試當時余初診方用生川軍二錢粉丹皮二錢桃仁泥四錢元明粉錢半分沖京赤芍三錢敗醬草錢半生苡仁一兩香穀芽三錢二日復診知一日服藥之後得下三次悉屬穢濁不堪之物腹痛隨減按之亦不甚痛又能進粥大佳方用生川軍錢半粉丹皮三錢桃仁泥二錢冬瓜子四錢元明粉一錢柏子仁四錢赤茯苓三錢生苡仁一兩光杏仁三錢生甘草錢半三日三診知二日夜中亦下腹中甚適言語漸有力舌苔漸清淨小便之色漸淡予粉丹皮四錢敗醬草二錢桃仁泥二錢冬瓜仁四錢生苡仁一兩柏子仁五錢火麻仁四錢光杏仁三錢赤茯苓三錢紫丹參二錢香穀芽三錢生甘草二錢四日四診知三日夜中大便較難而痛苔膩脈弦料其內熱未除急予制川軍錢半粉丹皮二錢桃仁泥錢半冬瓜子四錢元明粉一錢二分生苡仁一兩京赤芍三錢藿香錢半佩蘭錢半生甘草錢半燈心三札五日五診量得體溫三十八度一脈搏八十二至舌苔前部較清後部仍膩盲腸部得按依然作痛每夜必自痛劇甚至呼喊藥用生大黃二錢牡丹皮三錢桃仁三錢芒硝二錢枳實錢半厚朴三分當歸尾錢半京赤芍三錢生苡仁一兩炙乳沒各一錢六日六診病家疑懼子良謂大便日日得下痛苦依然未除如何堪長用攻藥得毋壞其腸伯母尤焦慮因所育子女凡十人以小恙而折者凡五皆得病輒延醫延醫輒不治此番愁眉自在意中獨老伯慶齋先生供職於楓林橋市政府地政局是日特告假商診拜聆之下知為識者老伯意加重攻下之品一面請西醫施止痛針余難加可否量其身熱升作三十八度七時當下午三時計其脈搏得九十至精神較昨困頓脈亦無力舌苔又呈膩象並見咳嗽不爽不思納穀雖痛之次數較稀綜察全證殊難樂觀欲向吾師請教而吾師適已返江陰度舊歲欲薦他醫以自代病家又慰留勿許默思責任之重大證情之棘手無異孤軍苦戰草木皆兵閱者試設身處地為余著想居此險境將何所施其技殊不知當此進退維谷疑難莫決之際正醫者煉膽煆心之時煉何膽煉大膽也煆何心煆細心也余乃整襟危坐凝神沉思夫病為盲腸炎的證藥屬盲腸炎主方投之未得捷效者以其蚓突中當有汙物未出即吾師所謂病根未拔也每作陣痛者即蚓突力拔病根時也精神反疲體溫反高下午三四時許本較高脈搏反數者以病既延久正氣隨虛也然則急起直追何容踟躇因將原方去枳實加生黃耆錢半生甘草錢半杏仁三錢藿香二錢改厚朴作五分七日七診病情竟急轉直下身熱退至三十七度六脈搏減至七十六至苔大化納突佳余驚問其故據述六日晚服藥後上半夜呼痛特甚倍於疇昔惟子夜後即泰然睡去絕不呼痛天亮醒來其糞色作淡黃色異於前此之汙色黑色老黃色且其糞能沉器底不似前之但浮矣小便亦較清長因予生大黃一錢牡丹皮三錢生苡仁八錢冬瓜子五錢柏子仁三錢光杏仁二錢生黃耆二錢當歸尾錢半炙乳沒各八分赤茯苓三錢生甘草錢半八日八診體溫退作三十七度四脈搏減作六十七至此乃病後應有之現象盲腸部分已完全不痛且軟如左側能自由起立如平人又食而知味當予生大黃八分牡丹皮二錢生苡仁四錢大生地三錢生黃耆二錢潞黨參一錢當歸尾錢半炙乳沒各八分杏仁三錢生甘草錢半九日九診國楨能到前房坐案旁暢談不須余就床沿問切矣當從十全大補湯加減囑服二劑次日適值廢歷歲尾病魔乃隨年神俱去余於本病素加註意前年參觀同濟大學人體解剖展覽會時曾檢閱盲腸及蚓突之種種異狀至詳余並有一臆想即大黃牡丹湯可代西醫之刀與鉗且本湯能驅除蚓突中之汙物有刀與鉗之利而無刀與鉗之弊人初聞吾此言鮮不以為炫技欺世故我寧甘自藏拙自得國楨之診益信吾言不謬實告世人所謂盲腸炎者初起每非盲腸本身之發炎乃盲腸後部之附屬器官稱蚓突狀如小管者發炎耳腸中汙物之所以得入蚓突中者因盲腸部分腸內容物擁擠不堪不能上行以致從旁溢入蚓突耳服大黃牡丹湯即得瀉出汙物者因腸壁受藥力之刺激故能推送內容物上行平行下行以達肛門盲腸之處既空蚓突又得藥力之刺激乃返擠汙物於盲腸由是蚓突之炎以消而病以已故云本湯可代刀與鉗者乃言其藥力能刺激腸壁及蚓突使自起力量排出汙物耳執是以言寧不可信腸癰初起每有惡寒之狀國楨初得病時亦然故金匱瘡癰腸癰浸淫病脈證並治篇第一條即曰諸浮數脈應當發熱而反灑淅惡寒若有痛處當發其癰內而反灑淅惡寒大堪著目世人竟有誤認為瘧疾之初起者又發字諸家多鑿解竊意內癰生於體內無從目睹當其初起之時甚不自知病所何在故曰若有痛處則當發其癰者猶曰當覓其癰蓋發猶發現之謂也金匱曰腸癰者少腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒其脈遲緊者膿未成可下之當有血脈洪數者膿已成不可下也大黃牡丹湯主之歷來注家對於膿已成不可下也一語殆無異辭甚且以此為大黃牡丹湯與薏苡附子敗醬散主治之分野此殆不思之過也金匱所謂未成已成之膿所包至廣一切炎性滲出物腐化之白血球腐爛之腸壁皮肉等均是要在當去之例一也夫腸癰當未成膿之前曰可下之試問欲下者何物依余之說下其腸中一切汙積使蚓突得擠出病根是矣當已成膿之後反曰不可下之試問其膿作何處置將使膿復返為血乎此乃絕無之事將任膿突臍而出乎此乃速死之圖方伎雜誌略云一商家女中略自腹以至面部四肢悉腫少腹右方之底有釀膿因思取膿則可保十日以此告病家病家相驚吐舌謂前醫皆不知有膿但云補藥以助元氣則水氣自治耳遂乞施針余曰針則至多延命一月取膿則十日但識病在醫而死生任諸天數姑針之可也遂用鈹針刺入寸許膿汁迸射上及承塵臭氣撲鼻病家人人驚愕乃與薏苡附子敗醬散瘡口納細棉條以出瘀膿然其人元氣漸脫十一日而斃可謂一證猶曰薏苡附子敗醬散主之試問服散之後散能與膿起化學作用齊化為烏有乎吾懼其未能也若曰散將與膿結而俱下則依然是下法烏得曰不可下或曰不可下者猶言不勝下下之終危也余則謂果下之猶不失背城借一之計不下即是束手待斃之策孰得孰失明眼者自能辨之況膿去正虛大可用補活法在人寧難善後故竊於不可下三字大起疑惑即使的系仲聖遺文猶當據事實以改正之如何改正曰當作當急下也又經文稱本病小便自調按之事實不爾改正之責委之賢者金匱大黃牡丹湯方後曰頓服之有膿當下如無膿當下血本已昭示後人無膿當下有膿當急下悉主以本湯之意人自不察耳以病例言本集腸癰案其一史君之大下河泥狀汙物其三國楨之下穢濁不堪物皆有膿當下之列吾師金匱發微本湯條下師母之下血半淨桶及本集腸癰案其三周女士之下血筋瘀血血水等物皆無膿當下血之例是故下血云者此乃當下之惡血血去則病除絕非失血之謂也客曰審如君言薏苡附子敗醬散將無用武之地矣答曰非也特其用武之時不同耳余有本湯治驗一案頗富趣味容詳本錄第二集中但二方不同之點當稍述一二以快客之先睹依金匱法腸癰實分為二種一種為熱性者為大黃牡丹湯所主一種為寒性者為薏苡附子敗醬散所主熱性者多急性寒性者多慢性熱性者痛如淋寒性者痛緩熱性者時時發熱寒性者身無熱熱性者常右足屈患起於瞬時寒性者則身甲錯恙生於平日熱性者屬陽明故大黃牡丹湯即諸承氣之改方寒性者屬太陰故薏苡附子敗醬敗乃附子理中之變局且散與丸為近熱性者病灶多在盲腸寒性者病灶不限於盲腸能知乎此則二湯之分明矣客憬然若悟鞠躬而退西醫治盲腸炎初起用冰罩其患處可以暫遏病根略退炎灶不久以後炎灶復生病勢反劇於是注射退熱劑而熱不退注射止痛劑而痛不止蓋皆治標之法無裨實際故也其惟一治本之法厥為動手術諸君請閱斷腸續命記載本集附錄中即知動手術之危險為何如陳慶齋老伯見告云近者一人患盲腸炎受割治割口縫成後依然作痛查知有一小塊藥棉留腹中忘未取出再開刀卒不救云云此又動手術之意外枝節也然則西醫何不用下法意者最初西醫之治本病原用下法但多致腸穿孔出血而死後遂醫醫相誡故至今無復有敢議下者然則中西醫同用下法而死生之分又何徑庭蓋下其所謂下非吾之所謂下也實言之大黃牡丹湯之下下中帶消炎之意本經謂大黃盪滌腸胃推陳致新牡丹皮除瘀血療癰瘡即是此意而彼之下藥或仍系金石熱品以熱攻熱無怪腸壁穿孔得此一說吾惑庶解今有西醫於此採取吾說選用能消炎之下劑以治盲腸炎使其得效余樂聞其言使其僨事余恕不負責欲策萬全之道請用大黃牡丹湯曹穎甫曰無錫華宗海丁甘仁之門人也曾於十年前患腸癰往醫院治療同時患腸癰者三人二人先行破腹皆命隨刀盡宗海聞之懼無如已經簽字無從反悔最後某西人以學徒手術不精自行奏刀將盲腸之闌尾割去縫好幸得生全是殆有命存焉雖然令前解剖之二人或不入醫院用大黃牡丹湯治之吾知其未必致死於此而不歸咎於人事之失不可得也第八案肺癰其一穎師醫案師曰辛未七月中旬余治一陳姓疾初發時咳嗽胸中隱隱作痛痛連缺盆其所吐者濁痰腥臭與懸飲內痛之吐涎沫固自不同決為肺癰之始萌遂以桔梗湯乘其未集而先排之進五劑痛稍止諸證依然脈滑實因思是證確為肺癰之正病必其肺臟壅阻不通而腐腐久乃吐膿所謂久久吐膿如米粥者治以桔梗湯今當壅塞之時不去其壅反排其腐何怪其不效也淮南子云葶藶愈脹脹者壅極不通之謂金匱曰肺癰喘而不得眠即脹也千金重申其義曰肺癰胸滿脹故知葶藶瀉肺湯非瀉肺也瀉肺中壅脹今有此證必用此方乃以葶藶子五錢大黑棗十二枚凡五進痛漸止咳亦爽其腥臭挾有米粥狀之痰即腐膿也後乃以千金葦莖湯並以大小薊海藻桔梗甘草杜赤豆出入加減成方至八月朔日先後凡十五日有奇用藥凡十餘劑始告全瘥九月底其人偶受寒涼宿恙又發乃囑兼服犀黃醒消丸以一兩五錢分作五服服後腥臭全去但尚有綠色之痰複製一料服之乃愈而不復來診矣佐景按本案並略見金匱發微後歷檢吾師醫案乃得本案之先後全方兩相對照更易昭然特再附諸方於下諒閱者當不嫌重複也陳左住浦東陸家渡初診七月十二日肺癰咳嗽胸中痛上連缺盆而所吐絕非涎沫此與懸飲內痛者固自不同宜桔梗甘草湯桔梗五錢甘草五錢二診七月十八日五進桔梗湯胸中痛止而左缺盆痛此肺臟壅阻不通也宜葶藶大棗瀉肺湯葶藶子五錢黑大棗十二枚先煎三診七月二十四日五進瀉肺湯左缺盆痛止痰黃厚時見腥臭及如米粥者此濕邪去而燥氣勝也宜千金葦莖湯鮮蘆根四兩生薏仁一兩桃仁五十粒冬瓜子五錢四診七月二十九日服千金葦莖湯五劑後咯出之痰腥臭止而如米粒者亦除惟痰尚黃厚肺癰消而胃熱尚盛也右三部脈浮滑不復見沉弦之象可以無後患矣粉前胡三錢生苡仁一兩桔梗三錢生草三錢冬瓜子八十粒桃仁三錢杜赤豆六錢大小薊各三錢海藻二錢蘆根五兩拙巢注服此二三日全愈續發初診九月二日肺癰愈後復發咯痰腥臭見血心下痛咳時氣從中脘上衝宜清膽胃之火防其乘肺柴胡三錢生石膏二兩生甘草三錢淡岑三錢肥知母五錢生苡仁一兩蘆根四兩冬瓜仁一兩桃仁三錢杜赤豆一兩全當歸四錢二診九月十日肺癰未能斷根咯痰腥臭如昔但不似米粥耳痰不黃而色綠味酸咳不甚脈細數仍宜桔梗甘草湯不當攻伐佐以消毒以清病原桔梗一兩生甘草五錢冬瓜仁一兩昆布一錢五分海藻二錢大小薊各一錢五分前胡三錢犀黃醒消丸三錢另服拙巢注後不復服藥專服犀黃醒消丸愈醒消丸系王鴻緒法馬培之頗非議之然用之而效則馬說不足信也佐景按夫肺癰重病也仲聖云膿成則死今本案病者膿成而腥臭吾師乃能愈之豈吾師之術邁於仲聖乎非也所謂則死者極言其危而教人藥量之不可輕也夫桔梗今人僅用數分至一錢葶藶今人少用之用之亦不出數分葦莖今人通常用一尺今吾師用此三者乃至五錢五錢五兩不其駭人乎雖然此皆仲聖之教也余仍恐膿成亦可愈之難以信人也姑引他醫之醫案一則如下以為佐證新建熊廷詔老醫作內癰治療記曰肺癰一症金匱謂膿成則死但病者別臟器官尚強而單單肺臟局部潰爛尚可救治民國十九年國民革命軍陸軍第三十四旅駐節施南有羅連長樹成者黔之松濤人年約三十於夏月初出防建始縣患熱症被醫者誤認傷寒用大辛大溫之藥以致攻爛肺之左葉每咳嗽則左脅前後皆痛吐出臭膿敗血五六尺外即聞其穢氣遂轉施南初求西醫診治聽診觸診檢溫檢尿精詳殆遍未及三日即云萬無生理為之宣告死刑病者絕望其同事李秘書勸就中醫診治遂延一同道診之其人無經驗懾於膽邀余會診初會面病者即求決生死余見其皮膚尚潤澤聲音如常詢知飲食尚佳二便尚和即答之曰肺癰一症醫聖張仲景斷為膿成則死今閣下吐出皆膿血余何人斯敢云能活但詳觀外貌潤澤肺部似未全枯耐煩服藥調治或能挽回但不居功不任過耳羅曰先生能治好歹決無怨言余遂詳診其脈滑數且實右手更洪即認定為肺癰參用金匱葶藶大棗瀉肺湯桔梗湯大黃牡丹湯千金牡丹皮散出入加減總不使其大便秘結則肺熱有下行之路前後服藥八十餘劑另用西洋參代茶亦服至半斤時至百日之久膿血方淨一切如常但每咳則左脅前後隱隱尚痛即以白及為末用米飲沖服每日四錢共服八九兩其病始告全愈次年回黔來函道謝二十二年來函竟升團長矣可見治病要在醫者統察全局胸有把握若拘拘於膿成則死誤矣當其初求余診之際一般西醫皆謂此病由中醫治決死無疑如不死願斷頭余潛心精究毫不為動及余治全愈羅旅長謂諸西醫曰爾等拿頭來若輩噤若寒蟬此病終算戰勝西醫一次爰公開告吾同道以供討論固非炫己之長耳又曰今年五六月間余在施恩救濟院施醫所診一漆匠名黃玉林年四十貧苦無依患肺癰吐出臭痰膿血氣達六尺以外其痰落地須臾發酵高至六七分成花泡咳嗽則胸中隱隱作痛飲食衣服皆不適體淳于公所謂六不治已居其半余令自採蘆筍茅根煎水常服仍依治羅樹成法出入為方經余贈藥九劑幸告愈可見苦同胞飲茅蘆水亦有洋參之力堪作醫林經驗之一助又余每遇貧人肺熱囑食豆漿豆芽湯亦往往作焦頭爛額之客聖方平易不尚珍奇當茲經濟破產時代凡吾同道在可能範圍內當為民眾省節金錢莫謂非本責而不顧也錄光華醫藥雜誌三卷二期熊老醫士大膽細心誠是吾輩後學者之導師要略曰風傷皮毛熱傷血脈風舍於肺其人則咳口乾喘滿咽燥不渴多唾濁沫時時振寒熱之所過血為之凝滯蓄結癰膿吐如米粥始萌可救膿成則死由此可知肺癰之病源為熱其病狀為先唾濁沫後葉膿血濁沫者肺津為熱熏灼所成也膿血者津盡甚至肺體腐化也又曰咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗湯主之由此可知桔梗湯之所主者為肺癰之初成時出濁唾腥臭必久而久之方吐膿如米粥非初時吐膿如米粥也又曰肺癰喘不得臥葶藶大棗瀉肺湯主之又曰肺癰胸滿脹一身面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞者葶藶大棗瀉肺湯主之後人見此二條無膿血字狀竟以本方專為逐水之劑非有膿血也乃失仲聖原旨矣夫曰胸滿脹試問其所脹者何物非肺津肺體化為膿血而何曰喘鳴迫塞曰不得臥試問其故安在非肺體腐化不能營其呼吸之工作而何況仲聖之筆法多有詳於彼而略於此者故桔梗湯條既曰久久吐膿如米粥者為肺癰葶藶大棗湯二條即但言肺癰而隱含吐膿血於其中矣又曰千金葦莖湯治咳有微熱煩滿胸中甲錯是為肺癰按煩滿讀如煩懣煩懣者肺中微熱之初生似尚未灼爍肺津為腥臭之濁唾也故葦莖湯所主之候還在桔梗湯之前由是觀之以上三湯殊有輕重層次之分葦莖湯最先而輕桔梗湯為中葶藶大棗瀉肺湯最後而重姑以方譬方則葦莖湯猶如白虎湯桔梗湯猶如調胃承氣湯葶藶大棗瀉肺湯猶如大承氣湯今有陽明腸胃病者於此大便不行醫試以調胃承氣小瘥而未愈於是與以大承氣遂大下而病瘥顧胃熱未楚乃以白虎奏全功此事實所許可者也故吾師本案先用桔梗次用葶藶大棗末用葦莖其義殆亦猶是未知吾師之意云何凡酒客煙徒大便久秘者最易生肺熱內經以肺與大腸相表裡殆千古不刊之論本案所引熊老醫士之言曰總不使其大便秘結則肺熱有下行之路實經驗有得之談余嘗治前上海晨報館編輯曹陶成先生夫人患恙已久其證每當清晨睡未醒即盜汗汗後周身覺冷踡臥被中略似桂枝加龍骨牡蠣湯證然而非是此乃肺癰條之所謂振寒也蓋詳察之大便燥結三日一行小溲覺熱脈弦數咳吐膿痰胸中隱隱作痛經事先期而至作紫色日晡必發潮熱五中煩熱夫人自分肺病疾不可為愁眉緊鎖者多日矣余曰毋慮可治也用葦莖湯為主方以治其肺熱加青蒿白薇地骨皮以退其潮熱加丹參丹皮益母子以調其經期二診四劑諸恙均瘳此即後人之所謂陰虛虛勞實則要略所云肺癰初起之證也更有桔梗白散合桔梗貝母巴豆而成其力更峻經文雖曰桔梗湯疑其有誤本散非但可以治重證之肺癰且可以盪滌一切頑痰壅塞在膈上者能使之吐在膈下者能使之瀉東人多有用之者吾不願國內之大醫反棄而勿道之曹穎甫曰肺癰一證咳吐時胸中必隱隱作痛所吐濃厚之痰雜以如米粥者至地甚有力漸乃發酵成氣泡不復平塌地上蓋胸中熱如沸湯蒸爛肺之本體然後吐出如膿之痰則所吐之物其中實有蒸氣熱力故吐出而發酵也此熊醫士所見者予亦親見之若夫脈之滑大沉實與夫大便之燥結則本證均有之吾他日得遇熊醫願為之香花頂禮為其能為吾醫界中放大光明也肺與大腸為表裡在今日醫林中已成口頭禪而肺癰用腸癰方治實為破天荒作用要不失為仲景遺意即如痰飲肺病也而懸飲內痛支飲不得息則用十棗湯以下之結胸肺病也則用甘遂大黃芒硝以下之要之燥氣在下則肺臟必受熏灼非用釜底抽薪之法不足以清上炎也第八一案肺癰其二穎師醫案吳冠明小姐住上海法租界華成路六號佐景按吳君大鏞余友也其第二女公子名冠明年十歲肄業小學校中本年二十五年七月三日忽感不適自言胸中痛約於十日左右就診於上海廣慈醫院醫與內服藥兼用藥水揩胸部續診一星期許胸中痛少止而身熱咳嗽仍甚十七日起在家自服種種養肺成藥至二十日無效是日夜間發熱更甚竟夜不能睡甚且號哭二十一日上午重返廣慈醫院請檢驗醫囑住院療治但卒未果即回家二十二日就診中醫張君斷為小傷寒其方案曰時邪感肺痰濕交阻咳嗆不爽肌熱頗甚脈滑數法擬疏解豁邪候正香豉三錢嫩前胡錢半蟬衣八分木蝴蝶四分浙貝母去心三錢五分橘絡一錢生苡米四錢款冬花一錢八分鮮佩蘭一錢桑葉錢半絲瓜絡錢半竹茹錢半二十三日二診方案曰熱勢夜甚咳嗆脅痛夜難安睡脈數舌絳時溫挾痰濕交阻再以宣解為治恐劇候政炒香豉三錢白夕莉二錢浙貝母去心三錢蟬衣八分光杏仁三錢路路通五個生苡米四錢通草一錢嫩前胡錢半雞蘇散三錢包荷梗尺許竹二青錢半服後痰出漸呈臭味二十四日三診方案曰熱勢較昨已淡咳嗆頗甚脈滑數苔膩溫邪挾痰濕遏肺再進昨法加減候正香豉三錢鮮佩梗錢半蟬衣八分雞蘇散三錢包浙貝母去心三錢五分紫菀錢半光杏仁三錢白夕莉二錢木蝴蝶五分前胡錢半荷梗尺許炒竹茹錢半二十五日四診方案散佚共四診至是熱加甚撫之烙手咳亦甚每作則痛劇徹夜不安甚至昏厥乃由伊母手抱竟夜二十六日延西醫胡先生診斷為肺炎用安福消腫膏外塗胸部又注射藥水二種一以退熱度一以滋營養如是三日熱略退顧退後熱又高痛咳未減不能平臥但坐喘鳴迫急肩動以助呼吸是為肩息胡先生恐變急性肺炎囑另請高明八日上午急送紅十字會醫院陳醫師診為肺膿瘍應用手術當夜住院九日照光一次審知左肺無恙右肺因肋膜太厚不能成影十一日早又照光一次下午又照一次所以在上下午分行者因清早膿未出下午膿已吐冀比較其不同之情形故也不料所得底片二紙毫無異狀爾時所吐膿痰之屬積之每日可得三五小罐醫與魚肝油等補劑冀其體力略佳以為施手術之張本並經驗血二次似未有結果小兒科主任陳醫師主張用人工氣胸術使肺部壓小以便抽膿但可否實行還須先照光決定病灶後再議乃由肺科主任劉醫師重照光所得結果仍為左肋骨明晰異常右肋骨部分底片上全部發白斷為肺與肋膜相接過緊不可施人工氣胸術終非開刀不可且須去肋骨一條以便出膿但究應取去何條肋骨仍賴光之照取法用一種顏色油從氣管打入肺部如是再照光時即易顯出肺爛之處乃可就肺爛最近之處取去肋骨據云此種顏色油以後自能吐出不妨病體惟動手術前例須病者家長簽字吳君夫婦籌思再三終簽字與之時八月十三日下午二時也六時許冠明得知次日將受手術並須吃顏色油心滋不悅憂形於面婉懇勿爾吳君夫婦不忍拂其意乃向醫師婉請撤回簽字但仍住院以求別法診治醫師勉允之十五日值星期六夜吳君忽聞友人言肺癰一病中醫亦有辦法但須服藥已足不必動手術較為安全十六日為星期日吳君急早起奔至醫院婉懇領女回家調治醫院中人驚駭曰君何突然變策耶余等為令嬡之恙集會研究者多日已不知費卻幾許心血佐景注此言絕非虛語我實深信是以該院歷來信譽卓著非幸致也所為者何無非求令嬡之速愈耳今者出院余等固無從施其技而令嬡亦安得獲其救耶吳君語塞辭以經濟困難問題醫曰本院原屬慈善性質此節可以通融辦理請勿慮終以吳君有外交折衝才能醫許之即於午刻出院回家時胸部右方已略覺高腫下午急請拙巢師出診案曰初診夏曆六月三十日肺癰已經匝月咳嗽咯痰腥臭夜中熱度甚高內已成膿當以排泄為主宜桔梗合千金葦莖二湯主治苦桔梗五錢生甘草三錢生苡仁一兩冬瓜子一兩桃仁六錢炙乳沒各二錢鮮蘆根半斤打汁沖服渣入煎犀黃醒消丸每服三錢開水送下佐景按吳小姐服此一劑咳即減次早大便即通向在醫院大便常閉醫用肥皂水灌洗方得糞水不能自下也本方連服三日每早大便均暢行師本囑連服四劑八月十九日佐景注拙按內悉用國曆又請師二診二診夏曆七月初三日原方去桔梗加葶藶子三錢炒研用黑棗去核包麻扎入煎佐景按吳小姐於下午三時許服初煎藥三刻鐘後忽然劇痛作大呼姆媽來抱吾瞬間氣喘目上視四肢厥逆冷汗出神識不清隨即昏去同時有一怪象生即其右胸患處約在乳部之上突隆起如拳大舉家驚惶不知所措半小時後神略清如醒回至六時又劇痛昏厥如前吳君於晚七時回家睹狀大駭急請西醫胡先生來診駕到約夜間十時主動手術謂服藥無效也未曾施治而辭迨夜十二時病者神志忽然清明呼啜熱粥果能進一甌胸前隆起者依然而痛卻漸定能安睡直至次早天明方醒熱漸退咳漸減吳夫人曰使非昨藥之功安得否極泰來耶即不畏其峻清晨八時復予二煎藥服後不復瞑眩夫人告余曰冠明自起病以迄服葶藶大棗前無一夜得安睡自服葶藶大棗後雖病無一夜不得安睡余為之驚異八月二十日守服原方毫無惡化現象二十一日三診三診夏曆七月初五日累服桔梗瀉肺二湯合千金葦莖病勢略輕仍宜前法加減生甘草五錢生白芍五錢生苡仁一兩冬瓜子一兩桃仁六錢桔梗五錢香白芷一錢炙乳沒各二錢輕馬勃五分敗醬草三錢葶藶子三錢炒研用棗包紮犀黃醒消丸每服二錢佐景按此方連服三日二十四日吳君以兒病漸減拳腫處亦漸平遂攜方至師家請予加減師減去白芷乳沒葶藶敗醬馬勃余依舊又連服三日二十七日吳君凝軒予藥一劑計生甘草五錢生白芍五錢生苡仁一兩冬瓜子八錢敗醬草三錢桃仁泥三錢桔梗二錢川貝母三錢忍冬藤三錢炙乳沒各錢半白及錢半覺藥汁膩甚八月二十八日予自鄉返申吳君急邀診視案曰肺癰延已二月刻診右肺外部依然隆起但不如向之如拳矣咳嗽不爽咯痰黃綠色咽中痛大便二日一行脈象細數擬排膿養陰合法請正生甘草三錢苦桔梗二錢大麥冬去心三錢天花粉六錢絲瓜絡五錢光杏仁三錢象貝母三錢冬瓜瓣二兩地枯蘿三錢二十九日承邀續診據謂昨方頗效案曰服藥後咳時加多膿痰加多按此種膿痰蘊積於內非排去之不為功刻診脈象數肩息未除咽中痛大便已行而堅病情尚在險途再擬前法加減鮮蘆根三根西洋參一錢生苡仁二兩苦桔梗二錢冬瓜瓣二兩光杏仁四錢絲瓜絡六錢地枯蘿四錢南沙參三錢生甘草二錢三十日吳君來謂身熱又減臭痰亦少堅請三診余以其脈雖細數一分鐘一百四十餘至不足慮獨息時左肩尚動思仲聖云上氣面浮腫肩息其脈浮大不治此雖非上氣病終不禁躊躇又以雜務紛集無暇抽身仍主請師續診九月一日吳君到師家商議問吉凶師慰之案曰肺癰業經出險但咯痰尚濃兼有微熱仍宜前方加減生甘草五錢桔梗五錢桃仁泥二錢生白芍五錢瓜蔞皮仁各三錢生山梔錢半另服醒消丸每服二錢此方服後又有進步九月二日夜中不知何故忽云心中劇痛隨嘔出鮮紅之血約半小杯隨續吐出數次吐後神疲納呆又不能安寐三日吳君急到師家乞診值師玉體不豫乃口報藥味由湘人師兄錄之方曰嫩射干三錢白前三錢桃仁泥二錢生甘草三錢生白芍五錢枳殼一錢全瓜蔞六錢切桔梗一錢制香附三錢生山梔三錢另服醒消丸每服一錢下午二時進初煎六時進二煎夜十一時痛即定次早起痛全除眾驚藥之速效竟至於此也五日師健步命駕出診案曰四診夏曆七月廿日肺癰無腥臭之痰病已出險但時吐濁痰膠黏黃厚當從千金皂莢丸法改湯以治之蓋濁痰不除咳必不能止也牙皂末五分用黑棗去核包煎佐景按此方之藥值賤甚僅需銅元三枚而已藥鋪中先生微笑曰此能愈疾乎吳君得藥仍取大黑棗先去其中核卻納入牙皂末用線扎棗兩端使勿漏出計需棗七枚已將牙皂末裝畢即煎與服服後竟又峰迴路轉別見柳暗花明陡有多許白膩之痰濁悉從大便出口中吐痰反少一如師預告非第此也前數日飲食常帶嘔意予曰嘔者胃不和也凡大病久病有胃則生胃不和則危此定例也今則非第不嘔而且胃納轉佳又能自起坐大便或為其他動作矣又前此臥不得左脅著席者今則能之所以然者前此右肺蓄膿方盛使用左脅著席則膿將壓諸其他臟器上因而不舒乎胸前隆起處前服三診方後即開始降落今乃悉平咳嗽時胸部不再牽痛又安福消腫膏自經西醫敷用即時常更換至此乃免除此方連服三日功效甚著自八日起又服前之懸擬方但去生山梔其中之醒消丸計守服迄今自三錢減為一錢猶未間也自是頓入坦途能食飯怕吃藥嬉戲如常矣二十九日吳君又叩調理之方師曰五診夏曆八月十四日肺癰已經出險而陰氣大傷宜千金黃昏湯昨日姜佐景亦云合歡皮如手掌大一塊用水三碗煎至一碗半作兩次服佐景按服此甚佳食量增而肌肉豐雖不時尚有微咳並帶薄痰是為病後餘波不足慮也本病有一特性即但惡熱不惡寒夫不惡寒但惡熱者為陽明病故吾曰肺癰者陽明病之一格也夫陽明病以清吐下為三大正治故肺癰之用葦莖清法也用桔梗吐法也用葶藶牙皂下法也經曰肺與大腸相表裡故大腸能移熱於肺夫知此方可以言治肺癰余更憶某日侍診師側一童子年可十二三矣隨其母來視童子解衣袒胸見其左肋骨處有瘡痕未斂其母曰此兒患肺病數載於茲先由外國醫生開刀去肋骨湧出膿痰不少自後即不能收口曾經西醫多人察視率無功後幸得收口結疤矣而胸部反痛劇不得已又將結口刺破導入藥線任膿流出則痛方止纏綿經年家資將罄如之何余視之慘然後未來二診不知究竟其母為吳產齒音明朗故印象殊深云閱者將以為西醫不能治病乎非也醫者不分中西倘得愈病常不惜任何犧牲以赴之遑論椎心嘔血而已哉故彼不為醫者決不解醫者之苦彼慣用輕劑或一遇重證即日另請高明之醫亦決不解肯負責治重證之醫者之苦先岳西垣童公於今歲八月歸道山先是客歲十二月間患大渴引飲日進大量果汁雪夜不識寒猶自開窗睡生平抱不藥為中醫之旨不信醫亦不自以為病至二三月間消渴更甚及至四五月轉為中消一日能進食七八次無飽意雖病根已深猶未能善自服藥尋而熱在上焦因咳為肺痿而後知肺痿之病從何得之師曰或從消渴小便利數一語確由實驗得之由此並知或從汗出或從嘔吐或從便難又被快藥下利重亡津液諸語悉由實驗得之我故曰傷寒卒病論者一部醫學實驗錄也尋而胸中隱隱痛熱之所過血為之凝滯蓄結癰膿吐如米粥知此為肺癰矣迨余返里省視則已大肉盡削惡聞食臭諸醫束手無策余亦勿能例外況其時因神疲納呆不得已稍進福壽膏以圖振作夫病本由亡津液而生安堪以膏火續爍之余見證狀已危乃用大劑葦莖合桔梗甘草加味咳爽膿出目得淚足能行初似略有進步繼乃又轉萎靡臨危前數日脈象怪狀迭出多非二十八脈所備者然後知仲聖謂始萌可救膿成則死者蓋排膿非難而膿排後生肌復原之實難也又何況期此於七十二齡之老翁哉嗚呼先岳碩德鴻儒詩書遺澤足啟來茲堂構相承克家繩武泉路有知似可含笑然而余在醫言醫則常耿耿有餘恨焉余恨者何曰不能如吾師之善用葶藶牙皂也為特詳志吾過以告世之治醫者又黃耆於本病有特效醫者不可不知曹穎甫曰凡治此證癰膿結聚肺部當開泄肺氣清其鬱熱為第一步及肺臟氣疏咯痰不暢則以決去癰膿為第二步及腥臭之痰出盡而膠痰之未成膿者尚吐之不已則以破除痰結為第三步及膠痰漸少肺之破碎處當用補救則以扶養肺陰為第四步惟補救之方推千金黃昏湯為最黃昏為合歡皮張璐玉稱其兩干相著即黏合不解取其黏性實足以補肺臟之罅漏而收其全功較世傳白及尤為穩當敢布腹心以告同仁按合歡為馬纓花花紅如馬纓五六月始開枝幹多連理予親見之蓋肺主皮毛此樹之皮彼此易為黏合故能補肺之綻裂也又按佐景謂肺癰病原實出陽明此說甚精確蓋腸胃燥實鬱熱上熏於肺則肺燥而膠痰生一日之燥氣不除則一日之膠痰不去久久熱傷肺臟因變癰膿故治之之法第一當開壅清熱其次則當破頑痰皆所以抉其壅也至如中消之證尤當破其壅結而清其胃熱重則承氣輕則人參白虎皆當用之否則肺液一傷甚則為癰輕即為痿佐景注肺痿又有屬於寒性者多為虛證治法迥異詳第二集童公之病實由於此竟致不起者未嘗不由此也可以為前鑑矣佐景又按余記本案既竟攜示吳君大鏞吳君閱畢乃書證明詞如下小女刻已全愈曹公再造之恩不敢忘也本案記載翔實無誤世有同病者知所抉擇矣特此附筆證明並表謝忱民國二十五年十一月吳大鏞拜志第八二案懸飲其一穎師醫案張任夫先生勞神父路仁興里六號初診二十四年四月四日水氣凌心則悸積於脅下則脅下痛冒於上膈則胸中脹脈來雙弦證屬飲家兼之乾嘔短氣其為十棗湯證無疑炙芫花五分制甘遂五分大戟五分上研細末分作兩服先用黑棗十枚煎爛去渣入藥末略煎和服佐景按張君任夫余至友也先患左頰部漫腫而痛痛牽耳際牙內外縫出膿甚多余曰此骨槽風也余嘗以陽和湯治愈骨槽風病多人惟張君之狀稍異大便閉而舌尖起刺當先投以生石膏涼膈散各五錢後予提托而愈越日張君又來告曰請恕煩擾我尚有宿恙乞診曰請詳陳之曰恙起於半載之前平日喜運動蹴球恆至汗出浹背率不易衣嗣覺兩脅作脹按之痛有時心悸而善畏入夜室中無燈炬則惴惴勿敢入頭亦暈搭車時尤甚噯氣則胸膈稍舒夜間不能平臥平臥則氣促輾轉不寧當夜深人靜之時每覺兩脅之裡有水聲漉漉然振盪於其間余曰請止辭我知之矣是證非十棗湯不治藥值甚廉而藥力則甚劇君欲服者尚須商諸吾師也君曰然則先試以輕劑可乎曰諾當疏厚朴柴胡藿佩半夏廣皮車前子茯苓清水豆卷白朮等燥濕行氣之藥與之計藥一劑值銀八角余服之其效渺然張君曰然則惟有遵命偕謁尊師矣翌日余徑叩師門則師診視張君甫畢並在立案矣走筆疾書方至脈來雙弦之句余問曰先生是何證也曰小柴胡也予曰不然柴胡之力不勝恐非十棗不效先生擱筆沉思急檢傷寒論十棗湯條曰太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞鞕滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之因問張君曰君氣短而乾嘔乎曰良然師乃顧謂余曰爾識證確所言良是也師乃續其案而書其方即如上載者是又按金匱曰脈沉而弦者懸飲內痛又曰病懸飲者十棗湯主之余嘗細按張君之脈覺其滑之成分較多弦則次之沉則又次之以三部言則寸脈為尤顯與寸脈主上焦之說適合以左右言則左脈為較顯蓋張君自言左脅之積水較右脅為劇也今當報告張君服湯後之情形張君先購藥價僅八分驚其值廉乃煮大棗拾枚得湯去滓分之為二入藥末一半略煎成漿狀物其夜七時許未進夜飯先服藥漿隨覺喉中辛辣甚於胡椒張君素能食椒猶尚畏之則藥性之劇可知並覺口乾心中煩若發熱然九時起喉啞不能作聲急欲大便不能頃刻停留所下非便直水耳其臭頗甚於是略停稍進夜飯竟得安眠非復平日之轉側不寧矣夜二時起又欲大便所下臭水更多又安眠六時又大便所下臭水益增多又睡至十時起床昨夜之喉啞者今乃愈矣且不料乾嘔噯氣心悸頭暈諸恙均減精神反佳張君自知肋膜炎為難愈之疾今竟得速效如此乃不禁嘆古方之神奇次日中午喉間完全復原下午七時夜膳如常九時半進藥棗湯即前日所留下者藥後胃脘甚覺難堪胃壁似有翻轉之狀頗欲吐一面心煩覺熱喉啞悉如昨日但略差可至深夜一時即泄水較第一夜尤多翌晨嘔出飯食少許並帶痰水又泄臭水但不多矣至午喉又復原能進中膳如常噯氣大除兩脅之脹大減惟兩脅之上乳偏下反覺比平日為脹張君自曰此脅上之脹必平日已有只因脅下劇脹故反勿覺今脅下之脹除故脅上反彰明耳而膽量仍小眼目模糊反有增無減但絕無痛苦而已吾人既知服後經驗試更細閱十棗湯之煎服法兩相參研乃知煎服法雖僅寥寥二三行而其中所蘊蓄之精義甚多煎服法曰右三味搗篩以水一升五合先煮肥大棗十枚取八合去滓內藥末強人服一錢匕羸人服半錢平旦溫服之不下者明日更加半錢得快下後糜粥自養觀張君之第一日先藥後飯而不嘔第二日之先飯後藥而嘔可知也先藥後飯較先飯後藥為愈亦安知平旦服之云者不飯而服之也較先藥後飯為更愈乎又云快下後糜粥自養則其未下以前不能進食可知實則下後糜粥自養較先後俱不飯者為尤佳此其第一義也曰不下者明日更加半錢而不言不下更作服可知明日二字大有深義即明日平旦之省文蓋平旦之時胃府在一夜休養之後機能較為亢盛故借其天時之利以與此劇藥周旋耳且一日一服不似其他湯藥之可以多服蓋一以見藥有大毒不宜累進一以為胃府休養地步此其第二義也強人一錢匕羸人則改半錢斤斤較其藥量倍顯慎重之意何者其義與上述者正同此其第三義也十棗湯以十棗為君亦安知十棗之功用為何如乎東人曰大棗甘草等藥功用大同而小異要為治攣急而已說殊混統不可從吾友吳君凝軒嘗歷考經方中大棗之功用稱其能保胃中之津液今觀十棗湯之下咽即起燥痛則甘遂大戟芫花三者吸收水分之力巨可知入胃之後雖能逐水驅邪然克傷津液在所不免故投十棗以衛之方可正邪兼顧又吳君謂十棗湯之服法應每日用十棗煎湯不可十棗分作兩服以弱保正之功其說頗有見地況舊說以棗為健脾之品又曰脾能為胃行其津液由此可知棗與胃液實有密切之關係惟其語隱約在可解不可解之間今得吾友之說乃益彰耳此其第四義也甘遂芫花大戟為何作藥末以加入而不與大棗同煎蓋有深意以余研究所得凡藥之欲其直接入腸胃起作用者大都用散薏苡附子敗醬散世人用之而不效不知其所用者非散乃藥之湯耳五苓散世人用之又不效謂其功不及車前子通草遠甚不知其所用者非散亦藥之湯耳至於承氣亦直接在腸中起作用所以不用散而用湯者蓋腸胃不能吸收硝黃用湯無異散也其他諸方用散效用湯而不效者甚夥容當作經方散藥之研究一文細推論之雖然甘遂等三藥為末入胃逐水有此說在又何能逐兩脅間之積水乎曰水飲先既有道以入脅間今自可循其道追之使出事實如此理論當循事實行也此其第五義也嗚呼仲聖之一方寥寥二三行字而其所蘊蓄之精義竟至不可思議凡此吾人所殫精竭慮思議而後得之者尚不知其是耶非耶安得起仲聖而問之耶二診四月六日兩進十棗湯脅下水氣減去大半惟胸中尚覺脹懣背痠行步則兩脅尚痛脈沉弦水象也下後不宜再下當從溫化姜半夏五錢北細辛二錢乾薑三錢熟附塊三錢炙甘草五錢菟絲子四錢杜仲五錢椒目三錢防己四錢佐景按師謂十棗湯每用一劑已足未可多進所謂大毒治病十去其四五是也又謂甘遂大戟皆性寒之品故二診例以溫藥和之此方系從諸成方加減而得不外從溫化二字著想惟據張君自言服此方後不甚適意覺脅上反脹背亦不舒目中若受刺大便亦閉結按此或因張君本屬熱體而藥之溫性太過歟三診四月八日前因腰痠脅痛用溫化法會天時陽氣張發腰脅雖定而胸中脹懣左脅微覺不舒但脈之沉弦者漸轉浮弦病根漸除惟大便頗艱兼之熱犯腦部目脈為赤當於胸脅著想用大柴胡湯加厚朴芒硝軟柴胡三錢淡黃芩三錢製半夏三錢生川軍三錢後下枳實三錢厚朴二錢芒硝錢半沖佐景按張君言服藥後夜間暢下四五次次日覺脅背均松胸中轉適精神爽利諸恙霍然觀此方知師轉筆之處銳利無比前後不過三劑藥費不過三元而竟能治愈半載宿恙之肋膜炎病嗚呼其亦神矣曹穎甫曰凡胸脅之病多系柴胡證傷寒太陽篇中累出蓋胸中屬上焦脅下則由中焦而達下焦為下焦水道所從出故脅下水道淤塞即病懸飲內痛而為十棗湯證胸中水痰阻滯上濕而下燥不和則為大陷胸湯證若胸中但有微薄水氣則宜小柴胡湯以汗之脅下水氣既除轉生燥熱則宜大柴胡湯以下之可以觀其通矣第八三案懸飲其二穎師親撰師曰宋子載之妻年已望五素病胸膈脹痛或五六日不得大解夜睡初醒則咽燥舌乾醫家或以為浮火或指為肝氣花粉連翹玉竹麥冬山梔之屬多至三十餘劑沉香青皮木香白芍之屬亦不下十餘方二年以來迄無小效去年四月延余診治余診其脈雙弦曰此痰飲也因用細辛乾薑等以副仲師溫藥和之之義宋見方甚為遲疑曰前醫用清潤之品尚不免咽中乾燥況於溫藥余曰服此當反不渴宋口應而心疑之其妻毅然購藥一劑而渴止惟胸膈脹痛如故余因金匱懸飲內痛者用十棗湯下之遂書制甘遂一錢大戟一錢炙芫花一錢用十棗濃煎為湯去滓令服如金匱法並開明每服一錢醫家鄭仰山與之同居見方力阻不聽令減半服之不下明日延余復診知其未下因令再進一錢日晡始下胸膈稍寬然大便乾燥蓄痰未下因令加芒硝三錢使於明早如法服之三日後復延余復診知其下甚暢糞中多痰涎遂令暫行停藥日飲糜粥以養之此時病者眠食安適步履輕捷不復如從前之蹣跚矣後一月宋又延余診治且曰大便常五六日不行頭面手足乳房俱腫余曰痰濁既行空隙之處衛氣不充而水飲聚之金匱原有發汗利小便之法以通陽氣今因其上膈壅阻特甚且兩乳脹痛不得更用緩攻之劑方用制甘遂一錢大戟末一錢王不留行二錢生大黃三錢芒硝三錢一瀉而脹痛俱止宋因詢善後之法余因書蒼朮一兩白朮一兩炙甘草五錢生麻黃一錢杏仁三錢令煎湯代茶汗及小便俱暢即去麻杏一劑之後永不復發云余按十棗湯一方醫家多畏其猛峻然余用之屢效今存此案非惟表經方之功亦以啟世俗之蔽也佐景按此吾師十年前之治案也是時余有志於醫顧未嘗學焉師另有本湯驗案多則悉詳金匱發微然則人猶是也病猶是也方猶是也效亦猶是也所謂古人不見今時月今月曾經照古人其間同具妙理若曰古方不可治今病猶曰古月不可照今人得毋癡不可及南宗景先生曰舍妹曾患脹病初起之時面目兩足皆微腫繼則腹大如鼓漉漉有聲渴喜熱飲小溲不利呼吸迫促夜不成寐愚本內經開鬼門玄府也亦即汗腺潔淨府膀胱也之旨投以麻附細辛合胃苓散加減服後雖得微汗而未見何效妹倩金君篤信西醫似以西醫治法勝於中醫於是就診於某醫院斷為腎臟炎症與以他藥及朴硝等下劑便瀉數次腹脹依然蓋以朴硝僅能下積不能下水也翌日忽頭痛如劈號泣之聲達於四鄰嘔出痰水則痛稍緩愚曰此乃水毒上攻之頭痛即西醫所謂自家中毒仲景書中曾載此症見趙刻本傷寒論第一百六十條非十棗湯不為功乘此體力未衰之時可以一下而愈遲則不耐重劑也乃擬方用甘遂三分此藥須煨透服後始不致作嘔否則吐瀉並作頗足驚人曾經屢次試驗而知大戟芫花炒各錢半因體質素不壯盛改用棗膏和丸欲其緩下並令侍役先煮紅米粥以備不時之需服藥後四五小時腹中雷鳴連瀉糞水十餘次腹皮弛緩頭痛亦除惟神昏似厥呼之不應其家人咸謂用藥過猛愚曰勿驚尚書所云若藥不瞑眩厥疾勿瘳此之謂也如慮其體力不支可進已冷之紅米粥一杯以養胃氣而止便瀉如言啜下果即瀉止神清次日腹中仍微有水氣因復投十棗丸錢半下其餘水亦去疾務盡之意嗣以六君子湯補助脾元且方內白朮一味能恢復其吸收機能故調理旬日即獲全愈錄中醫內科全書此亦古方治今病之一好例也第八四案奔豚其一穎師醫案劉右初診九月十六日始病中脘痛而吐水自今年六月每日晨泄有時氣從少腹上衝似有瘕塊氣還則絕然不覺此但肝鬱不調則中氣凝滯耳治宜吳茱萸湯合理中淡吳萸四錢生潞黨五錢乾薑三錢炙草三錢生白朮五錢生薑三片紅棗十二枚二診九月十八日兩服吳茱萸合理中湯酸味減而沖氣亦低且晨泄已全愈惟每值黃昏吐清水一二口氣從少腹挾痞上衝者或見或否治宜從欲作奔豚例用桂枝加桂湯更納半夏以去水川桂枝三錢白芍三錢生草錢半桂心錢半製半夏五錢生薑五片紅棗七枚拙巢注服後全愈佐景按本案初診所謂吐水二診所謂吐清水頗可疑或即是白津其說詳下案第八五案奔豚其二佐景醫案周右住浦東初診氣從少腹上衝心一日四五度發發則白津出此作奔豚論肉桂心一錢川桂枝三錢大白芍三錢炙甘草二錢生薑三片大紅棗八枚佐景按本案為余在廣益中醫院所診得者余視此頗感興趣若自珍其敝帚者然請從白津說起金匱要略曰寒疝繞臍痛苦發則白津出手足厥冷其脈沉弦大烏頭煎主之本條中苦發二字千金外臺作若發此不足論白津二字千金外臺作白汗白汗二字在仲聖書中為少見或以為即素問之魄汗或以為即脈經之白汗似未得為的解若仍作白津亦未能確指為何物若釋白津為白帶尤誤因帶則稱下而不稱出稱白物而不稱白津故也獨本案病者周右告我以一病狀我無成句以形容之欲得而形容之除非發則白津出五字庶足以當之蓋周右每當寒氣上衝之時口中津液即泉湧而出欲止之不得其色透明而白待沖氣下降此種白津方止其來也不知何自其止也不知何往但決非痰濁之屬蓋痰濁出於肺胃此則出於口中痰濁較濃而厚此則較淡而清痰濁之吐出須費氣力此則自然流溢故二者絕然為二物夫奔豚為寒性病既有出白津之例則寒疝亦為同類之寒性病其出白津復何疑師兄吳凝軒謂嘗親見凍斃之人將死之時口出白津無算汩汩而來絕非出於其人之自主與此正可互相印證事實之不可誣有如是者葉案曰高年少腹氣衝脘下心肋時痛舌底流涎得甜味或靜臥少瘥知飢不食大小便日窒此皆陰液內枯陽氣結閉喻西昌有滋液救焚之議然衰老關格病苟延歲月而已醫藥僅堪圖幸藥用大麻仁柏子仁枸杞子肉蓯蓉紫石英炒牛膝細按本病實是奔豚所謂舌底流涎即是白津其用藥雖非正道而足以互證病情者乃至審也按依西醫解剖學言唾腺亦名涎腺涎腺計有三對曰耳下腺曰顎下腺曰舌下腺其末端各有球囊如葡萄狀耳下腺為最大在外耳之直下別有管開口於上顎臼齒之近旁以輸送唾液顎下腺在下顎之內前部舌下腺在舌底黏膜之下其輸送管皆開口於舌尖下部之兩側若唾腺神經起反射興奮以致唾液分泌亢盛者謂之反射性流涎症云云竊意奔豚病者心腹部分之神經劇受刺激因反射及於唾腺神經故分泌唾液特多此唾液也實即本案所謂白津二診投桂枝加桂湯後氣上衝減為日二三度發白津之出亦漸稀下得矢氣此為邪之去路佳肉桂心一錢半川桂枝三錢大白芍三錢炙甘草三錢生薑三片紅棗十枚厚朴錢半半夏三錢佐景按初診時有為我錄方之同學曰此肝氣也余曰肝氣之名太泛毋寧遵經旨稱為奔豚同學疑焉次日病者欣相告曰沖氣減矣胃納亦增同學愕然焉余又瑣瑣重問白津之狀及關於白津之一切所言悉合無可疑焉又曾細按其脈頗見弦緊之象與仲聖所言寒疝之脈相似益見疝與奔豚確屬類似之病服桂枝加桂湯而得矢氣者因桂性芳香兼能逐穢故也然而逐穢氣之專功卻不及厚朴此為余屢次實驗而得之者又以半夏善降故並用之三診氣上衝白津出悉漸除蓋矢氣得暢行故也今圖其本宜厚朴生薑甘草半夏人參湯加桂厚朴三錢生薑四錢半夏四錢甘草三錢黨參三錢桂心一錢桂枝二錢佐景按余每遇可研究之病恆喜病者多來受診幾次俾可詳志服藥後之經過但以用經方之故病者向愈至速每一二診後即不復來予乃無從詳訊每致大失所望本案當初診時婦鑑於前此就地醫治之無效頻頻問先生這個毛病阿會好意猶言未知尚有愈望否也予期以十日婦笑頷之至二診來時予鑑於前此查詢病情之無從當即詳詢婦之滬寓住址第三診後婦果不復來又越數日余乃按址趨至城內肇嘉路關帝廟對過木器號內其戚家訪之得其外甥女出見曰家舅母因病已將全愈又以家務紛繁早欣然回浦東去矣以余意默忖此婦病根必然未拔不久行當重發夫當其病劇之時則以身體為重家事為輕及其病減之後又以家事為重身體為輕此乃人之常情安足怪歟有善懷疑之讀者必將問佐景曰何謂今圖其本為答此問題起見余乃不能不發表其未成熟之說緣余於奔豚一病曾下小小研究工夫只以學殖過淺資質過鈍迄無一得即稍稍獲新意亦殊不敢自信故曰未成熟之說也倘邀高明教正幸也何如余曰奔豚病之本源乃腸中之矢氣即腸胃中殘餘未曾消化之物因發酵分解所生之瓦斯是也厚朴生薑甘草半夏人參湯治此最佳方中人參生薑半夏能健胃降逆使立建瓴之勢厚朴甘草能逐穢安正大有剿撫之功病者服此後其矢氣將更多源源而出臭不可聞俗語謂屁之響者不臭臭者不響故此種矢氣並無多大響聲旁人當慎防之矢氣既去腹之脹滿者乃漸平本案周右腹本脹滿兩服藥後遂漸平今特補述於此病人之腹漸平奔豚乃免復發所謂圖其本者此也我今當補述周婦氣上衝之情形據述其氣確發源於小腹惟並非僅中道一線直上彷彿腹之兩旁皆有小線向上中方向升騰直衝至心臟部分而杳方其沖也頗覺難堪及其杳也不知何去而白津之忽湧忽止又皆出於不能自主如是前後數分鐘方復原狀然而神為之疲食為之減吾人當注意此婦之逆氣衝至心而杳一語與經文氣從少腹上衝心者氣從少腹上至心二語悉合符節經文之至字有以心為止境至此而止之意經文之沖字有以心為正鵠沖此即中之義經文衝心至心大同小異之二條悉主桂枝加桂湯故我治本案衝心至心之奔豚亦用桂枝加桂湯此婦服藥得矢氣後則上衝之氣頓減可見衝心之逆氣無非腸中之矢氣腸中之矢氣即是衝心之逆氣意者腸中發酵之瓦斯既不能泄於下勢必膨於中故腹脹滿而腹之脹滿程度又殊有限制故此時瓦斯乃隨時有上溢之可能適腸繫於腸間膜膜中有無數靜脈管吸液上行平時因血管有關約之作用瓦斯不能溢入血管適其人暴受驚恐關約失其效能吾人手方握物受驚則物墮地書載難產之婦因驟聞響器擲地胎兒安下是皆關約筋因驚失效之明證於是瓦斯乘機溢入血管此溢入之量必甚微渺然其害已烈觀西醫之注射液劑必避免空氣之隨入慎之又慎可見一斑設瓦斯溢入靜脈管病人之感痛楚尚不甚劇因瓦斯與靜脈血液同向上行故也設其所溢入者為動脈管則二者逆向而行痛楚斯甚以我臆測此種瓦斯甚且逆大動脈而上薄心臟但心臟瓣膜開合噴壓之力殊強故瓦斯終為擊潰或下退原處而杳藥以桂枝加桂湯者因桂枝能助動脈血運暢行之故更加桂心以為君則其噴壓之力更強而瓦斯乃不能上溢但能下返我前釋桂枝湯中桂枝之用與此處相合尚不致有兩歧之誤如此解釋似覺圓滿但依生理書言腸中毒素每能侵入血管至腸中之瓦斯殊不能溢入血管之中然今日之生理尚不足以盡釋實際之病理觀肋膜炎病者進十棗湯後其肋膜間之水竟從肛門而出即是一例故我敢依此種病例作奔豚病理之假說如上假說云者即假定之學說並非絕對之真理姑留此說以待他人之改正謬誤或補充證明者也故閱者有以吾說為非是起而駁難者我當謹敬受教但望另著新說以饜眾望若夫徒事破壞莫能建設者則非吾所期也依鄙意病者腸中先有瓦斯之蘊積偶受驚恐則關約失效致瓦斯溢入血管之中故仲聖曰皆從驚發得之發猶言始也此言大有深意仲聖又曰燒針令其汗針處被寒核起而赤者必發奔豚試問燒針令汗何故多發奔豚歷來注家少有善解不知仲聖早經自作註釋曰加溫針必驚也曰醫以火迫劫之亡陽必驚狂曰奔豚皆從驚發得之合而觀之則燒針所以發奔豚之理寧非至明故以經解經反勝贅說多多惟其人腸中本有宿氣待時而動此乃可斷言者也雖然余之假說尚不止於此設閱者能稍耐煩容當續陳其義余曰此上所述之奔豚病為第一種奔豚更有第二種奔豚與此稍異即奔豚湯所主之奔豚病是也此二種奔豚乃同源而異流者同源者何蓋同種因於腹中之瓦斯是也異流者何蓋一則逆大動脈而犯心臟一則溢入淋巴管逆胸導管亦犯心臟甚且犯胸與咽喉師曰奔豚病從少腹起上衝咽喉發作欲死又曰奔豚氣上衝胸腹痛往來寒熱奔豚湯主之即是此一種犯淋巴系之奔豚試更詳為之證胸導管之上端適當胸部其位高於心臟故曰上衝胸而不僅曰上至心此可證者一也咽中如有炙臠者屬半夏厚朴湯證其病在咽喉部分之淋巴系屬少陽與此處所謂上衝咽喉極相類此可證者二也淋巴系病即中醫所謂少陽病義詳本書第二集少陽病以寒熱往來為主證故曰往來寒熱奔豚湯主之此可證者三也試察奔豚湯方內有半芩姜草酷如少陽之主方小柴胡湯此可證者四也吾師曾用奔豚湯原方治愈此種奔豚病其案情詳金匱發微讀者欲知其詳請自檢之此可證者五也有此五證此第二種奔豚病乃告成立是故姑以六經言二種奔豚病同生於太陰一則發於太陽一則發於少陽以生理言二種奔豚病同生於腸中瓦斯一則發於循環系一則發於淋巴系考之實例發於循環系者多發於淋巴系者少故桂枝加桂湯之用常較奔豚湯為廣東哲有言曰奔豚主劑雖多特加桂湯為最可也即緣此故耳至奔豚病之劇者其逆氣同犯循環淋巴二系亦屬可能之事故用方亦不妨併合筆述至此奔豚病似可告一段落倘有讀者更欲追問腸中瓦斯之所由來太陰病之所由成我又安得無言曰以生理言腸中瓦斯之成實由於胃乏消化力即西醫所謂消化不良症是也故欲治腸當先健胃猶欲求流之長必先浚其源雖然是乃粗淺之言不值一笑今當進一步從心理方面言曰腸胃機能之所以不良者乃憂思傷感有以造成之耳試觀吾人偶逢憂傷則食不下即下亦不能化可作明證故中醫謂憂能傷脾又謂脾主運化猶言憂令人消化不良也本此用敢不揣冒昧續伸仲聖之說曰奔豚病皆從驚恐發之而從憂傷積之蓋發於驟而積於漸也讀者試將前案吾師治驗例及本案拙案例合而考之可知吾所言者皆實驗之論非玄想之談又吾師之案與拙案較在治法上言有一不同之點在讀者明眼諒早已燭之如其未也不妨略予思考得之然後接閱下文與吾所言者對勘此乃治學之一法添趣之一術也吾師前案先用吳茱萸合理中湯繼用桂枝加桂湯納半夏拙案則由桂枝加桂湯漸移作厚朴生薑甘草半夏人參湯加桂一往一來彼順此逆易言之吾師先治其本後圖其標余則先治其標後圖其本與上卷葛根芩連湯證師用退一步法余用進一步法者遙遙對映正可相得益彰學者當知一病之來每非一方可奏全功見其實則進慮其虛則退惟其急則顧標因其緩則保本必也進退合度標本無誤病乃速已抑進退之外尚有旁敲側擊之法標本之間更有中氣逆從之調一隅三反又豈待焦唇之喋喋乎史記扁鵲倉公列傳曰扁鵲過齊齊桓侯客之入朝見曰君有疾在腠理不治將深桓侯曰寡人無疾扁鵲出桓侯謂左右曰醫之好利也欲以不疾者為功後五日扁鵲復見曰君有疾在血脈不治恐深桓侯曰寡人無疾扁鵲出桓侯不悅後五日扁鵲復見曰君有疾在腸胃間不治將深桓侯不應扁鵲出桓侯不悅後五日扁鵲復見望見桓侯而退走桓侯使人問其故扁鵲曰疾之居腠理也湯熨之所及也在血脈針石之所及也其在腸胃酒醪之所及也其在骨髓雖司命無奈之何今在骨髓臣是以無請也後五日桓侯體病使人召扁鵲扁鵲已逃去桓侯遂死吾人讀此得毋驚扁鵲之神乎獨惲鐵樵先生本內經以為說曰扁鵲所以知齊侯之病初無其他巧妙全是今內經所有者且扁鵲必有左證凡治一藝而名家者其心思必靈活當時之氣候齊國之土宜齊侯之嗜好之意志之環境必曾一一注意常人用意不能如此扁鵲之言遂神惲先生此言可渭發前人所未發實深得吾心者矣後世醫人多自視過卑以為古人能治未病每油然生景仰之心今人不及古人輒廢然無抗衡之志竊意以為過矣今設有一病婦叩君之門而求診焉君一見之下即當望聞見其愁眉緊鎖聞其嘆聲頻發可以想知其心志之抑鬱見其腹部脹滿聞其嘔逆時作可以想見其腸胃之不運見其叉手冒心聞其自語慰藉可以想知其驚恐之易乘更察其苔白而膩切其脈沉而弦問之幸未有逆氣之上衝但君於此時當逆料奔豚上衝之期匪遙發作欲死之候將屆君乃出慰藉之言以寬其心志用芳香之藥以鼓其胃氣遣逐穢之劑以掃其腸積借安神之品以扶其心君無何婦轉健碩安病奔豚夫若是君已能治未病君即是上工彼扁鵲雖神安得專美於前哉學者當知古之上工人也吾亦人也吾獨不得為上工乎用特添一筆於此以自勉勉人茲姑舍吾國古人而論歐美洋人洋風女不必輕於男周旋進退之際女先而男後運動遊藝之場並肩而齊觀加以家庭之組織綦小妯娌之紛爭絕無故吾國婦女常病奔豚彼邦醫籍乃無此名至國人西醫每僅述洋醫之成法無能創新術以鳴世故若叩以奔豚之病理彼將瞠目不知所答嗟乎以言西醫我不如人以言中醫今不如古此今日同胞之厄運而佐景之所嘆息者也用特贅一筆於此以為本案餘波曹穎甫曰治病不經實地考驗往住失之懸斷孟子有言為高必自邱陵為下必因川澤今佐景乃因仲師所言之病情進而求其所以然則見證用藥隨在有得心應手之妙要不惟奔豚為然也又按奔豚向稱腎積而方治實為肝病陳修園謂奔豚湯暢肝氣而逐客邪黃坤載發明桂枝解達肝鬱佐景所述某同學所言肝氣亦自有理但以奔豚證屬肝病則可泛稱肝病並不知為奔豚證則不可今人動稱弦脈為肝病並瘧疾痰飲而不識予嘗非笑之又安知舉世皆然正有無從糾正者哉第八六案歷節其一穎師醫案耿右初診八月二十七日一身肢節疼痛腳痛足脛冷日晡所發熱脈沉而滑此為歷節宜桂枝芍藥知母湯瘰癧從緩治川桂枝五錢赤白芍各三錢生甘草三錢生麻黃三錢熟附塊五錢生白朮五錢肥知母五錢青防風五錢生薑一塊打二診九月一日服桂枝芍藥知母湯腰痛略減日晡所熱度較低惟手足痠痛如故仍宜前法川桂枝五錢赤白芍各五錢生甘草三錢淨麻黃四錢蒼白朮各五錢肥知母五錢青防風四錢生薑一塊打咸附子三錢生用勿泡佐景按我見歷節案乃聯想及一笑話焉有貧夫婦二人伉儷甚篤夫病歷節呻吟未已婦隨夫唱亦病歷節既病不能外出營生語謂坐吃山空夫婦積欠房金重重安得醫藥之資一日聞師常施診貧病二人跬步傴僂靦然求診師同飲以桂枝芍藥知母湯先後二診五劑收效頗捷後此夫婦之二房東來告曰二人病已大減能行動矣更不料其乘夜但攜什物不問房金走也呵呵吾師又曾治一戴姓婦人病情離奇曲折蔚為大觀先婦人妊娠八月為其夫病求醫抱夫乘車胎兒竟為夫身壓斃遂作腹痛一醫藥而墮之腐矣婦本屬血虛體質死胎既下因貧不能善後即病歷節手足拘攣節骱劇痛旦日較緩拖延二年方求師診師用一方二劑不應二診改用某藥汗乃大出兩劑肢節便可詘信足腫亦小獨手發出大泡有濃有水將成潰爛乃採丁甘仁先賢法用某某等藥清其血熱二劑而痂成四劑而痂脫遂與未病時無異以為可無恙矣婦忽陰癢難忍蓋濕毒未盡而下注也師因令其用某藥煎湯薰洗良瘥未幾入市購物卒然暈倒諸恙退而血虛之真象見師乃用某某諸藥大劑凡二十餘日全愈後竟抱子云云讀者試猜想吾師究用何方何藥諒多興趣欲求兩相對勘請閱金匱發微曹穎甫曰肢節疼痛病名歷節此證起於風邪外感汗出不暢久久濕流關節脈遲而滑屬寒濕其微者用桂枝芍藥知母湯其劇者宜烏頭湯嘗治一吳姓男病予用淨麻黃三錢生白芍三錢生綿耆三錢炙甘草三錢烏頭二枚切片用蜜糖一碗另煎煎至半碗蓋悉本金匱法也第八七案歷節其二佐景醫案張先生住靜安寺路潤康村一六八號天時與疾病有密切之關係尤以宿恙為然刻診脈苔均和惟右腿按之尚覺微痛再擬桂枝芍藥知母湯主之川桂枝三錢淨麻黃一錢青防風一錢大白芍三錢酒炒生白朮三錢熟附片一錢知母二錢生甘草二錢生薑一片佐景按張聿修先生病右腿膝蓋關節處酸楚不堪長日行走曾歷三四年矣屢治未愈今年請治於西醫服藥注射達五月之久亦未見功而心悸頭眩納呆便結遺精溲混諸恙迭作不得已問治及下工以情不可卻勉治之余先用芳香之劑開其胃納緩下之劑制川軍不可省通其大便繼用炙甘草湯安其心臟仿十全大補意補其腦力又以桂枝加龍骨牡蠣止其遺精五苓散利其小便如是諸恙愈而神振矣乃以桂枝芍藥知母湯治其腿部酸楚我以為是即歷節之類也投之酸楚果減有時且覺全除張君喜不自勝不知何以謝吾適時值節氣屆臨天雨潮濕張君之患處又覺微發故本案脈案中天時與疾病有密切之關係云者即指此而言也余初與張君言此君似不信因有西醫之言為先入之見故也後注意考察果於天雨之先一日即發微微酸楚而舊曆大節氣之前後尤顯張君乃信服夫宿恙與天時關係之密切乃鐵一般之事實誠以天時變則空氣之組織成分亦變人生空氣之中無異魚居水中息息相關無時或休故也此義至關重要特借本案表之張君之宿恙雖隨天時之轉變時愈時微發但我則秉不折不撓之精神為君立方君亦出再接再厲之毅力依我服藥現方日向全愈程中總冀人定以勝天也第八八案發背腦疽穎師親撰師曰人體外證之屬寒者除流注外發背腦疽最為重大惟世傳陽和湯一方與仲師當發其癰之旨最合若誤投寒涼敗毒之品十不活一所以然者為血絡凝於寒濕非療毒流火之屬於陽證者比也附陽和湯方如下麻黃三錢去根節炮姜三錢熟地黃一兩鹿角膠三錢肉桂一錢寒重加附子佐景按友人周慕蓮君患腦疽初起察其屬陰性法當與陽和湯顧大便五日未行疑其有熱結為之躊躇者再誰知服湯後次早項背轉動便易大便暢下乃悟其大便之閉亦屬寒性故也其外用膏藥為陽和膏又有友人周煥根君患腦疽發於項後偏右皮色不變而結塊脈微細大便亦不行採鄰居之言購番瀉葉值銅元十枚服之大下而自止疽反日劇予仍以陽和湯投之二日不應易醫又投陽和湯加減二日又不應易名醫投和榮通絡輕劑不更衣則無暇問也如是二日疽依然而大便之不行也如故無已予乃囑用甘油錠以潤之因用之不得法無效次日詳告以術乃下燥矢四五顆隨以溏薄矢液自是得安寐竟日醒來知飢索粥精神大振便下皆溏者濕既有去處疽乃以漸告愈事後余乃悟此為先鞕後溏症原不可攻其所以有燥矢結於腸中者必是番瀉葉之流弊蓋大下亡陰液去而矢在故結而致燥也病家之藥誤醫者可不留意哉葉勁秋先生曰民九秋隨業師診海上某翁疾翁病發熱神糊師診視良久莫名其故細細問之該病家微吐曾病發背經某德醫診將瘥再毋顧慮矣師請探視病家堅勿許其意若謂西醫善外科中醫優內科發背初時潰如碗許逐漸收口僅如豆大即日可全今所病者發熱神昏系內證故求中醫師曰不觀瘡瘍部分不足以明病理旋即解釦探視之新肉色黯淡不紅臭味深重師曰邪毒攻心予無能為矣敬謝不敏病者果於翌晨歿然則內科外科可分而不可分者也世之執迷不悟如某翁家人者可以醒矣又聞有人患發背受治於西醫癰化為腐肉則剪而去之孰意其外圍之好肉又腐又腐又剪又剪又腐竟至不可收拾後轉請某中醫外科專家救治用胡椒粉散其上兼內服藥乃腐去新生漸得收功云以事未目睹當待證於高明腦疽發背亦有皮色鮮紅化膿甚速由於濕熱蘊蒸未必盡屬寒證者惟居少數耳亦不可不知曹穎甫曰陽和湯一方不惟腦疽發背為宜即膝蓋忽然酸疼為鶴膝風初步用之亦多效若華母於去冬今春兩次患此臨睡時服藥醒即不痛施之骨槽風病亦能一服定痛真神方也第八九案汗後致虛穎師醫案師母案缺生半夏三錢炙草五錢當歸三錢陳皮三錢白朮三錢生黃耆三錢熟附塊五錢黨參四錢熟地二兩乾薑三錢川芎三錢炙乳沒各三錢生米仁一兩佐景按師母體素瘦削而微有痰飲之疾數日前偶感風寒惡寒頭痛發熱師疏表劑予之稍瘥而未了了再予之如是者屢余曾檢得其一方為桂枝三錢白芍三錢生草二錢浮萍三錢姜三片蓋桂枝湯去大棗加浮萍也服後汗出甚多微惡寒神疲心痛叉手自冒徐按稍瘥筋肉不舒有如針刺皮膚乾燥血脈色轉褐心時悸頭時眩坐立不穩但覺搖搖然脈細小而弱師母固知醫者因謂師曰我今虛法當補互商之下乃得上方師母且曰倘熟附而不效者我明日當易生附也其時方暮心痛甚劇筋肉牽制亦良苦進初煎旋得安睡夜半醒來痛隨大減次早進次煎精神大振皮色較潤而行動漸漸如常矣事後余推測本案之病理藥效其有可得而言者師母似系血液衰少痰濁凝據之體雖有表證本不宜發汗過多論曰脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知然以榮氣不足血少故也可以見之況桂枝湯去大棗加浮萍其發汗之力較桂枝原湯為尤猛因大棗本為保存津液者今反易以傷津液之浮萍故也以不宜發汗之人令大發其汗自有變證大論曰發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之此蓋為無痰飲者言之耳又曰太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲擗地者真武湯主之此蓋為有痰飲者言之又曰發汗病不解反惡寒者虛故也芍藥甘草附子湯主之此蓋為虛者言之今師母所服之方雖非桂枝甘草湯亦非真武湯又非芍藥甘草附子湯然相去匪遠而周詳或且過之故能效也由是觀之仲聖教人用麻桂以表邪固又教人有不宜用麻桂之證而又教人誤用後補救之法其意也善其法也備觀本案而益信讀傷寒論者又安可執其一而舍其二哉曹穎甫曰虛人發汗是謂重虛重虛之人必生裡寒血不養筋故筋脈牽制血不充於脈道故微細不補氣血則筋脈不調不溫水臟則表陽不達又因其有水氣也加乾薑半夏因其體痛也加乳香沒藥因其心悸也重用炙甘草因其夾濕也而加生苡仁大要隨證酌加初無成方之可據而初意卻在並用朮附使水氣得行於皮中蓋救逆之方治原必視病體為進退也第九案太陽轉陽明其一穎師醫案姚左發熱頭痛有汗惡風脈浮緩名曰中風桂枝湯加浮萍主之川桂枝三錢生白芍三錢生草錢半浮萍三錢生薑三片大棗三枚服藥後進熱粥一碗汗出後諸恙可愈汗出熱不除服後方熱除不必服生川軍三錢枳實三錢厚朴錢半芒硝二錢沖生甘草錢半佐景按上列二方乃師初診時一次疏予者也他醫似無此例然師則常為之師曰我今日疏二方病者明日可以省往返之勞節診金之費不亦善哉雖然苟我師無先見之明能預知明日之變證者其亦安肯若是耶浮萍為我師暑天常用之藥多加於桂枝湯中師每贊其功於徒輩之前病者姚君持方去後竟不敢服質疑於惲鐵樵先生之門人某君某君曰先解其表後攻其里是乃仲聖之大法也安用疑為卒從其言服後汗出果如方案所記諸恙悉愈不意半日許復熱病者固不知此熱卻非彼熱姑壯膽服後方竟便行而熱除三日悉如常人驚吾師之神踵門道謝曰僕行囊已備即將出門經商去矣余問曰桂枝湯之後有宜繼以承氣者有無須繼以承氣者其間豈無辨認之點耶師曰病者初診吾見其苔作黃色而且厚吾以是用承氣也余曰諾舉一反三又豈惟苔黃厚而已則凡便之不暢或不行者口渴者闕上痛者或素體熱盛者莫非皆承氣之預見證乎予自是亦能效吾師之法一診而疏二方矣以余臨床實驗所得凡服桂枝湯後桂枝證除而轉為陽明輕證又服承氣而病愈不傳者甚多狀此事實則一日太陽二日陽明八字恰甚相切雖然此僅就太陽病服藥者言若不服藥恐又非如是矣余固不謂內經之一日至六日相傳一說盡合於事實者也曹穎甫曰予治傷寒學早於仲師大論中證明七日為一候一候為一經二候為再經六經傳遍當在四十二日然亦有不作再經者由其腸胃中本不燥實也若太陽之病初起陽明先見燥實則先解其表後攻其里即為正治予昔治趙庭槐之妻常以一方箋書二方治愈者不止一二次又嘗治繆桂堂亦用二方並書一箋繆不識字誤以二方之藥並煎汗出便通而愈或告余曰此所謂盲人騎瞎馬也予為之大笑不止第九一案太陽轉陽明其二穎師醫案徐柏生初診微覺惡寒頭痛腰腳痠左脈甚平右脈獨見浮緩飲暖水微有汗而表熱不去此風邪留於肌腠也宜桂枝湯加浮萍川桂枝三錢生白芍三錢生草一錢浮萍三錢生薑三片棗七枚二診汗出身涼大便不行宜麻仁丸脾約麻仁丸三錢芒硝泡湯送下拙巢注藥後大便行愈矣第九二案太陽轉陽明其三穎師醫案俞哲生初診微覺惡寒頭痛發熱脈浮小緊宜麻黃湯淨麻黃三錢桂枝三錢生草一錢光杏仁三錢二診汗出熱除頭痛惡寒止惟大便三日不行胸悶惡熱脈浮大宜承氣湯所謂先解其表後攻其里也生川軍三錢後入枳實四錢川樸二錢芒硝二錢沖拙巢注服藥後下四次病全愈第九三案太陽轉陽明其四穎師醫案王左初診二十四年三月五日起病於浴後當風惡寒而咳一身盡痛當背尤甚脈弦法當先解其表得汗後再行攻裡大便七日不行從緩治生麻黃三錢川桂枝三錢光杏仁三錢北細辛二錢乾薑三錢五味子二錢生甘草一錢製半夏三錢白前四錢佐景按本案病者王君平素有疾必就師診每診一二次疾必良已者番又來自謂病重甚不知能如前速愈否師笑謂無妨汗出續診一次可矣君欣然告辭二診三月六日發汗已而大便未行食入口甜咽腫脘脹右脈滑大下之可愈生川軍三錢枳實四錢厚朴一錢芒硝三錢沖佐景按診後病者問明日尚須復診否察其神情蓋已非昨日病象矣師笑曰無須再勞駕矣後如師言學者當知疾病之傳變絕無一定之成規若我前所謂桂枝湯證一變而為白虎湯證麻黃湯證一變而為麻杏甘石湯證葛根湯證一變而為葛根芩連湯證此皆言其至常者也若以上太陽轉陽明諸案或由桂枝證傳為承氣證或麻子仁丸證或由麻黃湯證或由小青龍湯證傳為承氣證又皆不失其常者也若其他種種傳變或由葛根湯證傳為承氣證或由大青龍湯證傳為承氣證又悉在可能之中何必一一贅列是故醫者但求能辨證用方初不必慮其病變多端但求能大膽細心初不必泥於溫熱傷寒下工之所得貢獻於上賓者若是而已邪之著人如飲酒然凡人醉酒脈必洪而數氣高身熱面目俱赤乃其常也及言其變各有不同有醉後妄言妄動醒後全然不知者有雖沉醉而神思終不亂者醉後應面赤而反刮白者應委頓而反剛強者應壯熱而反惡寒戰慄者有易醉而易醒者有難醉而難醒者有發呼欠及噴嚏者有頭眩眼花及頭痛者因其氣血虛實之不同臟腑稟賦之各異更兼過飲少飲之別考其情狀各自不同至論醉酒一也及醒一時諸態如失此吳氏又可借飲酒以喻邪之傳變無定者也因其言通俗易曉故借錄之第九四案暑天陽明病穎師親撰師曰血熱壯盛之人遇天時酷蒸往往以多汗而胃中化燥始則大便不行繼則口燥飲冷夏令伏陰之體飲冷太暴或且轉為下利究之利者自利胃中燥實依然不去故仍宜用大承氣湯以下之予子湘人辛未六月在紅十字會治一山東人親見之一劑後不再來診蓋已瘥矣壬申六月復見此人來診診其脈洪大而滑疾已疏大承氣湯方治矣其人曰去歲之病承先生用大黃而愈湘人告以亦用大黃其人欣然持方去不復來蓋又瘥矣又江陰街菸紙店主嚴姓男子每年七月上旬大便閉而腹痛予每用調胃承氣湯無不應手奏效佐景按此又天時之關係於疾病者也吾人但知其理足矣至疏方用藥仍當一以脈證為依歸設在盛夏遇真寒之霍亂證脈伏肢冷吾知四逆又為必用之方矣曹穎甫曰以上所列二證不過欲證明至其年月日時復發之理由而病之變化要必視其人之本體為斷其人血熱過重則易於化燥水分過多則易於化濕燥熱當瀉寒濕當溫誠當如佐景所云矣第九五案產後陽明病穎師講授佐景筆記師曰同鄉姻親高長順之女嫁王鹿萍長子住西門路產後六七日體健能食無病忽覺胃納反佳食肉甚多數日後日晡所覺身熱煩躁中夜略瘥次日又如是延惲醫診斷為陰虧陽越投藥五六劑不效改請同鄉朱醫謂此乃桂枝湯證如何可用養陰藥即予輕劑桂枝湯內有桂枝五分白芍一錢二十日許病益劇長順之弟長利與余善乃延余診知其產後惡露不多腹脹予桃核承氣湯次日稍愈但仍發熱脈大乃疑金匱有產後大承氣湯條得毋指此證乎即予之方用生大黃五錢枳實三錢芒硝三錢厚朴二錢方成病家不敢服請示於惲醫惲曰不可服病家遲疑取決於長順長順主與服並願負責服後當夜不下次早方下一次乾燥而黑午時又來請診謂熱已退但覺腹中脹脈仍洪大囑仍服原方實則依余意當加重大黃以病家膽小姑從輕次日大下五六次得溏薄之黑糞糞後得水能起坐調理而愈獨怪近世醫家遇虛羸之體雖大實之證不敢竟用攻劑不知胃實不去熱勢日增及其危篤而始議攻下惜其見機不早耳佐景按王季寅先生作產後之宜承氣湯者篇曰產後虛證固多實證間亦有之獨怪世醫動引丹溪之說謂產後氣血雙虛惟宜大補雖有他證均從末治執此以診鮮不貽誤余友王百安君於月前治一郭姓婦人該婦於雙產後發狂見鬼多言罵詈不認親疏其嫂曾被其搯頸幾至驚斃家人因使強有力者羅守之遂延王君往診車至中途病家喘急汗流奔告曰病者角弓反張口吐涎沫現已垂危後事均已備妥特詢還可醫否如不可醫毋徒勞先生往返也王君答以果系實證不妨背城借一或可挽回然未敢必也及至病所見病人反張抽搐痰涎如湧診其脈數而疾因病者躁動未得細診詢以惡露所見多寡腹中曾否脹痛二便若何該家驚嚇之餘視病者如虎狼此等細事全無人知王君以無確鑿左證力辭欲去病家苦求立方堅不放行王君默唸重陽則狂經有明文加以脈象疾數無倫遍體灼熱神昏流涎在在均露熱徵其角弓反張當系熱極成痙綜合以上各點勉擬下方生石膏四錢知母三錢寸冬三錢川連三錢條芩三錢阿膠三錢白薇三錢生地三錢半夏三錢木通三錢枳殼三錢生軍三錢粉草一錢竹葉三錢一劑痙愈躁動略安復延往診病者固拒不令診脈詢以大便情形據云水泄挾有燥糞遂為立大承氣湯加桃仁丹皮囑其分三次灌之如初次服後矢氣便為對證可將余藥服下次日病家來云躁動若失已能進食惟仍狂言不寐遂處下方川連炒梔子條芩杭芍阿膠雲苓茯神遠志柏子仁琥珀丹皮當歸生地雞子黃據稱服後熟睡竟夜此後可以無慮其母因其灌藥艱難擬令靜養不復服藥矣似此病症若仍以產後多虛妄用十全八珍或生化湯加減豈不促其命期邪錄醫界春秋按本證初起似屬桃核承氣湯證或竟抵當湯證仲聖曰其人如狂但少腹急結者乃可攻之又曰其人發狂者以熱在下焦少腹當鞕滿是也此二條如狂與發狂異急結與鞕滿異是其辨也迨后角弓反張當為大承氣湯證仲聖曰臥不著席腳攣急必齘齒可與大承氣湯是也最後狂言不寐亦如仲聖所謂心中煩不得臥黃連阿膠湯主之之證故用藥近似即可以起死回生嗚呼此仲聖之所以為萬世法也此證甚劇亦屬產後引之可知吾師原案云云尚屬平淡免世人見之而驚駭也曹穎甫曰產後宜溫之說舉世相傳牢不可破而生化湯一方幾視為金科玉律何怪遇大實大熱之證而束手無策也大凡治一病必有一病之主藥要當隨時酌定不可有先人之見甚有同一病證而壯實虛羸之體不當同治者此尤不可不慎也第九六案陽明大實穎師醫案陳左住馬浪路十四歲初診八月十七日發熱有汗闕上痛右髀牽制膝外廉痛時欲嘔大便不行渴飲舌苔黃燥腹滿脈滑陽明證備於法當下宜大承氣湯加黃連生錦紋軍四錢後入枳實四錢中樸錢半芒硝三錢沖服淡吳萸五分細川連二分二診八月二十日擬方下後但見燥矢闕上仍痛時欲吐痰多是陽明燥氣未盡上膈津液化為痰涎也宜小半夏加硝黃製半夏四錢生川軍三錢後入芒硝錢半沖生薑五片佐景按若仍用大承氣湯加重厚朴似亦甚佳因厚朴並能去上濕也三診八月二十二日進小半夏合承氣下後熱除痛止知飢經食煮紅棗六枚頓覺煩悶夜中譫語不休甚至昏暈此特下後腸中燥熱上熏腦部而又發於下後要為無根毒熱不足為患夜不能寐當用酸棗仁湯加減酸棗仁五錢辰砂五分潞黨參三錢知母三錢天花粉一兩生薑三片紅棗三枚佐景按本湯之用似不得當蓋此時熱勢方稍稍受折轉瞬當復熾觀其僅服紅棗六枚即轉為譫語昏暈不可終日可以知矣酸棗仁湯功能安和神經使人入睡為病後調理之良方而不宜於此熱勢囂張之時故服後少效宜其然也或者當時病家見兩服硝黃遂懼病者虛脫故乃懇師用此似較平穩之方歟四診八月二十三日擬方陽明之熱未清故尚多譫語闕上痛渴飲宜白虎湯加味生石膏八錢知母四錢生甘草二錢天花粉一兩洋參片五錢滑石六錢粳米一撮牡蠣二兩生打先煎五診八月二十四日服人參白虎湯加味渴飲闕上痛定夜無譫語今尚微渴飲粥湯便止仍宜前法生石膏一兩知母三錢生草三錢天花粉一兩北沙參八錢潞黨參五錢塊滑石一兩左牡蠣二兩先煎拙巢注此證不大便二十餘日始來就診兩次攻下燥熱依然未盡予所治陽明證未有若此之重者自十七日至今前後凡八日方凡五易始得出險此與三角街吳姓婦相似蓋鬱熱多日胃中津液久已告竭也曹穎甫曰此證下後濕痰未去二診懸擬方因病家來告貧苦減去厚朴以致濕熱留於上膈三診但治不寐未嘗顧及陽明實證下後胃熱未除以致病根不拔誠如佐景所言蓋胃不和固寐不安也附志於後以志吾過而警將來曾記八年以前同鄉周鉅臣介紹一汪姓病人初診用生大黃四錢厚朴二錢枳實四錢芒硝三錢其人病喘不得眠壯熱多汗脈大而滑下後稍稍安眠而時吐黃濁之痰予用承氣湯去大黃加皂莢末一錢二劑而愈與此證相似並附存之第九七案陽明戰汗穎師醫案陸左初診三月二十二日陽明病十日不大便惡氣沖腦則闕上痛腦氣昏則夜中譫語陽明燥氣薰灼則右髀牽制膝屈而不伸右手亦拘攣夜不安寐當急下之宜大承氣湯生川軍四錢後入枳實三錢中樸一錢芒硝三錢沖服拙巢注此證服藥後夜中大下二次稍稍安睡二診三診用白虎湯為主以其右手足不伸而加芍藥以其渴飲而加天花粉三診後聞延張衡山兩次又以無效中止三十日後聞其惡熱甚家人飲以雪水頗安適此即病人慾飲水者少少與之即愈之證也予為之擬方用生石膏二兩知母五錢生甘草三錢西洋參一錢和米一撮煎湯服後病者甚覺清醒四月一日服二煎至午後病者忽然寒戰閉目若死既而壯熱汗出此當在傷寒論戰而汗出之例非惡候也續診四月六日擬方此證自三月二十二日用大承氣湯下後兩服涼營清胃之劑不效其家即延張衡山二次不效中止後於三十日聞其惡熱渴飲用白虎加人參湯至一日戰而汗出意其愈矣至四日病家謂其右手足不伸而痠痛為之擬方用芍藥甘草湯加味赤白芍各一兩炙甘草五錢炙乳沒各三錢絲瓜絡三錢手足乃伸今日病家來云能食但欲大便不得小便赤更為之擬方如下生川軍一錢五分芒硝一錢沖生甘草二錢拙巢注下後諸恙悉愈胃納大暢佐景按戰而汗出是為戰汗若本案之戰汗是陽明之戰汗也大論曰凡柴胡湯病證而柴胡證不罷者復與柴胡湯必蒸蒸而振卻復發熱汗出而解是少陽之戰汗也又曰太陽病未解脈陰陽俱停必先振慄汗出而解是太陽之戰汗也粗觀之似三陽皆有戰汗試問病人何以欲汗曰假此以逐邪耳設其人正氣充實受邪不重又得藥力以助之則濈然汗出了無煩苦設不假藥力之助但憑正氣與邪相搏則其人略有煩苦矣故大論曰欲自解者必當先煩乃有汗而解設其人正氣虛弱邪氣充實即使得藥力之助亦必須戰戰兢兢努力掙扎方能得汗而其外表不僅為煩甚當為戰矣故大論又曰問曰病有戰而汗出因得解者何也答曰脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛是以發戰以脈浮故當汗出而解若脈浮而數按之不芤此人本不虛若欲自解但汗出耳不發戰也本條詞句重疊不類仲聖口吻然而說理至精可以奉信抑余尤有說焉伸之如下凡汗出而愈屬於太陽病居多屬於少陽病次之屬於陽明病者鮮夫太陽之戰汗原不足以為異少陽病服柴胡湯已其濈然或戰而汗出解者或亦有太陽之邪錯雜於其間也至本案陽明病之戰汗亦無非舊日太陽或少陽之宿邪寄於肌表三焦醫者不能善為汗解及其病已轉為陽明則液灼不能化汗醫更無暇及之及其後陽明病愈陰液少復病者自己之正氣欲除久伏之宿邪故不得已出於一戰耳由是觀之謂本案曰陽明之戰汗者特就其近病而言之耳猶非至通之論也戰汗者破釜沉舟背城借一之謂也戰而勝則生不勝則死一戰不決則再三戰以求其果蓋久病之後正氣不堪病魔之纏擾故寧與一決雌雄以判勝負是故戰汗乃生死之樞機陰陽所從分醫者病家當共深曉爰錄三則以為參考傷寒證治明條云凡傷寒疫病戰汗者病人忽身寒鼓頷戰慄急與姜米湯熱飲以助其陽須臾戰定當發熱汗出而解或有病人惡熱盡去衣被逆閉其汗不得出者當以生薑豆豉紫蘇等發之有正氣虛不能勝邪作戰而無汗者此為艱治若過半日或至夜而有汗又為愈也如仍無汗而神昏脈漸脫者急以人參薑棗煎湯以救之又有老人虛人發戰而汗不行隨即昏悶不知人事此正氣脫而不復蘇矣又云余見疫病有五六次戰汗者不為害也蓋為邪氣深不得發透故耳又有二三次復舉者亦當二三次作戰汗出而愈醫林繩墨云應汗而脈虛弱者汗出必難戰不得汗不可強助無汗即死當戰不得用藥用藥有禍無功要助其汗多用薑湯溫疫論云應下失下氣消血耗即下亦作戰汗但戰而不汗者危以中氣虧微但能降陷不能升發也次日當期復戰厥回汗出者生厥不回汗不出者死以正氣脫不勝其邪也戰而厥回無汗者真陽尚在表氣枯涸也可使漸愈凡戰而不復忽痙者必死痙者身如屍牙關緊目上視凡戰不可擾動但可溫覆擾動則戰而中止次日當期復戰又云狂汗者伏邪中潰欲作汗解因其人稟賦充盛陽氣衝擊不能頓開故忽然坐臥不安且狂且躁少頃大汗淋漓狂躁頓止脈靜身涼霍然而愈溫疫論又云溫疫得下證日久失下日逐下利純臭水晝夜十數行乃致口燥唇乾舌裂如斷醫者按仲景協熱下利治法與葛根黃連黃芩湯服之轉劇余診視乃熱結旁流急與大承氣湯一服去宿糞甚多色如敗醬狀如黏膠臭惡異常是晚利止次日服清燥湯一劑脈尚沉再下之脈始浮下證減去肌表尚存微熱此應汗解雖不得汗然里邪先盡中氣和平所以飲食漸進半月後忽作戰汗表邪方解蓋緣下利日久表裡枯燥之極飲食半月津液漸回方能得汗所謂積流而渠自通也可見脈浮身熱非汗不解血燥津枯非液不汗昔人以奪血無汗今以奪液亦無汗血液雖殊枯燥則一則知溫疫非藥可得汗者矣本節上半可作自利清水大承氣證之補註下半可作余說戰汗多屬太陽病之別解曹穎甫曰戰汗多屬太陽為前人所未發蓋太陽有寒水他經不當有寒水也凡戰汗而愈之病皆由太陽失表所致在少陽一經猶曰手少陽三焦為寒水下行之經隧而陽明已經化燥則斷斷不應有此而卒見此證者或由其人水分太多上膈水氣猶在腸胃已經化燥水氣被蒸化為濕熱與燥矢相持而不動燥矢一去濕熱不能獨留乃戰汗而外出數十年來偶然一見要未可據為成例也佐景又按以上吾師各案皆為依法治之而得生者所謂驗案是也然而驗案之書多矣掩不善而著善何足貴者吾今特選吾師治而不驗之案詳盡述之以存真跡而昭大信考其不治之由或因病情之過重或因證方之未合或因藥量之嫌輕或因人事之未盡拙按內悉旁徵博引細為推求間有越仲聖之大範者不計也總冀閱者獲此庶了若觀火洞垣一方以後即遇此種疑難險證亦能治之而驗夫如是則今茲不驗之案尤遠勝於吾前此之驗案也歟第九八案陽明嘔多穎師醫案陸左八月二十九日住大興街傷寒八九日噦而腹滿渴飲小便多不惡寒脈急數此即仲師所謂知其何部不利利之而愈之證也生錦紋軍三錢後入生甘草二錢枳實二錢芒硝二錢沖服拙巢注此證下後呃不止二日死佐景按大論曰傷寒嘔多雖有陽明證不可攻之按嘔多與嘔異凡嘔多不止者其胃機能必衰逆更加硝黃甘寒以傷其氣是為誤治法當先治其嘔為是吾師傷寒發微注本條云蓋即金匱病人慾吐者不可下之之說也胃中鬱熱上泛濕痰壅於上膈便當用瓜蒂散以吐之胃中虛氣上逆而胸滿者則吳茱萸湯以降之否則無論何藥入咽即吐雖欲攻之烏得而攻之故必先殺其上逆之勢然後可行攻下予每遇此證或先用一味吳萸湯間亦有肝膽鬱熱而用萸連湯者嘔吐即止然後以大承氣湯繼之陽明實熱乃得一下而盡須知有陽明證四字即隱示人以可攻若不於無字處求之但狃於胃氣之虛視芒硝大黃如蛇蠍真瞌睡漢耳薛生白先賢曰濕熱證嘔惡不止晝夜不差欲死者宜用川連三四分蘇葉二三分兩味煎湯呷下即止可以互參曹穎甫曰予昔治肉莊範阿良婦十五日不大便終日嘔吐渴而飲水吐尤甚予診其脈洪大而實用大承氣湯生軍三錢枳實三錢川樸二錢芒硝三錢以其不能進藥也先用吳萸三錢令其煎好先服一劑愈後治菜市街福興祥衣莊男子大熱脈實大便七日不行亦以其茶水入口即吐也先用薑汁半夏三錢吳萸一錢川連三分令其先行煎服然後用大黃三錢枳實四錢厚朴一錢芒硝三錢亦以一劑愈蓋見嘔吐者易治見噦逆者艱治世有能治此者吾當北面事之第九九案陽明津竭穎師醫案甘右初診四月八日陽明病十四日不大便闕上痛譫語手足濈然汗出脈滑大宜大承氣湯生川軍五錢後入枳實四錢川樸錢半芒硝三錢沖服二診四月九日下經三次黑而燥譫語如故脈大汗出前方加石膏知母石膏一兩知母五錢加入前方中佐景按張氏錫純曰愚臨證實驗以來知陽明病既當下其脈遲者固可下即其脈不遲而又不數者亦可下惟脈數及六至則不可下即強下之病必不解或病更加劇而愚對於此等病則有變通之下法即用白虎加人參湯將石膏不煎入湯中而以所煎之湯將石膏送服者是也愚因屢次用此方奏效遂名之為白虎承氣湯方為生石膏八錢搗細大潞黨參三錢知母八錢甘草二錢粳米二錢藥共五味將後四味煎湯一盅半分二次將生石膏細末用溫藥湯送下服初次藥後遲兩點鐘若腹中不見行動再服第二次若腹中已見行動再遲點半鐘大便已下者停服若仍未下者再將第二次藥服下至若其脈雖數而洪滑有力者用此方時亦可不加黨參愚從來遇寒溫證之當下而脈象數者恆投以大劑白虎湯或白虎加人參湯其大便亦可通下然生石膏必須用至四五兩煎一大碗分數次溫服大便始可通下間有服數劑後大便仍不通下者其人亦恆脈靜身涼少用玄明粉二三錢和蜜沖服大便即可通下然終不若白虎承氣用之較便也按生石膏若服其研細之末其退熱之力一錢抵煎湯者半兩若以之通大便一錢可抵煎湯者一兩是以方中止用生石膏八錢而又慎重用之必分二次服下也寒溫陽明病其熱甚盛者投以大劑白虎湯其熱稍退翌日恆病仍如故如此反復數次病家終疑藥不對證而轉延他醫因致病不起者多矣愚復擬得此方初次用大劑白虎湯不效二次即將生石膏細末送服其湯中用五六兩者送服其末不過兩餘或至二兩其熱即可全消矣張氏謂脈遲可下脈數難下吾師則謂下後脈和者安脈轉洪數者危其理正有可通之處要皆經驗之談不可忽視者也張氏謂生石膏研細末送服一錢可抵煎湯者一兩信然余則謂生石膏研細煎服一錢亦可抵成塊煎服者三錢大論原文本謂打碎棉裹可以知之若夫熟石膏有凝固痰濕之弊切不可用張氏為此曾大聲疾呼以告國人誠仁者之言也三診四月十日兩次大下熱勢漸平惟下後津液大傷應用白虎加人參湯無如病家貧苦姑從生津著意生石膏五錢知母三錢生草二錢天花粉一兩北沙參一兩元參三錢粳米一撮先煎拙巢注此證當兩次下後脈仍洪大舌乾不潤竟以津液枯竭而死可悲也佐景按張氏又曰愚用白虎加人參湯或以玄參代知母產後寒溫證用之或以芍藥代知母寒溫兼下利者用之或以生地黃代知母寒溫兼陰虛者用之或以生山藥代粳米產後寒溫證用之寒溫熱實下焦氣化不固者用之或於原方中加生地黃玄參花粉諸藥以滋陰生津加鮮茅根鮮蘆根生麥芽諸藥以宣通氣化凡人外感之熱熾盛真陰又復虧損此乃極危險之症此時若但用生地玄參沙參諸藥以滋陰不能奏效即將此等藥加於白虎湯中亦不能奏效惟石膏與人參並用獨能於邪熱熾盛之時立復真陰此仲師制方之妙實有挽回造化之權也觀本案以病家貧苦無力用人參卒致不起可證張氏之言為不虛津竭而又當下之證固不可貿然用大承氣除張氏之白虎承氣湯法外尚有麻子仁丸法惟麻仁如不重用依然無效又有豬膽汁導法取其苦寒軟堅自下及上亦每有效若節庵陶氏黃龍湯法即大承氣湯加人參地黃當歸正邪兼顧屢建奇功降至承氣養營湯即小承氣湯加知母當歸芍藥地黃效相彷彿又聞有名醫仿白虎加人參之例獨加人參一味於大承氣湯中預防其下後之脫亦是妙策至吳鞠通之增液承氣湯其功原在承氣而不在增液若其單獨增液湯僅可作病後調理之方決不可倚為病時主要之劑故溫病條辨中焦篇十一條增液湯主之句下復曰服增液湯已周十二時觀之若大便不下者合調胃承氣湯微和之蓋彼亦知通幽蕩積非增液湯所能也沈仲圭先生論此甚詳非虛語也倘有人尚執迷增液湯之足恃請再檢閱下引之一則李健頤先生作增液湯殺人篇曰俞某與余素善在船上為舵工因洋中感冒溫邪甚篤適為狂風所阻迨兩星期始抵潭港邀余診視六脈沉實口渴引飲舌絳焦黑肌膚大熱多汗便秘按照溫病條辨中焦所列暑溫蔓延三焦與三石湯合增液湯以救液清液之法治之連服二劑熱退身涼惟舌苔不退大便未通意欲用承氣下之緣以初權醫職一則心膽細小再則太顧清議況過信吳鞠通所云溫病禁用汗下所以未敢劇下至午後大熱復作再與前方次日稍愈愈而復作綿延十餘日不惟大熱不減更加語亂神倦乃改與調胃承氣迨夜半連下二次其病若失知飢欲食連食稀粥兩碗遂止後服於此時也仍不忘鞠通之言大便既下須止後服等語改用增液白虎隔二日熱勢復發再延某醫亦止用增液湯加犀角芩連而已竟至不治嗚呼傷哉時余以俞某之不起亦命矣夫不意續讀世補齋傷寒陽明病釋謂傷寒有五傳入陽明遂成溫病斥鞠通用增液之誤凡溫病皆宜以陽明治之余方悟是病乃因於不敢用承氣而特增液誤之之過也蓋陽明實病裡熱已盛腸胃燥結燥氣上熏燥灼津液正當用承氣白虎下其大便則燥熱可解津液挽復諸病可愈然餘隻以條辨一書奉之如圭臬何敢稍越其用藥之意遂致臨診不決便成誤治余過大矣遂遇有是症輒投承氣白虎而治愈者不少可知醫者當博覽群書切勿墨守一家言以貽世害余自此撫躬自警益加虛心精心研究戰戰兢兢惟恐再蹈覆轍矣錄醫界春秋由是觀之孰為溫病孰為陽明直是不可分辨若必欲一一鑿分即是自欺欺人陸公謂傷寒傳入陽明遂成溫病我猶嫌其言之不徹底何者設使吾心目中依然有溫病廣義的二字之存在即是我於傷寒大論未盡瞭解故也或者陸公但求與人共喻故亦不惜作此類通俗說法乎嗚呼肺腑而能語醫師面如土能毋慨然曹穎甫曰醫至今日難言矣醫者身負盛名往往不敢用藥遷延日久精氣日敗然後囑病家另請高明後醫見證之可下也不暇考其精氣存亡而下之而死之罪乃歸於後醫矣前醫又稍稍語人曰某家病某醫之所殺也其術乃終身不破昔有某富翁患溫熱病累日不大便延某名醫診治日易一方大要不外增液湯加減積至三十餘日夜不成寐晝尤煩躁病者求死不得名醫乃用挖糞下策稍稍挖出黑糞而大便終不得行延至四十日以至於死聞將死之前某名醫謂病家曰此病若請曹穎甫醫治尚有一二分希望友人裴君來告津液已枯不可往診乃止後二日病者果死予心常耿耿焉竊意用豬膽汁灌腸或能僥倖於萬一死者不可復生徒呼負負而已第一案陽明鼻衄穎師醫案陳右住九畝地年二十九歲初診四月十七日十八日不大便腹脹痛脈洪大右足屈而不伸壯熱證屬陽明予調胃承氣湯生川軍三錢生甘草錢半芒硝二錢二診四月十八日昨進調胃承氣湯下經四次陽明之熱上衝腦部遂出鼻衄渴飲脈仍洪數法當清熱鮮蘆根一兩天花粉一兩地骨皮三錢鮮生地六錢生石膏五錢肥知母三錢玉竹三錢生草二錢元參三錢拙巢注此證卒以不起大約以下後脈大陽氣外張與前所治之甘姓相似蓋陰從下竭陽從上脫未有不死者也佐景按本證至於鼻衄似宜犀角地黃湯即小品芍藥地黃湯湯中犀角能降低血壓除血中之熱丹皮能調劑血運去血中之瘀生地內有鐵質足資生血之源芍藥中含酸素善令靜脈迴流四物皆為血藥誠治血熱之良方也本證未下之先熱結腸中一處既下之後熱散周身血脈亦有不經攻下而然者血熱既臻極點乃從脆弱之處溢射或從鼻出或從口出或從溺出或從便出其形雖異其治則一千金曰犀角地黃湯治傷寒及溫病應發汗而不汗之內蓄血者及鼻衄吐血不盡內余瘀血面黃大便黑消瘀血可以證之溫病條辨曰太陰溫病血從上溢者犀角地黃湯合銀翹散治之又曰時欲漱口不欲咽大便黑而易者有瘀血也犀角地黃湯主之悉不出千金範圍細審本湯或系仲聖之方而傷寒金匱所遺落者不然則本方殊足以補二書之未備彌足珍也千金外臺諸方以犀角為主藥者甚多悉可覆按後人以此加神靈之品如羚羊牛黃增香竄之物如安息麝香添重鎮之藥如金銀硃砂擴而充之乃成紫雪至寶之屬善自施用原不失為良方惜乎俗醫信之過專用之過濫一遇神昏譫語動謂邪迷心包不問其是否承氣之證悉假之作孤注一擲及其不效則病家無怨詞以為劫數難挽醫家無悔意以為吾心無愧茫茫浩劫方今未已至足憫也至犀角早用亦多弊端故太炎章氏有言曰有以為溫病藥總宜涼每令早服犀角而反致神昏譫語者比比觀仲景方未有用犀角者本草謂犀角解毒千金外臺方中多以犀角止血故凡大吐衄大崩下或便血等多以犀角治之蓋犀角有收縮血管之功用也陽明病原自有汗今反以犀角收之於是將邪逼入腸胃神昏譫語自然起矣人每不明此理以為神昏譫語終是邪入包絡因此犀角之誤治終不了然惟陸九芝為能知之耳由是以觀河間已遜仲景葉吳輩更不如河間遠矣蓋亦有感而發然而陸氏犀角膏黃辨最後之結論曰病豈必無膏黃之不能愈而待愈於犀角者哉然必在用過膏黃之後必不在未用膏黃之前蓋亦有可決者方是持平之論也至犀角與羚羊角之功用大同小異之處亦當求其幾微之辨吳兄凝軒與余共研此事得結論曰犀角能降低血壓其主在血液羚羊角能涼和神經其主在神經依舊說血液為心所主故曰犀角為心經藥神經為肝所屬故曰羚羊角為肝經藥然而血熱者神經每受灼神經受灼者其血必更熱二者常互為因果故二藥常相須而用同中之異如此而已曹穎甫曰近世犀角羚羊角二味其價翔貴非大貴鉅富之家罕有用入煎劑者若遇貧寒之人則有方與無方同直坐待其死耳吾願同道諸君子分其診金之餘俾貧病同胞於萬死中求得一生路吾中醫前途庶有濟乎佐景又按以上各節皆為醫理之探討夫陽明無死證在理論固是然而陽明病之不起又有屬於人事之未盡者試言一點以為證明余謂凡屬險證類皆變化多端忽而神昏譫語忽而撮空摸床忽而寒戰若死忽而汗出幾脫忽而熱化忽而寒化猶如夏令酷蒸仰觀則萬里無雲俯視則流金爍石忽而油云密布沛然下雨其變之倏也乃間不容髮故治若此之病理當醫者不離病人一醫之不足恃會數醫而共圖之隨脈證之傳變作迅捷之處置以是赴之庶或有濟然而通常病家力不能辦此一診之後須待來日不知其間變化已多即其獲救之機會失去者亦多舉例以明之有用大承氣下後即當用參耆歸芍以救其虛者然而病家不知徒事驚惶亂其所措而病者撒手矣嗚呼安得廣廈千間良醫百人集世之絕險大證起其死而還之生功德無量當勝造浮屠萬座今聞吾國醫館長焦公易堂有鑑及此方努力籌建首都國醫院以為全國倡而上海國醫分館館長沈公仲芳更節其花甲令誕之賀儀筵資以助該院建築經費行見登高一呼萬方響應眾擎易舉集腋成裘拯同胞之疾苦揚中醫之權威闡學術於神明之境臻世界於大同之域馨香祈祝企予望之
